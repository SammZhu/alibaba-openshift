---
# Build the cluster-stack ROS parameter list into `_cluster_stack_params`.
# Shared by 06-create-cluster-stack.yml (initial create) and
# 06b-reimage-masters.yml (Agent-based phase-2 stack update) so the two never
# drift.  Caller MUST set:
#   cluster_stack_image_id   — value for the ImageId parameter.  The placeholder
#                              system image on the Agent-based phase-1 create; the
#                              real ecs_image_id on AI create and on ABI phase-2.
# Caller must already have loaded state + mirror_defaults and resolved
# _effective_control_plane_count / _effective_compute_count and _ssh_pub_slurp.

- name: cluster_stack_params — assemble ROS Parameters
  ansible.builtin.set_fact:
    _cluster_stack_params:
      # ── mirror-stack outputs passed through ──────────────────────
      - ParameterKey: VpcId
        ParameterValue: "{{ mirror_vpc_id }}"
      - ParameterKey: VpcCidr
        ParameterValue: "{{ mirror_vpc_cidr | default(vpc_cidr) }}"
      - ParameterKey: PrivateVSwitchId
        ParameterValue: "{{ mirror_private_vsw_1 }}"
      - ParameterKey: PrivateVSwitch2Id
        ParameterValue: "{{ mirror_private_vsw_2 }}"
      - ParameterKey: ZoneId
        ParameterValue: "{{ mirror_zone_id | default(zone) }}"
      - ParameterKey: ZoneId2
        ParameterValue: "{{ mirror_zone_id2 | default(zone2) }}"
      - ParameterKey: NodeRamRoleName
        ParameterValue: "{{ mirror_node_ram_role }}"
      - ParameterKey: JumpHostSecurityGroupId
        ParameterValue: "{{ jump_host_sg_id if (jump_host_sg_id | default('') | length > 0) else 'none' }}"
      - ParameterKey: EnableJumpHostSsh
        ParameterValue: "{{ 'true' if (jump_host_sg_id | default('') | length > 0) else 'false' }}"
      # ── cluster-specific ─────────────────────────────────────────
      - ParameterKey: ClusterName
        ParameterValue: "{{ cluster_name }}"
      - ParameterKey: BaseDomain
        ParameterValue: "{{ base_domain }}"
      - ParameterKey: Region
        ParameterValue: "{{ region }}"
      # ENI-first: empty on the ABI phase-1 (ENI-only) create, real image on
      # AI create and ABI phase-2 update.  See ImageId description in
      # ros-templates/cluster-stack.yaml.
      - ParameterKey: ImageId
        ParameterValue: "{{ cluster_stack_image_id }}"
      - ParameterKey: ControlPlaneCount
        ParameterValue: "{{ _effective_control_plane_count | string }}"
      - ParameterKey: ControlPlaneInstanceType
        ParameterValue: "{{ control_plane_type }}"
      - ParameterKey: ComputeCount
        ParameterValue: "{{ _effective_compute_count | string }}"
      - ParameterKey: ComputeInstanceType
        ParameterValue: "{{ compute_type }}"
      - ParameterKey: SystemDiskCategory
        ParameterValue: "{{ system_disk_category }}"
      - ParameterKey: SystemDiskSize
        ParameterValue: "{{ system_disk_size | string }}"
      - ParameterKey: InstallDiskSize
        ParameterValue: "{{ install_disk_size | string }}"
      - ParameterKey: RendezvousIp
        ParameterValue: "{{ rendezvous_ip }}"
      - ParameterKey: IngressVip
        ParameterValue: "{{ ingress_vip }}"
      - ParameterKey: InstallationMethod
        ParameterValue: "{{ installation_method }}"
      - ParameterKey: SshPublicKey
        ParameterValue: "{{ _ssh_pub_slurp.content | b64decode | trim }}"
