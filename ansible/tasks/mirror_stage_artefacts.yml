---
# Stage the mirror-registry installer + version marker in OSS so Phase 03's
# mirror-ECS cloud-init can fetch them via the internal endpoint instead of
# trying to curl from mirror.openshift.com (which 307-redirects through
# access.cdn.redhat.com to a signed URL that is unreliable from cn-* regions).
#
# Caller must define:
#   - _oss_endpoint  (e.g. "oss-cn-wulanchabu.aliyuncs.com")
#   - _oss_ak / _oss_sk
#
# Idempotency: each OSS object existence is checked before download/upload.
- name: Mirror — auto-discover latest mirror-registry version (or honor override)
  ansible.builtin.shell: |
    V={{ (mirror_registry_version | default('')) | quote }}
    if [ -n "$V" ]; then
      echo "$V"
    else
      curl -sL https://mirror.openshift.com/pub/openshift-v4/clients/mirror-registry/ \
        | grep -oE 'href="[^"]+/"' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' \
        | sort -V | tail -1
    fi
  register: _mr_version_query
  changed_when: false

- name: Mirror — set version fact
  ansible.builtin.set_fact:
    _mirror_registry_version: "{{ _mr_version_query.stdout | trim }}"

- name: Mirror — assert version discovered
  ansible.builtin.assert:
    that: _mirror_registry_version | length > 0
    fail_msg: |
      Could not auto-discover mirror-registry version.  Possible causes:
        - This host can't reach mirror.openshift.com
        - The directory listing format changed
      Workaround: pass an explicit version via group_vars or -e:
        mirror_registry_version: "1.3.11"

- name: Mirror — check whether installer already in OSS (idempotency)
  ansible.builtin.command:
    argv:
      - aliyun
      - oss
      - stat
      - "oss://{{ oss_bucket }}/mirror-tarballs/mirror-registry-{{ _mirror_registry_version }}.tar.gz"
      - "--endpoint={{ _oss_endpoint }}"
      - "--access-key-id={{ _oss_ak }}"
      - "--access-key-secret={{ _oss_sk }}"
  register: _mr_oss_stat
  changed_when: false
  failed_when: false
  no_log: true

- name: Mirror — download installer from Red Hat (anonymous; ~700 MB, may take 5-15 min)
  ansible.builtin.get_url:
    url: "https://developers.redhat.com/content-gateway/file/pub/openshift-v4/clients/mirror-registry/{{ _mirror_registry_version }}/mirror-registry.tar.gz"
    dest: "/tmp/mirror-registry-{{ _mirror_registry_version }}.tar.gz"
    mode: "0644"
    timeout: 60
    force: false
  when: _mr_oss_stat.rc != 0

- name: Mirror — upload installer to OSS
  ansible.builtin.command:
    argv:
      - aliyun
      - oss
      - cp
      - "/tmp/mirror-registry-{{ _mirror_registry_version }}.tar.gz"
      - "oss://{{ oss_bucket }}/mirror-tarballs/mirror-registry-{{ _mirror_registry_version }}.tar.gz"
      - "--endpoint={{ _oss_endpoint }}"
      - "--access-key-id={{ _oss_ak }}"
      - "--access-key-secret={{ _oss_sk }}"
      - "--part-size=104857600"
      - "--parallel=10"
      - "--force"
  when: _mr_oss_stat.rc != 0
  no_log: true

- name: Mirror — write local version-marker file
  ansible.builtin.copy:
    content: "{{ _mirror_registry_version }}"
    dest: "/tmp/mirror-registry-version.txt"
    mode: "0644"

- name: Mirror — upload version marker to OSS (always; cheap; cloud-init reads it)
  ansible.builtin.command:
    argv:
      - aliyun
      - oss
      - cp
      - "/tmp/mirror-registry-version.txt"
      - "oss://{{ oss_bucket }}/mirror-tarballs/mirror-registry-version.txt"
      - "--endpoint={{ _oss_endpoint }}"
      - "--access-key-id={{ _oss_ak }}"
      - "--access-key-secret={{ _oss_sk }}"
      - "--force"
  no_log: true

# ── Also stage the OpenShift patch version marker ─────────────────────────────
# Cloud-init constructs the versioned URL for oc + oc-mirror download.  The
# previous /latest/ symlinks on mirror.openshift.com are 404 now; URLs must
# pin to a specific patch (e.g. .../ocp/4.20.22/oc-mirror.tar.gz).
#
# Three sources, in priority order:
#   1. -e openshift_patch_version=X.Y.Z (explicit override)
#   2. openshift_version itself when already X.Y.Z form (the recommended setup —
#      single source of truth in group_vars/all.yml; see 04's assert)
#   3. Cincinnati graph lookup for stable-X.Y channel (legacy/channel-form path)
- name: Mirror — discover OpenShift patch version
  ansible.builtin.shell: |
    V={{ (openshift_patch_version | default('')) | quote }}
    OSV={{ openshift_version | quote }}
    if [ -n "$V" ]; then
      echo "$V"
    elif echo "$OSV" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
      # openshift_version is already specific patch; use as-is (no Cincinnati needed)
      echo "$OSV"
    else
      # Channel form (e.g. "4.20") — ask Cincinnati for the latest in this channel
      curl -sfSL "https://api.openshift.com/api/upgrades_info/v1/graph?channel=stable-$OSV" \
        -H 'Accept: application/json' \
        | jq -r '.nodes[].version' | sort -V | tail -1
    fi
  register: _ocp_patch_query
  changed_when: false

- name: Mirror — set OpenShift patch version fact
  ansible.builtin.set_fact:
    _openshift_patch_version: "{{ _ocp_patch_query.stdout | trim }}"

- name: Mirror — assert OpenShift patch version discovered
  ansible.builtin.assert:
    that: _openshift_patch_version | length > 0
    fail_msg: |
      Could not derive OpenShift patch version.
      Tried (in order):
        1. -e openshift_patch_version=X.Y.Z       — not set
        2. openshift_version (group_vars/all.yml) — '{{ openshift_version }}'
           (must be X.Y.Z to use directly)
        3. Cincinnati graph for stable-{{ openshift_version }} — empty/404
      Set openshift_version to a specific patch in all.yml (e.g. "4.20.22"),
      OR run with `-e openshift_patch_version=X.Y.Z` to override.

- name: Mirror — write local OpenShift patch version marker
  ansible.builtin.copy:
    content: "{{ _openshift_patch_version }}"
    dest: "/tmp/openshift-patch-version.txt"
    mode: "0644"

- name: Mirror — upload OpenShift patch version marker to OSS
  ansible.builtin.command:
    argv:
      - aliyun
      - oss
      - cp
      - "/tmp/openshift-patch-version.txt"
      - "oss://{{ oss_bucket }}/mirror-tarballs/openshift-patch-version.txt"
      - "--endpoint={{ _oss_endpoint }}"
      - "--access-key-id={{ _oss_ak }}"
      - "--access-key-secret={{ _oss_sk }}"
      - "--force"
  no_log: true

- name: Mirror — report staged artefacts
  ansible.builtin.debug:
    msg: |
      ✓ Mirror artefacts staged in OSS:
          oss://{{ oss_bucket }}/mirror-tarballs/mirror-registry-{{ _mirror_registry_version }}.tar.gz
          oss://{{ oss_bucket }}/mirror-tarballs/mirror-registry-version.txt → {{ _mirror_registry_version }}
          oss://{{ oss_bucket }}/mirror-tarballs/openshift-patch-version.txt → {{ _openshift_patch_version }}
