---
# Relay the 3 Assisted/ABI discovery images (assisted-installer-agent,
# assisted-installer, assisted-installer-controller) into the mirror via the
# OPERATOR host.
#
# Why: Red Hat rotates these images' commit-tags every few days.
# refresh_tag_mapping.yml resolves the new commit-tag -> digest and writes the
# alias TSV, but the new digest's BLOBS are not in the mirror (the mirror came
# from an older tarball/snapshot).  The discovery agent then pulls
# rhai/...:<new-commit-tag> and the mirror 404s "manifest unknown".  The
# mirror + jump host are network-restricted and cannot reach registry.redhat.io,
# so we relay through the operator box (which can) — exactly the pattern the CAPA
# and CSI cross-border pre-pulls in 04 use:
#
#   operator (RHEL8): skopeo copy registry.redhat.io/... -> docker-archive .tar
#   transit:          scp the tar through the jump host to the mirror ECS
#   mirror ECS:       podman load + tag <mirror>:8443/<repo>:<commit-tag> + push
#
# Idempotent: each image is checked on the mirror first (curl bearer) and only
# relayed if MISSING.  Requires (already true where 04 calls this, right after
# refresh_tag_mapping.yml): _ai_versions registered, _ssh_root_mirror set,
# skopeo + registry.redhat.io creds (pull secret) on the operator host.

- name: relay-abi — build relay list (ref / repo / commit-tag) from AI versions
  ansible.builtin.set_fact:
    _abi_relay: >-
      {{ _abi_relay | default([]) + [{
           'key':  item,
           'ref':  _ai_versions.json.versions[item],
           'repo': _ai_versions.json.versions[item] | regex_replace('^registry.redhat.io/', '') | regex_replace(':.*$', ''),
           'ctag': _ai_versions.json.versions[item] | regex_replace('^.*:', '')
         }] }}
  loop:
    - discovery-agent
    - assisted-installer
    - assisted-installer-controller

- name: relay-abi — check which images are already on the mirror
  ansible.builtin.shell: |
    {{ _ssh_root_mirror }} bash <<'REMOTE'
    set -uo pipefail
    export HOME=/root
    REG={{ mirror_private_ip }}:8443
    REPO="{{ item.repo }}"; TAG="{{ item.ctag }}"
    TOKEN=$(curl -ks -u "$(jq -r .auths[].auth /root/.docker/config.json | base64 -d)" \
      "https://$REG/v2/auth?service=$REG&scope=repository:$REPO:pull" | jq -r .token)
    if curl -ksf -H "Authorization: Bearer $TOKEN" "https://$REG/v2/$REPO/manifests/$TAG" >/dev/null; then
      echo PRESENT
    else
      echo MISSING
    fi
    REMOTE
  loop: "{{ _abi_relay }}"
  loop_control:
    label: "{{ item.repo }}:{{ item.ctag }}"
  register: _abi_check
  changed_when: false

- name: relay-abi — compute the missing-image list
  ansible.builtin.set_fact:
    _abi_missing: "{{ _abi_check.results | selectattr('stdout', 'search', 'MISSING') | map(attribute='item') | list }}"

- name: relay-abi — report
  ansible.builtin.debug:
    msg: "ABI images missing on mirror, relaying via operator: {{ _abi_missing | map(attribute='repo') | list }}"

- name: relay-abi — clear stale local tars (docker-archive can't overwrite)
  ansible.builtin.file:
    path: "/tmp/abi-{{ item.key }}.tar"
    state: absent
  delegate_to: localhost
  loop: "{{ _abi_missing }}"
  loop_control:
    label: "{{ item.repo }}:{{ item.ctag }}"

- name: relay-abi — skopeo copy missing images to docker-archive (operator, online)
  # --remove-signatures: the rhai images are Red Hat-signed and docker-archive
  # cannot store signatures ("Storing signatures for docker tar files is not
  # supported"); we drop them for the local relay tar.  --src-authfile reads the
  # registry.redhat.io creds straight from the pull secret (keeps creds out of
  # argv, so this task can log its error on failure).
  ansible.builtin.command:
    argv:
      - skopeo
      - copy
      - --src-tls-verify=true
      - --remove-signatures
      - --retry-times=5
      - --src-authfile
      - "{{ pull_secret_file }}"
      - "docker://{{ item.ref }}"
      - "docker-archive:/tmp/abi-{{ item.key }}.tar:{{ item.repo }}:{{ item.ctag }}"
  delegate_to: localhost
  loop: "{{ _abi_missing }}"
  loop_control:
    label: "{{ item.repo }}:{{ item.ctag }}"
  register: _abi_pull
  retries: 3
  delay: 20
  until: _abi_pull.rc == 0
  changed_when: true

- name: relay-abi — scp tars to the mirror ECS via jump host
  ansible.builtin.command:
    argv:
      - scp
      - -i
      - "{{ ssh_priv_key_file }}"
      - -o
      - StrictHostKeyChecking=no
      - -o
      - UserKnownHostsFile=/dev/null
      - -o
      - "ProxyCommand=ssh -i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@{{ jump_host_ip }}"
      - "/tmp/abi-{{ item.key }}.tar"
      - "root@{{ mirror_private_ip }}:/tmp/abi-{{ item.key }}.tar"
  loop: "{{ _abi_missing }}"
  loop_control:
    label: "{{ item.repo }}:{{ item.ctag }}"
  register: _abi_scp
  retries: 3
  delay: 10
  until: _abi_scp.rc == 0
  changed_when: true

- name: relay-abi — load + tag + push on the mirror ECS
  ansible.builtin.shell: |
    {{ _ssh_root_mirror }} bash <<'REMOTE'
    set -euxo pipefail
    export HOME=/root
    REG={{ mirror_private_ip }}:8443
    SRC="{{ item.repo }}:{{ item.ctag }}"
    DST="$REG/{{ item.repo }}:{{ item.ctag }}"
    podman load -i /tmp/abi-{{ item.key }}.tar
    podman tag  "$SRC" "$DST"
    podman push --tls-verify=false "$DST"
    rm -f /tmp/abi-{{ item.key }}.tar
    echo "OK: $DST now on mirror"
    REMOTE
  loop: "{{ _abi_missing }}"
  loop_control:
    label: "{{ item.repo }}:{{ item.ctag }}"
  register: _abi_relay_push
  retries: 3
  delay: 10
  until: _abi_relay_push.rc == 0
  changed_when: true
