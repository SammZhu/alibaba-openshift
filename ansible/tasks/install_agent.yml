---
# tasks/install_agent.yml — Agent-based Installer (installation_method=Agent-based)
# install monitoring, ON THE MIRROR ECS.  Included by 07-install-cluster-agent.yml.
#
# The agent assets (install_dir with auth/ + .openshift_install_state.json) live
# on the mirror ECS where 01 (iso_agent.yml) built them, and the mirror ECS is
# in-VPC so it resolves the cluster's PrivateZone (api.<cluster>.<domain>) and
# can run `openshift-install agent wait-for`.  We wait there, then scp the
# kubeconfig back to {{ output_dir }}/auth on the operator host (same location
# the AI path uses, so 08+ are unchanged).  No host-role assignment / manifest
# upload / install trigger — all baked into the agent ISO at 01; the install
# auto-starts when 06 (cluster-stack) boots the nodes.

- name: ABI — set mirror ECS ssh connection facts
  ansible.builtin.set_fact:
    _ssh_common_args: "-i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=6 -o TCPKeepAlive=yes"
    _ssh_proxy_args: "-o ProxyCommand='ssh -i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@{{ jump_host_ip }}'"
    _m_install_dir: /var/lib/quay-storage/agent-build/install

- name: ABI — set _ssh_root_mirror
  ansible.builtin.set_fact:
    _ssh_root_mirror: "ssh {{ _ssh_common_args }} {{ _ssh_proxy_args }} root@{{ mirror_private_ip }}"

- name: ABI — assert agent assets exist on the mirror ECS (01/06 ran)
  ansible.builtin.shell: >-
    {{ _ssh_root_mirror }} 'test -f {{ _m_install_dir }}/.openshift_install_state.json'
  changed_when: false

# ansible buffers async/poll stdout, so the wait-for output below is NOT shown
# live — for a live progress view run scripts/abi-monitor.sh in a SECOND
# terminal on the operator host.  We also tee each milestone to a log on the
# mirror ECS so progress survives for after-the-fact inspection.
- name: ABI — live-monitor hint
  ansible.builtin.debug:
    msg: >-
      Watch progress live in another terminal:  scripts/abi-monitor.sh
      — it streams `agent wait-for` from the mirror ECS, bypassing ansible's
      async buffering.  Logs also tee to {{ _m_install_dir }}/wait-bootstrap.log
      and wait-install.log on the mirror ECS.

# wait-for blocks until the milestone or its own timeout; bootstrap ~20-40 min,
# install-complete longer.  async/poll guards the long-running ssh command.
# `set -o pipefail` so the task's rc reflects openshift-install, not tee.
- name: ABI — wait for bootstrap-complete (on mirror ECS)
  ansible.builtin.shell: >-
    {{ _ssh_root_mirror }} 'set -o pipefail; openshift-install agent wait-for bootstrap-complete --dir {{ _m_install_dir }} --log-level=info 2>&1 | tee {{ _m_install_dir }}/wait-bootstrap.log'
  args:
    executable: /bin/bash
  async: 3600
  poll: 30
  changed_when: false

# IMPORTANT ordering: harvest the kubeconfig and rewrite *.apps DNS *between*
# bootstrap-complete and install-complete — NOT after.  `wait-for
# install-complete` blocks until ALL cluster operators are Available, and
# authentication/console/ingress only converge once the *.apps wildcard
# resolves to a node running router-default.  The cluster-stack seeds *.apps
# with a placeholder (IngressVip), so if we waited for install-complete first
# we'd deadlock (operators wait on DNS, DNS rewrite waits on install-complete).
# The AI path doesn't hit this because it confirms via assisted-service, not
# `openshift-install wait-for`.  The kubeconfig from `agent create image` is a
# valid admin kubeconfig the moment bootstrap is up, so harvesting it here is
# safe.

# ── harvest credentials back to the operator host (same path the AI path uses) ──
- name: ABI — ensure local output auth dir exists
  ansible.builtin.file:
    path: "{{ output_dir }}/auth"
    state: directory
    mode: "0700"

- name: ABI — scp kubeconfig + kubeadmin-password back from the mirror ECS
  ansible.builtin.command:
    argv:
      - scp
      - -i
      - "{{ ssh_priv_key_file }}"
      - -o
      - StrictHostKeyChecking=no
      - -o
      - UserKnownHostsFile=/dev/null
      - -o
      - "ProxyCommand=ssh -i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@{{ jump_host_ip }}"
      - "root@{{ mirror_private_ip }}:{{ _m_install_dir }}/auth/{{ item }}"
      - "{{ output_dir }}/auth/{{ item }}"
  loop:
    - kubeconfig
    - kubeadmin-password
  register: _abi_kc_scp
  retries: 3
  delay: 10
  until: _abi_kc_scp.rc == 0
  changed_when: true

- name: ABI — set kubeconfig_path fact
  ansible.builtin.set_fact:
    kubeconfig_path: "{{ output_dir }}/auth/kubeconfig"

- name: ABI — persist kubeconfig_path to state
  ansible.builtin.include_tasks: ../tasks/save_state.yml
  vars:
    new_state:
      kubeconfig_path: "{{ kubeconfig_path }}"

# Method-agnostic post-install wiring (same as the AI 07 path does inline):
# stage kubeconfig on the jump host (/root/kubeconfig — 08+ run oc there) and
# rewrite the *.apps wildcard PrivateZone record to a real router node so the
# console/ingress/auth operators can converge.  MUST run before install-complete
# (see ordering note above).
- name: ABI — stage kubeconfig on jump host + rewrite *.apps DNS
  ansible.builtin.include_tasks: ../tasks/post_install_apps_dns.yml

# Now that *.apps resolves to a router node, the remaining operators converge.
- name: ABI — wait for install-complete (on mirror ECS)
  ansible.builtin.shell: >-
    {{ _ssh_root_mirror }} 'set -o pipefail; openshift-install agent wait-for install-complete --dir {{ _m_install_dir }} --log-level=info 2>&1 | tee {{ _m_install_dir }}/wait-install.log'
  args:
    executable: /bin/bash
  async: 5400
  poll: 30
  changed_when: false

- name: ABI — install complete
  ansible.builtin.debug:
    msg: >-
      Agent-based install complete. kubeconfig at {{ output_dir }}/auth/kubeconfig
      and on the jump host at /root/kubeconfig; *.apps DNS rewritten. 08+ (site-post)
      run oc on the jump host as usual.
