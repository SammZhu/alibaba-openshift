---
# Phase 04 — set up the mirror-registry on the bare ECS that
# Phase 03's mirror-stack created.  Runs AFTER Phase 03 (mirror-stack), BEFORE Phase 06 (cluster-stack).
#
# Why a separate playbook (not cloud-init):
#   - Iterative debugging.  A bug in install/import logic doesn't force
#     re-creation of the whole ROS stack (VPC + 4 ECS instances + SLB + NAT).
#     Fix the playbook, re-run.  Each step is idempotent.
#   - Better error visibility.  ansible logs go to ansible/logs/ansible.log;
#     cloud-init logs are buried in /var/log/cloud-init-output.log.
#   - Standard ansible patterns: until/retries, when conditions, no_log
#     gating, jinja templating — all easier than bash heredoc in UserData.
#
# Idempotency strategy:
#   - Each "do work" task is guarded by a prior "check if already done" task.
#   - Re-running on a fully-prepared mirror is a no-op (~30 seconds).
#   - Re-running after a mid-flight failure resumes from the failed step.
- name: Prepare mirror-registry on the bare ECS provisioned by Phase 03 (mirror-stack)
  hosts: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../vars/images.yml"
  vars:
    # ServerAliveInterval/ServerAliveCountMax force ssh to send keepalive
    # probes every 30 s and disconnect after 6 missed (= 3 min silent).
    # Without these, long-running remote commands (25 GB OSS download,
    # 10-min oc-mirror import) can leave a stale TCP socket that never
    # gets FIN/RST after the remote process dies — ansible then waits
    # forever.  TCPKeepAlive is the OS-level fallback.
    _ssh_keepalive: "-o ServerAliveInterval=30 -o ServerAliveCountMax=6 -o TCPKeepAlive=yes"
    _ssh_common_args: "-i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null {{ _ssh_keepalive }}"
    _ssh_proxy_args: "-o ProxyCommand='ssh {{ _ssh_common_args }} -W %h:%p root@{{ jump_host_ip }}'"
    _ssh_root_mirror: "ssh {{ _ssh_common_args }} {{ _ssh_proxy_args }} root@{{ mirror_private_ip }}"
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml
    - ansible.builtin.include_tasks: ../tasks/path_defaults.yml
    - ansible.builtin.include_tasks: ../tasks/mirror_defaults.yml

    # Skip entire playbook gracefully when mirror is not enabled — lets
    # site.yml include us unconditionally without breaking the non-mirror flow.
    - name: Skip — mirror_enabled is false (running in non-mirror mode)
      ansible.builtin.meta: end_play
      when: not (mirror_enabled | default(false) | bool)

    - name: Sanity — Phase 03 (mirror-stack) ran with mirror_enabled and saved its outputs
      ansible.builtin.assert:
        that:
          - mirror_enabled | default(false) | bool
          - mirror_private_ip is defined and mirror_private_ip | length > 0
          - mirror_init_user is defined and mirror_init_user | length > 0
          - mirror_init_password is defined and mirror_init_password | length > 0
          - jump_host_ip is defined and jump_host_ip | length > 0
          - cluster_id is defined and cluster_id | length > 0
          - infra_env_id is defined and infra_env_id | length > 0
          - oss_bucket is defined and oss_bucket | length > 0
          - mirror_oss_object is defined and mirror_oss_object | length > 0
        fail_msg: |
          Required state is missing.  This playbook runs AFTER Phase 03 (mirror-stack) and
          requires:
            - mirror_enabled=true in group_vars
            - Phase 03 (mirror-stack) completed (state.yml has mirror_private_ip / jump_host_ip
              / cluster_id / infra_env_id)
            - mirror_oss_object / oss_bucket configured

    # ── Step 1: wait for ECS bootstrap signal ────────────────────────────────
    # Cloud-init wrote /var/lib/mirror-bootstrap-ready when the host is
    # SSH-able + has the data disk mounted + has aliyun CLI installed.
    - name: Wait for mirror ECS bootstrap-ready signal (up to 10 min)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} -o ConnectTimeout=5 test -f /var/lib/mirror-bootstrap-ready
      register: bootstrap_check
      changed_when: false
      failed_when: false
      retries: 30
      delay: 20
      until: bootstrap_check.rc == 0

    - name: Fail if mirror ECS not bootstrap-ready
      ansible.builtin.fail:
        msg: |
          Mirror ECS at {{ mirror_private_ip }} is not SSH-reachable or did not
          finish minimal cloud-init within 10 min.
          Debug:
            ssh -J root@{{ jump_host_ip }} root@{{ mirror_private_ip }} \
              cat /var/log/mirror-bootstrap.log
      when: bootstrap_check.rc | default(0) != 0

    # ── Step 2: idempotent check — is mirror already ready? ─────────────────
    # Readiness requires BOTH: (a) the /var/lib/quay-storage/mirror-ready marker,
    # AND (b) Quay actually answering on :8443.
    #
    # Why (b) is not optional — snapshot-restore failure mode (P3-FIX):
    #   The vdb snapshot preserves the image blobs (/var/lib/quay-storage/
    #   datastorage) and the marker, but Quay's postgres CATALOG DB lives in a
    #   podman named volume (pg-storage) on the ROOT disk (vda).  Aliyun
    #   CreateImage runs sysprep on vda during restore and strips the container
    #   runtime + that volume, so a restored ECS comes up with the marker +
    #   ~21 GB of ORPHANED blobs but NO running Quay (8443 refused) and no
    #   catalog.  Trusting the marker alone made 04 skip the heavy path and hit
    #   the auth sentinel, which then misreported the connection-refused as a
    #   "password drift" (observed 2026-06-05).  Gating on a real health probe
    #   makes a half-restored mirror fall through to re-install + re-import
    #   (rebuilding the catalog from the OSS tarball) instead of shipping a dead
    #   mirror.  See docs/SNAPSHOT.md.
    - name: Check mirror-ready marker (fast; a fresh build has none)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} test -f /var/lib/quay-storage/mirror-ready
      register: _mirror_marker
      changed_when: false
      failed_when: false

    # P3-FIX.9: on a snapshot-restore the marker is present but Quay's app
    # container needs ~2-3 min after cloud-init starts the units before
    # /health/instance answers.  POLL (not single-shot) so a slow-but-fine
    # restore isn't wastefully downgraded to a full 24 GB re-import.  Observed
    # 2026-06-06: Quay came up healthy ~3 min post-boot, but the single-curl
    # gate had already fallen back to the heavy path.  A fresh build (no marker)
    # skips this and goes straight to heavy work.
    - name: Wait for Quay health when marker present (restore may still be booting)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} 'curl -ksf https://{{ mirror_private_ip }}:8443/health/instance >/dev/null'
      register: already_ready
      retries: 30
      delay: 10
      until: already_ready.rc == 0
      changed_when: false
      failed_when: false
      when: _mirror_marker.rc == 0

    - name: Mark not-ready when marker absent (fresh build — no wait)
      ansible.builtin.set_fact:
        already_ready: { rc: 1 }
      when: _mirror_marker.rc != 0

    - name: Mirror already ready — skipping heavy work
      ansible.builtin.debug:
        msg: "mirror-registry is already ready (marker present and Quay healthy on :8443). Skipping install + import + PATCH still runs."
      when: already_ready.rc == 0

    # P3-COST.7: record whether this run actually (re)built the mirror content.
    # already_ready.rc == 0  → fast-path restore, no import  → mirror_imported=false
    # already_ready.rc != 0  → fresh build or restore-then-rebuild (did import)
    #                          → mirror_imported=true
    # 05-verify-mirror reads this fact (same host 'local', later play) to skip a
    # redundant re-snapshot when vdb is unchanged from the seed it was restored
    # from.  Defaults to true everywhere it is unknown, so we never silently skip
    # a needed snapshot.
    - name: Record whether this run rebuilt the mirror content (gates 05 re-snapshot)
      ansible.builtin.set_fact:
        mirror_imported: "{{ already_ready.rc != 0 }}"

    # Diagnostic: distinguish "never prepared" from "restored but Quay dead".
    # When the marker IS present yet readiness failed, the snapshot landed the
    # blobs but not a working Quay (catalog lost to vda sysprep, see above).
    - name: (diagnostic) Was the marker present even though readiness failed?
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} test -f /var/lib/quay-storage/mirror-ready
      register: marker_only_check
      changed_when: false
      failed_when: false
      when: already_ready.rc != 0

    - name: Warn — marker present but Quay never became healthy within the wait
      ansible.builtin.debug:
        msg: |
          ⚠  mirror-ready marker is present and the vdb snapshot carries the full
             Quay state (blobs + pg catalog + container images + units), but Quay
             did NOT answer on {{ mirror_private_ip }}:8443 within the boot wait
             (~5 min).  cloud-init's restore path may have failed to start the
             quay-* units, or a container crash-looped.  Falling through to a full
             re-install + re-import to recover.  Investigate the restored mirror:
             journalctl -u quay-app, podman ps -a.  See docs/mirror-vdb-persistence.md.
      when:
        - already_ready.rc != 0
        - marker_only_check.rc | default(1) == 0

    # P3-COST.6 watchdog: snapshot fast-path is supposed to save ~25 min by
    # restoring a Quay that's already imported.  This only works if the marker
    # /var/lib/quay-storage/mirror-ready was inside the snapshot when 05-verify-mirror
    # took it.  Snapshots created BEFORE commit b72f4a0 (mirror-ready marker
    # written immediately after import, 2026-06-01) don't contain the marker —
    # restore brings up the disk but 04 still runs full prep, wasting ~25 min
    # of mirror ECS uptime + the snapshot's ¥29/month is effectively dead.
    #
    # Detect this here so the operator sees a clear message instead of just
    # observing 04 "taking longer than expected".  Recovery: this run will
    # finish, 05 will take a NEW snapshot WITH the marker, future restores
    # will fast-path properly.  See docs/SNAPSHOT.md.
    - name: Warn when snapshot-restore was attempted but marker missing
      ansible.builtin.debug:
        msg: |
          ⚠  fast-path degraded: state.yml carries snapshot IDs (system={{ mirror_snapshot_system_id }},
              data={{ mirror_snapshot_data_id }}) but /var/lib/quay-storage/mirror-ready is MISSING
              from the restored disk.  This run will do full Phase 04 prep
              (~25 min); 05 will then take a fresh snapshot containing the
              marker, restoring fast-path behavior for the next teardown +
              restore cycle.  See docs/SNAPSHOT.md (P3-COST.6).
      when:
        - already_ready.rc != 0
        - (mirror_snapshot_system_id | default('') | length) > 0
        - (mirror_snapshot_data_id   | default('') | length) > 0

    # ── Step 2a: snapshot-restore password drift sentinel ───────────────────
    # When fast-path restored Quay from a snapshot, the Quay DB inside that
    # snapshot has the password baked at snapshot time.  If state.yml's
    # mirror_init_password has since been regenerated (the historical bug:
    # 99-teardown used to unconditionally clear the password while keeping
    # the snapshot — fixed 2026-05-31 commit on 99-teardown.yml line ~349),
    # the fresh value in cloud-init's /root/.docker/config.json will not
    # authenticate against Quay → every later push/pull fails with HTTP 401.
    # Detect the drift HERE so the operator sees a clear actionable error
    # instead of debugging a 401 deep inside the belt-and-suspenders CCM
    # pre-pull step ~500 lines below.
    #
    # Use `podman login` as the probe — it exercises the same Quay token
    # auth path that `podman push` / `podman pull` use later, so if login
    # succeeds the later steps will too.  (Don't use /api/v1/user/ — that
    # is the Quay UI API and expects session cookies / OAuth, not basic
    # auth; it returns 401 even with valid registry credentials.
    # Observed 2026-05-31 P0-3 stage 2 resume — false positive shipped in
    # the initial sentinel version, caught by hand-testing `podman login`.)
    - name: Auth sentinel — verify state.yml password actually authenticates against Quay
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} \
          "podman login --tls-verify=false {{ mirror_private_ip }}:8443 \
              -u {{ mirror_init_user | quote }} -p {{ mirror_init_password | quote }}"
      register: auth_probe
      changed_when: false
      failed_when: false
      when: already_ready.rc == 0
      no_log: true

    - name: Fail fast with actionable message on password drift
      ansible.builtin.fail:
        msg: |
          Quay is healthy on {{ mirror_private_ip }}:8443 but REJECTED
          state.yml's mirror_init_password (podman login rc={{ auth_probe.rc }}).
          Because the readiness gate already confirmed Quay is serving, this is
          a genuine credential mismatch (HTTP 401), not a connectivity problem.

          Most likely cause: snapshot-restore fast-path + a stale password.
          The Quay DB on the data-disk snapshot has the password from
          snapshot time; state.yml has a different value (either
          regenerated by a pre-fix 99-teardown, or hand-edited).

          Recovery:
            1. Confirm 99-teardown.yml has the password-preservation fix
               (the mirror_init_password line that is blanked only when
               delete_mirror_snapshots is true — so the password is kept
               whenever the snapshot is kept).
            2. Tear down with snapshots deleted:
                 ansible-playbook playbooks/99-teardown.yml \
                   -e teardown_target=mirror -e delete_mirror_snapshots=true \
                   -e teardown_preserves_ai=false -e keep_image=true \
                   -e teardown_confirmed=true
            3. Re-run 01 → 02 → 03 → 04 → 05.  Fresh path generates a new
               password and Quay --initPassword applies it; both sides
               start in sync and stay in sync as long as the 99 fix is
               in place.
      when:
        - already_ready.rc == 0
        - auth_probe.rc is defined
        - auth_probe.rc != 0

    # ── Step 2.5: ensure swap exists on small mirror instance types ──────────
    # oc-mirror v2 import allocates several GB at peak.  On ecs.c7.large
    # (4 GB physical) Quay-app alone uses ~3 GB so the v2 process gets
    # OOM-killed within 1 s of starting (rc=137).  Drop in an 8 GB swap
    # file on the data disk (idempotent) so the kernel has spillover room.
    # On bigger instance types (g7.xlarge etc.) this is harmless and unused.
    - name: Ensure 8 GB swap on mirror ECS (prevents OOM during v2 import)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        if swapon --show | grep -q swapfile; then
          echo "swap already present, skipping"
          exit 0
        fi
        # Use data disk so we do not blow the 40 GB root partition.
        dd if=/dev/zero of=/var/lib/quay-storage/swapfile bs=1M count=8192 status=none
        chmod 600 /var/lib/quay-storage/swapfile
        mkswap /var/lib/quay-storage/swapfile
        swapon /var/lib/quay-storage/swapfile
        grep -q "/var/lib/quay-storage/swapfile" /etc/fstab || \
          echo "/var/lib/quay-storage/swapfile none swap sw 0 0" >> /etc/fstab
        free -h
        REMOTE
      when: already_ready.rc != 0
      changed_when: true

    # ── Step 3: download mirror-registry installer from OSS ──────────────────
    - name: Check if mirror-registry installer already extracted
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} test -x /opt/mirror-registry
      register: mr_installer_present
      changed_when: false
      failed_when: false
      when: already_ready.rc != 0

    - name: Download + extract mirror-registry installer
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        cd /opt
        aliyun oss cp \
          "oss://{{ oss_bucket }}/mirror-tarballs/mirror-registry-version.txt" \
          ./mr-version.txt \
          --endpoint="oss-{{ region }}-internal.aliyuncs.com" \
          --mode=EcsRamRole --ecs-role-name "{{ cluster_name }}-mirror-role" \
          --region "{{ region }}" --force
        MR_VERSION=$(cat ./mr-version.txt | tr -d '[:space:]')
        rm -f ./mr-version.txt
        echo "    mirror-registry version: $MR_VERSION"
        aliyun oss cp \
          "oss://{{ oss_bucket }}/mirror-tarballs/mirror-registry-$MR_VERSION.tar.gz" \
          ./mirror-registry.tar.gz \
          --endpoint="oss-{{ region }}-internal.aliyuncs.com" \
          --mode=EcsRamRole --ecs-role-name "{{ cluster_name }}-mirror-role" \
          --region "{{ region }}" --part-size=104857600 --parallel=10
        tar xzf mirror-registry.tar.gz
        rm -f mirror-registry.tar.gz
        REMOTE
      when:
        - already_ready.rc != 0
        - mr_installer_present.rc | default(1) != 0

    # ── Step 4: download oc-mirror (standalone binary) ──────────────────────
    # We only need oc-mirror, not oc.  Using `oc mirror --from=...` requires
    # the oc binary which is built against newer glibc than Alibaba Linux 3
    # provides ('GLIBC_2.33 not found').  The standalone oc-mirror binary
    # has no such requirement and exposes the same import functionality:
    #   oc-mirror --from=tarball.tar docker://registry:8443
    - name: Check if oc-mirror already installed
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} 'command -v oc-mirror'
      register: oc_mirror_present
      changed_when: false
      failed_when: false
      when: already_ready.rc != 0

    - name: Download + install oc-mirror
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        cd /tmp
        aliyun oss cp \
          "oss://{{ oss_bucket }}/mirror-tarballs/openshift-patch-version.txt" \
          ./ocp-version.txt \
          --endpoint="oss-{{ region }}-internal.aliyuncs.com" \
          --mode=EcsRamRole --ecs-role-name "{{ cluster_name }}-mirror-role" \
          --region "{{ region }}" --force
        OCP_VERSION=$(cat ./ocp-version.txt | tr -d '[:space:]')
        rm -f ./ocp-version.txt
        echo "    OpenShift patch version: $OCP_VERSION"
        curl -fLO "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/$OCP_VERSION/oc-mirror.tar.gz"
        tar xzf oc-mirror.tar.gz
        chmod +x oc-mirror
        install -m 0755 oc-mirror /usr/local/bin/
        rm -f oc-mirror oc-mirror.tar.gz
        REMOTE
      when:
        - already_ready.rc != 0
        - oc_mirror_present.rc | default(1) != 0

    # ── Step 5: download the 22 GB image tarball from OSS ────────────────────
    #
    # Idempotency policy: the outer tarball gets DELETED right before
    # `oc-mirror import` runs (see "Reclaim tarball BEFORE import" task) to
    # free disk for the cache.  So on a re-run after a failed import, the
    # outer tarball is gone but the extracted v2 chunks
    # (/var/lib/quay-storage/extracted/mirror_*.tar) are still there.
    # Without this short-circuit, ansible would happily re-download 22 GB
    # for nothing — Extract sees chunks present and skips, so the download
    # is pure waste (~50 min on internal OSS bandwidth).
    #
    # Cheapest signal that the previous run got past extract: any v2 chunk
    # file > 1 GB under extracted/.  If yes → skip download + size lookups
    # + extract entirely and go straight to mirror-registry install.
    - name: Check if v2 chunks already extracted (skip re-download if so)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euo pipefail
        EXTRACTED=/var/lib/quay-storage/extracted
        if ls "$EXTRACTED"/mirror_*.tar >/dev/null 2>&1 && \
           [ "$(stat -c %s "$EXTRACTED"/mirror_*.tar | sort -n | tail -1)" -gt 1073741824 ]; then
          echo PRESENT
        else
          echo MISSING
        fi
        REMOTE
      register: chunks_check
      changed_when: false
      when: already_ready.rc != 0

    - name: Check if image tarball already on disk (correct size)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} 'stat -c%s /var/lib/quay-storage/mirror-tarball.tar 2>/dev/null || echo 0'
      register: tarball_size_check
      changed_when: false
      failed_when: false
      when:
        - already_ready.rc != 0
        - "'PRESENT' not in (chunks_check.stdout | default(''))"

    # Lesson learned (2026-05): an earlier version of this task suppressed
    # stderr with `2>/dev/null`, swallowing aliyun stat's 404.  oss_size.stdout
    # then defaulted to "" → default('0') → matched tarball_size_check=0 → the
    # download step was skipped → the next tar xf blew up with "no such file".
    # Common trigger: group_vars's openshift_version changes (e.g. 4.20 →
    # 4.20.22) while the OSS object still has the old name, so mirror_oss_object
    # resolves to a 404 path.
    # Fix: keep stderr visible to register; assert OSS object existence right
    # after this task so failure is actionable.
    - name: Get expected tarball size from OSS
      ansible.builtin.shell: |
        AK=$(jq -r '.profiles[] | select(.name=="{{ aliyun_profile }}") | .access_key_id' ~/.aliyun/config.json)
        SK=$(jq -r '.profiles[] | select(.name=="{{ aliyun_profile }}") | .access_key_secret' ~/.aliyun/config.json)
        aliyun oss stat "oss://{{ oss_bucket }}/{{ mirror_oss_object }}" \
          --endpoint="oss-{{ region }}.aliyuncs.com" \
          --access-key-id="$AK" --access-key-secret="$SK" \
          | awk -F': *' '/Content-Length/ {print $2}'
      register: oss_size
      changed_when: false
      failed_when: false   # let the assert below produce the actionable error
      when:
        - already_ready.rc != 0
        - "'PRESENT' not in (chunks_check.stdout | default(''))"
      no_log: true

    - name: Assert tarball OSS object exists (prevents silent skip → extract crash)
      ansible.builtin.assert:
        that:
          - oss_size.rc | default(0) == 0
          - oss_size.stdout | default('') | trim | length > 0
          - (oss_size.stdout | default('0') | trim | int) > 1000000   # > 1 MB to look like a real tarball
        fail_msg: |
          mirror tarball not found in OSS:
            oss://{{ oss_bucket }}/{{ mirror_oss_object }}
          Common causes:
            - group_vars/all.yml's openshift_version was changed (e.g. 4.20 → 4.20.22)
              but the OSS tarball still has the old name.  Check what's there:
                aliyun oss ls oss://{{ oss_bucket }}/mirror-tarballs/ \
                  --endpoint=oss-{{ region }}.aliyuncs.com
            - or the OSS object was deleted / moved to a different bucket.
          Fix: either rename the tarball server-side (intra-bucket — seconds) or re-upload:
            aliyun oss cp oss://{{ oss_bucket }}/mirror-tarballs/<old-name>.tar \
                          oss://{{ oss_bucket }}/{{ mirror_oss_object }} \
                --endpoint=oss-{{ region }}.aliyuncs.com \
                --part-size=104857600 --parallel=10
          The isc + tag-mapping sibling objects must be renamed/copied alongside (same base name).
      when:
        - already_ready.rc != 0
        - "'PRESENT' not in (chunks_check.stdout | default(''))"

    - name: Download image tarball from OSS (with retries; aliyun multipart resumes from .temp)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        echo "=== $(date -Iseconds) downloading 22 GB image tarball from OSS ==="
        # aliyun oss cp multipart download uses a .temp file + checkpoint.
        # Re-invoking the same command after a 'connection reset' picks up
        # from where the .temp left off (~10x faster than restarting at 0).
        aliyun oss cp "oss://{{ oss_bucket }}/{{ mirror_oss_object }}" \
          /var/lib/quay-storage/mirror-tarball.tar \
          --endpoint="oss-{{ region }}-internal.aliyuncs.com" \
          --mode=EcsRamRole --ecs-role-name "{{ cluster_name }}-mirror-role" \
          --region "{{ region }}" --part-size=104857600 --parallel=10 --force
        REMOTE
      register: tarball_download
      retries: 5
      delay: 30
      until: tarball_download.rc == 0
      when:
        - already_ready.rc != 0
        - "'PRESENT' not in (chunks_check.stdout | default(''))"
        - (tarball_size_check.stdout | default('0') | int) != (oss_size.stdout | default('0') | trim | int)

    # ── Step 6a: generate a self-signed cert with IP SAN ─────────────────────
    # mirror-registry's auto-generated cert has NO IP SAN.  When --quayHostname
    # is an IP (10.0.16.4), Quay's HostSettings validation rejects the cert
    # with: "x509: cannot validate certificate for 10.0.16.4 because it
    # doesn't contain any IP SANs".  quay-app then loops on restart.
    #
    # Workaround: generate our own cert with IP SAN and hand it to
    # mirror-registry via --sslCert / --sslKey.
    - name: Check if /etc/quay-config/ssl.cert already present
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} test -s /etc/quay-config/ssl.cert
      register: ssl_cert_present
      changed_when: false
      failed_when: false
      when: already_ready.rc != 0

    - name: Generate self-signed cert with IP SAN for mirror's static IP
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        mkdir -p /etc/quay-config
        openssl req -newkey rsa:4096 -nodes -sha256 \
          -keyout /etc/quay-config/ssl.key \
          -x509 -days 3650 \
          -subj "/CN={{ mirror_private_ip }}" \
          -addext "subjectAltName = IP:{{ mirror_private_ip }}" \
          -out /etc/quay-config/ssl.cert
        chmod 600 /etc/quay-config/ssl.key
        REMOTE
      when:
        - already_ready.rc != 0
        - ssl_cert_present.rc | default(1) != 0

    # ── Step 6b: nuke any partial mirror-registry state ──────────────────────
    # Only uninstall if Quay containers EXIST but are NOT healthy.  Earlier
    # logic uninstalled whenever any quay-* container was present, which
    # nuked working Quay + tarball on re-runs after a fixable downstream
    # bug (e.g. oc binary glibc issue).
    - name: Check if Quay is already HEALTHY (curl /health/instance)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} 'curl -ksf https://{{ mirror_private_ip }}:8443/health/instance'
      register: quay_healthy_precheck
      changed_when: false
      failed_when: false
      when: already_ready.rc != 0

    - name: Check for stale Quay containers (only when Quay NOT healthy)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} 'podman ps -a --format "{{ '{{' }}.Names{{ '}}' }}" 2>/dev/null | grep -q "^quay-"'
      register: quay_containers_exist
      changed_when: false
      failed_when: false
      when:
        - already_ready.rc != 0
        - quay_healthy_precheck.rc | default(1) != 0

    - name: Uninstall stale mirror-registry from previous failed attempt
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -uxo pipefail
        export HOME=/root
        export USER=root
        # Preserve the 22 GB tarball before uninstall (which wipes the entire
        # --quayRoot directory).  Stash to a sibling path, restore after.
        if [ -s /var/lib/quay-storage/mirror-tarball.tar ]; then
          mv /var/lib/quay-storage/mirror-tarball.tar /var/lib/mirror-tarball.tar
        fi
        /opt/mirror-registry uninstall --autoApprove --quayRoot /var/lib/quay-storage 2>&1 || true
        # Belt-and-suspenders: ensure no lingering containers/volumes/services
        systemctl stop quay-app quay-postgres quay-redis quay-pod 2>/dev/null || true
        systemctl disable quay-app quay-postgres quay-redis quay-pod 2>/dev/null || true
        podman pod rm -f quay-pod 2>/dev/null || true
        podman volume rm -f pg-storage 2>/dev/null || true
        rm -f /etc/systemd/system/quay-*.service
        systemctl daemon-reload
        # Restore tarball
        mkdir -p /var/lib/quay-storage
        if [ -s /var/lib/mirror-tarball.tar ]; then
          mv /var/lib/mirror-tarball.tar /var/lib/quay-storage/mirror-tarball.tar
        fi
        REMOTE
      when:
        - already_ready.rc != 0
        - quay_healthy_precheck.rc | default(1) != 0
        - quay_containers_exist.rc | default(1) == 0

    # ── Step 6c: actually run mirror-registry install ────────────────────────
    - name: Check if mirror-registry already running (healthy)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} 'curl -ksf https://{{ mirror_private_ip }}:8443/health/instance'
      register: quay_running
      changed_when: false
      failed_when: false
      when: already_ready.rc != 0

    - name: Run mirror-registry install (with IP-SAN cert, blobs on data disk)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        export HOME=/root
        export USER=root
        echo "=== $(date -Iseconds) installing mirror-registry ==="
        # --quayRoot   : where mirror-registry stores its config / scripts
        # --quayStorage: where Quay puts blob storage (image layers).  Without
        #                this flag Quay uses a podman named volume, which
        #                lives at /var/lib/containers/storage/volumes/... on
        #                the ROOT disk.  After a full OCP mirror that is
        #                ~21 GB and easily fills the 40 GB system disk.
        #                Pointing it here keeps everything on the 100 GB
        #                data disk (vdb, mounted at /var/lib/quay-storage
        #                by cloud-init).
        mkdir -p /var/lib/quay-storage/datastorage
        /opt/mirror-registry install \
          --quayHostname "{{ mirror_private_ip }}" \
          --quayRoot /var/lib/quay-storage \
          --quayStorage /var/lib/quay-storage/datastorage \
          --initUser "{{ mirror_init_user }}" \
          --initPassword "{{ mirror_init_password }}" \
          --sslCert /etc/quay-config/ssl.cert \
          --sslKey /etc/quay-config/ssl.key
        REMOTE
      register: mirror_install
      when:
        - already_ready.rc != 0
        - quay_running.rc | default(1) != 0

    # ── Step 7: trust the self-signed CA + register docker auth ──────────────
    # MUST run on BOTH paths (P3-FIX.9): /root/.docker/config.json + the CA
    # trust live on the ROOT disk (vda), which is NOT in the vdb snapshot, so a
    # fast-path restore (already_ready==0) comes up without them.  The always-run
    # commit-tag aliases step + IDMS PATCH below need config.json, so writing it
    # only on the heavy path made the fast-path restore fail with podman 401
    # (observed 2026-06-06).  This write is idempotent and cheap — always do it.
    # CA cert source: /etc/quay-config on the heavy path; on fast-path restore
    # fall back to the copy that rides the vdb snapshot.
    - name: Trust mirror's self-signed CA + set up docker auth (both paths)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<REMOTE
        set -euxo pipefail
        CACERT=/etc/quay-config/ssl.cert
        [ -s "\$CACERT" ] || CACERT=/var/lib/quay-storage/quay-config/ssl.cert
        cp "\$CACERT" /etc/pki/ca-trust/source/anchors/quay-mirror.crt
        update-ca-trust extract
        mkdir -p /root/.docker
        cat > /root/.docker/config.json <<DOCKEREOF
        {"auths":{"{{ mirror_private_ip }}:8443":{"auth":"\$(echo -n '{{ mirror_init_user }}:{{ mirror_init_password }}' | base64 -w0)"}}}
        DOCKEREOF
        until curl -ksf "https://{{ mirror_private_ip }}:8443/health/instance"; do sleep 5; done
        REMOTE
      no_log: true

    # ── Step 8: import the image tarball via oc-mirror standalone ──────────
    # Our tarball is *double-tarred*: build-mirror-tarball.sh runs
    #   oc-mirror -c isc.yaml file://./openshift-mirror --v2
    # which produces mirror_000001.tar (and 000002 etc. for very large
    # imagesets) plus a working-dir/ tree inside ./openshift-mirror/,
    # then wraps the *directory* in one outer tar for OSS upload.
    # oc-mirror v2 disk-to-mirror import expects --from file://<dir> to
    # point at that directory — it does NOT unwrap an outer wrapper tar.
    # So we must extract first.
    - name: Extract outer tar wrapper (idempotent — skip if already extracted)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        EXTRACTED=/var/lib/quay-storage/extracted
        # Idempotent: if any v2 chunk file already there and >1 GB, skip.
        if ls "$EXTRACTED"/mirror_*.tar >/dev/null 2>&1 && \
           [ "$(stat -c %s "$EXTRACTED"/mirror_*.tar | sort -n | tail -1)" -gt 1073741824 ]; then
          echo "=== $(date -Iseconds) outer tar already extracted, skipping ==="
          exit 0
        fi
        mkdir -p "$EXTRACTED"
        echo "=== $(date -Iseconds) extracting outer tar (~3-5 min) ==="
        tar xf /var/lib/quay-storage/mirror-tarball.tar -C "$EXTRACTED"
        echo "=== $(date -Iseconds) extract complete ==="
        ls -lh "$EXTRACTED"/mirror_*.tar
        REMOTE
      when:
        - already_ready.rc != 0
        - "'PRESENT' not in (chunks_check.stdout | default(''))"

    # Reclaim ~25 GB BEFORE the import phase — the outer tarball is no
    # longer needed once extracted/mirror_*.tar is on disk, and oc-mirror
    # v2 d2m will rebuild a ~24 GB cache under oc-mirror-cache/.  Leaving
    # the original tarball around blows the 100 GB data disk budget
    # (tarball 25 + extracted 25 + cache 24 + datastorage 20 + swap 8
    # = 102 GB).  Reclaim here, not in the post-import block (too late).
    - name: Reclaim tarball BEFORE import (frees ~25 GB)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        rm -f /var/lib/quay-storage/mirror-tarball.tar
        df -h /var/lib/quay-storage
        REMOTE
      when:
        - already_ready.rc != 0
        - "'PRESENT' not in (chunks_check.stdout | default(''))"
      changed_when: true

    # The imageset-config.yaml that oc-mirror v2 d2m needs is NOT shipped
    # inside the tarball anymore — it lives in OSS next to the tarball
    # as a sibling object (built by scripts/build-mirror-tarball.sh and
    # uploaded to `${OSS_OBJECT}.imageset-config.yaml`).  Here we download
    # it onto the mirror ECS via the same ECS-RAM-role path used for the
    # tarball itself.  Decoupling from the tarball means:
    #   - any ansible controller with OSS access can run 04 — no need
    #     to share a host with whoever built the tarball
    #   - editing the isc (e.g. adding operator catalogs) only requires
    #     re-uploading the isc and re-running 04 — no repack / re-upload
    #     of the 22 GB tarball
    #   - the failure mode "ISC missing → mirror: {} stub → no images to copy"
    #     is caught by the fail-fast assert below, no more 3-minute silent
    #     no-op imports
    - name: Download imageset-config.yaml from OSS to mirror ECS
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        echo "=== $(date -Iseconds) downloading imageset-config.yaml from OSS ==="
        aliyun oss cp "oss://{{ oss_bucket }}/{{ mirror_oss_object }}.imageset-config.yaml" \
          /var/lib/quay-storage/extracted/imageset-config.yaml \
          --endpoint="oss-{{ region }}-internal.aliyuncs.com" \
          --mode=EcsRamRole --ecs-role-name "{{ cluster_name }}-mirror-role" \
          --region "{{ region }}" --force
        # Sanity: 80 bytes is the size of the old empty `mirror: {}` stub;
        # a real isc is at least 300+ bytes.
        SIZE=$(stat -c%s /var/lib/quay-storage/extracted/imageset-config.yaml)
        if [ "$SIZE" -lt 100 ]; then
          echo "FATAL: downloaded imageset-config.yaml is only ${SIZE} bytes — looks like an empty stub."
          echo "Inspect OSS object: oss://{{ oss_bucket }}/{{ mirror_oss_object }}.imageset-config.yaml"
          echo "Most likely the build-mirror-tarball.sh upload step did not finish — re-run the build script."
          exit 2
        fi
        echo "    OK: imageset-config.yaml in place (${SIZE} bytes)"
        REMOTE
      when: already_ready.rc != 0
      changed_when: true

    - name: Import image tarball into mirror-registry — oc-mirror v2 (~15-20 min)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        export HOME=/root
        echo "=== $(date -Iseconds) importing tarball into mirror-registry ==="
        cd /var/lib/quay-storage/extracted
        # oc-mirror v2 disk-to-mirror syntax:
        #   oc-mirror -c <isc> --from file://<dir> docker://<reg> --v2
        # imageset-config.yaml was just scp-ed up in the previous task —
        # no stub fallback, no in-band heredoc.  If it is somehow still
        # missing at this point, oc-mirror v2 will fail loud rather than
        # silently producing "No images to mirror" from an empty stub.
        ISC=imageset-config.yaml
        test -s "$ISC" || { echo "FATAL: $ISC missing or empty on mirror ECS — did the previous scp step fail?"; exit 2; }
        # parallel-images=1 + parallel-layers=1 forces serial copy.
        # Defaults are 4 images x 5 layers = 20 concurrent goroutines
        # which OOM-kills oc-mirror on small mirror ECS during the
        # chunk-extraction phase.  Serial is ~2-4x slower but actually
        # completes.  Bump back to defaults when running on a mirror
        # ECS with >= 8 GB RAM available to the process.
        # (NOTE: --max-per-registry is a v1 flag and does NOT exist in v2.)
        # --cache-dir on the data disk — default is $HOME (/root) which is on
        # the 40 GB root partition.  d2m unpacks every blob from the v2
        # archive into the cache, so an OCP-4.20 mirror (~25 GB unpacked)
        # blows past root disk.  Data disk has the 100 GB we provisioned
        # exactly for this.
        mkdir -p /var/lib/quay-storage/oc-mirror-cache
        oc-mirror -c "$ISC" --from file://. "docker://{{ mirror_private_ip }}:8443" --v2 \
          --cache-dir /var/lib/quay-storage/oc-mirror-cache \
          --parallel-images 1 --parallel-layers 1
        echo "=== $(date -Iseconds) import complete ==="
        REMOTE
      when: already_ready.rc != 0

    # (Mirror-completeness verification removed from this playbook —
    # ansible.builtin.shell heredocs containing jq / awk single-quoted
    # scripts trip the arg splitter ("unbalanced quotes").  Use a
    # standalone 05-verify-mirror.yml that template-renders a script
    # file instead, if you want a runtime gate.  We already trust the
    # build-side "✓ 192/192 + ✓ 3/3" check from oc-mirror v2.)

    # Free ~42 GB on the data disk: the import is complete, so neither the
    # outer tarball nor the extracted mirror_*.tar chunks are needed
    # anymore.  oc-mirror workspace + the v2 archive files were the source
    # of truth for the just-finished push; deleting them is safe.
    - name: Reclaim disk after import (drop tarball + extracted chunks)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        rm -f  /var/lib/quay-storage/mirror-tarball.tar
        rm -rf /var/lib/quay-storage/extracted
        df -h /var/lib/quay-storage
        REMOTE
      when: already_ready.rc != 0

    # ── Mark mirror-ready as EARLY as possible (right after import succeeds) ─
    # The heavy work (download 25 GB tarball + install Quay + oc-mirror
    # import) is now done.  Write the resume marker NOW so any subsequent
    # task failure (CCM/CAPA pre-pull, IDMS PATCH, etc.) lets the next
    # site.yml rerun short-circuit straight into already_ready=True and
    # skip the heavy work — those follow-on tasks are individually
    # idempotent and re-run cheap.
    # Also stage the CA cert onto /var/lib/mirror-ca.crt for the "Fetch
    # mirror CA cert to ansible host" task below — both used to live in
    # one task at the very end, gated on already_ready.rc != 0; gating it
    # there meant any failure between here and there lost the marker AND
    # the CA exposure.  Observed 2026-06-01 P1-CAPA.b: CAPA pre-pull
    # failed → marker never written → rerun re-downloaded 25 GB tarball.
    # P3-FIX.9: stage the CA cert on BOTH paths.  /var/lib/mirror-ca.crt is a
    # root-disk (vda) file consumed by the always-run "Fetch mirror CA cert to
    # ansible host" + IDMS PATCH steps; it is NOT in the vdb snapshot, so a
    # fast-path restore comes up without it and the fetch scp 404s (observed
    # 2026-06-06).  Always re-stage it (vdb fallback for the source); only write
    # the marker when it is missing so the snapshot's marker is preserved.
    - name: Stage CA cert (both paths) + write mirror-ready marker if missing
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        CACERT=/etc/quay-config/ssl.cert
        [ -s "$CACERT" ] || CACERT=/var/lib/quay-storage/quay-config/ssl.cert
        cp "$CACERT" /var/lib/mirror-ca.crt
        [ -f /var/lib/quay-storage/mirror-ready ] || \
          echo "$(date -Iseconds) READY (import done; CCM/CAPA pre-pull + IDMS PATCH still to run)" > /var/lib/quay-storage/mirror-ready
        REMOTE
      changed_when: true

    # ── P3-FIX.9: stash Quay systemd units onto vdb for snapshot-restore ─────
    # mirror-registry generates reboot-safe units (quay-pod/app/postgres/redis)
    # in /etc/systemd/system on the ROOT disk (vda).  Copy them onto the vdb
    # data disk so a future vdb-only snapshot carries them.  On restore the
    # stock vda has no quay units; mirror-stack cloud-init copies these back and
    # `enable --now quay-pod` brings Quay up against the restored graphroot
    # (images + pg-storage catalog now also on vdb) — no re-install, no
    # re-import.  See docs/mirror-vdb-persistence.md.
    - name: (P3-FIX.9) Stash Quay systemd units onto vdb for snapshot-restore
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        mkdir -p /var/lib/quay-storage/systemd
        cp -f /etc/systemd/system/quay-*.service /var/lib/quay-storage/systemd/
        echo "stashed units:"; ls -1 /var/lib/quay-storage/systemd/
        REMOTE
      when: already_ready.rc != 0
      changed_when: true

    # ── Add commit-tag aliases for rhai images (ALWAYS runs, idempotent) ─────
    # The isc uses @sha256:digest form for additionalImages so oc-mirror v2
    # mirrors them deterministically.  But the AI discovery agent's
    # agent.service is hard-coded to pull by commit-tag form (e.g.
    # rhai/assisted-installer-agent-rhel9:008935c33...).  Without an
    # additional tag→digest alias on mirror, master ECS hit "manifest unknown"
    # and agent.service crash-loops, hosts never register with AI.
    #
    # ⚠️ This block runs even when already_ready.rc == 0 (snapshot-restore
    # path), because:
    #   - The snapshot may have been taken BEFORE this aliasing logic existed
    #   - The AI commit-tag may have changed since the snapshot was created
    #     (Red Hat updates discovery agent every few days)
    # Re-running is idempotent — podman tag+push on an existing tag pointer
    # is essentially a manifest no-op (Quay dedupes by digest).  Cost ~15 s.

    # P3-FIX.6: Quay push-readiness gate.
    # /health/instance returning 200 only means the web frontend is up.
    # The Docker-registry token endpoint (/v2/auth) and the blob upload
    # path come online slightly later.  Pushing in that window fails with
    #   Requesting bearer token: invalid status code from registry 405
    # mid-push (observed 2026-06-04 + 2026-06-05, both at the CCM pre-pull —
    # the first task that pushes a fresh external blob to the mirror).
    # The existing per-task retries don't help: each retry re-pulls then
    # re-pushes, and if Quay is still racy after delay seconds it 405s again.
    #
    # Gate here: request a token WITH PUSH SCOPE in a loop until Quay issues
    # a valid (>50-char) JWT.  Once push-scope tokens mint cleanly, the
    # subsequent push tasks succeed first try.  ~10s when already ready;
    # up to 5 min on a cold Quay.  Only meaningful on fresh path (after
    # mirror-registry install); on snapshot-restore Quay is already warm
    # but the probe is a cheap no-op so we run it unconditionally.
    - name: Wait for Quay token endpoint to mint push-scope tokens
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -uo pipefail
        export HOME=/root
        REG={{ mirror_private_ip }}:8443
        CREDS=$(jq -r .auths[].auth /root/.docker/config.json | base64 -d)
        for i in $(seq 1 30); do
          TOKEN=$(curl -ks -u "$CREDS" "https://$REG/v2/auth?service=$REG&scope=repository:probe/readiness:pull,push" | jq -r .token)
          # NOTE: do NOT use the bash string-length form on TOKEN here — the
          # literal brace-hash sequence is parsed by the ansible Jinja2 templar
          # as a comment-block start and aborts playbook load with
          # "unbalanced jinja2 block".  Count bytes with wc instead.
          TOKEN_LEN=$(printf %s "$TOKEN" | wc -c)
          if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] && [ "$TOKEN_LEN" -gt 50 ]; then
            echo "Quay push-scope token OK after $((i*10))s"
            exit 0
          fi
          sleep 10
        done
        echo "Quay never minted a push-scope token after 300s" >&2
        exit 1
        REMOTE
      register: _quay_push_ready
      retries: 3
      delay: 20
      until: _quay_push_ready.rc == 0
      changed_when: false

    # Refresh the OSS-side tag-mapping.tsv first — covers two cases:
    #   - build-mirror-tarball.sh was an older version that didn't write it
    #   - AI rotated commit-tags since the last build (happens every few days)
    # Cheap (~10 s for 3× skopeo inspect), always safe to re-run.
    - ansible.builtin.include_tasks: ../tasks/refresh_tag_mapping.yml

    - name: Download tag-mapping.tsv from OSS (commit-tag → digest aliases)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        aliyun oss cp "oss://{{ oss_bucket }}/{{ mirror_oss_object }}.tag-mapping.tsv" \
          /var/lib/quay-storage/tag-mapping.tsv \
          --endpoint="oss-{{ region }}-internal.aliyuncs.com" \
          --mode=EcsRamRole --ecs-role-name "{{ cluster_name }}-mirror-role" \
          --region "{{ region }}" --force
        wc -l /var/lib/quay-storage/tag-mapping.tsv
        REMOTE
      changed_when: true

    - name: Add commit-tag aliases for rhai images on mirror (always; idempotent)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        export HOME=/root  # so podman picks up /root/.docker/config.json
        REG=10.0.16.4:8443
        while IFS=$'\t' read -r REPO TAG DIGEST; do
          [ -z "$REPO" ] && continue
          echo "=== aliasing $REG/$REPO@$DIGEST → :$TAG ==="
          podman pull  --tls-verify=false "$REG/$REPO@$DIGEST"
          podman tag                       "$REG/$REPO@$DIGEST" "$REG/$REPO:$TAG"
          podman push --tls-verify=false   "$REG/$REPO:$TAG"
        done < /var/lib/quay-storage/tag-mapping.tsv
        rm -f /var/lib/quay-storage/tag-mapping.tsv
        echo "✓ all commit-tag aliases ensured"
        REMOTE
      changed_when: true

    # ── Alibaba CCM image: belt-and-suspenders pre-pull (idempotent) ───────
    # The CCM Deployment in custom_manifests/01-alibaba-ccm.yaml references
    # `registry-cn-hangzhou.ack.aliyuncs.com/acs/cloud-controller-manager:v2.14.0`.
    # build-mirror-tarball.sh DOES now include CCM as a digest-pinned
    # additionalImage + TAG_MAPPING entry (since 2026-05).  This pre-pull
    # task stays as a safety net for two scenarios:
    #   (a) mirror tarball built before that addition (older mirrors)
    #   (b) imageset import skipped/failed for the CCM entry specifically
    # Idempotent: skopeo inspect on mirror first; only pull-tag-push when
    # the manifest is missing.  Cheap ~5 s when already present.
    # See also the CAPA pre-pull below: same belt-and-suspenders pattern
    # but routed via the operator box (quay.io is unreliable from
    # mirror ECS cross-border, so we relay through localhost which is
    # assumed to be on a network that can reach quay.io — the same
    # assumption build-mirror-tarball.sh makes).
    - name: Ensure Alibaba CCM image is on mirror (pre-pull + push if missing)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euo pipefail
        export HOME=/root
        REG=10.0.16.4:8443
        REPO=acs/cloud-controller-manager
        TAG=v2.14.0
        # Check mirror first via curl + bearer flow (skopeo not installed).
        TOKEN=$(curl -ks -u "$(jq -r .auths[].auth /root/.docker/config.json | base64 -d)" \
          "https://$REG/v2/auth?service=$REG&scope=repository:$REPO:pull" | jq -r .token)
        if curl -ksf -H "Authorization: Bearer $TOKEN" "https://$REG/v2/$REPO/manifests/$TAG" > /dev/null; then
          echo "✓ $REG/$REPO:$TAG already on mirror, skipping pull"
          exit 0
        fi
        echo "=== mirror missing $REPO:$TAG, pulling from registry-cn-hangzhou.ack.aliyuncs.com ==="
        podman pull "registry-cn-hangzhou.ack.aliyuncs.com/$REPO:$TAG"
        podman tag  "registry-cn-hangzhou.ack.aliyuncs.com/$REPO:$TAG" "$REG/$REPO:$TAG"
        podman push --tls-verify=false "$REG/$REPO:$TAG"
        echo "✓ $REG/$REPO:$TAG now on mirror"
        REMOTE
      changed_when: true

    # ── CAPA controller image: belt-and-suspenders pre-pull via operator relay ──
    # The CAPA Deployment in openshift-capi-alicloud config/manager/deployment.yaml
    # references quay.io/samzhu/openshift-capi-alicloud:{{ capa_image_tag }}.
    # build-mirror-tarball.sh has pinned CAPA into the imageset since
    # commit 7054bfe (2026-05-31), so any tarball built after that
    # already contains the image — this task no-ops.  But mirrors
    # built from older tarballs (or restored from older snapshots)
    # lack CAPA; 08-deploy-post-install would then hit ImagePullBackOff.
    #
    # Mirror ECS in China regions cannot reach quay.io reliably across
    # the border, so unlike the CCM task (which pulls from Aliyun ACR
    # over the Aliyun backbone), this relays through the operator box:
    #   operator: skopeo copy quay.io → docker-archive on disk
    #   transit:  scp the tar through jumphost to mirror ECS
    #   mirror:   podman load + tag + push to local Quay
    # Same outside-China connectivity assumption build-mirror-tarball.sh
    # makes.  Operator needs skopeo (already required for the build script).
    #
    # Idempotent: check mirror first via the same curl + bearer pattern
    # the CCM task uses; skip everything when the manifest is present.
    - name: Check whether CAPA image is already on mirror
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euo pipefail
        REG={{ mirror_private_ip }}:8443
        REPO=samzhu/openshift-capi-alicloud
        TAG={{ capa_image_tag }}
        TOKEN=$(curl -ks -u "$(jq -r .auths[].auth /root/.docker/config.json | base64 -d)" \
          "https://$REG/v2/auth?service=$REG&scope=repository:$REPO:pull" | jq -r .token)
        if curl -ksf -H "Authorization: Bearer $TOKEN" "https://$REG/v2/$REPO/manifests/$TAG" > /dev/null; then
          echo PRESENT
        else
          echo MISSING
        fi
        REMOTE
      register: _capa_on_mirror
      changed_when: false

    # Same docker-archive overwrite hazard as the CSI pull below: clear any
    # stale /tmp/capa-*.tar from a prior aborted run before skopeo writes it.
    - name: Remove stale local CAPA tar before skopeo (docker-archive can't overwrite)
      ansible.builtin.file:
        path: /tmp/capa-{{ capa_image_tag }}.tar
        state: absent
      delegate_to: localhost
      when: "'MISSING' in _capa_on_mirror.stdout"

    - name: Pull CAPA image to operator-local docker-archive (skopeo)
      # quay.io's edge CDN intermittently returns 502 mid-blob; retry a
      # few times before giving up.  Observed 2026-06-01 P1-CAPA.b — 14
      # of 15 blobs copied, then 502 on the last one killed site.yml.
      ansible.builtin.command:
        argv:
          - skopeo
          - copy
          - --src-tls-verify=true
          - --retry-times=5
          - docker://quay.io/samzhu/openshift-capi-alicloud:{{ capa_image_tag }}
          - docker-archive:/tmp/capa-{{ capa_image_tag }}.tar:quay.io/samzhu/openshift-capi-alicloud:{{ capa_image_tag }}
      delegate_to: localhost
      register: _capa_pull
      retries: 3
      delay: 20
      until: _capa_pull.rc == 0
      when: "'MISSING' in _capa_on_mirror.stdout"
      changed_when: true

    - name: Stage CAPA tar onto mirror ECS via jumphost ProxyCommand
      ansible.builtin.command:
        argv:
          - scp
          - -i
          - "{{ ssh_priv_key_file }}"
          - -o
          - StrictHostKeyChecking=no
          - -o
          - UserKnownHostsFile=/dev/null
          - -o
          - "ProxyCommand=ssh -i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@{{ jump_host_ip }}"
          - /tmp/capa-{{ capa_image_tag }}.tar
          - "root@{{ mirror_private_ip }}:/tmp/capa-{{ capa_image_tag }}.tar"
      register: _capa_scp
      retries: 3
      delay: 10
      until: _capa_scp.rc == 0
      when: "'MISSING' in _capa_on_mirror.stdout"
      changed_when: true

    - name: Load + tag + push CAPA on mirror ECS
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        REG={{ mirror_private_ip }}:8443
        SRC=quay.io/samzhu/openshift-capi-alicloud:{{ capa_image_tag }}
        DST=$REG/samzhu/openshift-capi-alicloud:{{ capa_image_tag }}
        # podman load reads the docker-archive format skopeo wrote.
        podman load -i /tmp/capa-{{ capa_image_tag }}.tar
        podman tag  "$SRC" "$DST"
        podman push --tls-verify=false "$DST"
        rm -f /tmp/capa-{{ capa_image_tag }}.tar
        echo "OK: $DST now on mirror"
        REMOTE
      register: _capa_push
      retries: 3
      delay: 10
      until: _capa_push.rc == 0
      when: "'MISSING' in _capa_on_mirror.stdout"
      changed_when: true

    # ── CSI DRIVER + sidecar images (Aliyun ACR, pulled direct on mirror) ──────
    # The CSI operator's controller/node pods run the upstream driver + 6 sidecars
    # from registry.cn-hangzhou.aliyuncs.com/acs/* — these tags are HARDCODED in the
    # operator binary (internal/controller constants), so the cluster pulls them by
    # tag and they MUST be on the mirror or the driver Pods hit ImagePullBackOff and
    # NO PVC ever provisions. Same Aliyun-ACR direct-pull pattern as the CCM task
    # above (mirror ECS reaches Aliyun ACR over the backbone; podman pull→tag→push).
    # build-mirror-tarball.sh also pins these as additionalImages for fresh tarballs;
    # this recovers older mirrors / snapshots. NON-FATAL (failed_when: false): a CSI
    # mirror miss must NOT abort the cluster install — it surfaces later at 08/smoke.
    # `repo` = the path on the MIRROR (acs/...), which the operator references and
    # the ITMS redirects to. `src` = where to PULL the image from. csi-plugin is
    # Alibaba's own driver (acs/, bare tag). The 6 sig-storage sidecars use upstream
    # bare semver — but Alibaba ACR (acs/) does NOT carry those exact tags: it
    # re-tags with `-aliyun`/commit suffixes AND a different version cadence
    # (e.g. no csi-attacher v4.3.0, no csi-resizer v1.8.0, no csi-snapshotter v6.3.0).
    # The provisioner/attacher/resizer/snapshotter the operator declares exist ONLY
    # at registry.k8s.io/sig-storage (the mirror ECS can reach it, verified 200), so
    # pull them from there and store under the operator's acs/ path. registrar +
    # livenessprobe happen to exist at acs/ with bare tags, so leave them as-is.
    # (Observed 2026-06-13: pulling these 4 from acs/ failed `manifest unknown`,
    # which the old set -e probe hid — see the pre-pull task below.)
    - name: Define CSI driver + sidecar images (mirror path + pull source)
      ansible.builtin.set_fact:
        _csi_driver_images:
          - { repo: acs/csi-plugin,                tag: v1.35.3, src: registry.cn-hangzhou.aliyuncs.com/acs/csi-plugin }
          - { repo: acs/csi-provisioner,           tag: v3.5.0,  src: registry.k8s.io/sig-storage/csi-provisioner }
          - { repo: acs/csi-attacher,              tag: v4.3.0,  src: registry.k8s.io/sig-storage/csi-attacher }
          - { repo: acs/csi-resizer,               tag: v1.8.0,  src: registry.k8s.io/sig-storage/csi-resizer }
          - { repo: acs/csi-snapshotter,           tag: v6.3.0,  src: registry.k8s.io/sig-storage/csi-snapshotter }
          - { repo: acs/csi-node-driver-registrar, tag: v2.8.0,  src: registry.cn-hangzhou.aliyuncs.com/acs/csi-node-driver-registrar }
          - { repo: acs/livenessprobe,             tag: v2.10.0, src: registry.cn-hangzhou.aliyuncs.com/acs/livenessprobe }

    - name: Ensure CSI driver + sidecar images are on mirror (pull from Aliyun ACR if missing)
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        # NOTE: deliberately NOT `set -e`. The presence probe (token fetch + manifest
        # GET) can legitimately fail — e.g. querying the registry auth scope for a
        # repository that does not exist yet returns a non-JSON body and `jq` errors.
        # Under `set -e` that aborted the script BEFORE the pull/push branch, printing
        # neither PRESENT nor "now on mirror", so ansible showed a deceptive "ok" and
        # the image was SILENTLY SKIPPED — later ImagePullBackOff on the CSI
        # controller/NAS pods (observed 2026-06-13: csi-provisioner/attacher/resizer/
        # snapshotter never landed). Any probe failure must fall through to pull+push.
        set -uo pipefail
        export HOME=/root
        REG={{ mirror_private_ip }}:8443
        REPO={{ item.repo }}
        TAG={{ item.tag }}
        SRC={{ item.src }}

        # PRESENT only on an explicit HTTP 200 for the manifest; every other outcome
        # (bad/empty token, missing repo, transient error) returns non-zero -> push.
        present() {
          local auth token code
          auth=$(jq -r '.auths[].auth' /root/.docker/config.json 2>/dev/null | head -1 | base64 -d 2>/dev/null) || return 1
          token=$(curl -ks -u "$auth" "https://$REG/v2/auth?service=$REG&scope=repository:$REPO:pull" 2>/dev/null | jq -r '.token // empty' 2>/dev/null)
          [ -n "$token" ] || return 1
          code=$(curl -ks -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $token" "https://$REG/v2/$REPO/manifests/$TAG" 2>/dev/null)
          [ "$code" = "200" ]
        }

        if present; then echo "PRESENT $REPO:$TAG"; exit 0; fi
        echo "MISSING $REPO:$TAG — pulling from $SRC:$TAG"
        podman pull "$SRC:$TAG"           || { echo "ERROR: pull $SRC:$TAG failed" >&2; exit 1; }
        podman tag  "$SRC:$TAG" "$REG/$REPO:$TAG"
        podman push --tls-verify=false "$REG/$REPO:$TAG" || { echo "ERROR: push $REG/$REPO:$TAG failed" >&2; exit 1; }
        # Verify the push actually landed — don't trust podman's exit code alone.
        if present; then echo "✓ $REG/$REPO:$TAG now on mirror"; else
          echo "ERROR: $REG/$REPO:$TAG still MISSING after push" >&2; exit 1; fi
        REMOTE
      loop: "{{ _csi_driver_images }}"
      loop_control:
        label: "{{ item.repo }}:{{ item.tag }}"
      register: _csi_driver_pull
      changed_when: "'now on mirror' in (_csi_driver_pull.stdout | default(''))"
      # Surface a genuine pull/push failure (the script exits 1 + logs ERROR) instead
      # of the old blanket `failed_when: false` that hid silent skips.
      failed_when: "_csi_driver_pull.rc | default(0) != 0"
      when: mirror_private_ip | default('') | length > 0

    # ── CSI Operator (OLM bundle 3 images): same belt-and-suspenders pattern ──
    # custom_manifests/04-csi-{catalogsource,subscription}.yaml reference
    # three OLM images.  All three must be on the mirror for OLM to install
    # the operator successfully.  build-mirror-tarball.sh pins them since
    # P3-CSI.1; this block recovers older mirrors / snapshots.
    #
    # Implementation: 4 tasks looped over the 3-image dict, mirroring the
    # CAPA pattern.  Each task is conditional on `MISSING` in the per-image
    # `_csi_on_mirror.results` register.  Looping cuts ~36 lines (3×12) of
    # copy-paste down to ~24 lines total.
    # Operator/bundle/catalog all share the operator release tag
    # (csi_operator_image_tag, SSOT in vars/images.yml, auto-bumped by csi-operator
    # CI). NOT the upstream csi-driver imageTag (v1.35.3) — that ships inside the
    # operator image and is mirrored separately by the driver image pre-pull.
    - name: Define CSI image list for pre-pull
      ansible.builtin.set_fact:
        _csi_images:
          - { repo: samzhu/alibaba-cloud-csi-operator,         tag: "{{ csi_operator_image_tag }}", tarname: "csi-operator-{{ csi_operator_image_tag }}" }
          - { repo: samzhu/alibaba-cloud-csi-operator-bundle,  tag: "{{ csi_operator_image_tag }}", tarname: "csi-bundle-{{ csi_operator_image_tag }}" }
          - { repo: samzhu/alibaba-cloud-csi-operator-catalog, tag: "{{ csi_operator_image_tag }}", tarname: "csi-catalog-{{ csi_operator_image_tag }}" }

    - name: Check whether each CSI image is already on mirror
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euo pipefail
        REG={{ mirror_private_ip }}:8443
        REPO={{ item.repo }}
        TAG={{ item.tag }}
        TOKEN=$(curl -ks -u "$(jq -r .auths[].auth /root/.docker/config.json | base64 -d)" \
          "https://$REG/v2/auth?service=$REG&scope=repository:$REPO:pull" | jq -r .token)
        if curl -ksf -H "Authorization: Bearer $TOKEN" "https://$REG/v2/$REPO/manifests/$TAG" > /dev/null; then
          echo PRESENT
        else
          echo MISSING
        fi
        REMOTE
      register: _csi_on_mirror
      changed_when: false
      loop: "{{ _csi_images }}"
      loop_control:
        label: "{{ item.repo }}:{{ item.tag }}"

    # skopeo's docker-archive transport REFUSES to write to an existing tar
    # ("docker-archive doesn't support modifying existing images").  A leftover
    # /tmp/<tarname>.tar from a previous aborted run makes the copy fail in
    # ~20 ms, exhausting all retries.  Delete any stale local tar first.
    - name: Remove stale local CSI tar before skopeo (docker-archive can't overwrite)
      ansible.builtin.file:
        path: "/tmp/{{ item.item.tarname }}.tar"
        state: absent
      delegate_to: localhost
      loop: "{{ _csi_on_mirror.results }}"
      loop_control:
        label: "{{ item.item.repo }}:{{ item.item.tag }}"
      when: "'MISSING' in (item.stdout | default(''))"

    - name: Pull missing CSI images to operator-local docker-archive (skopeo)
      ansible.builtin.command:
        argv:
          - skopeo
          - copy
          - --src-tls-verify=true
          - --retry-times=5
          - "docker://quay.io/{{ item.item.repo }}:{{ item.item.tag }}"
          - "docker-archive:/tmp/{{ item.item.tarname }}.tar:quay.io/{{ item.item.repo }}:{{ item.item.tag }}"
      delegate_to: localhost
      register: _csi_pull
      retries: 3
      delay: 20
      until: _csi_pull.rc == 0
      loop: "{{ _csi_on_mirror.results }}"
      loop_control:
        label: "{{ item.item.repo }}:{{ item.item.tag }}"
      when: "'MISSING' in (item.stdout | default(''))"
      changed_when: true

    - name: Stage missing CSI tars onto mirror ECS via jumphost ProxyCommand
      ansible.builtin.command:
        argv:
          - scp
          - -i
          - "{{ ssh_priv_key_file }}"
          - -o
          - StrictHostKeyChecking=no
          - -o
          - UserKnownHostsFile=/dev/null
          - -o
          - "ProxyCommand=ssh -i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@{{ jump_host_ip }}"
          - "/tmp/{{ item.item.tarname }}.tar"
          - "root@{{ mirror_private_ip }}:/tmp/{{ item.item.tarname }}.tar"
      register: _csi_scp
      retries: 3
      delay: 10
      until: _csi_scp.rc == 0
      loop: "{{ _csi_on_mirror.results }}"
      loop_control:
        label: "{{ item.item.repo }}:{{ item.item.tag }}"
      when: "'MISSING' in (item.stdout | default(''))"
      changed_when: true

    - name: Load + tag + push CSI images on mirror ECS
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        REG={{ mirror_private_ip }}:8443
        SRC=quay.io/{{ item.item.repo }}:{{ item.item.tag }}
        DST=$REG/{{ item.item.repo }}:{{ item.item.tag }}
        podman load -i /tmp/{{ item.item.tarname }}.tar
        podman tag  "$SRC" "$DST"
        podman push --tls-verify=false "$DST"
        rm -f /tmp/{{ item.item.tarname }}.tar
        echo "OK: $DST now on mirror"
        REMOTE
      register: _csi_push
      retries: 3
      delay: 10
      until: _csi_push.rc == 0
      loop: "{{ _csi_on_mirror.results }}"
      loop_control:
        label: "{{ item.item.repo }}:{{ item.item.tag }}"
      when: "'MISSING' in (item.stdout | default(''))"
      changed_when: true

    - name: Clean up operator-local CAPA tar (we don't need to keep ~200 MB)
      ansible.builtin.file:
        path: /tmp/capa-{{ capa_image_tag }}.tar
        state: absent
      delegate_to: localhost
      when: "'MISSING' in _capa_on_mirror.stdout"

    # (Former "Expose CA cert + write ready signal" task here removed —
    # both side-effects are now done by the "Stage CA cert + write
    # mirror-ready marker" task placed right after "Reclaim disk after
    # import" above.  Doing it early means a CAPA pre-pull failure no
    # longer wastes a 25 GB tarball re-download on the next site.yml run.)

    # ── Step 10: fetch CA cert back to ansible host ─────────────────────────
    - name: Fetch mirror CA cert to ansible host
      ansible.builtin.shell: |
        scp {{ _ssh_common_args }} {{ _ssh_proxy_args }} \
          root@{{ mirror_private_ip }}:/var/lib/mirror-ca.crt \
          {{ output_dir }}/mirror-ca.crt
      changed_when: true

    - name: Save mirror CA path to state
      ansible.builtin.include_tasks: ../tasks/save_state.yml
      vars:
        new_state:
          mirror_ca_cert_path: "{{ output_dir }}/mirror-ca.crt"

    # ── Step 11: PATCH AI cluster install-config + infra-env trust bundle ───
    - ansible.builtin.include_tasks: ../tasks/assisted_token.yml

    # ── Verify AI cluster.openshift_version matches group_vars ───────────────
    # Single source of truth: openshift_version in group_vars/all.yml.
    # Phase 01 creates the AI cluster with this value; AI's openshift_version
    # is IMMUTABLE post-create (AI v2 API rejects PATCH on this field), so
    # all we can do here is verify alignment + fail loud on mismatch.
    #
    # Common mismatch sources:
    #   - all.yml had channel form "4.20" → AI resolved to latest patch
    #     (e.g. 4.20.23) at create time; mirror was built for older patch
    #   - all.yml's openshift_version got bumped after cluster was created
    #     without re-creating the cluster
    #
    # Recovery on mismatch: re-create the AI cluster (full re-run of Phase 01)
    # with the right value pinned in all.yml first.  Since ECS image's baked
    # ignition references the OLD infra-env id, that also forces re-running
    # 02 + 06 (new image + new cluster-stack).  Mirror itself is fine to keep.
    # See docs/TEARDOWN.md "OCP version change" scenario for the playbook
    # sequence (uses 99 -e cluster_includes_ai=true to drop only the AI half).
    - name: Assert openshift_version is pinned to a specific patch (X.Y.Z form)
      ansible.builtin.assert:
        that:
          - openshift_version is match('^[0-9]+\.[0-9]+\.[0-9]+$')
        fail_msg: |
          openshift_version='{{ openshift_version }}' looks like channel form (X.Y).
          Pin it to a specific patch (X.Y.Z) in group_vars/all.yml — otherwise
          AI auto-resolves to latest patch at cluster create time and drifts
          off whatever your mirror actually has.  AI v2 API does not allow
          changing this after the cluster is created, so getting it wrong
          requires re-creating the cluster.
          Example: openshift_version: "4.20.22"

    - name: Get current AI cluster.openshift_version
      ansible.builtin.uri:
        url: "{{ assisted_api }}/clusters/{{ cluster_id }}"
        method: GET
        headers: { Authorization: "Bearer {{ ai_access_token }}" }
        return_content: true
      register: _ai_cluster_get

    - name: Assert AI cluster version matches group_vars (drift detection)
      ansible.builtin.assert:
        that:
          - _ai_cluster_get.json.openshift_version == openshift_version
        fail_msg: |
          AI cluster {{ cluster_id }} is on openshift_version={{ _ai_cluster_get.json.openshift_version }}
          but group_vars/all.yml says {{ openshift_version }}.  AI v2 API does NOT allow
          changing openshift_version after create, so the cluster must be re-created.

          Recovery (preserves mirror — only re-does AI/infra-env/ECS image/cluster-stack):
            1. Confirm all.yml openshift_version is set correctly first.
            2. ansible-playbook ansible/playbooks/99-teardown.yml \
                 -e teardown_target=cluster -e cluster_includes_ai=true \
                 -e teardown_confirmed=true
            3. ansible-playbook ansible/playbooks/01-prepare-iso.yml
            4. ansible-playbook ansible/playbooks/02-import-image.yml
            5. ansible-playbook ansible/playbooks/04-prepare-mirror.yml
            6. ansible-playbook ansible/playbooks/06-create-cluster-stack.yml
            7. ansible-playbook ansible/playbooks/07-install-cluster.yml

    - name: Load mirror CA cert content (for PATCH)
      ansible.builtin.slurp:
        src: "{{ output_dir }}/mirror-ca.crt"
      register: mirror_ca_slurp

    # Mirror path mappings come straight from oc-mirror's own generated
    # imageContentSourcePolicy.yaml (oc-mirror v1 publishes upstream
    # sources to shorter destinations):
    #   quay.io/openshift-release-dev/ocp-release      -> openshift/release-images
    #   quay.io/openshift-release-dev/ocp-v4.0-art-dev -> openshift/release
    #   registry.redhat.io/rhai                        -> rhai (unchanged)
    #
    # Use imageDigestSources (IDMS) — paired with oc-mirror v2:
    #   - v2 emits IDMS as its native cluster-resource (idms-oc-mirror.yaml)
    #   - the cluster honours mirrorSourcePolicy: NeverContactSource so
    #     upstream registries can't be reached at all (fail fast instead
    #     of cdn01.quay.io timeouts in cn-* regions).
    #   - the v1-era bootkube IDMS bug (manifest via mirror, layers via
    #     upstream) is fixed in 4.18+; we're on 4.20, safe.
    #
    # IDMS sources list below covers, in order:
    #   3 × rhai/* (Assisted Installer agent / installer / controller)
    #   2 × quay.io/openshift-release-dev/* (OCP release manifests + layers)
    #   1 × registry-cn-hangzhou.ack.aliyuncs.com/acs/cloud-controller-manager
    #         (CCM v2.14.0 — referenced by custom_manifests/01-alibaba-ccm.yaml.j2,
    #          mirrored in by build-mirror-tarball.sh CCM section + 04 belt-and-suspenders.)
    #   1 × quay.io/samzhu/openshift-capi-alicloud
    #         (CAPA controller {{ capa_image_tag }} — referenced by openshift-capi-alicloud config/manager/deployment.yaml,
    #          mirrored in by build-mirror-tarball.sh CAPA section.  Note: only relevant for
    #          08-deploy-post-install; install (Phase 07) never pulls this image.)
    #
    # ⚠️  Do NOT add inline `#` comments inside the {{ ... }} expression below.
    # YAML `>-` folds newlines to spaces, so any `#` becomes part of the Jinja
    # expression where it is an invalid token → set_fact fails with a censored
    # (no_log:true) error.  Observed 2026-05-31 P0-3 stage 2 rerun.
    - name: Build install_config_overrides JSON (imageDigestSources + CA)
      ansible.builtin.set_fact:
        _install_config_overrides_json: >-
          {{ {
            'imageDigestSources': [
              {'source': 'registry.redhat.io/rhai/assisted-installer-agent-rhel9',
               'mirrors': [mirror_private_ip + ':8443/rhai/assisted-installer-agent-rhel9']},
              {'source': 'registry.redhat.io/rhai/assisted-installer-rhel9',
               'mirrors': [mirror_private_ip + ':8443/rhai/assisted-installer-rhel9']},
              {'source': 'registry.redhat.io/rhai/assisted-installer-controller-rhel9',
               'mirrors': [mirror_private_ip + ':8443/rhai/assisted-installer-controller-rhel9']},
              {'source': 'quay.io/openshift-release-dev/ocp-release',
               'mirrors': [mirror_private_ip + ':8443/openshift/release-images']},
              {'source': 'quay.io/openshift-release-dev/ocp-v4.0-art-dev',
               'mirrors': [mirror_private_ip + ':8443/openshift/release']},
              {'source': 'registry-cn-hangzhou.ack.aliyuncs.com/acs/cloud-controller-manager',
               'mirrors': [mirror_private_ip + ':8443/acs/cloud-controller-manager']},
              {'source': 'quay.io/samzhu/openshift-capi-alicloud',
               'mirrors': [mirror_private_ip + ':8443/samzhu/openshift-capi-alicloud']},
              {'source': 'quay.io/samzhu/alibaba-cloud-csi-operator',
               'mirrors': [mirror_private_ip + ':8443/samzhu/alibaba-cloud-csi-operator']},
              {'source': 'quay.io/samzhu/alibaba-cloud-csi-operator-bundle',
               'mirrors': [mirror_private_ip + ':8443/samzhu/alibaba-cloud-csi-operator-bundle']},
              {'source': 'quay.io/samzhu/alibaba-cloud-csi-operator-catalog',
               'mirrors': [mirror_private_ip + ':8443/samzhu/alibaba-cloud-csi-operator-catalog']}
            ],
            'additionalTrustBundle': mirror_ca_slurp.content | b64decode,
            'additionalTrustBundlePolicy': 'Always'
          } | to_json }}
      no_log: true

    - name: PATCH AI cluster install-config (imageDigestSources + CA)
      ansible.builtin.uri:
        url: "{{ assisted_api }}/clusters/{{ cluster_id }}/install-config"
        method: PATCH
        headers:
          Authorization: "Bearer {{ ai_access_token }}"
          Content-Type: application/json
        # AI v2 PATCH /clusters/{id}/install-config takes the JSON-encoded
        # install-config-overrides STRING as the entire body (not an object).
        # Wire payload must look like:
        #     "{\"imageContentSources\":[...],\"additionalTrustBundle\":...}"
        # (note the outer quotes — it's a JSON string, not a JSON object).
        # `| to_json` on our already-JSON string adds the outer quotes
        # and escapes internal quotes correctly.
        body: '{{ _install_config_overrides_json | to_json }}'
        body_format: json
        status_code: [200, 201]
      no_log: true

    - name: PATCH AI infra-env with mirror additional_trust_bundle
      ansible.builtin.uri:
        url: "{{ assisted_api }}/infra-envs/{{ infra_env_id }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ ai_access_token }}"
          Content-Type: application/json
        body:
          additional_trust_bundle: "{{ mirror_ca_slurp.content | b64decode }}"
        body_format: json
        status_code: [200, 201]

    # ── Extend infra-env ignition_config_override with per-registry CA ─────
    #
    # additional_trust_bundle drops the CA into /etc/pki/ca-trust/source/anchors/
    # but `update-ca-trust extract` doesn't run during RHCOS Live ignition →
    # system CA bundle stays stale.  Worse, the containers/image library
    # (used by skopeo / ostree-container / cri-o) does NOT consult the system
    # trust store — it only looks at /etc/containers/certs.d/<host>:<port>/
    # for per-registry CAs.
    #
    # Symptom we hit: `ostree container image pull` for the rhel-coreos
    # release image redirected through registries.conf to mirror, TLS handshake
    # failed (no CA in certs.d), fell back to upstream quay.io across-border,
    # hung indefinitely until AI's 30-min stage timeout killed the install.
    #
    # Fix: read the existing ignition_config_override from infra-env, append
    # /etc/containers/certs.d/<mirror>:8443/ca.crt to it, PATCH back.  Now
    # every future discovery-ISO download has the file baked in (gone from
    # tmpfs on reboot, but re-injected on every fresh boot).
    - name: GET current infra-env to extract existing ignition_config_override
      ansible.builtin.uri:
        url: "{{ assisted_api }}/infra-envs/{{ infra_env_id }}"
        method: GET
        headers: { Authorization: "Bearer {{ ai_access_token }}" }
        return_content: true
      register: _infra_env_get

    - name: Build extended ignition_config_override with mirror CA in certs.d
      ansible.builtin.set_fact:
        _extended_ignition_override: >-
          {{ (_infra_env_get.json.ignition_config_override | default('{"ignition":{"version":"3.1.0"},"storage":{"files":[]},"systemd":{"units":[]}}') | from_json)
             | combine({
                 'storage': {
                   'files': (((_infra_env_get.json.ignition_config_override | default('{"storage":{"files":[]}}') | from_json).storage.files | default([]))
                             | rejectattr('path', 'equalto', '/etc/containers/certs.d/' + mirror_private_ip + ':8443/ca.crt') | list)
                            + [{
                                'path': '/etc/containers/certs.d/' + mirror_private_ip + ':8443/ca.crt',
                                'mode': 420,
                                'overwrite': true,
                                'contents': {
                                  'source': 'data:text/plain;base64,' + mirror_ca_slurp.content
                                }
                              }]
                 }
               }, recursive=True) }}
      no_log: true

    - name: PATCH AI infra-env ignition_config_override (per-registry CA in certs.d)
      ansible.builtin.uri:
        url: "{{ assisted_api }}/infra-envs/{{ infra_env_id }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ ai_access_token }}"
          Content-Type: application/json
        body:
          ignition_config_override: "{{ _extended_ignition_override | to_json }}"
        body_format: json
        status_code: [200, 201]

    - name: Mirror prepare done
      ansible.builtin.debug:
        msg: |
          ✓ Mirror ready at https://{{ mirror_private_ip }}:8443
          ✓ AI cluster install-config patched
          ✓ AI infra-env trust bundle patched

          Next step:
            ansible-playbook ansible/playbooks/mirror-verify.yml
            ansible-playbook ansible/playbooks/07-install-cluster.yml
