---
# Convenience wrapper: run Phases 00 → 07 in sequence (split architecture).
# Phase 08 (post-install) runs on jump host inventory and is NOT included
# here.  Phase 99 (teardown) must run with explicit confirmation.
#
# The 04/05 mirror playbooks end_play harmlessly when mirror_enabled=false,
# so site.yml can include them unconditionally.
- ansible.builtin.import_playbook: 00-preflight.yml
- ansible.builtin.import_playbook: 01-prepare-iso.yml
- ansible.builtin.import_playbook: 02-import-image.yml
- ansible.builtin.import_playbook: 03-create-mirror-stack.yml   # no-op if mirror_enabled=false
- ansible.builtin.import_playbook: 04-prepare-mirror.yml        # no-op if mirror_enabled=false
- ansible.builtin.import_playbook: 05-verify-mirror.yml         # no-op if mirror_enabled=false
- ansible.builtin.import_playbook: 06-create-cluster-stack.yml
- ansible.builtin.import_playbook: 07-install-cluster.yml
