---
# Phase 01 — create Assisted cluster + infra-env, download Discovery ISO.
- name: Prepare OpenShift Discovery ISO via Assisted Installer API
  hosts: local
  gather_facts: false
  vars:
    iso_path: "{{ output_dir }}/discovery-{{ cluster_name }}.iso"
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml
    - ansible.builtin.include_tasks: ../tasks/path_defaults.yml
    - ansible.builtin.include_tasks: ../tasks/mirror_defaults.yml
    - ansible.builtin.include_tasks: ../tasks/assisted_token.yml

    # ── Adopt existing cluster by name to avoid duplicates ─────────────────
    - name: List existing Assisted clusters
      ansible.builtin.uri:
        url: "{{ assisted_api }}/clusters"
        headers: { Authorization: "Bearer {{ ai_access_token }}" }
        status_code: 200
        return_content: true
      register: cluster_list
      when: cluster_id is not defined or cluster_id | length == 0

    - name: Adopt existing cluster with matching name + domain
      ansible.builtin.set_fact:
        cluster_id: "{{ (cluster_list.json
                          | selectattr('name', 'equalto', cluster_name)
                          | selectattr('base_dns_domain', 'equalto', base_domain)
                          | list | first).id }}"
      when:
        - cluster_id is not defined or cluster_id | length == 0
        - cluster_list is defined
        - (cluster_list.json
            | selectattr('name', 'equalto', cluster_name)
            | selectattr('base_dns_domain', 'equalto', base_domain)
            | list | length) > 0

    # ── Create cluster if still missing ────────────────────────────────────
    - name: Read pull secret
      ansible.builtin.slurp:
        src: "{{ pull_secret_file }}"
      register: pull_slurp
      no_log: true

    - name: Read SSH public key
      ansible.builtin.slurp:
        src: "{{ ssh_pub_key_file }}"
      register: ssh_pub_slurp

    # ── Mirror-registry: resolve admin password (auto-generate if blank) ──────
    # Saved to state.yml immediately so Phase 03 reads the SAME password when
    # provisioning mirror-registry — they MUST match (one is used in pull_secret
    # auth, the other in `mirror-registry install --initPassword`).
    - name: Resolve mirror init password (auto-generate if blank)
      ansible.builtin.set_fact:
        _mirror_init_password_resolved: >-
          {{ mirror_init_password
             if (mirror_init_password | default('') | length > 0)
             else lookup('password', '/dev/null length=20 chars=ascii_letters,digits') }}
      when: mirror_enabled | default(false) | bool
      no_log: true

    - name: Persist mirror password to state (Phase 03 reads it from here)
      ansible.builtin.include_tasks: ../tasks/save_state.yml
      vars:
        new_state:
          mirror_init_password: "{{ _mirror_init_password_resolved }}"
      when: mirror_enabled | default(false) | bool
      no_log: true

    # ── Mirror-registry: augment pull_secret with mirror auth ─────────────────
    # discovery agent + bootstrap installer will pull from <mirror>:8443 which
    # requires basic auth (mirror-admin:password).  Without this entry in
    # pull_secret, pulls 401 even though registries.conf points to the mirror.
    # Sanity-check inputs BEFORE the big Jinja expression so a missing
    # variable produces a clear error rather than a censored one.
    - name: Sanity — required mirror facts present
      ansible.builtin.assert:
        that:
          - mirror_private_ip is defined and mirror_private_ip | length > 0
          - mirror_init_user | default('mirror-admin') | length > 0
          - _mirror_init_password_resolved is defined and _mirror_init_password_resolved | length > 0
          - pull_slurp is defined
          - pull_slurp.content is defined
        fail_msg: |
          One or more required facts are missing before pull_secret augmentation:
            mirror_private_ip                 = {{ mirror_private_ip | default('(undefined)') }}
            mirror_init_user                  = {{ mirror_init_user | default('(undefined)') }}
            _mirror_init_password_resolved    = {{ '(defined)' if _mirror_init_password_resolved is defined else '(UNDEFINED)' }}
            pull_slurp.content                = {{ '(defined)' if (pull_slurp is defined and pull_slurp.content is defined) else '(UNDEFINED)' }}
      when: mirror_enabled | default(false) | bool

    # Validate pull-secret parses + has the standard .auths key
    - name: Sanity — pull_secret parses and has .auths
      ansible.builtin.set_fact:
        _pull_secret_parsed: "{{ pull_slurp.content | b64decode | from_json }}"
      when: mirror_enabled | default(false) | bool
      no_log: true

    - name: Sanity — pull_secret has .auths
      ansible.builtin.assert:
        that:
          - _pull_secret_parsed.auths is defined
          - _pull_secret_parsed.auths | length > 0
        fail_msg: |
          pull-secret does not have an "auths" key, or it is empty.
          Make sure {{ pull_secret_file }} is a valid Red Hat pull-secret JSON.
      when: mirror_enabled | default(false) | bool

    - name: Augment pull_secret with mirror auth
      ansible.builtin.set_fact:
        _pull_secret_with_mirror: >-
          {{ (_pull_secret_parsed
              | combine({'auths':
                  _pull_secret_parsed.auths
                  | combine({ (mirror_private_ip + ':8443'): {
                      'auth': ((mirror_init_user | default('mirror-admin')) + ':' + _mirror_init_password_resolved) | b64encode,
                      'email': 'mirror-registry@localhost'
                    }})
              }))
             | to_json }}
      when: mirror_enabled | default(false) | bool
      no_log: true

    # Build body as a JSON string so integer fields are serialized correctly.
    # In Ansible's uri module, body_format=json with a dict converts values via
    # Python's json.dumps — but only if the Python types are already correct.
    # Using to_json inside Jinja2 guarantees control_plane_count is an int, not "3".
    #
    # Mirror notes:
    # - pull_secret gets the mirror auth entry merged in (so discovery agent +
    #   bootstrap installer can both auth to the in-VPC registry).
    # - install-config overrides (imageDigestSources + additionalTrustBundle)
    #   are NOT applied here — they go via PATCH /v2/clusters/{id}/install-config
    #   in Phase 03 once the mirror CA cert exists.
    - name: Build cluster create payload
      ansible.builtin.set_fact:
        _cluster_body: "{{ {
          'name': cluster_name,
          'openshift_version': openshift_version | string,
          'cpu_architecture': 'x86_64',
          'base_dns_domain': base_domain,
          'high_availability_mode': 'Full',
          'control_plane_count': control_plane_count | int,
          'pull_secret': _pull_secret_with_mirror if (mirror_enabled | default(false) | bool) else (pull_slurp.content | b64decode),
          'ssh_public_key': ssh_pub_slurp.content | b64decode | trim,
          'platform': {
            'type': 'external',
            'external': {
              'platform_name': 'AlibabaCloud',
              'cloud_controller_manager': 'External'
            }
          }
        } | to_json }}"
      no_log: true

    - name: Create Assisted cluster object
      ansible.builtin.uri:
        url: "{{ assisted_api }}/clusters"
        method: POST
        headers:
          Authorization: "Bearer {{ ai_access_token }}"
          Content-Type: application/json
        body: "{{ _cluster_body }}"
        body_format: raw
        status_code: 201
      register: cluster_create
      no_log: true
      when: cluster_id is not defined or cluster_id | length == 0

    - name: Capture new cluster ID
      ansible.builtin.set_fact:
        cluster_id: "{{ cluster_create.json.id }}"
      when: cluster_create is not skipped

    - name: Assert cluster_id is defined
      ansible.builtin.assert:
        that: cluster_id is defined and cluster_id | length > 0
        fail_msg: >-
          cluster_id is not set. Cluster creation or adoption failed.
          Check Assisted API response above.

    # ── Create infra-env (this is what generates the ISO) ──────────────────
    - name: Look up infra-env for the cluster
      ansible.builtin.uri:
        url: "{{ assisted_api }}/infra-envs?cluster_id={{ cluster_id }}"
        headers: { Authorization: "Bearer {{ ai_access_token }}" }
        status_code: 200
        return_content: true
      register: infra_list
      when: infra_env_id is not defined or infra_env_id | length == 0

    - name: Adopt existing infra-env
      ansible.builtin.set_fact:
        infra_env_id: "{{ (infra_list.json | first).id }}"
      when:
        - infra_env_id is not defined or infra_env_id | length == 0
        - infra_list is defined
        - infra_list.json | length > 0

    # ── Mirror registry: build registries.conf override for the discovery ISO ──
    # Mirror ECS doesn't exist yet (Phase 03 creates it), so we mark the mirror
    # as insecure rather than try to bake in a CA cert.  Safe because the mirror
    # lives in a private VPC and is only reachable from cluster nodes.
    - name: Build registries.conf for mirror (insecure for discovery ISO)
      ansible.builtin.set_fact:
        _registries_conf: |
          [[registry]]
          prefix = ""
          location = "registry.redhat.io/rhai/assisted-installer-agent-rhel9"
          mirror-by-digest-only = true

          [[registry.mirror]]
          location = "{{ mirror_private_ip }}:8443/rhai/assisted-installer-agent-rhel9"
          insecure = true

          [[registry]]
          prefix = ""
          location = "registry.redhat.io/rhai/assisted-installer-rhel9"
          mirror-by-digest-only = true

          [[registry.mirror]]
          location = "{{ mirror_private_ip }}:8443/rhai/assisted-installer-rhel9"
          insecure = true

          [[registry]]
          prefix = ""
          location = "registry.redhat.io/rhai/assisted-installer-controller-rhel9"
          mirror-by-digest-only = true

          [[registry.mirror]]
          location = "{{ mirror_private_ip }}:8443/rhai/assisted-installer-controller-rhel9"
          insecure = true

          # Mirror destination paths come from oc-mirror's own ICSP — see
          # comment on the analogous PATCH in 03b-mirror-prepare.yml.
          # oc-mirror v1 publishes both OCP repos into the `openshift`
          # namespace with *different* names from the source.
          [[registry]]
          prefix = ""
          location = "quay.io/openshift-release-dev/ocp-release"
          mirror-by-digest-only = true

          [[registry.mirror]]
          location = "{{ mirror_private_ip }}:8443/openshift/release-images"
          insecure = true

          [[registry]]
          prefix = ""
          location = "quay.io/openshift-release-dev/ocp-v4.0-art-dev"
          mirror-by-digest-only = true

          [[registry.mirror]]
          location = "{{ mirror_private_ip }}:8443/openshift/release"
          insecure = true
      when: mirror_enabled | default(false) | bool

    # ── Inject vdb→vda clone hook (Alibaba ECS install workaround) ───────
    # See ansible/files/clone-vdb-to-vda.{sh,service} for details.
    # Runs on EVERY Alibaba install (mirror or not) because the underlying
    # constraint is the same — ECS boots from vda which holds the ISO.
    - name: Slurp clone hook script
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/../files/clone-vdb-to-vda.sh"
      register: clone_sh_slurp

    - name: Slurp clone hook systemd unit
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/../files/clone-vdb-to-vda.service"
      register: clone_unit_slurp

    # Build the ignition override unconditionally (clone hook is always
    # needed on Alibaba).  Mirror's registries.conf is merged in only
    # when mirror_enabled.  Ignition spec 3.1.0 schema:
    #   storage.files[]  — write a file
    #   systemd.units[]  — install + enable a systemd unit
    - name: Build ignition file list — base (clone hook always)
      ansible.builtin.set_fact:
        _ignition_files:
          - path: /usr/local/bin/clone-vdb-to-vda.sh
            mode: 493            # 0755
            overwrite: true
            contents:
              source: "data:text/plain;base64,{{ clone_sh_slurp.content }}"

    - name: Append registries.conf to ignition files (mirror mode)
      ansible.builtin.set_fact:
        _ignition_files: >-
          {{ _ignition_files + [{
            'path': '/etc/containers/registries.conf',
            'mode': 420,
            'overwrite': true,
            'contents': {
              'source': 'data:text/plain;base64,' + (_registries_conf | b64encode)
            }
          }] }}
      when: mirror_enabled | default(false) | bool

    - name: Build ignition config override JSON (clone hook + optional mirror)
      ansible.builtin.set_fact:
        _ignition_override: >-
          {{ {
            'ignition': {'version': '3.1.0'},
            'storage': {'files': _ignition_files},
            'systemd': {'units': [{
              'name': 'clone-vdb-to-vda.service',
              'enabled': true,
              'contents': clone_unit_slurp.content | b64decode
            }]}
          } | to_json }}

    - name: Build base infra-env body
      ansible.builtin.set_fact:
        _infra_body_base: >-
          {{ {
            'name': cluster_name + '-infra',
            'cluster_id': cluster_id,
            'image_type': 'full-iso',
            'pull_secret': _pull_secret_with_mirror if (mirror_enabled | default(false) | bool) else (pull_slurp.content | b64decode),
            'ssh_authorized_key': ssh_pub_slurp.content | b64decode | trim,
            'openshift_version': openshift_version | string,
            'cpu_architecture': 'x86_64'
          } }}
      no_log: true
      when: infra_env_id is not defined or infra_env_id | length == 0

    - name: Build infra-env body (clone hook always; mirror conf when enabled)
      ansible.builtin.set_fact:
        _infra_body: >-
          {{ (_infra_body_base
                | combine({'ignition_config_override': _ignition_override}))
             | to_json }}
      no_log: true
      when: infra_env_id is not defined or infra_env_id | length == 0

    - name: Create infra-env if missing
      ansible.builtin.uri:
        url: "{{ assisted_api }}/infra-envs"
        method: POST
        headers:
          Authorization: "Bearer {{ ai_access_token }}"
          Content-Type: application/json
        body: "{{ _infra_body }}"
        body_format: raw
        status_code: 201
      register: infra_create
      no_log: true
      when: infra_env_id is not defined or infra_env_id | length == 0

    - name: Capture new infra-env ID
      ansible.builtin.set_fact:
        infra_env_id: "{{ infra_create.json.id }}"
      when: infra_create is not skipped

    # ── Wait for ISO URL ───────────────────────────────────────────────────
    - name: Poll for ISO download URL
      ansible.builtin.uri:
        url: "{{ assisted_api }}/infra-envs/{{ infra_env_id }}/downloads/image-url"
        headers: { Authorization: "Bearer {{ ai_access_token }}" }
        status_code: 200
        return_content: true
      register: iso_url_resp
      retries: 30
      delay: 5
      until:
        - iso_url_resp.status == 200
        - iso_url_resp.json.url is defined
        - iso_url_resp.json.url | length > 0

    # ── Download (idempotent when infra-env is reused; forced when new) ──────
    # full-iso ≥ 900 MB; minimal-iso ~100-150 MB.
    # The ISO bakes in the infra-env registration token at generation time.
    # If a NEW infra-env was just created (infra_create not skipped), the token
    # has changed and any on-disk ISO from a previous run is stale — always
    # re-download.  Only skip when the infra-env was ADOPTED (same ID, same token)
    # and the on-disk file looks like a valid full-iso (≥ 900 MB).
    - name: Stat existing ISO on disk
      ansible.builtin.stat:
        path: "{{ iso_path }}"
      register: iso_stat

    - name: Download Discovery ISO
      ansible.builtin.get_url:
        url: "{{ iso_url_resp.json.url }}"
        dest: "{{ iso_path }}"
        mode: "0644"
        force: true
      when: >-
        not iso_stat.stat.exists or
        iso_stat.stat.size < (900 * 1024 * 1024) or
        infra_create is not skipped

    - name: Confirm ISO size sanity-checks (≥ 900 MB for full-iso)
      ansible.builtin.stat:
        path: "{{ iso_path }}"
      register: iso_stat_final
      failed_when: iso_stat_final.stat.size < (900 * 1024 * 1024)

    # ── Persist state ──────────────────────────────────────────────────────
    - name: Save state
      ansible.builtin.include_tasks: ../tasks/save_state.yml
      vars:
        new_state:
          cluster_id: "{{ cluster_id }}"
          infra_env_id: "{{ infra_env_id }}"
          iso_path: "{{ iso_path }}"

    - name: Phase 01 done
      ansible.builtin.debug:
        msg: "ISO ready at {{ iso_path }} — next: 02-import-image.yml"
