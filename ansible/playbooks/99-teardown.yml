---
# Phase 99 — clean up resources to zero billing at any phase boundary.
#
# Usage:
#   ansible-playbook playbooks/99-teardown.yml                    # full teardown
#   ansible-playbook playbooks/99-teardown.yml -e teardown_from=3 # stopped at Phase 03
#   ansible-playbook playbooks/99-teardown.yml -e teardown_from=2 # stopped at Phase 02
#   ansible-playbook playbooks/99-teardown.yml -e teardown_from=1 # stopped at Phase 01
#   ansible-playbook playbooks/99-teardown.yml -e teardown_confirmed=true  # no prompt
#
# teardown_from levels — cleans resources created UP TO that phase:
#   1 → Assisted cluster + infra-env records (Red Hat API only, no Aliyun cost)
#   2 → + ECS custom image
#   3 → + ROS stack (VPC / ECS nodes / SLB / NAT / EIP / jump host)
#   4 → + app-layer cleanup first (LoadBalancer SVCs + PVCs), then everything above
#        (use when OpenShift is installed and CCM/CSI may have created extra resources)

- name: Teardown
  hosts: local
  gather_facts: false
  vars:
    teardown_from: 4        # default: full teardown
    teardown_confirmed: false
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml

    - name: Show teardown scope
      ansible.builtin.debug:
        msg: |
          Teardown scope: phases 1–{{ teardown_from }}
          {% if teardown_from | int >= 4 %}  Step 0 : app-layer cleanup (SLBs / PVCs via jump host){% endif %}
            Step 1 : Delete Assisted cluster record
          {% if teardown_from | int >= 2 %}  Step 2 : Delete ECS custom image{% endif %}
          {% if teardown_from | int >= 3 %}  Step 3 : Delete ROS stack (VPC / ECS / SLB / NAT / EIP){% endif %}
            Step 4 : Orphan scan
            Step 5 : Clear state.yml

    - name: Confirm teardown (skip with -e teardown_confirmed=true)
      ansible.builtin.pause:
        prompt: >-
          Teardown phases 1–{{ teardown_from }} for cluster '{{ cluster_name }}'.
          Type 'yes' to proceed
      register: confirm_input
      when: not teardown_confirmed | bool

    - ansible.builtin.assert:
        that:
          - teardown_confirmed | bool or confirm_input.user_input == 'yes'
        fail_msg: "Aborted"

    # ── Step 0: App-layer cleanup (Phase 04+ only) ─────────────────────────
    # Must run BEFORE stack delete so CCM/CSI can release SLBs and cloud disks.
    - name: App-layer cleanup via jump host
      when:
        - teardown_from | int >= 4
        - jump_host_ip is defined and jump_host_ip | length > 0
      block:
        - name: Delete LoadBalancer Services + PVCs on the cluster
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ssh_priv_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - ConnectTimeout=10
              - "root@{{ jump_host_ip }}"
              - bash
              - -lc
              - |
                set -e
                export KUBECONFIG=/root/kubeconfig
                test -f $KUBECONFIG || { echo "no kubeconfig on jump host — skipping"; exit 0; }
                oc get svc -A --field-selector spec.type=LoadBalancer -o json \
                  | jq -r '.items[] | "\(.metadata.namespace) \(.metadata.name)"' \
                  | while read ns name; do
                      [ -n "$name" ] && oc delete svc -n "$ns" "$name" --wait=false || true
                    done
                oc delete pvc --all -A --wait=false 2>/dev/null || true
                echo "App-layer cleanup done"
          failed_when: false
          register: app_cleanup

        - name: Wait 180 s for CCM / CSI to release Aliyun resources
          ansible.builtin.pause:
            seconds: 180

    # ── Step 1: Delete Assisted cluster record (always) ────────────────────
    - ansible.builtin.include_tasks: ../tasks/assisted_token.yml
      when: cluster_id is defined and cluster_id | length > 0

    - name: Delete Assisted cluster record
      ansible.builtin.uri:
        url: "{{ assisted_api }}/clusters/{{ cluster_id }}"
        method: DELETE
        headers: { Authorization: "Bearer {{ ai_access_token }}" }
        status_code: [204, 404, 405]
      when: cluster_id is defined and cluster_id | length > 0
      failed_when: false

    - name: Delete Assisted infra-env record
      ansible.builtin.uri:
        url: "{{ assisted_api }}/infra-envs/{{ infra_env_id }}"
        method: DELETE
        headers: { Authorization: "Bearer {{ ai_access_token }}" }
        status_code: [204, 404, 405]
      when: infra_env_id is defined and infra_env_id | length > 0
      failed_when: false

    # ── Step 2: Delete ECS custom image (Phase 02+) ────────────────────────
    - name: Delete ECS custom image
      ansible.builtin.command:
        argv:
          - aliyun
          - ecs
          - DeleteImage
          - --RegionId
          - "{{ region }}"
          - --ImageId
          - "{{ ecs_image_id }}"
          - --Force
          - "true"
          - --profile
          - "{{ aliyun_profile }}"
      when:
        - teardown_from | int >= 2
        - ecs_image_id is defined and ecs_image_id | length > 0
      failed_when: false

    # ── Step 3: Delete ROS stack (Phase 03+) ──────────────────────────────
    # Pre-clean RAM resources that block stack deletion
    - name: Pre-detach RAM policy from role (unblocks stack deletion)
      ansible.builtin.command:
        argv:
          - aliyun
          - ram
          - DetachPolicyFromRole
          - --PolicyName
          - "{{ cluster_name }}-node-policy"
          - --PolicyType
          - Custom
          - --RoleName
          - "{{ node_ram_role | default('openshift-node-role') }}"
          - --profile
          - "{{ aliyun_profile }}"
      failed_when: false
      changed_when: false
      when:
        - teardown_from | int >= 3
        - ros_stack_id is defined and ros_stack_id | length > 0

    - name: Pre-delete RAM policy (unblocks stack deletion)
      ansible.builtin.command:
        argv:
          - aliyun
          - ram
          - DeletePolicy
          - --PolicyName
          - "{{ cluster_name }}-node-policy"
          - --profile
          - "{{ aliyun_profile }}"
      failed_when: false
      changed_when: false
      when:
        - teardown_from | int >= 3
        - ros_stack_id is defined and ros_stack_id | length > 0

    - name: Delete ROS stack
      ansible.builtin.command:
        argv:
          - aliyun
          - ros
          - DeleteStack
          - --StackId
          - "{{ ros_stack_id }}"
          - --RegionId
          - "{{ region }}"
          - --profile
          - "{{ aliyun_profile }}"
      when:
        - teardown_from | int >= 3
        - ros_stack_id is defined and ros_stack_id | length > 0
      failed_when: false

    - name: Wait for ROS stack deletion (DELETE_COMPLETE or 404)
      ansible.builtin.command:
        argv:
          - aliyun
          - ros
          - GetStack
          - --StackId
          - "{{ ros_stack_id }}"
          - --RegionId
          - "{{ region }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: stack_check
      changed_when: false
      failed_when: false
      retries: 40
      delay: 30
      until: >-
        stack_check.rc != 0 or
        (stack_check.stdout | from_json).Status in ['DELETE_COMPLETE', 'DELETE_FAILED']
      when:
        - teardown_from | int >= 3
        - ros_stack_id is defined and ros_stack_id | length > 0

    - name: Warn if stack stuck in DELETE_FAILED
      ansible.builtin.debug:
        msg: |
          WARNING: Stack {{ ros_stack_id }} is stuck in DELETE_FAILED.
          Check the ROS console for remaining blocking resources and delete manually.
      when:
        - teardown_from | int >= 3
        - stack_check is not skipped
        - stack_check.rc == 0
        - (stack_check.stdout | from_json).Status == 'DELETE_FAILED'

    # ── Step 4: Orphan scan (always) ──────────────────────────────────────
    - name: Scan for orphan resources tagged with cluster name
      ansible.builtin.command:
        argv:
          - aliyun
          - "{{ item.svc }}"
          - "{{ item.action }}"
          - --RegionId
          - "{{ region }}"
          - --Tag.1.Key
          - "kubernetes.io/cluster/{{ cluster_name }}"
          - --Tag.1.Value
          - owned
          - --profile
          - "{{ aliyun_profile }}"
      register: orphan_scan
      changed_when: false
      failed_when: false
      loop:
        - { svc: ecs, action: DescribeInstances,      label: "ECS instances" }
        - { svc: ecs, action: DescribeDisks,          label: "Disks (CSI orphans)" }
        - { svc: ecs, action: DescribeSecurityGroups, label: "Security Groups" }
        - { svc: slb, action: DescribeLoadBalancers,  label: "SLBs (CCM orphans)" }
        - { svc: vpc, action: DescribeEipAddresses,   label: "EIPs" }
        - { svc: vpc, action: DescribeNatGateways,    label: "NAT Gateways" }
        - { svc: vpc, action: DescribeVSwitches,      label: "VSwitches" }
        - { svc: vpc, action: DescribeVpcs,           label: "VPCs" }
        - { svc: pvtz, action: DescribeZones,         label: "PrivateZones" }
      loop_control:
        label: "{{ item.label }}"

    - name: Show orphan summary
      ansible.builtin.debug:
        msg: >-
          {{ item.item.label }}: {{ item.stdout
            | regex_findall('"InstanceId"|"DiskId"|"LoadBalancerId"|"AllocationId"')
            | length }} found
      loop: "{{ orphan_scan.results }}"
      loop_control:
        label: "{{ item.item.label }}"

    # ── Step 5: Clear state ────────────────────────────────────────────────
    - name: Remove state.yml
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../state.yml"
        state: absent

    - name: Teardown done
      ansible.builtin.debug:
        msg: |
          ✓ Teardown phases 1–{{ teardown_from }} complete.
          Check the Aliyun billing console in ~1 h to confirm zero ongoing charges.
