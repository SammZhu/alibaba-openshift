---
# Phase 99 (split architecture) — teardown one or both of the
# split-architecture ROS stacks.
#
# Pair with: 03-create-mirror-stack.yml + 06-create-cluster-stack.yml.
# For the legacy monolithic single-stack flow, use 99-teardown.yml.
#
# Usage:
#   # Drop only the cluster, keep mirror (the common case — rebuilds fast):
#   ansible-playbook playbooks/99-teardown.yml \
#     -e teardown_target=cluster -e teardown_confirmed=true
#
#   # Drop only the mirror (also auto-drops AI cluster + ECS image since
#   # they are paired by infra-env ID):
#   ansible-playbook playbooks/99-teardown.yml \
#     -e teardown_target=mirror  -e teardown_confirmed=true
#
#   # Drop everything (cluster first, then mirror):
#   ansible-playbook playbooks/99-teardown.yml \
#     -e teardown_target=both    -e teardown_confirmed=true
#
# teardown_target values:
#   cluster — delete cluster_stack_id, clear cluster_* fields in state.
#             mirror-stack stays.  Next: re-run 06-create-cluster-stack
#             + 04-install-cluster.  Saves ~30 min vs full rebuild.
#   mirror  — delete mirror_stack_id + AI cluster + infra-env + ECS image.
#             Forces a full rebuild (Phase 01 → 02 → 03 → 04 → 05 → 06 → 07).
#             Use when changing mirror tarball contents or VPC topology.
#   both    — do cluster, then mirror.  Equivalent to a hard reset.

- name: Teardown (split architecture)
  hosts: local
  gather_facts: false
  vars:
    teardown_target: cluster        # cluster | mirror | both
    teardown_confirmed: false
    teardown_preserves_ai: false    # mirror teardown — preserve AI cluster + infra-env + ECS image?
    delete_mirror_snapshots: false  # also delete mirror snapshots?
    cluster_includes_ai: false      # cluster teardown — also tear down AI cluster + infra-env + ECS image?
                                    # Use for OCP version changes: mirror preserved, AI cluster must
                                    # be rebuilt (AI v2 API does not allow PATCHing openshift_version
                                    # — the version is immutable on an existing cluster).
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml
    - ansible.builtin.include_tasks: ../tasks/path_defaults.yml

    - name: Validate teardown_target
      ansible.builtin.assert:
        that: teardown_target in ['cluster', 'mirror', 'both']
        fail_msg: "teardown_target must be one of: cluster, mirror, both"

    # teardown_preserves_ai=true is only meaningful for the "snapshot-restore
    # mirror" workflow: the AI cluster install-config carries a PATCHed
    # trustBundle + IDMS that reference the old mirror's CA and IP.  A
    # snapshot-restored mirror ECS keeps the same CA / IP, so the AI side
    # can be fully reused.  But if snapshots are deleted at the same time,
    # there is nothing to restore from — the flag combination is incoherent
    # and rejected below.
    - name: Reject preserves_ai + delete_snapshots both set to true
      ansible.builtin.assert:
        that: not (teardown_preserves_ai | bool and delete_mirror_snapshots | bool)
        fail_msg: |
          teardown_preserves_ai=true is mutually exclusive with delete_mirror_snapshots=true.
          preserves_ai assumes a snapshot-restore next run (the CA/IP that AI
          install-config refers to are still valid in the snapshot); deleting
          the snapshots makes preserving AI pointless — AI's ignition would
          no longer match a freshly rebuilt mirror.
          Pick one path:
            - snapshot-restore (preserves_ai=true, snapshots kept), or
            - fresh rebuild (preserves_ai=false, snapshots optional).

    - name: Show scope + confirm
      ansible.builtin.pause:
        prompt: |

          Split-architecture teardown for cluster '{{ cluster_name }}':
            target                   = {{ teardown_target }}
            teardown_preserves_ai    = {{ teardown_preserves_ai }}
            delete_mirror_snapshots  = {{ delete_mirror_snapshots }}
            cluster_stack_id = {{ cluster_stack_id | default('(none)') }}
            mirror_stack_id  = {{ mirror_stack_id  | default('(none)') }}
            ai cluster_id    = {{ cluster_id       | default('(none)') }}
            ecs_image_id     = {{ ecs_image_id     | default('(none)') }}

          Type 'yes' to proceed
      register: _confirm
      when: not teardown_confirmed | bool

    - ansible.builtin.assert:
        that: teardown_confirmed | bool or _confirm.user_input == 'yes'
        fail_msg: "Aborted"

    # ── 0. CAPA worker-pool ECS cleanup (#62) ────────────────────────────
    # Phase 12's MachineDeployments create worker ECS DIRECTLY via CAPA (not ROS
    # stack-managed), inside the mirror VPC, tagged openshift-worker-pool=
    # capa-multiaz (tag propagates to disks + ENIs). 12 no longer deletes them on
    # the way out — it leaves the pools running so a failed pool can be debugged
    # online — so teardown must remove them here, BEFORE any DeleteStack, or their
    # ENIs block the capa-worker vSwitch sweep + mirror DeleteStack (same failure
    # class as the leftover vSwitches). Pure aliyun CLI: no dependency on the
    # cluster API / jump host (which may already be gone). Runs for every target
    # since the workers belong to the cluster, not to either ROS stack.
    - name: CAPA workers — delete tagged worker ECS (frees ENIs for stack teardown)
      when: region is defined and region | length > 0
      block:
        - name: CAPA workers — list ECS tagged openshift-worker-pool=capa-multiaz
          ansible.builtin.command:
            argv: [aliyun, ecs, DescribeInstances, --RegionId, "{{ region }}",
                   "--Tag.1.Key", openshift-worker-pool, "--Tag.1.Value", capa-multiaz,
                   --PageSize, "100", --profile, "{{ aliyun_profile }}"]
          register: _capa_ecs_q
          changed_when: false
          failed_when: false

        - name: CAPA workers — extract instance IDs
          ansible.builtin.set_fact:
            _capa_ecs_ids: >-
              {{ (_capa_ecs_q.stdout | default('{}') | from_json).Instances.Instance
                 | default([]) | map(attribute='InstanceId') | list }}

        - name: CAPA workers — delete each (force stops + deletes; disks/ENIs cascade by tag)
          ansible.builtin.command:
            argv: [aliyun, ecs, DeleteInstance, --RegionId, "{{ region }}",
                   --InstanceId, "{{ item }}", --Force, "true", --profile, "{{ aliyun_profile }}"]
          loop: "{{ _capa_ecs_ids | default([]) }}"
          loop_control:
            label: "{{ item }} (capa-multiaz worker)"
          when: (_capa_ecs_ids | default([])) | length > 0
          failed_when: false
          changed_when: true

        - name: CAPA workers — wait until all tagged ECS are gone (ENIs released)
          ansible.builtin.command:
            argv: [aliyun, ecs, DescribeInstances, --RegionId, "{{ region }}",
                   "--Tag.1.Key", openshift-worker-pool, "--Tag.1.Value", capa-multiaz,
                   --PageSize, "100", --profile, "{{ aliyun_profile }}"]
          register: _capa_ecs_gone
          retries: 30
          delay: 10
          until: ((_capa_ecs_gone.stdout | default('{}') | from_json).Instances.Instance | default([]) | length) == 0
          failed_when: false
          changed_when: false
          when: (_capa_ecs_ids | default([])) | length > 0

    # ── 1. Cluster-stack teardown ────────────────────────────────────────
    - name: Delete cluster-stack
      when:
        - teardown_target in ['cluster', 'both']
        - cluster_stack_id is defined and cluster_stack_id | length > 0
      block:
        - name: DeleteStack — cluster
          ansible.builtin.command:
            argv:
              - aliyun
              - ros
              - DeleteStack
              - --RegionId
              - "{{ region }}"
              - --StackId
              - "{{ cluster_stack_id }}"
              - --RetainAllResources
              - "false"
              - --profile
              - "{{ aliyun_profile }}"
          register: _cluster_delete
          changed_when: _cluster_delete.rc == 0
          failed_when: false

        - name: Poll cluster-stack until gone
          ansible.builtin.command:
            argv:
              - aliyun
              - ros
              - GetStack
              - --RegionId
              - "{{ region }}"
              - --StackId
              - "{{ cluster_stack_id }}"
              - --profile
              - "{{ aliyun_profile }}"
          register: _cluster_poll
          retries: 60
          delay: 30
          # GetStack on a deleted stack returns rc!=0 — that is success.
          until: _cluster_poll.rc != 0 or
                 (_cluster_poll.stdout | from_json).Status in ['DELETE_COMPLETE']
          failed_when: false
          changed_when: false

        # ── Worker boot image (Route B / P3-IMG.1): the re-stamped aliyun RHCOS
        #    image materialized by 10-prepare-worker-bootimage.yml. It belongs to
        #    this cluster, so it dies with the cluster-stack. DeleteImage does NOT
        #    cascade its SnapshotForImage (same as the ISO image), so:
        #    query → delete image → delete each backing snapshot. The OSS transit
        #    object is already gone (deleted right after ImportImage in phase 10).
        - name: Worker image — look up backing snapshots
          ansible.builtin.command:
            argv: [aliyun, ecs, DescribeImages, --RegionId, "{{ region }}",
                   --ImageId, "{{ worker_boot_image_id }}", --profile, "{{ aliyun_profile }}"]
          register: _worker_img_desc
          changed_when: false
          failed_when: false
          when: worker_boot_image_id is defined and worker_boot_image_id | length > 0

        - name: Worker image — extract backing snapshot IDs
          ansible.builtin.set_fact:
            _worker_img_snaps: >-
              {{ ((_worker_img_desc.stdout | default('{}') | from_json)
                  .Images.Image | default([]) | first | default({}))
                 .DiskDeviceMappings.DiskDeviceMapping | default([])
                 | map(attribute='SnapshotId') | list }}
          when:
            - worker_boot_image_id is defined and worker_boot_image_id | length > 0
            - _worker_img_desc.stdout is defined

        - name: Worker image — delete custom image
          ansible.builtin.command:
            argv: [aliyun, ecs, DeleteImage, --RegionId, "{{ region }}",
                   --ImageId, "{{ worker_boot_image_id }}", --Force, "true",
                   --profile, "{{ aliyun_profile }}"]
          when: worker_boot_image_id is defined and worker_boot_image_id | length > 0
          failed_when: false
          changed_when: true

        - name: Worker image — cascade-delete backing snapshots (aliyun has no auto cascade)
          ansible.builtin.command:
            argv: [aliyun, ecs, DeleteSnapshot, --RegionId, "{{ region }}",
                   --SnapshotId, "{{ item }}", --profile, "{{ aliyun_profile }}"]
          loop: "{{ _worker_img_snaps | default([]) }}"
          loop_control:
            label: "{{ item }} (was backing worker image {{ worker_boot_image_id }})"
          when: (_worker_img_snaps | default([])) | length > 0
          failed_when: false
          changed_when: true

        - name: Clear cluster_* fields in state
          ansible.builtin.include_tasks: ../tasks/save_state.yml
          vars:
            new_state:
              cluster_stack_id: ''
              worker_boot_image_id: ''
              api_lb_endpoint: ''
              worker_sg: ''
              master_ip1: ''
              master_ip2: ''
              master_ip3: ''
              forward_zone_id: ''
              reverse_zone_id1: ''
              reverse_zone_id2: ''
              # When cluster_includes_ai=true, also clear AI/image/iso fields
              # so the next 01 doesn't try to adopt the just-deleted cluster.
              cluster_id:   "{{ '' if (cluster_includes_ai | default(false) | bool) else (cluster_id | default('')) }}"
              infra_env_id: "{{ '' if (cluster_includes_ai | default(false) | bool) else (infra_env_id | default('')) }}"
              ecs_image_id: "{{ '' if (cluster_includes_ai | default(false) | bool) else (ecs_image_id | default('')) }}"
              iso_path:     "{{ '' if (cluster_includes_ai | default(false) | bool) else (iso_path | default('')) }}"

    # ── 2. AI cluster + infra-env + ECS image ────────────────────────────────
    # These are paired: the discovery ignition baked into the ECS image
    # references infra_env_id; deleting either in isolation leaves a broken pair.
    #
    # Triggers (delete all three):
    #   - teardown_target=mirror|both AND not teardown_preserves_ai
    #     (mirror is being rebuilt → new CA/IP → AI must be rebuilt too)
    #   - teardown_target=cluster AND cluster_includes_ai=true
    #     (OCP version change scenario: mirror preserved, but AI cluster
    #      must be re-created because AI v2 API doesn't allow PATCHing
    #      openshift_version on an existing cluster)
    #
    # Skip (keep all three):
    #   - default cluster teardown (mirror untouched + AI valid for re-use)
    #   - mirror teardown with teardown_preserves_ai=true
    #     (snapshot restore expected — CA/IP preserved, AI install-config still valid)
    - name: Delete Assisted cluster + infra-env + ECS image
      when: >-
        (teardown_target in ['mirror', 'both'] and not (teardown_preserves_ai | bool))
        or
        (teardown_target == 'cluster' and (cluster_includes_ai | bool))
      block:
        - ansible.builtin.include_tasks: ../tasks/assisted_token.yml
          when: cluster_id is defined and cluster_id | length > 0

        - name: AI — delete cluster
          ansible.builtin.uri:
            url: "{{ assisted_api }}/clusters/{{ cluster_id }}"
            method: DELETE
            headers: { Authorization: "Bearer {{ ai_access_token }}" }
            status_code: [202, 204, 404]
          when: cluster_id is defined and cluster_id | length > 0
          failed_when: false

        - name: AI — delete infra-env
          ansible.builtin.uri:
            url: "{{ assisted_api }}/infra-envs/{{ infra_env_id }}"
            method: DELETE
            headers: { Authorization: "Bearer {{ ai_access_token }}" }
            status_code: [202, 204, 404]
          when: infra_env_id is defined and infra_env_id | length > 0
          failed_when: false

        # aliyun `DeleteImage --Force=true` does NOT cascade-delete the
        # underlying SnapshotForImage entries.  Manually: query → delete
        # image → delete each backing snapshot.  Without this, every
        # 02-import-image cycle leaves a 2 GB SnapshotForImage-* orphan
        # in the region — accumulates ~¥0.24/月 per orphan, indefinitely.
        # Observed 2026-06-04: 5 stale ISO snapshots from prior runs.
        - name: ECS — look up backing snapshots of the custom image (for cascade delete)
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DescribeImages
              - --RegionId
              - "{{ region }}"
              - --ImageId
              - "{{ ecs_image_id }}"
              - --profile
              - "{{ aliyun_profile }}"
          register: _ecs_image_desc
          when: ecs_image_id is defined and ecs_image_id | length > 0
          changed_when: false
          failed_when: false

        - name: ECS — extract backing snapshot IDs
          ansible.builtin.set_fact:
            _ecs_image_backing_snaps: >-
              {{ ((_ecs_image_desc.stdout | default('{}') | from_json)
                  .Images.Image | default([]) | first | default({}))
                 .DiskDeviceMappings.DiskDeviceMapping | default([])
                 | map(attribute='SnapshotId') | list }}
          when:
            - ecs_image_id is defined and ecs_image_id | length > 0
            - _ecs_image_desc.stdout is defined

        - name: ECS — delete custom image
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DeleteImage
              - --RegionId
              - "{{ region }}"
              - --ImageId
              - "{{ ecs_image_id }}"
              - --Force
              - "true"
              - --profile
              - "{{ aliyun_profile }}"
          when: ecs_image_id is defined and ecs_image_id | length > 0
          failed_when: false
          changed_when: true

        - name: ECS — cascade-delete backing snapshots (aliyun has no auto cascade)
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DeleteSnapshot
              - --RegionId
              - "{{ region }}"
              - --SnapshotId
              - "{{ item }}"
              - --profile
              - "{{ aliyun_profile }}"
          loop: "{{ _ecs_image_backing_snaps | default([]) }}"
          loop_control:
            label: "{{ item }} (was backing image {{ ecs_image_id }})"
          when: (_ecs_image_backing_snaps | default([])) | length > 0
          failed_when: false
          changed_when: true

    # ── 3. Mirror-stack teardown ─────────────────────────────────────────
    - name: Delete mirror-stack
      when:
        - teardown_target in ['mirror', 'both']
        - mirror_stack_id is defined and mirror_stack_id | length > 0
      block:
        # CSI dynamically provisions NAS filesystems + mount targets in the cluster
        # VPC (filesystem-mode NAS SC / live-migration RWX). They are NOT stack-
        # managed and their mount targets sit in the mirror stack's vSwitch, so
        # DeleteVSwitch / the mirror DeleteStack fail with DependencyViolation.Nas
        # (observed 2026-06-14). Reclaim them first. NOTE: the NAS was created by the
        # NODE RAM role (nas:*); the teardown RAM user ({{ aliyun_profile }}) must
        # ALSO have nas:DescribeFileSystems / DeleteMountTarget / DeleteFileSystem or
        # this is a no-op (best-effort) and you must delete the NAS from the console.
        # The clean alternative is `oc delete pvc --all-namespaces` while the cluster
        # is still up (CSI reclaims via the node role) — but teardown also runs after
        # the cluster is gone, so this API sweep is the backstop.
        - name: Reclaim CSI-orphaned NAS in the mirror VPC (mount targets block DeleteVSwitch)
          ansible.builtin.shell: |
            python3 - <<'PY'
            import os, json, subprocess
            vpc = os.environ["VPC"]; R = os.environ["R"]; P = os.environ["P"]
            q = subprocess.run(["aliyun", "nas", "DescribeFileSystems", "--RegionId", R,
                                "--PageSize", "100", "--profile", P],
                               capture_output=True, text=True)
            data = json.loads(q.stdout or "{}")
            for fs in data.get("FileSystems", {}).get("FileSystem", []):
                fsid = fs["FileSystemId"]
                mts = [m for m in fs.get("MountTargets", {}).get("MountTarget", [])
                       if m.get("VpcId") == vpc]
                if not mts:
                    continue
                for m in mts:
                    print("deleting NAS mount target", m["MountTargetDomain"], flush=True)
                    subprocess.run(["aliyun", "nas", "DeleteMountTarget", "--RegionId", R,
                                    "--FileSystemId", fsid, "--MountTargetDomain",
                                    m["MountTargetDomain"], "--profile", P])
                print("deleting NAS filesystem", fsid, "(may need mount targets fully gone)", flush=True)
                subprocess.run(["aliyun", "nas", "DeleteFileSystem", "--RegionId", R,
                                "--FileSystemId", fsid, "--profile", P])
            PY
          environment:
            VPC: "{{ mirror_vpc_id }}"
            R: "{{ region }}"
            P: "{{ aliyun_profile }}"
          changed_when: true
          failed_when: false
          when: mirror_vpc_id is defined and mirror_vpc_id | length > 0

        # Phase 12's ensure_vswitch creates capa-worker-<zone> vSwitches INSIDE the
        # mirror stack's VPC. They are NOT stack-managed, so once site-post's 12 has
        # run, DeleteStack on the mirror stack fails (the VPC still has vSwitches) —
        # i.e. testing site-post made teardown impossible. Sweep them first.
        - name: List leftover capa-worker vSwitches in the mirror VPC
          ansible.builtin.command:
            argv: [aliyun, vpc, DescribeVSwitches, --RegionId, "{{ region }}",
                   --VpcId, "{{ mirror_vpc_id }}", --PageSize, "50",
                   --profile, "{{ aliyun_profile }}"]
          register: _capa_vsw_q
          changed_when: false
          failed_when: false
          when: mirror_vpc_id is defined and mirror_vpc_id | length > 0

        - name: Delete each leftover capa-worker vSwitch (Phase 12, not stack-managed)
          ansible.builtin.command:
            argv: [aliyun, vpc, DeleteVSwitch, --RegionId, "{{ region }}",
                   --VSwitchId, "{{ item.VSwitchId }}", --profile, "{{ aliyun_profile }}"]
          loop: "{{ (_capa_vsw_q.stdout | default('{}') | from_json).VSwitches.VSwitch
                    | default([]) | selectattr('VSwitchName', 'defined')
                    | selectattr('VSwitchName', 'match', '^capa-worker-') | list }}"
          loop_control:
            label: "{{ item.VSwitchName }} ({{ item.VSwitchId }})"
          changed_when: true
          failed_when: false
          when: _capa_vsw_q.stdout is defined

        - name: DeleteStack — mirror
          ansible.builtin.command:
            argv:
              - aliyun
              - ros
              - DeleteStack
              - --RegionId
              - "{{ region }}"
              - --StackId
              - "{{ mirror_stack_id }}"
              - --RetainAllResources
              - "false"
              - --profile
              - "{{ aliyun_profile }}"
          changed_when: true
          failed_when: false

        - name: Poll mirror-stack until gone
          ansible.builtin.command:
            argv:
              - aliyun
              - ros
              - GetStack
              - --RegionId
              - "{{ region }}"
              - --StackId
              - "{{ mirror_stack_id }}"
              - --profile
              - "{{ aliyun_profile }}"
          register: _mirror_poll
          retries: 60
          delay: 30
          until: _mirror_poll.rc != 0 or
                 (_mirror_poll.stdout | from_json).Status in ['DELETE_COMPLETE']
          failed_when: false
          changed_when: false

        # ── Always delete the derived custom image (regardless of delete_mirror_snapshots) ──
        # This image is a transient artefact created by 03's fast-path
        # (derived from the vda snapshot); ROS uses it once as the ECS
        # ImageId then never references it again.  The next 03 fast-path
        # will CreateImage from the snapshot fresh (~10 min extra but
        # keeps the image list tidy).
        #
        # Note: DeleteImage requires --ImageId (it does not accept --ImageName);
        # so DescribeImages first to look up the ID by name, then Delete.
        # DescribeImages already returns DiskDeviceMappings → SnapshotId, so we
        # can capture the backing SnapshotForImage entries in the same call
        # and explicitly delete them after DeleteImage (aliyun CLI has no
        # cascade; the console "delete associated snapshots" checkbox is
        # not exposed via API).
        - name: Look up the snapshot-derived custom image by name (+ backing snapshots)
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DescribeImages
              - --RegionId
              - "{{ region }}"
              - --ImageName
              - "{{ cluster_name }}-mirror-system-from-snap"
              - --ImageOwnerAlias
              - self
              - --profile
              - "{{ aliyun_profile }}"
          register: _snap_image_lookup
          changed_when: false
          failed_when: false

        - name: Collect SnapshotIds backing the snapshot-derived image (cascade fodder)
          ansible.builtin.set_fact:
            _snap_image_backing_snaps: >-
              {{ (_snap_image_lookup.stdout | default('{}') | from_json).Images.Image | default([])
                 | map(attribute='DiskDeviceMappings')
                 | map(attribute='DiskDeviceMapping')
                 | flatten
                 | map(attribute='SnapshotId')
                 | list }}

        - name: Delete the snapshot-derived custom image (default behaviour — always)
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DeleteImage
              - --RegionId
              - "{{ region }}"
              - --ImageId
              - "{{ item.ImageId }}"
              - --Force
              - "true"
              - --profile
              - "{{ aliyun_profile }}"
          loop: "{{ (_snap_image_lookup.stdout | default('{}') | from_json).Images.Image | default([]) }}"
          loop_control:
            label: "{{ item.ImageId }} ({{ item.ImageName }})"
          failed_when: false
          changed_when: true

        - name: Cascade-delete SnapshotForImage entries from the snapshot-derived image
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DeleteSnapshot
              - --RegionId
              - "{{ region }}"
              - --SnapshotId
              - "{{ item }}"
              - --profile
              - "{{ aliyun_profile }}"
          loop: "{{ _snap_image_backing_snaps | default([]) }}"
          loop_control:
            label: "{{ item }} (was backing {{ cluster_name }}-mirror-system-from-snap)"
          when: (_snap_image_backing_snaps | default([])) | length > 0
          failed_when: false
          changed_when: true

        # ── Optional: also delete mirror snapshots (default keep, for fast-path rebuild) ──
        # Usage: -e delete_mirror_snapshots=true
        # Default (keep): the next 03 run will CreateImage from the same-named
        #                 snapshot (~10 min waiting for image Available) and
        #                 take the fast-path to bring up ECS.
        # Deleted:        the next 03 detects no snapshot id (cleared from
        #                 state) → falls through to the fresh bring-up path;
        #                 Phase 04 then runs the full ~1-hour import.
        - name: Delete mirror snapshots (only when delete_mirror_snapshots=true)
          when:
            - delete_mirror_snapshots | default(false) | bool
            - item is defined
            - item | length > 0
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DeleteSnapshot
              - --RegionId
              - "{{ region }}"
              - --SnapshotId
              - "{{ item }}"
              - --profile
              - "{{ aliyun_profile }}"
          loop:
            - "{{ mirror_snapshot_system_id | default('') }}"
            - "{{ mirror_snapshot_data_id   | default('') }}"
          failed_when: false
          changed_when: true

        # ── Stale same-named mirror snapshot sweep (P3-FIX.7) ──────────────
        # 05-verify-mirror's "overwrite" dedup CANNOT delete the snapshot the
        # current mirror ECS was restored FROM, because that snapshot is the
        # SourceSnapshotId of the live ECS's data disk (error
        # SnapshotCreatedDisk) or backs the from-snap image.  So on every
        # restore→rebuild cycle, the OLD source pair survives until the ECS is
        # gone.  Now that DeleteStack above freed the ECS + disks, those old
        # snapshots are finally deletable.  Sweep all same-named mirror
        # snapshots EXCEPT the active pair state.yml points at (unless
        # delete_mirror_snapshots already removed those above, in which case
        # there's nothing to preserve).  Observed 2026-06-05: 200 GB old
        # aliocp1-mirror-data lingered, locked by the live ECS's vdb disk.
        - name: Stale-sweep — list all same-named mirror snapshots
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DescribeSnapshots
              - --RegionId
              - "{{ region }}"
              - --SnapshotName
              - "{{ item }}"
              - --PageSize
              - "100"
              - --profile
              - "{{ aliyun_profile }}"
          register: _stale_mirror_snaps
          changed_when: false
          failed_when: false
          loop:
            - "{{ cluster_name }}-mirror-system"
            - "{{ cluster_name }}-mirror-data"

        - name: Stale-sweep — compute deletable IDs (keep active unless delete_mirror_snapshots)
          ansible.builtin.set_fact:
            _stale_mirror_snap_ids: >-
              {{ _stale_mirror_snaps.results
                 | map(attribute='stdout') | map('default', '{}', true) | map('from_json')
                 | map(attribute='Snapshots.Snapshot', default=[]) | flatten
                 | map(attribute='SnapshotId') | list
                 | difference(
                     []
                     if (delete_mirror_snapshots | default(false) | bool)
                     else [ mirror_snapshot_system_id | default(''),
                            mirror_snapshot_data_id   | default('') ]
                   )
                 | select | list }}

        - name: Stale-sweep — delete leftover source-locked snapshots
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DeleteSnapshot
              - --RegionId
              - "{{ region }}"
              - --SnapshotId
              - "{{ item }}"
              - --profile
              - "{{ aliyun_profile }}"
          loop: "{{ _stale_mirror_snap_ids | default([]) }}"
          loop_control:
            label: "{{ item }} (stale same-named mirror snapshot)"
          when: (_stale_mirror_snap_ids | default([])) | length > 0
          failed_when: false
          changed_when: true

        # ── Orphan SnapshotForImage sweep ──────────────────────────────────
        # The cascade DeleteSnapshot tasks above only catch snapshots backing
        # images we delete in THIS teardown.  Snapshots whose parent image
        # was deleted in a PREVIOUS teardown (before the cascade fix landed)
        # remain orphaned with no parent — accumulating ~¥0.24/月 per orphan.
        # Observed 2026-06-04: 5 stale SnapshotForImage-openshift-aliocp1-iso.
        # Sweep them by name pattern; safe because by this point all our
        # cluster_name-tagged images are gone, so any matching SnapshotForImage
        # is necessarily orphaned.
        # `DescribeSnapshots` default PageSize=10.  When a project has
        # accumulated >10 orphan SnapshotForImage entries (observed
        # 2026-06-05: 16 entries), the API silently truncates to 10 and
        # the next 6+ get missed every teardown forever.  Use --PageSize
        # 100 (max).  Future-proof: if a project ever exceeds 100, this
        # task would still miss the tail — would need a pagination loop.
        - name: Orphan sweep — find SnapshotForImage entries for this cluster
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DescribeSnapshots
              - --RegionId
              - "{{ region }}"
              - --SnapshotName
              - "{{ item }}"
              - --PageSize
              - "100"
              - --profile
              - "{{ aliyun_profile }}"
          register: _orphan_query
          changed_when: false
          failed_when: false
          loop:
            - "SnapshotForImage-openshift-{{ cluster_name }}-iso"
            - "SnapshotForImage-{{ cluster_name }}-mirror-system-from-snap"

        # Defensive flatten: each iteration's .stdout MAY be "" if the
        # describe call errored (failed_when:false above masks that).
        # `default('{}', true)` gives us a valid empty JSON object to
        # parse instead of an empty string that crashes from_json.
        - name: Orphan sweep — flatten to ID list
          ansible.builtin.set_fact:
            _orphan_snap_ids: >-
              {{ _orphan_query.results
                 | map(attribute='stdout')
                 | map('default', '{}', true)
                 | map('from_json')
                 | map(attribute='Snapshots.Snapshot', default=[])
                 | flatten
                 | map(attribute='SnapshotId')
                 | list }}

        - name: Orphan sweep — report what will be deleted
          ansible.builtin.debug:
            msg: >-
              Orphan SnapshotForImage entries to delete: {{ _orphan_snap_ids | length }}
              (PageSize=100 cap).  IDs: {{ _orphan_snap_ids }}

        - name: Orphan sweep — delete each
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DeleteSnapshot
              - --RegionId
              - "{{ region }}"
              - --SnapshotId
              - "{{ item }}"
              - --profile
              - "{{ aliyun_profile }}"
          loop: "{{ _orphan_snap_ids | default([]) }}"
          loop_control:
            label: "{{ item }} (orphan SnapshotForImage)"
          when: (_orphan_snap_ids | default([])) | length > 0
          failed_when: false
          changed_when: true

        - name: Clear mirror_* + AI fields in state
          ansible.builtin.include_tasks: ../tasks/save_state.yml
          vars:
            new_state:
              mirror_stack_id: ''
              mirror_vpc_id: ''
              mirror_vpc_cidr: ''
              mirror_private_vsw_1: ''
              mirror_private_vsw_2: ''
              mirror_public_vsw: ''
              mirror_zone_id: ''
              mirror_zone_id2: ''
              mirror_node_ram_role: ''
              mirror_private_ip: ''
              mirror_registry_id: ''
              jump_host_ip: ''
              jump_host_sg_id: ''
              # The password and snapshots must rise and fall together:
              # if snapshots are preserved, the password must be preserved too.
              # Otherwise, the next 03 fast-path generates a new password
              # (03 lines 31-34) and writes it into cloud-init / state.yml,
              # but the Quay DB restored from the snapshot still has the
              # baked-in old password.  04's belt-and-suspenders task then
              # authenticates with the new password when pushing CCM →
              # HTTP 401 → mirror-stack flow fails entirely.
              # When snapshots are deleted, also clear the password — the
              # next fresh-path run regenerates it and Quay install applies
              # it via --initPassword, keeping the two sides in sync.
              mirror_init_password:      "{{ '' if (delete_mirror_snapshots | default(false) | bool) else (mirror_init_password      | default('')) }}"
              mirror_snapshot_system_id: "{{ '' if (delete_mirror_snapshots | default(false) | bool) else (mirror_snapshot_system_id | default('')) }}"
              mirror_snapshot_data_id:   "{{ '' if (delete_mirror_snapshots | default(false) | bool) else (mirror_snapshot_data_id   | default('')) }}"
              # AI / image / iso state: preserve when teardown_preserves_ai=true
              # (so the next snapshot-restore can jump straight to 06+07,
              # skipping 01/02), otherwise clear.
              cluster_id:   "{{ cluster_id   | default('') if (teardown_preserves_ai | default(false) | bool) else '' }}"
              infra_env_id: "{{ infra_env_id | default('') if (teardown_preserves_ai | default(false) | bool) else '' }}"
              ecs_image_id: "{{ ecs_image_id | default('') if (teardown_preserves_ai | default(false) | bool) else '' }}"
              iso_path:     "{{ iso_path     | default('') if (teardown_preserves_ai | default(false) | bool) else '' }}"

    # ── Post-teardown sanity (P3-FIX.4) ──────────────────────────────────
    # Audit the actual cloud state against what teardown_target promised.
    # The history before this block: at multiple layers (aliyun API,
    # ansible logic, sweep query, error masking, NO verification), bugs
    # let resources accumulate while PLAY RECAP still showed failed=0.
    # 2026-06-05 audit found 17 stale snapshots wasting ~¥38/month that
    # had silently leaked across many teardown cycles.  This block
    # converts "teardown said OK" into "teardown actually cleaned up".
    #
    # Asserts depend on target + delete_mirror_snapshots:
    #   - target in [cluster,both]: cluster-stack ROS + cluster ECS gone
    #   - target in [mirror,both]:  mirror-stack ROS + mirror ECS + NAT
    #                               + EIP + (image cascade) all gone
    #   - delete_mirror_snapshots:  mirror data/system snapshots gone
    #                               else expect ≤ 2 (1 system + 1 data)
    #   - any target:               SnapshotForImage orphans for our
    #                               cluster_name must be 0
    - name: Post-teardown sanity — query actual cloud state
      block:
        - name: Audit — ROS stacks still bearing this cluster's names
          ansible.builtin.command:
            argv: [aliyun, ros, ListStacks, --RegionId, "{{ region }}", --profile, "{{ aliyun_profile }}"]
          register: _audit_stacks
          changed_when: false
          failed_when: false

        - name: Audit — ECS instances still bearing this cluster's names
          ansible.builtin.command:
            argv: [aliyun, ecs, DescribeInstances, --RegionId, "{{ region }}",
                   --InstanceName, "{{ cluster_name }}-*",
                   --PageSize, "100",
                   --profile, "{{ aliyun_profile }}"]
          register: _audit_ecs
          changed_when: false
          failed_when: false

        # CAPA worker ECS are named caworkers-* (after the Machine), NOT
        # cluster_name-*, so the name audit above misses them — check by tag.
        - name: Audit — CAPA worker ECS still tagged openshift-worker-pool=capa-multiaz
          ansible.builtin.command:
            argv: [aliyun, ecs, DescribeInstances, --RegionId, "{{ region }}",
                   "--Tag.1.Key", openshift-worker-pool, "--Tag.1.Value", capa-multiaz,
                   --PageSize, "100", --profile, "{{ aliyun_profile }}"]
          register: _audit_capa_ecs
          changed_when: false
          failed_when: false

        - name: Audit — orphan SnapshotForImage (ISO + mirror-from-snap)
          ansible.builtin.command:
            argv: [aliyun, ecs, DescribeSnapshots, --RegionId, "{{ region }}",
                   --SnapshotName, "{{ item }}",
                   --PageSize, "100",
                   --profile, "{{ aliyun_profile }}"]
          register: _audit_orphan
          changed_when: false
          failed_when: false
          loop:
            - "SnapshotForImage-openshift-{{ cluster_name }}-iso"
            - "SnapshotForImage-{{ cluster_name }}-mirror-system-from-snap"

        - name: Audit — mirror data/system snapshots
          ansible.builtin.command:
            argv: [aliyun, ecs, DescribeSnapshots, --RegionId, "{{ region }}",
                   --SnapshotName, "{{ item }}",
                   --PageSize, "100",
                   --profile, "{{ aliyun_profile }}"]
          register: _audit_mirror_snap
          changed_when: false
          failed_when: false
          loop:
            - "{{ cluster_name }}-mirror-system"
            - "{{ cluster_name }}-mirror-data"

        - name: Audit — derive observed counts
          ansible.builtin.set_fact:
            _obs_cluster_stack: >-
              {{ ((_audit_stacks.stdout | default('{}') | from_json).Stacks | default([]))
                 | selectattr('StackName', 'equalto', cluster_name + '-cluster')
                 | list | length }}
            _obs_mirror_stack: >-
              {{ ((_audit_stacks.stdout | default('{}') | from_json).Stacks | default([]))
                 | selectattr('StackName', 'equalto', cluster_name + '-mirror')
                 | list | length }}
            _obs_ecs: >-
              {{ ((_audit_ecs.stdout | default('{}') | from_json).Instances.Instance | default([]))
                 | length }}
            _obs_capa_workers: >-
              {{ ((_audit_capa_ecs.stdout | default('{}') | from_json).Instances.Instance | default([]))
                 | length }}
            _obs_orphans: >-
              {{ _audit_orphan.results
                 | map(attribute='stdout') | map('default', '{}', true) | map('from_json')
                 | map(attribute='Snapshots.Snapshot', default=[]) | flatten | length }}
            _obs_mirror_snaps: >-
              {{ _audit_mirror_snap.results
                 | map(attribute='stdout') | map('default', '{}', true) | map('from_json')
                 | map(attribute='Snapshots.Snapshot', default=[]) | flatten | length }}

        # SnapshotForImage entries are legitimately backing a preserved ECS
        # image whenever the teardown KEEPS that image.  Images are deleted by:
        #   - the "Delete Assisted cluster + infra-env + ECS image" block
        #     (target in [mirror,both] and NOT preserves_ai), OR
        #     (target==cluster and cluster_includes_ai)
        #   - the "Delete snapshot-derived custom image" task (target in
        #     [mirror,both], always)
        # We can only assert orphans==0 when images were actually deleted.
        # When images are preserved, SnapshotForImage by-name lookup matches
        # the LIVE backing snapshot (not an orphan), so asserting 0 would
        # false-positive.  Observed 2026-06-05: teardown_target=cluster left
        # openshift-aliocp1-iso image + its backing snapshot (correctly
        # preserved), but the assert flagged it as an orphan.
        # NOTE: must mirror the EXACT gate of the "Delete Assisted cluster +
        # infra-env + ECS image" block.  preserves_ai=true KEEPS the ISO image
        # (and its backing SnapshotForImage), so for mirror/both teardowns the
        # image is deleted ONLY when NOT preserving AI.  Omitting preserves_ai
        # here false-positives the orphan assert on a snapshot-restore teardown
        # (observed 2026-06-06: target=both preserves_ai=true delete_snapshots=
        # false correctly kept openshift-aliocp1-iso + its snapshot).
        - name: Audit — derive whether ECS images were deleted this teardown
          ansible.builtin.set_fact:
            _images_deleted: >-
              {{ (teardown_target in ['mirror', 'both'] and not (teardown_preserves_ai | default(false) | bool))
                 or (teardown_target == 'cluster' and (cluster_includes_ai | default(false) | bool)) }}

        - name: Audit — derive expected counts per target / flags
          ansible.builtin.set_fact:
            _exp_cluster_stack: "{{ 0 if (teardown_target in ['cluster', 'both']) else (_obs_cluster_stack | int) }}"
            _exp_mirror_stack:  "{{ 0 if (teardown_target in ['mirror',  'both']) else (_obs_mirror_stack  | int) }}"
            _exp_ecs:           "{{ 0 if (teardown_target == 'both') else (_obs_ecs | int) }}"
            _exp_orphans:       "{{ 0 if (_images_deleted | bool) else (_obs_orphans | int) }}"
            _exp_mirror_snaps: >-
              {{ 0
                 if ((teardown_target in ['mirror','both']) and (delete_mirror_snapshots | default(false) | bool))
                 else 2 if (teardown_target in ['mirror','both'])
                 else (_obs_mirror_snaps | int) }}

        - name: Audit — assert observed == expected
          ansible.builtin.assert:
            that:
              - (_obs_cluster_stack | int) == (_exp_cluster_stack | int)
              - (_obs_mirror_stack  | int) == (_exp_mirror_stack  | int)
              - (_obs_ecs           | int) == (_exp_ecs           | int)
              - (_obs_capa_workers  | int) == 0
              - (_obs_orphans       | int) == (_exp_orphans       | int)
              - (_obs_mirror_snaps  | int) <= (_exp_mirror_snaps  | int)
            fail_msg: |
              ❌ post-teardown sanity FAILED for cluster '{{ cluster_name }}' in {{ region }}.
              Target={{ teardown_target }}  delete_snapshots={{ delete_mirror_snapshots }}
              ┌──────────────────────────────┬────────┬────────┐
              │ Item                         │ Expect │ Actual │
              ├──────────────────────────────┼────────┼────────┤
              │ cluster-stack ROS            │ {{ _exp_cluster_stack }}      │ {{ _obs_cluster_stack }}      │
              │ mirror-stack ROS             │ {{ _exp_mirror_stack }}      │ {{ _obs_mirror_stack }}      │
              │ ECS instances ({{ cluster_name }}-*)│ {{ _exp_ecs }}      │ {{ _obs_ecs }}      │
              │ CAPA worker ECS (capa-multiaz)│ 0      │ {{ _obs_capa_workers }}      │
              │ SnapshotForImage orphans     │ {{ _exp_orphans }}      │ {{ _obs_orphans }}      │
              │ mirror data/system snapshots │ ≤{{ _exp_mirror_snaps }}     │ {{ _obs_mirror_snaps }}      │
              └──────────────────────────────┴────────┴────────┘
              Likely root cause: a deletion step inside this teardown errored
              and `failed_when:false` swallowed it.  Run with -v or check
              prior tasks marked OK but "changed=false".

              Quick manual cleanup commands:
                aliyun ecs DescribeSnapshots --SnapshotName 'SnapshotForImage-openshift-{{ cluster_name }}-iso' --PageSize 100 --RegionId {{ region }} --profile {{ aliyun_profile }} | jq -r '.Snapshots.Snapshot[].SnapshotId' | xargs -n1 -I{} aliyun ecs DeleteSnapshot --SnapshotId {} --RegionId {{ region }} --profile {{ aliyun_profile }}
            success_msg: |
              ✓ post-teardown sanity PASSED.
                cluster-stack={{ _obs_cluster_stack }}/{{ _exp_cluster_stack }}
                mirror-stack={{ _obs_mirror_stack }}/{{ _exp_mirror_stack }}
                ECS={{ _obs_ecs }}/{{ _exp_ecs }}
                capa-workers={{ _obs_capa_workers }}/0
                orphan-snapshots={{ _obs_orphans }}/{{ _exp_orphans }}
                mirror-snapshots={{ _obs_mirror_snaps }}/≤{{ _exp_mirror_snaps }}

    - name: Teardown done
      ansible.builtin.debug:
        msg: |
          ✓ split-teardown complete (target={{ teardown_target }}, preserves_ai={{ teardown_preserves_ai }}, delete_snapshots={{ delete_mirror_snapshots }}, cluster_includes_ai={{ cluster_includes_ai }}).

          {% if teardown_target == 'cluster' and (cluster_includes_ai | bool) %}
          cluster-stack + AI cluster + infra-env + ECS image all gone (mirror PRESERVED).
          Typical case: OCP openshift_version change.  Re-run:
            ansible-playbook ansible/playbooks/01-prepare-iso.yml         # new AI cluster + infra-env with new version
            ansible-playbook ansible/playbooks/02-import-image.yml        # new ECS image from new infra-env's ignition
            ansible-playbook ansible/playbooks/04-prepare-mirror.yml      # re-PATCH new install-config (mirror itself skips heavy work)
            ansible-playbook ansible/playbooks/06-create-cluster-stack.yml
            ansible-playbook ansible/playbooks/07-install-cluster.yml
          {% elif teardown_target == 'cluster' %}
          mirror-stack is untouched.  Re-run:
            ansible-playbook ansible/playbooks/06-create-cluster-stack.yml
            ansible-playbook ansible/playbooks/07-install-cluster.yml
          {% elif teardown_target == 'mirror' and (teardown_preserves_ai | bool) %}
          mirror gone, AI cluster + infra-env + ECS image PRESERVED for snapshot-restore flow.
          Next run (mirror snapshots untouched → 03 fast-path → 04 already_ready skip → 06 → 07):
            ansible-playbook ansible/playbooks/03-create-mirror-stack.yml
            ansible-playbook ansible/playbooks/04-prepare-mirror.yml
            ansible-playbook ansible/playbooks/06-create-cluster-stack.yml
            ansible-playbook ansible/playbooks/07-install-cluster.yml
          Prerequisite: snapshots are still in the cloud (DescribeSnapshots to verify); if any are missing, 03 will auto-downgrade to fresh-path.
          {% elif teardown_target == 'mirror' %}
          mirror gone (along with AI cluster + ECS image).  Full rebuild:
            ansible-playbook ansible/playbooks/01-prepare-iso.yml
            ansible-playbook ansible/playbooks/02-import-image.yml
            ansible-playbook ansible/playbooks/03-create-mirror-stack.yml
            ansible-playbook ansible/playbooks/04-prepare-mirror.yml
            ansible-playbook ansible/playbooks/06-create-cluster-stack.yml
            ansible-playbook ansible/playbooks/07-install-cluster.yml
          {% else %}
          Both stacks gone, state mostly cleared.  Full rebuild from Phase 01 → 02 → 03 → 04 → 05 → 06 → 07.
          {% endif %}
