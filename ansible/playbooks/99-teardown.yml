---
# Phase 99 (split architecture) — teardown one or both of the
# split-architecture ROS stacks.
#
# Pair with: 03-create-mirror-stack.yml + 06-create-cluster-stack.yml.
# For the legacy monolithic single-stack flow, use 99-teardown.yml.
#
# Usage:
#   # Drop only the cluster, keep mirror (the common case — rebuilds fast):
#   ansible-playbook playbooks/99-teardown.yml \
#     -e teardown_target=cluster -e teardown_confirmed=true
#
#   # Drop only the mirror (also auto-drops AI cluster + ECS image since
#   # they are paired by infra-env ID):
#   ansible-playbook playbooks/99-teardown.yml \
#     -e teardown_target=mirror  -e teardown_confirmed=true
#
#   # Drop everything (cluster first, then mirror):
#   ansible-playbook playbooks/99-teardown.yml \
#     -e teardown_target=both    -e teardown_confirmed=true
#
# teardown_target values:
#   cluster — delete cluster_stack_id, clear cluster_* fields in state.
#             mirror-stack stays.  Next: re-run 06-create-cluster-stack
#             + 04-install-cluster.  Saves ~30 min vs full rebuild.
#   mirror  — delete mirror_stack_id + AI cluster + infra-env + ECS image.
#             Forces a full rebuild (Phase 01 → 02 → 03 → 04 → 05 → 06 → 07).
#             Use when changing mirror tarball contents or VPC topology.
#   both    — do cluster, then mirror.  Equivalent to a hard reset.

- name: Teardown (split architecture)
  hosts: local
  gather_facts: false
  vars:
    teardown_target: cluster        # cluster | mirror | both
    teardown_confirmed: false
    teardown_preserves_ai: false    # mirror teardown 时是否保留 AI cluster + infra-env + ECS image
    delete_mirror_snapshots: false  # 是否连同 mirror snapshot 一起删
    cluster_includes_ai: false      # cluster teardown 时是否也拆 AI cluster + infra-env + ECS image
                                    # 用于 OCP 版本更换：mirror 保留，但 AI cluster 必须重建
                                    # （AI v2 API 不允许 PATCH openshift_version，版本不可变）
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml
    - ansible.builtin.include_tasks: ../tasks/path_defaults.yml

    - name: Validate teardown_target
      ansible.builtin.assert:
        that: teardown_target in ['cluster', 'mirror', 'both']
        fail_msg: "teardown_target must be one of: cluster, mirror, both"

    # teardown_preserves_ai=true 只在打算"快照恢复 mirror"时用：
    # AI cluster install-config 里 PATCH 过的 trustBundle + IDMS 都引用
    # 旧 mirror 的 CA 和 IP；快照恢复出来的 mirror ECS CA / IP 都没变，
    # 所以 AI 这边可以完整复用。但如果同时让 snapshot 也被删，就没意义了
    # （快照都没了哪能恢复），所以两个标志互斥时拒绝。
    - name: Reject preserves_ai + delete_snapshots 同时为 true
      ansible.builtin.assert:
        that: not (teardown_preserves_ai | bool and delete_mirror_snapshots | bool)
        fail_msg: |
          teardown_preserves_ai=true 跟 delete_mirror_snapshots=true 互斥。
          preserves_ai 假设你下次用 snapshot 恢复 mirror（AI install-config 引用
          的 CA/IP 在快照里都还有效）；snapshot 都删了 AI 留着也没用，
          AI 的 ignition 跟新 mirror 对不上。
          要么走 snapshot 恢复（preserves_ai=true, snapshot 不删），
          要么走 fresh 重建（preserves_ai=false, snapshot 可删可不删）。

    - name: Show scope + confirm
      ansible.builtin.pause:
        prompt: |

          Split-architecture teardown for cluster '{{ cluster_name }}':
            target                   = {{ teardown_target }}
            teardown_preserves_ai    = {{ teardown_preserves_ai }}
            delete_mirror_snapshots  = {{ delete_mirror_snapshots }}
            cluster_stack_id = {{ cluster_stack_id | default('(none)') }}
            mirror_stack_id  = {{ mirror_stack_id  | default('(none)') }}
            ai cluster_id    = {{ cluster_id       | default('(none)') }}
            ecs_image_id     = {{ ecs_image_id     | default('(none)') }}

          Type 'yes' to proceed
      register: _confirm
      when: not teardown_confirmed | bool

    - ansible.builtin.assert:
        that: teardown_confirmed | bool or _confirm.user_input == 'yes'
        fail_msg: "Aborted"

    # ── 1. Cluster-stack teardown ────────────────────────────────────────
    - name: Delete cluster-stack
      when:
        - teardown_target in ['cluster', 'both']
        - cluster_stack_id is defined and cluster_stack_id | length > 0
      block:
        - name: DeleteStack — cluster
          ansible.builtin.command:
            argv:
              - aliyun
              - ros
              - DeleteStack
              - --RegionId
              - "{{ region }}"
              - --StackId
              - "{{ cluster_stack_id }}"
              - --RetainAllResources
              - "false"
              - --profile
              - "{{ aliyun_profile }}"
          register: _cluster_delete
          changed_when: _cluster_delete.rc == 0
          failed_when: false

        - name: Poll cluster-stack until gone
          ansible.builtin.command:
            argv:
              - aliyun
              - ros
              - GetStack
              - --RegionId
              - "{{ region }}"
              - --StackId
              - "{{ cluster_stack_id }}"
              - --profile
              - "{{ aliyun_profile }}"
          register: _cluster_poll
          retries: 60
          delay: 30
          # GetStack on a deleted stack returns rc!=0 — that is success.
          until: _cluster_poll.rc != 0 or
                 (_cluster_poll.stdout | from_json).Status in ['DELETE_COMPLETE']
          failed_when: false
          changed_when: false

        - name: Clear cluster_* fields in state
          ansible.builtin.include_tasks: ../tasks/save_state.yml
          vars:
            new_state:
              cluster_stack_id: ''
              api_lb_endpoint: ''
              worker_sg: ''
              master_ip1: ''
              master_ip2: ''
              master_ip3: ''
              forward_zone_id: ''
              reverse_zone_id1: ''
              reverse_zone_id2: ''
              # When cluster_includes_ai=true, also clear AI/image/iso fields
              # so the next 01 doesn't try to adopt the just-deleted cluster.
              cluster_id:   "{{ '' if (cluster_includes_ai | default(false) | bool) else (cluster_id | default('')) }}"
              infra_env_id: "{{ '' if (cluster_includes_ai | default(false) | bool) else (infra_env_id | default('')) }}"
              ecs_image_id: "{{ '' if (cluster_includes_ai | default(false) | bool) else (ecs_image_id | default('')) }}"
              iso_path:     "{{ '' if (cluster_includes_ai | default(false) | bool) else (iso_path | default('')) }}"

    # ── 2. AI cluster + infra-env + ECS image ────────────────────────────────
    # These are paired: the discovery ignition baked into the ECS image
    # references infra_env_id; deleting either in isolation leaves a broken pair.
    #
    # Triggers (delete all three):
    #   - teardown_target=mirror|both AND not teardown_preserves_ai
    #     (mirror is being rebuilt → new CA/IP → AI must be rebuilt too)
    #   - teardown_target=cluster AND cluster_includes_ai=true
    #     (OCP version change scenario: mirror preserved, but AI cluster
    #      must be re-created because AI v2 API doesn't allow PATCHing
    #      openshift_version on an existing cluster)
    #
    # Skip (keep all three):
    #   - default cluster teardown (mirror untouched + AI valid for re-use)
    #   - mirror teardown with teardown_preserves_ai=true
    #     (snapshot restore expected — CA/IP preserved, AI install-config still valid)
    - name: Delete Assisted cluster + infra-env + ECS image
      when: >-
        (teardown_target in ['mirror', 'both'] and not (teardown_preserves_ai | bool))
        or
        (teardown_target == 'cluster' and (cluster_includes_ai | bool))
      block:
        - ansible.builtin.include_tasks: ../tasks/assisted_token.yml
          when: cluster_id is defined and cluster_id | length > 0

        - name: AI — delete cluster
          ansible.builtin.uri:
            url: "{{ assisted_api }}/clusters/{{ cluster_id }}"
            method: DELETE
            headers: { Authorization: "Bearer {{ ai_access_token }}" }
            status_code: [202, 204, 404]
          when: cluster_id is defined and cluster_id | length > 0
          failed_when: false

        - name: AI — delete infra-env
          ansible.builtin.uri:
            url: "{{ assisted_api }}/infra-envs/{{ infra_env_id }}"
            method: DELETE
            headers: { Authorization: "Bearer {{ ai_access_token }}" }
            status_code: [202, 204, 404]
          when: infra_env_id is defined and infra_env_id | length > 0
          failed_when: false

        - name: ECS — delete custom image
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DeleteImage
              - --RegionId
              - "{{ region }}"
              - --ImageId
              - "{{ ecs_image_id }}"
              - --Force
              - "true"
              - --profile
              - "{{ aliyun_profile }}"
          when: ecs_image_id is defined and ecs_image_id | length > 0
          failed_when: false
          changed_when: true

    # ── 3. Mirror-stack teardown ─────────────────────────────────────────
    - name: Delete mirror-stack
      when:
        - teardown_target in ['mirror', 'both']
        - mirror_stack_id is defined and mirror_stack_id | length > 0
      block:
        - name: DeleteStack — mirror
          ansible.builtin.command:
            argv:
              - aliyun
              - ros
              - DeleteStack
              - --RegionId
              - "{{ region }}"
              - --StackId
              - "{{ mirror_stack_id }}"
              - --RetainAllResources
              - "false"
              - --profile
              - "{{ aliyun_profile }}"
          changed_when: true
          failed_when: false

        - name: Poll mirror-stack until gone
          ansible.builtin.command:
            argv:
              - aliyun
              - ros
              - GetStack
              - --RegionId
              - "{{ region }}"
              - --StackId
              - "{{ mirror_stack_id }}"
              - --profile
              - "{{ aliyun_profile }}"
          register: _mirror_poll
          retries: 60
          delay: 30
          until: _mirror_poll.rc != 0 or
                 (_mirror_poll.stdout | from_json).Status in ['DELETE_COMPLETE']
          failed_when: false
          changed_when: false

        # ── 自定义 image 永远删（不管 delete_mirror_snapshots） ────────────────
        # 这个 image 是 03 fast-path 临时产物（从 vda snapshot 派生），ROS
        # 把它当 ECS ImageId 用了一次后就再无引用。下次 03 fast-path 会从
        # snapshot 重新 CreateImage（多花 ~10 min 但 image 列表干净）。
        #
        # 注意：DeleteImage 必须用 --ImageId（不接受 --ImageName）；先
        # DescribeImages 按 name 查 ID，再 Delete。
        # 仅删 image 本身（CLI 默认不删 snapshot；要级联得在 console 手勾
        # "同时删除快照"）。
        - name: 查找从快照派生的自定义 image (by name)
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DescribeImages
              - --RegionId
              - "{{ region }}"
              - --ImageName
              - "{{ cluster_name }}-mirror-system-from-snap"
              - --ImageOwnerAlias
              - self
              - --profile
              - "{{ aliyun_profile }}"
          register: _snap_image_lookup
          changed_when: false
          failed_when: false

        - name: 删除从快照派生的自定义 image（默认行为，永远删）
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DeleteImage
              - --RegionId
              - "{{ region }}"
              - --ImageId
              - "{{ item.ImageId }}"
              - --Force
              - "true"
              - --profile
              - "{{ aliyun_profile }}"
          loop: "{{ (_snap_image_lookup.stdout | default('{}') | from_json).Images.Image | default([]) }}"
          loop_control:
            label: "{{ item.ImageId }} ({{ item.ImageName }})"
          failed_when: false
          changed_when: true

        # ── 可选：连同 mirror snapshot 一起删（默认保留，便于下次 fast-path 重建）
        # 用法：-e delete_mirror_snapshots=true
        # 不删时：下次跑 03 会用同名 snapshot 重新 CreateImage（一次性 ~10
        #         min 等 image Available）+ fast-path 起 ECS。
        # 删后：下次跑 03 检测不到 snapshot id（被清出 state）→ 走 fresh
        #       bring-up 路径，Phase 04 会完整执行 ~1 小时 import。
        - name: 删除 mirror snapshot（仅当 delete_mirror_snapshots=true）
          when:
            - delete_mirror_snapshots | default(false) | bool
            - item is defined
            - item | length > 0
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DeleteSnapshot
              - --RegionId
              - "{{ region }}"
              - --SnapshotId
              - "{{ item }}"
              - --profile
              - "{{ aliyun_profile }}"
          loop:
            - "{{ mirror_snapshot_system_id | default('') }}"
            - "{{ mirror_snapshot_data_id   | default('') }}"
          failed_when: false
          changed_when: true

        - name: Clear mirror_* + AI fields in state
          ansible.builtin.include_tasks: ../tasks/save_state.yml
          vars:
            new_state:
              mirror_stack_id: ''
              mirror_vpc_id: ''
              mirror_vpc_cidr: ''
              mirror_private_vsw_1: ''
              mirror_private_vsw_2: ''
              mirror_public_vsw: ''
              mirror_zone_id: ''
              mirror_zone_id2: ''
              mirror_node_ram_role: ''
              mirror_private_ip: ''
              mirror_registry_id: ''
              jump_host_ip: ''
              jump_host_sg_id: ''
              mirror_init_password: ''
              # 快照 ID 仅在 delete_mirror_snapshots=true 时清空。
              # 默认保留 → 下次 03 自动走 fast-path。
              mirror_snapshot_system_id: "{{ '' if (delete_mirror_snapshots | default(false) | bool) else (mirror_snapshot_system_id | default('')) }}"
              mirror_snapshot_data_id:   "{{ '' if (delete_mirror_snapshots | default(false) | bool) else (mirror_snapshot_data_id   | default('')) }}"
              # AI / image / iso state：teardown_preserves_ai=true 时保留
              # （让下次 snapshot 恢复后直接走 06+07，跳过 01/02），否则清空。
              cluster_id:   "{{ cluster_id   | default('') if (teardown_preserves_ai | default(false) | bool) else '' }}"
              infra_env_id: "{{ infra_env_id | default('') if (teardown_preserves_ai | default(false) | bool) else '' }}"
              ecs_image_id: "{{ ecs_image_id | default('') if (teardown_preserves_ai | default(false) | bool) else '' }}"
              iso_path:     "{{ iso_path     | default('') if (teardown_preserves_ai | default(false) | bool) else '' }}"

    - name: Teardown done
      ansible.builtin.debug:
        msg: |
          ✓ split-teardown complete (target={{ teardown_target }}, preserves_ai={{ teardown_preserves_ai }}, delete_snapshots={{ delete_mirror_snapshots }}, cluster_includes_ai={{ cluster_includes_ai }}).

          {% if teardown_target == 'cluster' and (cluster_includes_ai | bool) %}
          cluster-stack + AI cluster + infra-env + ECS image all gone (mirror PRESERVED).
          Typical case: OCP openshift_version change.  Re-run:
            ansible-playbook ansible/playbooks/01-prepare-iso.yml         # new AI cluster + infra-env with new version
            ansible-playbook ansible/playbooks/02-import-image.yml        # new ECS image from new infra-env's ignition
            ansible-playbook ansible/playbooks/04-prepare-mirror.yml      # re-PATCH new install-config (mirror itself skips heavy work)
            ansible-playbook ansible/playbooks/06-create-cluster-stack.yml
            ansible-playbook ansible/playbooks/07-install-cluster.yml
          {% elif teardown_target == 'cluster' %}
          mirror-stack is untouched.  Re-run:
            ansible-playbook ansible/playbooks/06-create-cluster-stack.yml
            ansible-playbook ansible/playbooks/07-install-cluster.yml
          {% elif teardown_target == 'mirror' and (teardown_preserves_ai | bool) %}
          mirror gone, AI cluster + infra-env + ECS image PRESERVED for snapshot-restore flow.
          下次跑（mirror snapshot 没动 → 03 fast-path → 04 already_ready 跳过 → 06 → 07）：
            ansible-playbook ansible/playbooks/03-create-mirror-stack.yml
            ansible-playbook ansible/playbooks/04-prepare-mirror.yml
            ansible-playbook ansible/playbooks/06-create-cluster-stack.yml
            ansible-playbook ansible/playbooks/07-install-cluster.yml
          ⚠️ 前提：snapshot 还在云上（DescribeSnapshots 查一下）；任何缺失，03 会自动降级到 fresh-path。
          {% elif teardown_target == 'mirror' %}
          mirror gone (along with AI cluster + ECS image).  Full rebuild:
            ansible-playbook ansible/playbooks/01-prepare-iso.yml
            ansible-playbook ansible/playbooks/02-import-image.yml
            ansible-playbook ansible/playbooks/03-create-mirror-stack.yml
            ansible-playbook ansible/playbooks/04-prepare-mirror.yml
            ansible-playbook ansible/playbooks/06-create-cluster-stack.yml
            ansible-playbook ansible/playbooks/07-install-cluster.yml
          {% else %}
          Both stacks gone, state mostly cleared.  Full rebuild from Phase 01 → 02 → 03 → 04 → 05 → 06 → 07.
          {% endif %}
