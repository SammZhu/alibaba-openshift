---
# Phase 08a — self-managed CAPI core controller (offline, service-ca webhooks).
#
# The OCP-hosted cluster-capi-operator supplies no CAPI core on platform=external,
# so declarative MachineDeployment pools (#62) need us to run core ourselves. This
# mirrors the upstream core controller image into the air-gapped registry, points
# the cluster at it via IDMS, and applies the vendored core-only + service-ca
# manifest (custom_manifests/cluster-api-core.yaml, from gen-cluster-api-core.py).
# That manifest also ships the CAPI core CRDs, replacing the curl-GitHub path in
# 11/09. Runs at the head of site-post (before 08).
#
# IMPORTANT: registry.k8s.io is reachable from the OPERATOR host but NOT from the
# in-VPC jump host (cross-border egress). So mirror the same way 04 does for
# CAPA/CCM/CSI: pull on the operator (play 1, hosts: local) into a docker-archive,
# scp it to the mirror ECS via the jump host ProxyCommand, and podman load+push
# there. Only the oc steps (IDMS, apply, rollout) run on the jump host (play 2).
- name: Mirror the CAPI core image (operator pulls, pushes to mirror ECS)
  hosts: local
  gather_facts: false
  vars:
    _ssh_keepalive: "-o ServerAliveInterval=30 -o ServerAliveCountMax=6 -o TCPKeepAlive=yes"
    _ssh_common_args: "-i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null {{ _ssh_keepalive }}"
    _ssh_proxy_args: "-o ProxyCommand='ssh {{ _ssh_common_args }} -W %h:%p root@{{ jump_host_ip }}'"
    _ssh_root_mirror: "ssh {{ _ssh_common_args }} {{ _ssh_proxy_args }} root@{{ mirror_private_ip }}"
    capi_core_upstream: registry.k8s.io/cluster-api/cluster-api-controller
    capi_core_tag: v1.12.7
    capi_core_mirror_repo: cluster-api/cluster-api-controller
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml

    - name: Assert jump host + mirror are known
      ansible.builtin.assert:
        that:
          - jump_host_ip | default('') | length > 0
          - mirror_private_ip | default('') | length > 0
        fail_msg: >-
          jump_host_ip / mirror_private_ip missing in state.yml — bring up the
          mirror-stack (Phase 03) first; 08a deploys via the jump host + mirror.

    - name: Remove any stale CAPI core tar (docker-archive can't be re-written)
      ansible.builtin.file:
        path: "/tmp/capi-core-{{ capi_core_tag }}.tar"
        state: absent
      delegate_to: localhost

    - name: Pull the CAPI core image into a docker-archive (operator has egress)
      ansible.builtin.command:
        argv:
          - skopeo
          - copy
          - --src-tls-verify=true
          - --retry-times=5
          - "docker://{{ capi_core_upstream }}:{{ capi_core_tag }}"
          - "docker-archive:/tmp/capi-core-{{ capi_core_tag }}.tar:{{ capi_core_upstream }}:{{ capi_core_tag }}"
      delegate_to: localhost
      register: _core_pull
      retries: 3
      delay: 20
      until: _core_pull.rc == 0
      changed_when: true

    - name: Stage the CAPI core tar onto the mirror ECS via OSS (not scp)
      ansible.builtin.include_tasks: ../tasks/ship_via_oss.yml
      vars:
        ship_local: "/tmp/capi-core-{{ capi_core_tag }}.tar"
        ship_remote: "/tmp/capi-core-{{ capi_core_tag }}.tar"
        ship_object: "capi-core-{{ cluster_name }}-{{ capi_core_tag }}.tar"

    - name: Load + tag + push the CAPI core image on the mirror ECS
      ansible.builtin.shell: |
        {{ _ssh_root_mirror }} bash <<'REMOTE'
        set -euxo pipefail
        REG={{ mirror_private_ip }}:8443
        SRC={{ capi_core_upstream }}:{{ capi_core_tag }}
        DST=$REG/{{ capi_core_mirror_repo }}:{{ capi_core_tag }}
        podman load -i /tmp/capi-core-{{ capi_core_tag }}.tar
        podman tag  "$SRC" "$DST"
        podman push --tls-verify=false "$DST"
        rm -f /tmp/capi-core-{{ capi_core_tag }}.tar
        echo "OK: $DST now on mirror"
        REMOTE
      register: _core_push
      retries: 3
      delay: 10
      until: _core_push.rc == 0
      changed_when: true

    - name: Add the jump host to the inventory (carry the mirror IP)
      ansible.builtin.add_host:
        name: jumphost
        ansible_host: "{{ jump_host_ip }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ ssh_priv_key_file }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15"
        groups: deploy
        mirror_private_ip: "{{ mirror_private_ip }}"

- name: Self-managed CAPI core controller (offline, service-ca)
  hosts: jumphost
  gather_facts: false
  vars:
    kubeconfig_file: /root/kubeconfig
    # Manifest lives on the operator host (RHEL8) where ansible runs; rendered
    # there via delegate_to: local. No repo checkout / git pull on the jump host.
    deploy_repo: "{{ playbook_dir }}/../.."
    capi_core_upstream: registry.k8s.io/cluster-api/cluster-api-controller
    capi_core_tag: v1.12.7
    capi_core_mirror_repo: cluster-api/cluster-api-controller
  tasks:
    - name: Extract the cluster pull secret (mirror auth for oc image info)
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", -n, openshift-config,
               extract, secret/pull-secret, --to=/root, --confirm]
      changed_when: false

    - name: Apply IDMS for the CAPI core image
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", apply, -f, "-"]
      args:
        stdin: |
          apiVersion: config.openshift.io/v1
          kind: ImageDigestMirrorSet
          metadata:
            name: capi-core
          spec:
            imageDigestMirrors:
              - source: {{ capi_core_upstream }}
                mirrors:
                  - {{ mirror_private_ip }}:8443/{{ capi_core_mirror_repo }}
      register: _idms_apply
      changed_when: "'unchanged' not in _idms_apply.stdout"

    - name: Resolve the CAPI core image digest from the mirror
      ansible.builtin.command:
        argv: [oc, image, info,
               "{{ mirror_private_ip }}:8443/{{ capi_core_mirror_repo }}:{{ capi_core_tag }}",
               "--registry-config=/root/.dockerconfigjson", --insecure, -o, json]
      register: _core_imginfo
      changed_when: false

    - name: Render cluster-api-core.yaml with the digest-pinned image
      # sed runs on the operator host (delegate_to: local) over the controller's
      # manifest; the digest comes from _core_imginfo (resolved on the jump host).
      ansible.builtin.shell: >
        sed 's|image: {{ capi_core_upstream }}:.*|image: {{ capi_core_upstream }}@{{ (_core_imginfo.stdout | from_json).digest }}|'
        '{{ deploy_repo }}/custom_manifests/cluster-api-core.yaml'
      delegate_to: local
      register: _core_rendered
      changed_when: false

    - name: Apply CAPI core (CRDs + controller + service-ca webhooks)
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", apply,
               --server-side=true, --force-conflicts, -f, "-"]
      args:
        stdin: "{{ _core_rendered.stdout }}"
      register: _core_apply
      changed_when: "'unchanged' not in _core_apply.stdout"

    # ── Stop the CVO from fighting our cluster-api core CRDs ──────────────────
    # OCP ships these CRDs in the release, but cluster-capi-operator does NOT run
    # on platform=external — so the CVO endlessly fails to reconcile ITS (older,
    # OCP 4.20 = cluster-api v1.10.4, v1beta1-only) version over the v1.12.7 set
    # we install (clusterversion Failing=True: "Could not update CRD
    # ipaddresses.ipam.cluster.x-k8s.io ... the object is invalid").  We own these
    # CRDs (our v1beta2 controller needs them), so mark them unmanaged in the CVO
    # overrides.  Aligning versions instead would force a provider v1beta2->v1beta1
    # downgrade (the Alibaba provider is built on api/core/v1beta2).
    - name: "08a — collect cluster-api core CRD names from the rendered manifest"
      ansible.builtin.set_fact:
        _capi_core_crds: "{{ _core_rendered.stdout | from_yaml_all
                             | selectattr('kind', 'equalto', 'CustomResourceDefinition')
                             | map(attribute='metadata.name') | list }}"

    - name: "08a — build CVO override entries (unmanaged) for those CRDs"
      ansible.builtin.set_fact:
        _cvo_overrides: "{{ _cvo_overrides | default([]) + [{'group': 'apiextensions.k8s.io',
                            'kind': 'CustomResourceDefinition', 'namespace': '',
                            'name': item, 'unmanaged': true}] }}"
      loop: "{{ _capi_core_crds }}"

    - name: "08a — mark cluster-api core CRDs unmanaged in the CVO (stop Failing=True)"
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", patch, clusterversion, version,
               --type=merge, -p, "{{ {'spec': {'overrides': _cvo_overrides}} | to_json }}"]
      register: _cvo_patch
      changed_when: "'no change' not in (_cvo_patch.stdout | default(''))"

    - name: Wait for capi-controller-manager rollout
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", -n, capi-system,
               rollout, status, deploy/capi-controller-manager, --timeout=180s]
      register: _core_rollout
      retries: 4
      delay: 20
      until: _core_rollout.rc == 0
      changed_when: false
