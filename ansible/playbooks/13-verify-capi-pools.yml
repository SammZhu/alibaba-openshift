---
# Phase 13 (standalone, READ-ONLY) — verify the self-managed-core worker pools.
#
# Runs scripts/verify-capi-pools.sh ON THE JUMP HOST — the only host that can
# reach the in-VPC cluster API (same reason 08a/12 run their `oc` there; the
# operator host can't talk to api-int). The jump host is ephemeral: it comes up
# WITH the cluster (Phase 03/06) and is torn down with it, so this playbook
# resolves its IP from state.yml rather than assuming it exists.
#
# Initiated from the operator host (RHEL8), like every other playbook:
#   ansible-playbook -i ansible/inventory.yml ansible/playbooks/13-verify-capi-pools.yml
#
# Touches NOTHING on the cluster (oc get/logs only). Checks #62 (multi-AZ pools),
# #78 (providerID -> nodeRef) and #69 (MachineHealthCheck) in one shot.
#
# IMPORTANT — there must be something to look at. Playbook 12's always-cleanup
# deletes the caworkers chain on the way out (pass OR fail), so a plain
# `site-post` run leaves NOTHING for this verifier. For a verification run, run
# 12 (or site-post) with `-e keep_pools=true` so the pools persist; THEN run this.
# (Alternatively run this WHILE 12 is still looping, before its cleanup fires.)
- name: Resolve the jump host from state
  hosts: local
  gather_facts: false
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml

    - name: Assert the jump host is known (cluster must be up)
      ansible.builtin.assert:
        that:
          - jump_host_ip | default('') | length > 0
        fail_msg: >-
          jump_host_ip missing in state.yml — the jump host comes up with the
          cluster (Phase 03/06) and is gone after teardown. Bring the cluster up
          (site.yml) first, then run this verifier.

    - name: Add the jump host to the inventory
      ansible.builtin.add_host:
        name: jumphost
        ansible_host: "{{ jump_host_ip }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ ssh_priv_key_file }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15"
        groups: deploy

- name: Run the read-only pool verification on the jump host
  hosts: jumphost
  gather_facts: false
  vars:
    repo: /root/openshift-alibaba/alibaba-openshift
  tasks:
    - name: Refresh the repo on the jump host (pick up the latest verify script)
      ansible.builtin.command:
        argv: [git, -C, "{{ repo }}", pull, --ff-only]
      changed_when: false
      failed_when: false

    - name: Execute scripts/verify-capi-pools.sh (read-only)
      ansible.builtin.command:
        argv: [bash, "{{ repo }}/scripts/verify-capi-pools.sh"]
      environment:
        KUBECONFIG: /root/kubeconfig
      register: _verify
      changed_when: false
      failed_when: false

    - name: Verification report
      ansible.builtin.debug:
        var: _verify.stdout_lines

    - name: Verification stderr (if any)
      ansible.builtin.debug:
        var: _verify.stderr_lines
      when: _verify.stderr | default('') | length > 0
