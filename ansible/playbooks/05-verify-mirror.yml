---
# Verify the mirror-registry is healthy and contains the expected images.
#
# Use cases:
#   - After Phase 04 completed, sanity-check before Phase 07 trigger.
#   - After mirror-rebuild.yml, confirm new tarball was imported.
#   - Anytime Phase 07 stalls — first thing to check is "can the mirror
#     even serve images right now".
#
# Usage:
#   ansible-playbook ansible/playbooks/mirror-verify.yml
- name: Verify mirror-registry health + contents
  hosts: local
  gather_facts: false
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml
    - ansible.builtin.include_tasks: ../tasks/path_defaults.yml
    - ansible.builtin.include_tasks: ../tasks/mirror_defaults.yml

    # Skip entire playbook gracefully when mirror is not enabled.
    - name: Skip — mirror_enabled is false (running in non-mirror mode)
      ansible.builtin.meta: end_play
      when: not (mirror_enabled | default(false) | bool)

    - name: Sanity — required mirror state present
      ansible.builtin.assert:
        that:
          - mirror_enabled | default(false) | bool
          - mirror_private_ip is defined and mirror_private_ip | length > 0
          - mirror_init_user is defined and mirror_init_user | length > 0
          - mirror_init_password is defined and mirror_init_password | length > 0
          - jump_host_ip is defined and jump_host_ip | length > 0
        fail_msg: |
          Missing mirror state in state.yml.  Run Phase 03 + 04 (with mirror_enabled=true)
          first.

    # ── Quay health endpoint ──────────────────────────────────────────────
    - name: Check mirror-registry /health/instance endpoint
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_priv_key_file }}"
          - -o
          - StrictHostKeyChecking=no
          - -o
          - UserKnownHostsFile=/dev/null
          - -o
          - ConnectTimeout=10
          - -o
          - "ProxyCommand=ssh -i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@{{ jump_host_ip }}"
          - "root@{{ mirror_private_ip }}"
          - "curl -ksf https://{{ mirror_private_ip }}:8443/health/instance"
      register: health_check
      changed_when: false

    # ── Per-repo existence check via Docker Distribution v2 ──────────────
    # Both Quay's /api/v1/repository and /v2/_catalog hide cross-user
    # namespaces (openshift, rhai) from mirror-admin's view, so neither
    # gives us a usable repo listing.  Instead we hit /v2/<repo>/tags/list
    # for each expected repo via the standard bearer-token flow — this is
    # the same path the cluster nodes use when pulling, so a 200 here
    # means a 200 from a real node too.
    - name: Probe each required repo with Docker v2 bearer-token flow
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_priv_key_file }}"
          - -o
          - StrictHostKeyChecking=no
          - -o
          - UserKnownHostsFile=/dev/null
          - -o
          - "ProxyCommand=ssh -i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@{{ jump_host_ip }}"
          - "root@{{ mirror_private_ip }}"
          - >-
            TOKEN=$(curl -ks -u '{{ mirror_init_user }}:{{ mirror_init_password }}'
            "https://{{ mirror_private_ip }}:8443/v2/auth?service={{ mirror_private_ip }}:8443&scope=repository:{{ item }}:pull"
            | jq -r .token);
            curl -ks -o /dev/null -w '%{http_code}'
            -H "Authorization: Bearer $TOKEN"
            "https://{{ mirror_private_ip }}:8443/v2/{{ item }}/tags/list"
      loop:
        - rhai/assisted-installer-agent-rhel9
        - rhai/assisted-installer-rhel9
        - rhai/assisted-installer-controller-rhel9
        - openshift/release
        - openshift/release-images
      register: repo_probes
      changed_when: false
      no_log: true   # mirror password is in argv

    - name: Show mirror probe summary
      ansible.builtin.debug:
        msg: |
          ✓ Mirror reachable at https://{{ mirror_private_ip }}:8443
          Per-repo HTTP probe (200 = present, 404 = missing):
          {% for r in repo_probes.results %}
            {{ r.stdout }}  {{ r.item }}
          {% endfor %}

    - name: Verify all required repos returned HTTP 200
      ansible.builtin.assert:
        that:
          - repo_probes.results | selectattr('stdout', 'equalto', '200') | list | length
            == repo_probes.results | length
        fail_msg: |
          Mirror is missing one or more required repos.  Phase 07 will fail
          because cluster nodes won't be able to pull these images.

          Missing repos:
          {% for r in repo_probes.results %}
          {% if r.stdout != '200' %}
            - {{ r.item }} (HTTP {{ r.stdout }})
          {% endif %}
          {% endfor %}

          Re-run scripts/build-mirror-tarball.sh on your build host (the
          OFFLINE_TOKEN_FILE auto-discovery includes all 3 rhai images),
          upload to OSS, then `ansible-playbook ansible/playbooks/mirror-rebuild.yml`.

    - name: All checks passed
      ansible.builtin.debug:
        msg: |
          ✓ Mirror is healthy and contains all critical images.
          Safe to proceed with Phase 07:
            ansible-playbook ansible/playbooks/07-install-cluster.yml

    # ─── Snapshot the mirror ECS's two disks (default on, overwrite-in-place) ──
    # In a known-good state right after 04 verification, capture vda + vdb
    # snapshots; future cluster rebuilds can restore a fresh mirror ECS
    # from these and skip Phase 04's ~1-hour import.
    #
    # Why both disks are required:
    #   vdb = image blob storage (~50 GB, all 195 images)
    #   vda = Postgres metadata + IP-SAN self-signed certificate +
    #         Quay container layers + /opt installer tree
    #         (snapshot vdb only → Postgres metadata lost → Quay sees an
    #          empty registry on restore)
    #
    # Overwrite strategy:
    #   Each run creates a new snapshot with the fixed names
    #     "{cluster}-mirror-system" and "{cluster}-mirror-data".
    #   After the new snapshot reaches Progress=100%, the same-named old
    #   snapshot is deleted.
    #     Failure before CreateSnapshot → old snapshot survives.
    #     Failure during polling       → multiple same-named snapshots
    #                                    coexist; next run cleans them up.
    #
    # Skip:    -e mirror_snapshot_enabled=false
    # Rebuild: see docs/SNAPSHOT.md (lifecycle, fast-path, mutex rules,
    #          recovery scenarios)
    - name: Snapshot the mirror ECS's data disk (vdb only — P3-FIX.9)
      when: mirror_snapshot_enabled | default(true) | bool
      vars:
        _snap_data_name:   "{{ cluster_name }}-mirror-data"
        _ssh_to_mirror: >-
          ssh -i {{ ssh_priv_key_file }}
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o "ProxyCommand=ssh -i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@{{ jump_host_ip }}"
          root@{{ mirror_private_ip }}
      # block + always guarantees Quay is brought back up no matter where
      # the snapshot flow blows up.  Previously, `podman stop` hit a race
      # with systemd's auto-restart, downstream tasks failed, and Quay was
      # stuck in 'stopped' until manually rescued.  Use systemctl (the way
      # mirror-registry manages itself, via the quay-{app,postgres,redis,pod}
      # .service units) instead.
      block:
        # ── Strict filesystem sanity (don't freeze a broken state into a snapshot) ──
        # Lesson learned (2026-05): we once produced a snapshot named
        # "system (Postgres + cert + Quay container layers)" but the actual
        # vda was a bare OS — /opt/mirror-registry was missing, the
        # pg-storage volume was missing, the systemd units were missing.
        # Reason: the earlier /health/instance + repo-listing HTTP 200
        # checks only prove the Quay container is alive and that Postgres
        # has metadata — they DO NOT prove that the mirror-registry
        # installer tree, the systemd management layer, and the Postgres
        # data volume files are physically present.  Once that broken
        # state overwrote the previous good snapshot, the next 03
        # fast-path derived an image from the bad snapshot, ECS booted
        # to a blank system disk, and we had to redo 04 in full (~70 min).
        #
        # Checks (any miss → refuse to take the snapshot):
        #   1) /opt/mirror-registry        — installer tree (needed for reinstall/upgrade)
        #   2) /usr/local/bin/oc-mirror    — needed by any future re-import
        #   3) /etc/systemd/system/quay-{app,postgres,redis,pod}.service
        #                                  — systemd layer (auto-start + restart on boot)
        #   4) /var/lib/containers/storage/volumes/pg-storage
        #                                  — Postgres data volume (the REAL metadata)
        #   5) /root/.docker/config.json   — podman pull/tag/push credentials
        #                                    (needed by 04's tail commit-tag aliases step)
        # On failure: fail outright; the rest of the block (cleanup / stop Quay /
        # snapshot) does not run, so the live mirror is unaffected.
        # Use command:+argv: (NOT shell:).  shell module's freeform goes
        # through Ansible's split_args tokenizer, which misinterprets bash
        # snippets that mix errs=() + ${u} + $TOKEN as
        # "unbalanced jinja2 block or quotes" and refuses to parse the
        # playbook.  argv is a list passed directly to subprocess — zero
        # tokenization, bulletproof.
        # Same template pattern as the repo_probes task at line 64 of this file.
        - name: Pre-snapshot strict sanity — vdb carries ALL Quay state (P3-FIX.9)
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ssh_priv_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - -o
              - ConnectTimeout=10
              - -o
              - "ProxyCommand=ssh -i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@{{ jump_host_ip }}"
              - "root@{{ mirror_private_ip }}"
              # P3-FIX.9: everything Quay needs to restore now lives on vdb
              # (/var/lib/quay-storage).  Verify the four pillars are present
              # BEFORE freezing the snapshot, so we never bake a snapshot that
              # restores to a dead Quay:
              #   1) datastorage                         — image blobs
              #   2) containers/storage/volumes/pg-storage — Postgres catalog DB
              #      (relocated here via storage.conf graphroot)
              #   3) systemd/quay-{app,postgres,redis,pod}.service — stashed units
              #      (cloud-init copies these back + enable --now on restore)
              #   4) mirror-ready                        — fast-path marker
              # Avoid bash array ${#arr[@]} — Jinja2 treats `{#` as a comment.
              - >-
                set -e;
                ERRCT=0;
                [ -d /var/lib/quay-storage/datastorage ] || { echo "MISSING: datastorage (image blobs)"; ERRCT=$((ERRCT+1)); };
                [ -d /var/lib/quay-storage/containers/storage/volumes/pg-storage ] || { echo "MISSING: pg-storage volume on vdb (catalog DB)"; ERRCT=$((ERRCT+1)); };
                for u in quay-app quay-postgres quay-redis quay-pod; do [ -f /var/lib/quay-storage/systemd/${u}.service ] || { echo "MISSING: stashed unit ${u}.service on vdb"; ERRCT=$((ERRCT+1)); }; done;
                [ -f /var/lib/quay-storage/mirror-ready ] || { echo "MISSING: mirror-ready marker"; ERRCT=$((ERRCT+1)); };
                [ "$ERRCT" -eq 0 ] || { echo "FATAL: $ERRCT vdb mirror state files missing — snapshot would not restore a working Quay"; exit 1; };
                echo "OK: vdb carries datastorage + pg-storage + stashed units + marker"
          register: _snap_sanity
          changed_when: false

        # Note: Postgres metadata integrity has already been verified by the
        # repo_probes task at line ~64 above — 5 critical repos all returned
        # HTTP 200 via bearer-token + /v2/<repo>/tags/list, which is only
        # possible when Postgres metadata correctly maps repo names to blobs.
        # We considered also counting v2/_catalog entries, but Quay does not
        # support the registry:catalog:* scope, and it would duplicate work
        # better left to repo_probes.

        - name: Pre-snapshot — purge transient files (frees ~28 GB, shrinks snapshot)
          ansible.builtin.shell: |
            {{ _ssh_to_mirror }} bash <<'REMOTE'
            set -euxo pipefail
            rm -f  /var/lib/quay-storage/mirror-tarball.tar /var/lib/quay-storage/mirror-tarball.tar.temp
            rm -rf /var/lib/quay-storage/oc-mirror-cache
            df -h /var/lib/quay-storage
            REMOTE
          changed_when: true

        - name: Quiesce Quay (systemctl stop, for a Postgres-consistent point)
          ansible.builtin.shell: |
            {{ _ssh_to_mirror }} bash <<'REMOTE'
            set -euxo pipefail
            # mirror-registry registers each container as a systemd service;
            # systemd auto-restarts any container whose podman process dies.
            # We must stop the SERVICE (not the container), or systemd will
            # immediately race-restart it and we hit "no such container".
            systemctl stop quay-app.service quay-redis.service quay-postgres.service || true
            # We do NOT stop quay-pod.service: killing the infra container
            # tears down the pod and the data volume bind-mounts, which is
            # more disruptive.  As long as app/redis/postgres are stopped
            # Postgres checkpoints, which is a sufficient consistency point.
            sync; sync; sync
            REMOTE
          changed_when: true

        - name: Look up the mirror ECS's system + data disk IDs
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DescribeDisks
              - --RegionId
              - "{{ region }}"
              - --InstanceId
              - "{{ mirror_registry_id }}"
              - --profile
              - "{{ aliyun_profile }}"
          register: _disk_lookup
          changed_when: false

        - name: Extract DiskId of vdb (data disk)
          ansible.builtin.set_fact:
            _vdb_disk_id: "{{ ((_disk_lookup.stdout | from_json).Disks.Disk | selectattr('Type','equalto','data')   | first).DiskId }}"

        # P3-COST.6: snapshot fast-path INVARIANT
        # The whole point of paying ¥29/month for these snapshots is that a
        # future restore can skip Phase 04's ~25 min of work.  That only
        # happens if /var/lib/quay-storage/mirror-ready is INSIDE the snapshot.  Without
        # this assert, a partial/buggy Phase 04 that didn't write the marker
        # could still get snapshotted, baking in a "looks fast-pathable but
        # isn't" state forever (until next teardown_target=mirror).
        - name: Pre-snapshot invariant — /var/lib/quay-storage/mirror-ready exists
          ansible.builtin.shell: |
            {{ _ssh_to_mirror }} test -f /var/lib/quay-storage/mirror-ready
          register: _marker_check
          changed_when: false
          failed_when: false

        - name: Refuse to snapshot mirror without the ready marker
          ansible.builtin.assert:
            that: _marker_check.rc == 0
            fail_msg: |
              Refusing to create mirror snapshots: /var/lib/quay-storage/mirror-ready is
              missing on the mirror ECS.  This means Phase 04 did not finish
              cleanly (probably an exception between import and marker write),
              and snapshotting now would produce a snapshot that LOOKS
              fast-pathable but isn't — every restore would silently degrade
              to full prep, wasting ~25 min per cycle and ~¥29/month storage.

              Action: re-run Phase 04 until the "Stage CA cert + write
              mirror-ready marker" task completes, then re-run Phase 05.
              See docs/SNAPSHOT.md (P3-COST.6).

        - name: Look up same-named old snapshots (deleted after new ones succeed)
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DescribeSnapshots
              - --RegionId
              - "{{ region }}"
              - --SnapshotName
              - "{{ item }}"
              - --profile
              - "{{ aliyun_profile }}"
          register: _old_snaps_query
          changed_when: false
          loop:
            - "{{ _snap_data_name }}"

        - name: Collect old snapshot ID list
          ansible.builtin.set_fact:
            _old_snap_ids: >-
              {{ _old_snaps_query.results
                 | map(attribute='stdout')
                 | map('from_json')
                 | map(attribute='Snapshots.Snapshot')
                 | flatten
                 | map(attribute='SnapshotId')
                 | list }}

        - name: Create snapshot of data disk (vdb — now carries ALL Quay state)
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - CreateSnapshot
              - --RegionId
              - "{{ region }}"
              - --DiskId
              - "{{ _vdb_disk_id }}"
              - --SnapshotName
              - "{{ _snap_data_name }}"
              - --Description
              - "Phase 05 verified mirror — data disk (blobs + pg catalog + container images + units)"
              - --profile
              - "{{ aliyun_profile }}"
          register: _create_vdb_snap

        - name: Extract new snapshot ID
          ansible.builtin.set_fact:
            _new_vdb_snap_id: "{{ (_create_vdb_snap.stdout | from_json).SnapshotId }}"

      # always block: no matter where the above block fails, bring Quay
      # back up.  A previous failure happened because the restart-Quay step
      # was a regular task — any earlier failure skipped it and Quay was
      # left stopped.
      always:
        - name: Restore Quay (systemctl start + health-poll, regardless of snapshot result)
          ansible.builtin.shell: |
            {{ _ssh_to_mirror }} bash <<'REMOTE'
            set -euxo pipefail
            systemctl start quay-postgres.service quay-redis.service quay-app.service || true
            for i in $(seq 1 60); do
              curl -ksf https://{{ mirror_private_ip }}:8443/health/instance && { echo "Quay healthy"; exit 0; }
              sleep 5
            done
            echo "Quay health check timed out (5 min)"; exit 1
            REMOTE
          changed_when: true

    # ── Second block: post-snapshot handling (wait for 100% / delete old / save state) ──
    # Split into its own block: if the above block's always-restart failed
    # (rare, but possible), we don't want this cleanup to run either —
    # but if Quay came back up AND snapshot creation succeeded, this
    # should continue.  Gating on whether _new_vda_snap_id /
    # _new_vdb_snap_id are defined is sufficient.
    - name: Post-snapshot handling (wait + overwrite + save state)
      when:
        - mirror_snapshot_enabled | default(true) | bool
        - _new_vdb_snap_id is defined
      vars:
        _snap_data_name:   "{{ cluster_name }}-mirror-data"
        # vars from the first block are NOT inherited here — redeclare,
        # otherwise the post-snapshot verify cleanup tasks below using
        # {{ _ssh_to_mirror }} would fail with "undefined variable".
        _ssh_to_mirror: >-
          ssh -i {{ ssh_priv_key_file }}
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o "ProxyCommand=ssh -i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@{{ jump_host_ip }}"
          root@{{ mirror_private_ip }}
      block:
        - name: Wait until the data snapshot reaches Progress=100% in OSS (up to 30 min)
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DescribeSnapshots
              - --RegionId
              - "{{ region }}"
              - --SnapshotIds
              - '["{{ _new_vdb_snap_id }}"]'
              - --profile
              - "{{ aliyun_profile }}"
          register: _snap_progress
          retries: 60
          delay: 30
          until: >-
            (_snap_progress.stdout | from_json).Snapshots.Snapshot
            | selectattr('Status','equalto','accomplished')
            | list | length == 1
          changed_when: false

        # ── Snapshot content verification (trust-but-verify) ──────────────────
        # Before snapshotting we already verified the live vda's filesystem
        # tree + Postgres metadata (the two sanity checks at the start of
        # the block).  Here we add an end-to-end "after the snapshot is
        # taken" verification: convert the new snapshot into a temp data
        # disk → attach it to the live mirror ECS → mount read-only → check
        # the filesystem tree → unmount/delete.  Only after this passes do
        # we proceed to "delete old snapshots + save state".
        #
        # Why verify again (we already have a pre-sanity check):
        #   - Defend against bugs in Aliyun's snapshot creation itself
        #     (rare but it has happened)
        #   - Defend against a DescribeDisks parse error pointing
        #     _vda_disk_id at the wrong disk
        #   - Provide physical evidence "this snapshot can be mounted and
        #     read", not just the indirect evidence "the live disk looks fine"
        #
        # On failure, rescue deletes both new snapshots (no half-good state
        # left behind); the OLD snapshots have not been deleted yet (that
        # happens in the "delete same-named old snapshots" task below), so
        # the user's mirror can still be restored from the old snapshots —
        # no data loss.
        - name: Verify snapshot contents (attach to live ECS + mount RO + check filesystem tree)
          when: snapshot_post_verify | default(true) | bool
          vars:
            _verify_disk_name: "{{ cluster_name }}-snap-verify-tmp"
          block:
            # Initialise the ID variable so the always cleanup below
            # can always reference it
            - name: Initialise verify-disk ID (for cleanup)
              ansible.builtin.set_fact:
                _verify_disk_id: ''

            - name: CreateDisk from new data snapshot (temp verification disk)
              ansible.builtin.command:
                argv:
                  - aliyun
                  - ecs
                  - CreateDisk
                  - --RegionId
                  - "{{ region }}"
                  - --ZoneId
                  - "{{ zone }}"
                  - --SnapshotId
                  - "{{ _new_vdb_snap_id }}"
                  - --DiskCategory
                  - cloud_essd
                  - --DiskName
                  - "{{ _verify_disk_name }}"
                  - --Description
                  - "Phase 05 snapshot post-verify temp disk (auto-cleanup)"
                  - --profile
                  - "{{ aliyun_profile }}"
              register: _verify_create
              changed_when: true

            - name: Record verify-disk ID
              ansible.builtin.set_fact:
                _verify_disk_id: "{{ (_verify_create.stdout | from_json).DiskId }}"

            - name: AttachDisk to live mirror ECS (will appear as /dev/vdc by default)
              ansible.builtin.command:
                argv:
                  - aliyun
                  - ecs
                  - AttachDisk
                  - --InstanceId
                  - "{{ mirror_registry_id }}"
                  - --DiskId
                  - "{{ _verify_disk_id }}"
                  - --profile
                  - "{{ aliyun_profile }}"
              changed_when: true

            - name: Wait for attach to complete (DescribeDisks until Status=In_use)
              ansible.builtin.command:
                argv:
                  - aliyun
                  - ecs
                  - DescribeDisks
                  - --RegionId
                  - "{{ region }}"
                  - --DiskIds
                  - '["{{ _verify_disk_id }}"]'
                  - --profile
                  - "{{ aliyun_profile }}"
              register: _verify_attach_poll
              retries: 15
              delay: 4
              until: >-
                ((_verify_attach_poll.stdout | from_json).Disks.Disk
                 | selectattr('Status','equalto','In_use') | list | length) == 1
              changed_when: false

            # mirror ECS: original vda + vdb already mounted; new attached
            # disk shows up as vdc.  System disk uses GPT; root partition is
            # part 3 (lsblk on live ECS shows vda3 mounted as root).
            # Use command:argv: (NOT shell:) to bypass split_args tokenizer
            # which trips on the bash array + ${} + = combinations.
            - name: Mount new vdc (whole-disk XFS) and check vdb filesystem tree
              ansible.builtin.command:
                argv:
                  - ssh
                  - -i
                  - "{{ ssh_priv_key_file }}"
                  - -o
                  - StrictHostKeyChecking=no
                  - -o
                  - UserKnownHostsFile=/dev/null
                  - -o
                  - ConnectTimeout=10
                  - -o
                  - "ProxyCommand=ssh -i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@{{ jump_host_ip }}"
                  - "root@{{ mirror_private_ip }}"
                  # P3-FIX.9: vdb is a WHOLE-DISK XFS (cloud-init mkfs.xfs on
                  # /dev/vdb, no partition table) — mount /dev/vdc directly, not
                  # vdc3.  Verify the vdb tree carries everything a restore needs.
                  # Avoid ${#arr[@]} ({# triggers Jinja's comment parser).
                  - >-
                    set -e;
                    for i in $(seq 1 30); do [ -b /dev/vdc ] && break; sleep 2; done;
                    [ -b /dev/vdc ] || { echo "FATAL: /dev/vdc not appearing"; lsblk; exit 1; };
                    mkdir -p /mnt/snap-verify;
                    # The snapshot was taken of a live, mounted, RW XFS (Quay
                    # containers were still writing), so its log is dirty.  XFS
                    # refuses a plain read-only mount of a dirty log; norecovery
                    # gives a crash-consistent read-only view, which is all the
                    # content check below needs.
                    mount -o ro,norecovery /dev/vdc /mnt/snap-verify;
                    trap 'umount /mnt/snap-verify 2>/dev/null || true' EXIT;
                    M=/mnt/snap-verify;
                    ERRCT=0;
                    [ -d $M/datastorage ] || { echo "MISSING: datastorage (image blobs)"; ERRCT=$((ERRCT+1)); };
                    [ -d $M/containers/storage/volumes/pg-storage ] || { echo "MISSING: pg-storage volume (catalog DB)"; ERRCT=$((ERRCT+1)); };
                    for u in quay-app quay-postgres quay-redis quay-pod; do [ -f $M/systemd/${u}.service ] || { echo "MISSING: stashed unit ${u}.service"; ERRCT=$((ERRCT+1)); }; done;
                    [ -f $M/mirror-ready ] || { echo "MISSING: mirror-ready marker"; ERRCT=$((ERRCT+1)); };
                    PG_FILES=$(find $M/containers/storage/volumes/pg-storage -type f 2>/dev/null | wc -l);
                    [ "$PG_FILES" -ge 50 ] || { echo "MISSING: pg-storage file count $PG_FILES (suspect empty Postgres)"; ERRCT=$((ERRCT+1)); };
                    [ "$ERRCT" -eq 0 ] || { echo "FATAL: $ERRCT problems with snapshot content (E2E verification failed)"; exit 1; };
                    echo "OK: new vdb snapshot E2E verified (vdc mount ro, blobs + pg-storage + units + marker present, pg file count=$PG_FILES)"
              changed_when: false

          rescue:
            - name: Verification failed — delete the just-taken data snapshot (leave no half-done state)
              ansible.builtin.command:
                argv:
                  - aliyun
                  - ecs
                  - DeleteSnapshot
                  - --RegionId
                  - "{{ region }}"
                  - --SnapshotId
                  - "{{ _new_vdb_snap_id }}"
                  - --profile
                  - "{{ aliyun_profile }}"
              failed_when: false

            - name: Abort — old snapshot is preserved; re-run 05 to retake
              ansible.builtin.fail:
                msg: |
                  End-to-end snapshot verification failed.  The new data
                  snapshot just taken has been deleted.
                  - The OLD snapshot (from the previous 05) is untouched and
                    can still be used to fast-path restore the mirror.
                  - state.yml was NOT updated, so the next 03 will still
                    use the old ID.
                  Where to look: does the vdb tree carry datastorage,
                  containers/storage/volumes/pg-storage, systemd/quay-*.service,
                  and mirror-ready?  See the MISSING errors above.

          always:
            # Temp-disk cleanup — runs on both failure and success to avoid
            # an orphaned disk on the ECS + the resulting Aliyun hourly
            # billing.  verify_disk_id may be empty (CreateDisk failed
            # earlier), or attach may have failed so Detach is unnecessary
            # → all tasks use failed_when:false.
            - name: cleanup — umount + DetachDisk + DeleteDisk
              when: _verify_disk_id is defined and _verify_disk_id | length > 0
              block:
                - name: Unmount the temp mount on mirror ECS
                  ansible.builtin.shell: |
                    {{ _ssh_to_mirror }} 'umount /mnt/snap-verify 2>/dev/null; rmdir /mnt/snap-verify 2>/dev/null || true'
                  changed_when: false
                  failed_when: false

                - name: DetachDisk temp disk
                  ansible.builtin.command:
                    argv:
                      - aliyun
                      - ecs
                      - DetachDisk
                      - --InstanceId
                      - "{{ mirror_registry_id }}"
                      - --DiskId
                      - "{{ _verify_disk_id }}"
                      - --profile
                      - "{{ aliyun_profile }}"
                  failed_when: false
                  changed_when: true

                - name: Wait for detach to complete (Status=Available)
                  ansible.builtin.command:
                    argv:
                      - aliyun
                      - ecs
                      - DescribeDisks
                      - --RegionId
                      - "{{ region }}"
                      - --DiskIds
                      - '["{{ _verify_disk_id }}"]'
                      - --profile
                      - "{{ aliyun_profile }}"
                  register: _verify_detach_poll
                  retries: 15
                  delay: 4
                  until: >-
                    ((_verify_detach_poll.stdout | from_json).Disks.Disk
                     | selectattr('Status','equalto','Available') | list | length) == 1
                  failed_when: false
                  changed_when: false

                # Retry DeleteDisk until the disk genuinely disappears.  Aliyun
                # race condition: DescribeDisks returns Status=Available before
                # the physical detach actually finishes, so an immediate
                # DeleteDisk often fails.  Observed: first attempt at
                # 04:43:42 UTC failed silently; a manual retry 60 s later
                # succeeded.  retries waits for the real cleanup.
                - name: DeleteDisk temp disk (retry until truly gone)
                  ansible.builtin.command:
                    argv:
                      - aliyun
                      - ecs
                      - DeleteDisk
                      - --DiskId
                      - "{{ _verify_disk_id }}"
                      - --profile
                      - "{{ aliyun_profile }}"
                  register: _verify_delete
                  retries: 10
                  delay: 6
                  until: _verify_delete.rc == 0
                  changed_when: true

                # Extra confirmation: DescribeDisks must return 0 disks.
                # DeleteDisk rc=0 does not guarantee the disk is gone (Aliyun async).
                - name: Confirm the temp disk really is gone
                  ansible.builtin.command:
                    argv:
                      - aliyun
                      - ecs
                      - DescribeDisks
                      - --RegionId
                      - "{{ region }}"
                      - --DiskIds
                      - '["{{ _verify_disk_id }}"]'
                      - --profile
                      - "{{ aliyun_profile }}"
                  register: _verify_delete_confirm
                  retries: 10
                  delay: 3
                  until: >-
                    ((_verify_delete_confirm.stdout | from_json).Disks.Disk
                     | default([]) | length) == 0
                  changed_when: false

        - name: Delete same-named old snapshots (overwrite semantics)
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DeleteSnapshot
              - --RegionId
              - "{{ region }}"
              - --SnapshotId
              - "{{ item }}"
              - --profile
              - "{{ aliyun_profile }}"
          loop: "{{ _old_snap_ids }}"
          when: item != _new_vdb_snap_id
          register: _delete_old
          failed_when: false
          changed_when: _delete_old.rc == 0

        - name: Save snapshot ID to state.yml (P3-FIX.9 — vdb only; retire system id)
          ansible.builtin.include_tasks: ../tasks/save_state.yml
          vars:
            new_state:
              mirror_snapshot_data_id:   "{{ _new_vdb_snap_id }}"
              # P3-FIX.9: there is no longer a system-disk snapshot; clear any
              # stale id left in state.yml from the old two-disk layout so 03's
              # fast-path decision never references it.
              mirror_snapshot_system_id: ""

        - name: Snapshot complete summary
          ansible.builtin.debug:
            msg: |
              OK: mirror ECS vdb snapshot ready (overwrite-in-place, old one cleaned)
                data (vdb) : {{ _new_vdb_snap_id }}  — "{{ _snap_data_name }}"
              vdb now carries ALL Quay state (blobs + pg catalog + container
              images + stashed units), so this single snapshot fully restores
              the mirror.  Recorded in state.yml (mirror_snapshot_data_id).

              To rebuild mirror ECS: restore from this snapshot onto a stock
              vda; cloud-init starts Quay from the stashed units — no Phase 04
              import.  See docs/mirror-vdb-persistence.md.
