---
# Verify the mirror-registry is healthy and contains the expected images.
#
# Use cases:
#   - After Phase 04 completed, sanity-check before Phase 07 trigger.
#   - After mirror-rebuild.yml, confirm new tarball was imported.
#   - Anytime Phase 07 stalls — first thing to check is "can the mirror
#     even serve images right now".
#
# Usage:
#   ansible-playbook ansible/playbooks/mirror-verify.yml
- name: Verify mirror-registry health + contents
  hosts: local
  gather_facts: false
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml
    - ansible.builtin.include_tasks: ../tasks/path_defaults.yml
    - ansible.builtin.include_tasks: ../tasks/mirror_defaults.yml

    # Skip entire playbook gracefully when mirror is not enabled.
    - name: Skip — mirror_enabled is false (running in non-mirror mode)
      ansible.builtin.meta: end_play
      when: not (mirror_enabled | default(false) | bool)

    - name: Sanity — required mirror state present
      ansible.builtin.assert:
        that:
          - mirror_enabled | default(false) | bool
          - mirror_private_ip is defined and mirror_private_ip | length > 0
          - mirror_init_user is defined and mirror_init_user | length > 0
          - mirror_init_password is defined and mirror_init_password | length > 0
          - jump_host_ip is defined and jump_host_ip | length > 0
        fail_msg: |
          Missing mirror state in state.yml.  Run Phase 03 + 04 (with mirror_enabled=true)
          first.

    # ── Quay health endpoint ──────────────────────────────────────────────
    - name: Check mirror-registry /health/instance endpoint
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_priv_key_file }}"
          - -o
          - StrictHostKeyChecking=no
          - -o
          - UserKnownHostsFile=/dev/null
          - -o
          - ConnectTimeout=10
          - -o
          - "ProxyCommand=ssh -i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@{{ jump_host_ip }}"
          - "root@{{ mirror_private_ip }}"
          - "curl -ksf https://{{ mirror_private_ip }}:8443/health/instance"
      register: health_check
      changed_when: false

    # ── Per-repo existence check via Docker Distribution v2 ──────────────
    # Both Quay's /api/v1/repository and /v2/_catalog hide cross-user
    # namespaces (openshift, rhai) from mirror-admin's view, so neither
    # gives us a usable repo listing.  Instead we hit /v2/<repo>/tags/list
    # for each expected repo via the standard bearer-token flow — this is
    # the same path the cluster nodes use when pulling, so a 200 here
    # means a 200 from a real node too.
    - name: Probe each required repo with Docker v2 bearer-token flow
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_priv_key_file }}"
          - -o
          - StrictHostKeyChecking=no
          - -o
          - UserKnownHostsFile=/dev/null
          - -o
          - "ProxyCommand=ssh -i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@{{ jump_host_ip }}"
          - "root@{{ mirror_private_ip }}"
          - >-
            TOKEN=$(curl -ks -u '{{ mirror_init_user }}:{{ mirror_init_password }}'
            "https://{{ mirror_private_ip }}:8443/v2/auth?service={{ mirror_private_ip }}:8443&scope=repository:{{ item }}:pull"
            | jq -r .token);
            curl -ks -o /dev/null -w '%{http_code}'
            -H "Authorization: Bearer $TOKEN"
            "https://{{ mirror_private_ip }}:8443/v2/{{ item }}/tags/list"
      loop:
        - rhai/assisted-installer-agent-rhel9
        - rhai/assisted-installer-rhel9
        - rhai/assisted-installer-controller-rhel9
        - openshift/release
        - openshift/release-images
      register: repo_probes
      changed_when: false
      no_log: true   # mirror password is in argv

    - name: Show mirror probe summary
      ansible.builtin.debug:
        msg: |
          ✓ Mirror reachable at https://{{ mirror_private_ip }}:8443
          Per-repo HTTP probe (200 = present, 404 = missing):
          {% for r in repo_probes.results %}
            {{ r.stdout }}  {{ r.item }}
          {% endfor %}

    - name: Verify all required repos returned HTTP 200
      ansible.builtin.assert:
        that:
          - repo_probes.results | selectattr('stdout', 'equalto', '200') | list | length
            == repo_probes.results | length
        fail_msg: |
          Mirror is missing one or more required repos.  Phase 07 will fail
          because cluster nodes won't be able to pull these images.

          Missing repos:
          {% for r in repo_probes.results %}
          {% if r.stdout != '200' %}
            - {{ r.item }} (HTTP {{ r.stdout }})
          {% endif %}
          {% endfor %}

          Re-run scripts/build-mirror-tarball.sh on your build host (the
          OFFLINE_TOKEN_FILE auto-discovery includes all 3 rhai images),
          upload to OSS, then `ansible-playbook ansible/playbooks/mirror-rebuild.yml`.

    - name: All checks passed
      ansible.builtin.debug:
        msg: |
          ✓ Mirror is healthy and contains all critical images.
          Safe to proceed with Phase 07:
            ansible-playbook ansible/playbooks/07-install-cluster.yml

    # ─── 快照 mirror ECS 双盘（默认开启，覆盖式）─────────────────────────────
    # 在 04 验证通过的状态下捕获 vda + vdb 快照，未来 cluster 重建时可以从
    # 快照恢复一个新 mirror ECS，省掉 Phase 04 的 1 小时 import。
    #
    # 为什么必须双盘：
    #   vdb = image blob（50 GB 全部 195 images）
    #   vda = Postgres 元数据 + IP-SAN 自签证书 + Quay 容器层 + /opt 安装器
    #         (只快照 vdb 的话 Postgres 元数据丢失 → Quay 看到空 registry)
    #
    # 覆盖策略：
    #   每次以固定名 "{cluster}-mirror-system" 和 "{cluster}-mirror-data"
    #   创建新快照；新快照 Progress=100% 后删除同名的旧快照。
    #   失败死在 CreateSnapshot 之前 → 旧快照保留；
    #   失败死在轮询期间 → 同名多份共存（下次跑会一并清理）。
    #
    # 跳过：  -e mirror_snapshot_enabled=false
    # 重建时：参考 docs/MIRROR.md "从快照恢复 mirror ECS" 章节
    - name: 快照 mirror ECS 双盘（vda + vdb）
      when: mirror_snapshot_enabled | default(true) | bool
      vars:
        _snap_system_name: "{{ cluster_name }}-mirror-system"
        _snap_data_name:   "{{ cluster_name }}-mirror-data"
        _ssh_to_mirror: >-
          ssh -i {{ ssh_priv_key_file }}
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o "ProxyCommand=ssh -i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@{{ jump_host_ip }}"
          root@{{ mirror_private_ip }}
      block:
        - name: 快照前清理瞬态文件（释放 ~28 GB，缩小快照体积）
          ansible.builtin.shell: |
            {{ _ssh_to_mirror }} bash <<'REMOTE'
            set -euxo pipefail
            rm -f  /var/lib/quay-storage/mirror-tarball.tar /var/lib/quay-storage/mirror-tarball.tar.temp
            rm -rf /var/lib/quay-storage/oc-mirror-cache
            df -h /var/lib/quay-storage
            REMOTE
          changed_when: true

        - name: 静默 Quay（停容器，确保 Postgres 一致点）
          ansible.builtin.shell: |
            {{ _ssh_to_mirror }} bash <<'REMOTE'
            set -euxo pipefail
            podman stop quay-app quay-redis quay-postgres || true
            sync; sync; sync
            REMOTE
          changed_when: true

        - name: 查询 mirror ECS 的 system + data 磁盘 ID
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DescribeDisks
              - --RegionId
              - "{{ region }}"
              - --InstanceId
              - "{{ mirror_registry_id }}"
              - --profile
              - "{{ aliyun_profile }}"
          register: _disk_lookup
          changed_when: false

        - name: 解析 vda / vdb 的 DiskId
          ansible.builtin.set_fact:
            _vda_disk_id: "{{ ((_disk_lookup.stdout | from_json).Disks.Disk | selectattr('Type','equalto','system') | first).DiskId }}"
            _vdb_disk_id: "{{ ((_disk_lookup.stdout | from_json).Disks.Disk | selectattr('Type','equalto','data')   | first).DiskId }}"

        - name: 查询同名旧快照（待新快照成功后删除）
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DescribeSnapshots
              - --RegionId
              - "{{ region }}"
              - --SnapshotName
              - "{{ item }}"
              - --profile
              - "{{ aliyun_profile }}"
          register: _old_snaps_query
          changed_when: false
          loop:
            - "{{ _snap_system_name }}"
            - "{{ _snap_data_name }}"

        - name: 收集旧快照 ID 列表
          ansible.builtin.set_fact:
            _old_snap_ids: >-
              {{ _old_snaps_query.results
                 | map(attribute='stdout')
                 | map('from_json')
                 | map(attribute='Snapshots.Snapshot')
                 | flatten
                 | map(attribute='SnapshotId')
                 | list }}

        - name: 创建 system 盘（vda）快照
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - CreateSnapshot
              - --RegionId
              - "{{ region }}"
              - --DiskId
              - "{{ _vda_disk_id }}"
              - --SnapshotName
              - "{{ _snap_system_name }}"
              - --Description
              - "Phase 05 verified mirror — system disk (Postgres + cert + Quay container layers)"
              - --profile
              - "{{ aliyun_profile }}"
          register: _create_vda_snap

        - name: 创建 data 盘（vdb）快照
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - CreateSnapshot
              - --RegionId
              - "{{ region }}"
              - --DiskId
              - "{{ _vdb_disk_id }}"
              - --SnapshotName
              - "{{ _snap_data_name }}"
              - --Description
              - "Phase 05 verified mirror — data disk (image blob storage)"
              - --profile
              - "{{ aliyun_profile }}"
          register: _create_vdb_snap

        - name: 提取新快照 ID
          ansible.builtin.set_fact:
            _new_vda_snap_id: "{{ (_create_vda_snap.stdout | from_json).SnapshotId }}"
            _new_vdb_snap_id: "{{ (_create_vdb_snap.stdout | from_json).SnapshotId }}"

        - name: 重启 Quay（快照已注册时间点，可立刻恢复服务）
          ansible.builtin.shell: |
            {{ _ssh_to_mirror }} bash <<'REMOTE'
            set -euxo pipefail
            podman start quay-postgres quay-redis quay-app
            until curl -ksf https://{{ mirror_private_ip }}:8443/health/instance; do sleep 5; done
            echo "Quay 恢复服务"
            REMOTE
          changed_when: true

        - name: 等待两个快照传到 OSS 完成（Progress=100%；最长 30 min）
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DescribeSnapshots
              - --RegionId
              - "{{ region }}"
              - --SnapshotIds
              - '["{{ _new_vda_snap_id }}","{{ _new_vdb_snap_id }}"]'
              - --profile
              - "{{ aliyun_profile }}"
          register: _snap_progress
          retries: 60
          delay: 30
          until: >-
            (_snap_progress.stdout | from_json).Snapshots.Snapshot
            | selectattr('Status','equalto','accomplished')
            | list | length == 2
          changed_when: false

        - name: 删除同名旧快照（覆盖语义）
          ansible.builtin.command:
            argv:
              - aliyun
              - ecs
              - DeleteSnapshot
              - --RegionId
              - "{{ region }}"
              - --SnapshotId
              - "{{ item }}"
              - --profile
              - "{{ aliyun_profile }}"
          loop: "{{ _old_snap_ids }}"
          when: item not in [_new_vda_snap_id, _new_vdb_snap_id]
          register: _delete_old
          failed_when: false
          changed_when: _delete_old.rc == 0

        - name: 保存快照 ID 到 state.yml
          ansible.builtin.include_tasks: ../tasks/save_state.yml
          vars:
            new_state:
              mirror_snapshot_system_id: "{{ _new_vda_snap_id }}"
              mirror_snapshot_data_id:   "{{ _new_vdb_snap_id }}"

        - name: 快照完成提示
          ansible.builtin.debug:
            msg: |
              ✓ Mirror ECS 双盘快照已就绪（覆盖式，旧的已清理）
                system (vda) : {{ _new_vda_snap_id }}  — "{{ _snap_system_name }}"
                data   (vdb) : {{ _new_vdb_snap_id }}  — "{{ _snap_data_name }}"
              已记入 state.yml (mirror_snapshot_system_id / mirror_snapshot_data_id)

              重建 mirror ECS 时：从这两个快照恢复，跳过 Phase 04 的 1 小时 import。
              详见 docs/MIRROR.md "从快照恢复 mirror ECS"。
