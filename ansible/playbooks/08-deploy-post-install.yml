---
# Phase 08 — deploy CAPI provider + CSI operator + CSI driver CR onto the cluster.
#
# Driven from the OPERATOR host (RHEL8); executed ON the jump host.  The jump
# host lives inside the VPC (can reach the private cluster API), and carries the
# repos + oc + kustomize + /root/kubeconfig — the operator box cannot reach the
# cluster API directly, so all kubectl/oc work happens on the jump host over SSH.
#
# Standalone + idempotent: play 1 derives the jump host from state.yml and adds
# it to the inventory (does NOT rely on Phase 03's in-run add_host), so Phase 08
# can be run on its own at any time.  Every apply is `oc apply` (idempotent) with
# changed_when gated on the "unchanged" marker.
#
# See docs/POST-INSTALL.md (OADP is manual-apply, not driven here).

- name: Resolve jump host from state (Phase 08 runs standalone)
  hosts: local
  gather_facts: false
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml

    - name: Assert the jump host IP is known
      ansible.builtin.assert:
        that: jump_host_ip | default('') | length > 0
        fail_msg: >-
          jump_host_ip is not in state.yml — bring up the mirror-stack
          (Phase 03) first; Phase 08 deploys via the jump host.

    # The CAPA controller Deployment consumes AK/SK via `envFrom: secretRef:
    # alibaba-creds` (see openshift-capi-alicloud config/manager/deployment.yaml). Read them
    # from the operator's aliyun profile here so play 2 can create that secret —
    # without it the controller pod is stuck in CreateContainerConfigError.
    - name: Read Alibaba AK/SK from the operator's aliyun profile
      ansible.builtin.command:
        argv:
          - jq
          - -r
          - '.profiles[] | select(.name=="{{ aliyun_profile }}") | .access_key_id + " " + .access_key_secret'
          - "{{ lookup('env', 'HOME') }}/.aliyun/config.json"
      register: _aksk
      changed_when: false
      no_log: true

    - name: Assert AK/SK resolved for CAPA creds
      ansible.builtin.assert:
        that: (_aksk.stdout | trim | length) > 0 and (_aksk.stdout.split(' ') | length) == 2
        fail_msg: "Could not read AK/SK for profile '{{ aliyun_profile }}' from ~/.aliyun/config.json"

    - name: Add the jump host to the inventory (carry creds as host vars)
      ansible.builtin.add_host:
        name: jumphost
        ansible_host: "{{ jump_host_ip }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ ssh_priv_key_file }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15"
        groups: deploy
        capa_ak: "{{ _aksk.stdout.split(' ')[0] }}"
        capa_sk: "{{ _aksk.stdout.split(' ')[1] }}"
        # Carry the mirror IP so play 2 can apply an ImageTagMirrorSet for the
        # tag-pinned CAPA/CSI images (the install-config only emits an
        # ImageDigestMirrorSet, which does NOT redirect tag pulls — see the ITMS
        # task in play 2).
        mirror_private_ip: "{{ mirror_private_ip | default('') }}"
        # Cluster network (from state.yml) so play 2 can apply a filesystem-mode
        # NAS StorageClass that dynamically provisions (needs vpc/vSwitch/zone).
        nas_vpc_id: "{{ mirror_vpc_id | default('') }}"
        nas_vsw_id: "{{ mirror_private_vsw_1 | default('') }}"
        nas_zone_id: "{{ mirror_zone_id | default('') }}"
      no_log: true

- name: Deploy post-install components (executed on the jump host)
  hosts: jumphost
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../vars/images.yml"
  vars:
    csi_operator_img: quay.io/samzhu/alibaba-cloud-csi-operator:v1.35.3
    capi_provider_img: "{{ capa_image }}"
    kubeconfig_file: /root/kubeconfig
    # Repos live here on the jump host (NOT {{ playbook_dir }} — that resolves to
    # the operator's path; these commands run on the jump host).
    jump_repo_root: /root/openshift-alibaba
  tasks:
    - name: Best-effort refresh of the jump host's repos (idempotent; never fatal)
      ansible.builtin.command:
        argv: [git, -C, "{{ jump_repo_root }}/{{ item }}", pull, --ff-only]
      loop:
        - alibaba-openshift
        - openshift-capi-alicloud
        - alibaba-cloud-csi-operator
      register: _git_pull
      changed_when: "'Already up to date' not in (_git_pull.stdout | default(''))"
      failed_when: false

    - name: Assert kubeconfig is present on the jump host
      ansible.builtin.stat:
        path: "{{ kubeconfig_file }}"
      register: kc_stat
      failed_when: not kc_stat.stat.exists

    - name: Verify cluster reachable
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", get, nodes]
      changed_when: false
      register: oc_nodes
      retries: 5
      delay: 10
      until: oc_nodes.rc == 0

    # Air-gap: pin the CAPA controller image BY DIGEST (not tag) — the same
    # pattern 08a uses for the CAPI core image. The companion ITMS (below) already
    # redirects tag pulls to the mirror, but a digest pin is stricter: the
    # install-config ImageDigestMirrorSet resolves it directly, the reference is
    # immutable, and CAPA stays consistent with capi-core. Resolve the digest from
    # the mirror copy that 04-prepare-mirror pushed. No-op (keeps the tag) when the
    # mirror is disabled — a connected cluster pulls from quay.io by tag.
    - name: Pin CAPA controller image by digest from the mirror (air-gap)
      when: mirror_private_ip | default('') | length > 0
      block:
        - name: Extract the cluster pull secret (mirror auth for oc image info)
          ansible.builtin.command:
            argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", -n, openshift-config,
                   extract, secret/pull-secret, --to=/root, --confirm]
          changed_when: false

        - name: Resolve the CAPA controller image digest from the mirror
          ansible.builtin.command:
            argv: [oc, image, info,
                   "{{ mirror_private_ip }}:8443/samzhu/openshift-capi-alicloud:{{ capa_image_tag }}",
                   "--registry-config=/root/.dockerconfigjson", "--insecure", -o, json]
          register: _capa_imginfo
          changed_when: false

        - name: Override capi_provider_img with the digest-pinned reference
          ansible.builtin.set_fact:
            capi_provider_img: "quay.io/samzhu/openshift-capi-alicloud@{{ (_capa_imginfo.stdout | from_json).digest }}"

    # ── CAPA provider (single kustomize SSOT: provider repo config/default) ──
    # CRDs + RBAC + controller + admission webhooks all come from the provider
    # repo's config/default kustomize base — the SAME source clusterctl
    # (gen-clusterctl-components.sh) and the OLM bundle CRDs build from. They are
    # rendered + applied together below, AFTER the namespace + creds secret +
    # air-gap ITMS are in place (the Deployment's envFrom needs the secret, and the
    # ITMS must precede the controller image pull).
    - name: Ensure capa-system namespace exists (before the creds secret)
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", create, namespace, capa-system]
      register: _capa_ns
      changed_when: "'created' in (_capa_ns.stdout | default(''))"
      failed_when:
        - _capa_ns.rc != 0
        - "'AlreadyExists' not in (_capa_ns.stderr | default(''))"

    - name: Create/update alibaba-creds secret for the CAPA controller (envFrom)
      ansible.builtin.shell: |
        oc --kubeconfig {{ kubeconfig_file }} create secret generic alibaba-creds \
          -n capa-system \
          --from-literal=ALIBABA_CLOUD_ACCESS_KEY_ID='{{ capa_ak }}' \
          --from-literal=ALIBABA_CLOUD_ACCESS_KEY_SECRET='{{ capa_sk }}' \
          --dry-run=client -o yaml | oc --kubeconfig {{ kubeconfig_file }} apply -f -
      register: _capa_secret
      changed_when: "'configured' in _capa_secret.stdout or 'created' in _capa_secret.stdout"
      no_log: true

    # Air-gap: the install-config emits only an ImageDigestMirrorSet
    # (imageDigestSources), which redirects pulls BY DIGEST. But our CAPA and CSI
    # manifests pin images BY TAG (capa :{{ capa_image_tag }}, csi :v1.35.3), so a
    # tag pull is NOT redirected and escapes to public quay.io — fine on nodes that
    # already cached the image, but on any node a pod is rescheduled to (scale /
    # rolling / drain / MHC remediation) the pull dials quay.io and times out
    # (capa-controller-manager stuck ImagePullBackOff, HA degraded; observed
    # 2026-06-11). Apply the companion ImageTagMirrorSet so tag pulls of these
    # mirrored repos also resolve to the mirror. No-op on non-air-gapped clusters
    # (mirror_private_ip empty). NOTE: like any IDMS/ITMS change, this is rendered
    # into registries.conf by the MCO and triggers a rolling node config update.
    - name: Apply ImageTagMirrorSet for tag-pinned CAPA/CSI mirror images
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", apply, -f, "-"]
      args:
        stdin: |
          apiVersion: config.openshift.io/v1
          kind: ImageTagMirrorSet
          metadata:
            name: samzhu-tag-mirror
          spec:
            imageTagMirrors:
              - source: quay.io/samzhu/openshift-capi-alicloud
                mirrors:
                  - {{ mirror_private_ip }}:8443/samzhu/openshift-capi-alicloud
              - source: quay.io/samzhu/alibaba-cloud-csi-operator
                mirrors:
                  - {{ mirror_private_ip }}:8443/samzhu/alibaba-cloud-csi-operator
              - source: quay.io/samzhu/alibaba-cloud-csi-operator-bundle
                mirrors:
                  - {{ mirror_private_ip }}:8443/samzhu/alibaba-cloud-csi-operator-bundle
              - source: quay.io/samzhu/alibaba-cloud-csi-operator-catalog
                mirrors:
                  - {{ mirror_private_ip }}:8443/samzhu/alibaba-cloud-csi-operator-catalog
              # CSI driver + 6 sidecars: the operator pulls these by tag from the
              # Aliyun ACR (tags hardcoded in the operator binary). Redirect the
              # whole acs/ namespace to the mirror so the driver Pods don't try to
              # reach the public registry (no egress in air-gap).
              - source: registry.cn-hangzhou.aliyuncs.com/acs
                mirrors:
                  - {{ mirror_private_ip }}:8443/acs
      register: _itms_apply
      changed_when: "'unchanged' not in _itms_apply.stdout"
      when: mirror_private_ip | default('') | length > 0

    - name: Render CAPA deployment set from config/ kustomize (image override)
      # `oc kustomize` renders the provider repo's config/default SSOT (CRDs + RBAC
      # + controller + webhooks). The controller image is the only thing overridden:
      # sed swaps the placeholder TAG for {{ capi_provider_img }} (the mirror DIGEST
      # on air-gapped clusters, see the digest-pin block above).
      ansible.builtin.shell: >
        oc kustomize '{{ jump_repo_root }}/openshift-capi-alicloud/config/default'
        | sed 's|image: quay.io/samzhu/openshift-capi-alicloud:.*|image: {{ capi_provider_img }}|'
      register: capa_rendered
      changed_when: false

    - name: Apply CAPA deployment set (CRDs + RBAC + controller + webhooks)
      # Server-side apply so the service-ca-injected webhook caBundle is not
      # clobbered on re-apply (--force-conflicts resolves field ownership). The
      # controller's webhook server reads its serving cert at
      # /tmp/k8s-webhook-server/serving-certs/tls.crt, minted by service-ca once the
      # webhook Service (in this set) exists.
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", apply, --server-side=true,
               --force-conflicts, -f, "-"]
      args:
        stdin: "{{ capa_rendered.stdout }}"
      register: capa_apply
      changed_when: "'unchanged' not in capa_apply.stdout"

    # ── CAPA metrics (G11) ────────────────────────────────────────────────
    - name: Check for the Prometheus Operator ServiceMonitor CRD
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", get, crd,
               servicemonitors.monitoring.coreos.com]
      register: _servicemonitor_crd
      changed_when: false
      failed_when: false

    - name: Render CAPA metrics overlay (config/metrics)
      ansible.builtin.command:
        argv: [oc, kustomize, "{{ jump_repo_root }}/openshift-capi-alicloud/config/metrics"]
      register: capa_metrics_rendered
      changed_when: false
      when: _servicemonitor_crd.rc == 0

    - name: Apply CAPA metrics Service + ServiceMonitor
      # Wires the controller's :8080 metrics endpoint into OpenShift monitoring.
      # Guarded on the monitoring.coreos.com CRD (always present on OpenShift);
      # skipped on a cluster without the Prometheus Operator so the run stays green.
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", apply, -f, "-"]
      args:
        stdin: "{{ capa_metrics_rendered.stdout }}"
      register: capa_metrics_apply
      changed_when: "'unchanged' not in capa_metrics_apply.stdout"
      when: _servicemonitor_crd.rc == 0

    # ── CSI operator ──────────────────────────────────────────────────────
    - name: Set CSI operator image in kustomize
      ansible.builtin.command:
        argv: [kustomize, edit, set, image, "controller={{ csi_operator_img }}"]
        chdir: "{{ jump_repo_root }}/alibaba-cloud-csi-operator/config/manager"
      changed_when: false

    - name: Render CSI operator kustomize
      ansible.builtin.command:
        argv: [kustomize, build, "{{ jump_repo_root }}/alibaba-cloud-csi-operator/config/default"]
      register: csi_rendered
      changed_when: false

    - name: Apply CSI operator
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", apply, -f, "-"]
      args:
        stdin: "{{ csi_rendered.stdout }}"
      register: csi_apply
      changed_when: "'unchanged' not in csi_apply.stdout"

    - name: Wait for AlibabaCloudCSIDriver CRD Established
      ansible.builtin.command:
        argv:
          - oc
          - --kubeconfig
          - "{{ kubeconfig_file }}"
          - wait
          - --for=condition=Established
          - --timeout=120s
          - crd/alibabacloudcsidrivers.csi.alibabacloud.com
      changed_when: false

    - name: Apply CSI driver CR
      ansible.builtin.command:
        argv:
          - oc
          - --kubeconfig
          - "{{ kubeconfig_file }}"
          - apply
          - -f
          - "{{ jump_repo_root }}/alibaba-openshift/custom_manifests/04-csi-driver-cr.yaml"
      register: csi_cr
      changed_when: "'unchanged' not in csi_cr.stdout"

    # ── NAS StorageClass (filesystem-mode dynamic provisioning) ───────────────
    # The CR sets nas.storageClasses=[] so the operator deploys the NAS driver but
    # creates no StorageClass — a provisionable NAS SC needs cluster-network params
    # the operator can't know. Apply it here, filled from state.yml's vpc/vSwitch/
    # zone. Gated on those being present, so it is a safe no-op if state lacks them
    # (NAS just stays unprovisioned; the deploy never fails). StorageClass params
    # are immutable, so this is created once; delete the SC to change params.
    - name: Apply NAS StorageClass (filesystem-mode, dynamic provisioning)
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", apply, -f, "-"]
      args:
        stdin: |
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: alicloud-nas-performance
          provisioner: nasplugin.csi.alibabacloud.com
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          # Immediate: RWX NAS has no node affinity (unlike WaitForFirstConsumer disk).
          volumeBindingMode: Immediate
          parameters:
            volumeAs: filesystem
            fileSystemType: standard
            storageType: Performance
            regionId: "{{ region }}"
            zoneId: "{{ nas_zone_id }}"
            vpcId: "{{ nas_vpc_id }}"
            vSwitchId: "{{ nas_vsw_id }}"
      register: nas_sc
      changed_when: "'unchanged' not in nas_sc.stdout"
      when:
        - nas_vpc_id | default('') | length > 0
        - nas_vsw_id | default('') | length > 0
        - nas_zone_id | default('') | length > 0

    # ── OADP / OSS backup (optional, opt-in via oadp_enabled) ─────────────────
    # Deploys the OADP operator (OLM Subscription from redhat-operators), then —
    # only if backup credentials are supplied — the cloud-credentials Secret and
    # the DataProtectionApplication (both rendered from oadp_* vars via stdin, so
    # the AK/SK never lands on disk). Air-gap: the redhat-oadp-operator package
    # must already be in the private mirror (build-mirror-tarball.sh OADP_MIRROR=true).
    - name: Apply OADP operator Subscription
      ansible.builtin.command:
        argv:
          - oc
          - --kubeconfig
          - "{{ kubeconfig_file }}"
          - apply
          - -f
          - "{{ jump_repo_root }}/alibaba-openshift/custom_manifests/05-oadp-subscription.yaml"
      register: oadp_sub
      changed_when: "'unchanged' not in oadp_sub.stdout"
      when: oadp_enabled | default(false) | bool

    - name: Wait for DataProtectionApplication CRD Established
      ansible.builtin.command:
        argv:
          - oc
          - --kubeconfig
          - "{{ kubeconfig_file }}"
          - wait
          - --for=condition=Established
          - --timeout=300s
          - crd/dataprotectionapplications.oadp.openshift.io
      register: oadp_crd_wait
      retries: 10
      delay: 15
      until: oadp_crd_wait.rc == 0
      changed_when: false
      when: oadp_enabled | default(false) | bool

    - name: Apply OADP OSS credentials Secret (rendered via stdin, never on disk)
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", apply, -f, "-"]
      args:
        stdin: "{{ lookup('template', jump_repo_root + '/alibaba-openshift/custom_manifests/05-oadp-oss-credentials.yaml.j2') }}"
      register: oadp_creds
      changed_when: "'unchanged' not in oadp_creds.stdout"
      no_log: true
      when:
        - oadp_enabled | default(false) | bool
        - oadp_oss_access_key_id | default('') | length > 0

    - name: Apply DataProtectionApplication (rendered from oadp_* vars)
      ansible.builtin.command:
        argv: [oc, --kubeconfig, "{{ kubeconfig_file }}", apply, -f, "-"]
      args:
        stdin: "{{ lookup('template', jump_repo_root + '/alibaba-openshift/custom_manifests/05-oadp-dpa.yaml.j2') }}"
      register: oadp_dpa
      changed_when: "'unchanged' not in oadp_dpa.stdout"
      when:
        - oadp_enabled | default(false) | bool
        - oadp_oss_access_key_id | default('') | length > 0

    - name: OADP operator deployed without backup credentials (subscription only)
      ansible.builtin.debug:
        msg: >
          OADP operator installed but oadp_oss_access_key_id is empty — skipped the
          cloud-credentials Secret and DataProtectionApplication. Set
          oadp_oss_access_key_id / _secret (dedicated backup RAM user) and re-run
          08 to finish the backup wiring.
      when:
        - oadp_enabled | default(false) | bool
        - oadp_oss_access_key_id | default('') | length == 0

    - name: Phase 08 done
      ansible.builtin.debug:
        msg: |
          ✓ CAPI provider, CSI operator, CSI driver CR all applied
            (driven from operator → executed on jump host {{ ansible_host }}).

          {% if oadp_enabled | default(false) | bool %}✓ OADP operator applied{% if oadp_oss_access_key_id | default('') | length > 0 %} + cloud-credentials + DataProtectionApplication (OSS backup → {{ oadp_oss_bucket }}){% else %} (subscription only — set oadp_oss_access_key_id to finish){% endif %}
          {% endif %}
          Verify on the jump host:
            ssh root@{{ ansible_host }}
            oc --kubeconfig=/root/kubeconfig get pods -n capa-system
            oc --kubeconfig=/root/kubeconfig get pods -n alibaba-cloud-csi-operator-system
            oc --kubeconfig=/root/kubeconfig get alibabacloudcsidriver cluster -o yaml
            oc --kubeconfig=/root/kubeconfig get storageclass | grep alicloud
          {% if oadp_enabled | default(false) | bool %}  oc --kubeconfig=/root/kubeconfig get dataprotectionapplication -n openshift-adp
            oc --kubeconfig=/root/kubeconfig get pods -n openshift-adp
          {% endif %}
