---
# Phase 03 — Create the PERSISTENT mirror-stack via ROS.
#
# This is the new "split architecture" entrypoint (paired with the
# rewritten 06-create-cluster-stack.yml).  Together they replace the
# old monolithic 03-create-stack-LEGACY.yml + create-cluster.yaml.
#
# What this stack contains:
#   - VPC, subnets, NAT, EIP, SNAT entries
#   - Node RAM role + policy (shared by future cluster-stack nodes)
#   - Optional SSH jump host (testing only)
#   - Mirror-registry ECS + 200 GB data disk + dedicated SG
#
# This stack is created ONCE and survives cluster rebuilds.  Run
# 04-prepare-mirror.yml afterwards to install Quay + push images.

- name: Create mirror-stack
  hosts: local
  gather_facts: false
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml
    - ansible.builtin.include_tasks: ../tasks/path_defaults.yml
    - ansible.builtin.include_tasks: ../tasks/mirror_defaults.yml

    - name: Skip when mirror not enabled
      ansible.builtin.meta: end_play
      when: not (mirror_enabled | default(false) | bool)

    - name: Resolve mirror init password (auto-generate if blank)
      ansible.builtin.set_fact:
        _mirror_init_password_resolved: >-
          {{ mirror_init_password
             if (mirror_init_password | default('') | length > 0)
             else (lookup('password', '/dev/null length=20 chars=ascii_letters,digits')) }}
      no_log: true

    # ─── Snapshot fast-path restore (P3-FIX.9: vdb-only) ────────────────────────
    # All Quay persistent state now lives on the vdb data disk (image blobs,
    # config, AND — via the relocated podman graphroot — the container images +
    # the pg-storage catalog DB).  So a restore needs ONLY the data-disk
    # snapshot: the mirror ECS launches from the STOCK image (no CreateImage,
    # no system snapshot, no sysprep) and cloud-init mounts the restored vdb,
    # rewires storage.conf, and starts Quay from the stashed systemd units.
    #   - data disk: pass mirror_snapshot_data_id via MirrorDataDiskSnapshotId;
    #     ROS wires it into DiskMappings.SnapshotId natively.
    # No snapshot → fall through to the empty-disk + cloud-init bootstrap +
    # full Phase 04 import path.  See docs/mirror-vdb-persistence.md.
    # Force the slow path: -e mirror_restore_from_snapshot=false
    - name: Decide whether to take the snapshot-restore fast-path (state has data snapshot?)
      ansible.builtin.set_fact:
        _mirror_restore_from_snapshot: >-
          {{ (mirror_restore_from_snapshot | default(true) | bool)
             and (mirror_snapshot_data_id   | default('') | length > 0) }}

    # Defensive: a snapshot ID in state.yml does not guarantee the snapshot
    # is still in the cloud.  Examples:
    #   - 99-teardown -e delete_mirror_snapshots=true deleted the image,
    #     cascading to the system snapshot.
    #   - operator manually cleaned them up in the console.
    # In either case CreateImage --SnapshotId hits InvalidSnapshotId.NotFound
    # → 03 fails.  Run a defensive DescribeSnapshots to confirm both
    # snapshots are alive; otherwise downgrade to the fresh-path.
    - name: (fast-path) verify data snapshot still exists in cloud
      ansible.builtin.command:
        argv:
          - aliyun
          - ecs
          - DescribeSnapshots
          - --RegionId
          - "{{ region }}"
          - --SnapshotIds
          - '["{{ mirror_snapshot_data_id }}"]'
          - --profile
          - "{{ aliyun_profile }}"
      register: _snap_verify
      changed_when: false
      failed_when: false
      when: _mirror_restore_from_snapshot

    - name: (fast-path) downgrade to fresh-path when cloud snapshot is missing
      ansible.builtin.set_fact:
        _mirror_restore_from_snapshot: false
        _snapshot_missing_reason: >-
          Data snapshot {{ mirror_snapshot_data_id }} in state.yml is missing from
          the cloud.  Likely causes: cascade from 99 -e delete_mirror_snapshots=true,
          or manual cleanup in the console.  Falling back to fresh bring-up;
          the next 05 will recreate the snapshot.
      when:
        - _mirror_restore_from_snapshot
        - _snap_verify.rc == 0
        - ((_snap_verify.stdout | from_json).Snapshots.Snapshot | default([]) | length) < 1

    # P3-COST.5: pick mirror_instance_type based on whether this run will
    # actually run oc-mirror v2 d2m import (fresh path) or skip it
    # (snapshot-restore fast-path).  d2m peak heap ~12 GB → needs g7.xlarge
    # (16 GB).  Snapshot-restore peak ~2 GB (just Quay + podman) → g7.large
    # (8 GB) is plenty.  Saves ~¥194/mo when mirror ECS runs 24/7 on dev.
    #
    # Resolution order:
    #   1. mirror_instance_type (legacy single var) — explicit override wins
    #   2. mirror_instance_type_restore — picked when snapshot-restore active
    #   3. mirror_instance_type_fresh — picked when fresh prep is required
    #   4. ecs.g7.xlarge — final safety fallback
    - name: Resolve effective mirror_instance_type per mirror_flow
      ansible.builtin.set_fact:
        _effective_mirror_type: >-
          {{ mirror_instance_type
             if ((mirror_instance_type | default('') | length) > 0)
             else (mirror_instance_type_restore | default('ecs.g7.large'))
                  if _mirror_restore_from_snapshot
                  else (mirror_instance_type_fresh | default('ecs.g7.xlarge')) }}

    - name: Announce mirror instance type selection
      ansible.builtin.debug:
        msg: >-
          mirror_flow={{ 'snapshot-restore' if _mirror_restore_from_snapshot else 'fresh' }}
          → mirror_instance_type={{ _effective_mirror_type }}

    - name: Snapshot-path decision summary
      ansible.builtin.debug:
        msg: |
          {% if _mirror_restore_from_snapshot %}
          OK: data snapshot present — taking vdb-only fast-path to restore mirror ECS:
              data snapshot : {{ mirror_snapshot_data_id }}
            (ECS boots from the STOCK image; the restored vdb carries all Quay
             state — blobs, config, container images, and the pg catalog DB —
             so cloud-init rewires podman's graphroot to vdb and starts Quay
             from the stashed systemd units.  Phase 04's "already prepared"
             health gate then skips the whole download/install/import flow.)
          {% else %}
          → Taking fresh bring-up path{% if _snapshot_missing_reason is defined %} (auto-downgraded):
            {{ _snapshot_missing_reason }}{% else %} (no snapshot, or explicitly disabled){% endif %}.
            Phase 04 will execute the full download tarball + install Quay + oc-mirror import.
          {% endif %}

    # P3-FIX.9: the CreateImage-from-system-snapshot machinery is gone.  The
    # restore no longer needs a custom system image — vda is always the stock
    # image and 100% of Quay state rides the vdb data snapshot.  MirrorOverride-
    # ImageId is therefore always empty (ROS uses the auto-discovered RHEL image).

    - name: Read SSH public key
      ansible.builtin.slurp:
        src: "{{ ssh_pub_key_file }}"
      register: _ssh_pub_slurp

    - name: Read SSH private key (base64-encoded for cloud-init)
      ansible.builtin.slurp:
        src: "{{ ssh_priv_key_file }}"
      register: _ssh_priv_slurp

    - name: Build mirror-stack Parameters
      ansible.builtin.set_fact:
        _mirror_stack_params:
          - ParameterKey: ClusterName
            ParameterValue: "{{ cluster_name }}"
          - ParameterKey: Region
            ParameterValue: "{{ region }}"
          - ParameterKey: ZoneId
            ParameterValue: "{{ zone }}"
          - ParameterKey: ZoneId2
            ParameterValue: "{{ zone2 }}"
          # zone3 only for the Agent-based multi-AZ control plane; empty -> mirror
          # skips the 3rd VSwitch (Assisted / single-AZ).
          - ParameterKey: ZoneId3
            ParameterValue: "{{ zone3 | default('') if (installation_method | default('Assisted') | lower in ['agent', 'agent-based']) else '' }}"
          - ParameterKey: VpcCidr
            ParameterValue: "{{ vpc_cidr }}"
          - ParameterKey: PrivateSubnetCidr
            ParameterValue: "{{ private_subnet_cidr }}"
          - ParameterKey: PrivateSubnetCidr2
            ParameterValue: "{{ private_subnet_cidr2 }}"
          - ParameterKey: PrivateSubnetCidr3
            ParameterValue: "{{ private_subnet_cidr3 | default('10.0.48.0/20') }}"
          - ParameterKey: PublicSubnetCidr
            ParameterValue: "{{ public_subnet_cidr }}"
          - ParameterKey: RamRoleName
            ParameterValue: "{{ cluster_name }}-node-role"
          - ParameterKey: EnableJumpHost
            ParameterValue: "{{ enable_jump_host | default(false) | string | lower }}"
          - ParameterKey: JumpHostInstanceType
            ParameterValue: "{{ jump_host_type | default('ecs.t6-c1m1.large') }}"
          - ParameterKey: SshPublicKey
            ParameterValue: "{{ _ssh_pub_slurp.content | b64decode | trim }}"
          - ParameterKey: SshPrivateKey
            ParameterValue: "{{ _ssh_priv_slurp.content }}"
          - ParameterKey: MirrorPrivateIp
            ParameterValue: "{{ mirror_private_ip }}"
          - ParameterKey: MirrorInstanceType
            ParameterValue: "{{ _effective_mirror_type }}"
          - ParameterKey: MirrorDataDiskSize
            ParameterValue: "{{ mirror_data_disk_size | string }}"
          # P3-FIX.9: always empty — vda is always the stock auto-discovered
          # image; all restore state rides MirrorDataDiskSnapshotId (vdb).
          - ParameterKey: MirrorOverrideImageId
            ParameterValue: ""
          - ParameterKey: MirrorDataDiskSnapshotId
            ParameterValue: "{{ mirror_snapshot_data_id if _mirror_restore_from_snapshot else '' }}"

    - name: Create / adopt mirror-stack
      ansible.builtin.include_tasks: ../tasks/create_stack.yml
      vars:
        _cs_stack_name: "{{ cluster_name }}-mirror"
        _cs_template_path: "{{ repo_root }}/ros-templates/mirror-stack.yaml"
        _cs_parameters: "{{ _mirror_stack_params }}"
        _cs_state_key_id: "mirror_stack_id"
        _cs_timeout_minutes: 30
      no_log: true

    - name: Map mirror-stack outputs to facts
      ansible.builtin.set_fact:
        mirror_vpc_id:           "{{ (_cs_outputs | selectattr('OutputKey','equalto','VpcId')           | first).OutputValue }}"
        mirror_vpc_cidr:         "{{ (_cs_outputs | selectattr('OutputKey','equalto','VpcCidr')         | first).OutputValue }}"
        mirror_private_vsw_1:    "{{ (_cs_outputs | selectattr('OutputKey','equalto','PrivateVSwitchId')| first).OutputValue }}"
        mirror_private_vsw_2:    "{{ (_cs_outputs | selectattr('OutputKey','equalto','PrivateVSwitch2Id')|first).OutputValue }}"
        mirror_private_vsw_3:    "{{ (_cs_outputs | selectattr('OutputKey','equalto','PrivateVSwitch3Id')| list | first | default({})).OutputValue | default('') }}"
        mirror_public_vsw:       "{{ (_cs_outputs | selectattr('OutputKey','equalto','PublicVSwitchId') | first).OutputValue }}"
        mirror_zone_id:          "{{ (_cs_outputs | selectattr('OutputKey','equalto','ZoneId')          | first).OutputValue }}"
        mirror_zone_id2:         "{{ (_cs_outputs | selectattr('OutputKey','equalto','ZoneId2')         | first).OutputValue }}"
        mirror_zone_id3:         "{{ (_cs_outputs | selectattr('OutputKey','equalto','ZoneId3')         | list | first | default({})).OutputValue | default('') }}"
        mirror_node_ram_role:    "{{ (_cs_outputs | selectattr('OutputKey','equalto','NodeRamRoleName') | first).OutputValue }}"
        mirror_registry_ip:      "{{ (_cs_outputs | selectattr('OutputKey','equalto','MirrorRegistryIp')| first).OutputValue }}"
        mirror_registry_id:      "{{ (_cs_outputs | selectattr('OutputKey','equalto','MirrorRegistryInstanceId') | first).OutputValue }}"
        mirror_jump_host_ip:     "{{ (_cs_outputs | selectattr('OutputKey','equalto','JumpHostPublicIp')        | list | map(attribute='OutputValue') | first | default('')) }}"
        mirror_jump_host_sg_id:  "{{ (_cs_outputs | selectattr('OutputKey','equalto','JumpHostSecurityGroupId') | list | map(attribute='OutputValue') | first | default('')) }}"

    - name: Save mirror-stack facts to state
      ansible.builtin.include_tasks: ../tasks/save_state.yml
      vars:
        new_state:
          # The split architecture replaces the monolithic ros_stack_id
          # with two separately-tracked stacks.
          mirror_stack_id:        "{{ _cs_stack_id }}"
          mirror_vpc_id:          "{{ mirror_vpc_id }}"
          mirror_vpc_cidr:        "{{ mirror_vpc_cidr }}"
          mirror_private_vsw_1:   "{{ mirror_private_vsw_1 }}"
          mirror_private_vsw_2:   "{{ mirror_private_vsw_2 }}"
          mirror_private_vsw_3:   "{{ mirror_private_vsw_3 | default('') }}"
          mirror_public_vsw:      "{{ mirror_public_vsw }}"
          mirror_zone_id:         "{{ mirror_zone_id }}"
          mirror_zone_id2:        "{{ mirror_zone_id2 }}"
          mirror_zone_id3:        "{{ mirror_zone_id3 | default('') }}"
          mirror_node_ram_role:   "{{ mirror_node_ram_role }}"
          mirror_private_ip:      "{{ mirror_registry_ip }}"
          mirror_registry_id:     "{{ mirror_registry_id }}"
          jump_host_ip:           "{{ mirror_jump_host_ip }}"
          jump_host_sg_id:        "{{ mirror_jump_host_sg_id }}"
          mirror_init_password:   "{{ _mirror_init_password_resolved }}"
          mirror_init_user:       "{{ mirror_init_user | default('mirror-admin') }}"
      no_log: true

    - name: Phase 03 done
      ansible.builtin.debug:
        msg: |
          ✓ mirror-stack ready.

          VPC          : {{ mirror_vpc_id }}
          Mirror IP    : {{ mirror_registry_ip }}
          {% if mirror_jump_host_ip | length > 0 %}
          Jump host    : {{ mirror_jump_host_ip }}
          {% endif %}
          {% if _mirror_restore_from_snapshot %}
          Path         : restored from snapshot (fast-path)
                         04 will skip the import via the "already prepared" check.
          {% else %}
          Path         : fresh deployment (slow-path)
                         04 will run the full ~1-hour oc-mirror import.
          {% endif %}

          Next:
            ansible-playbook ansible/playbooks/04-prepare-mirror.yml
            ansible-playbook ansible/playbooks/06-create-cluster-stack.yml
            ansible-playbook ansible/playbooks/07-install-cluster.yml
