---
# Phase 00 — verify all prerequisites are in place before touching the cloud.
- name: Preflight checks
  hosts: local
  gather_facts: true
  tasks:
    - name: Verify required CLI tools are installed
      ansible.builtin.command: "{{ item }} --version"
      changed_when: false
      check_mode: false
      register: tool_check
      failed_when: tool_check.rc != 0
      loop:
        - aliyun
        - curl
        - jq

    - name: Verify required input files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      register: input_files
      loop:
        - "{{ pull_secret_file }}"
        - "{{ ssh_pub_key_file }}"
        - "{{ ssh_priv_key_file }}"
        - "{{ offline_token_file }}"
      failed_when: not input_files.results[0].stat.exists  # checked individually below

    - name: Assert each input file is present
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "Missing required file: {{ item.item }}"
      loop: "{{ input_files.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Verify offline token can mint an access token
      ansible.builtin.include_tasks: ../tasks/assisted_token.yml

    - name: Verify aliyun-cli profile + ECS read access
      ansible.builtin.command:
        argv:
          - aliyun
          - ecs
          - DescribeRegions
          - --RegionId
          - "{{ region }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: ali_check
      changed_when: false
      failed_when: ali_check.rc != 0

    - name: Verify aliyun-cli has VPC, SLB, RAM, ROS, PVTZ, OSS access
      ansible.builtin.command:
        argv: "{{ item }}"
      register: svc_check
      changed_when: false
      failed_when: svc_check.rc != 0
      loop:
        - [aliyun, vpc, DescribeVpcs,    --RegionId, "{{ region }}", --profile, "{{ aliyun_profile }}"]
        - [aliyun, slb, DescribeLoadBalancers, --RegionId, "{{ region }}", --profile, "{{ aliyun_profile }}"]
        - [aliyun, ram, ListRoles,       --profile, "{{ aliyun_profile }}"]
        - [aliyun, ros, DescribeRegions, --profile, "{{ aliyun_profile }}"]
        - [aliyun, pvtz, DescribeZones,  --profile, "{{ aliyun_profile }}"]
        - [aliyun, oss, ls,              --region, "{{ region }}", --profile, "{{ aliyun_profile }}"]
      loop_control:
        label: "{{ item[1] }} {{ item[2] }}"

    - name: Ensure output directory exists
      ansible.builtin.file:
        path: "{{ output_dir }}"
        state: directory
        mode: "0755"

    - name: Preflight passed
      ansible.builtin.debug:
        msg: |
          ✓ All preflight checks passed.
          Next: ansible-playbook playbooks/01-prepare-iso.yml
