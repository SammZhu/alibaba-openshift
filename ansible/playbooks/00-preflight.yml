---
# Phase 00 — verify all prerequisites are in place before touching the cloud.
- name: Preflight checks
  hosts: local
  gather_facts: true
  tasks:
    - name: Verify required CLI tools are installed
      ansible.builtin.command: "{{ item }} --version"
      changed_when: false
      check_mode: false
      register: tool_check
      failed_when: tool_check.rc != 0
      loop:
        - aliyun
        - curl
        - jq

    - name: Verify required input files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      register: input_files
      loop:
        - "{{ pull_secret_file }}"
        - "{{ ssh_pub_key_file }}"
        - "{{ ssh_priv_key_file }}"
        - "{{ offline_token_file }}"
      # No failed_when here — Ansible only exposes .results AFTER the loop.
      # The assert step below fails per-file with a clear message.

    - name: Assert each input file is present
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "Missing required file: {{ item.item }}"
      loop: "{{ input_files.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Verify offline token can mint an access token
      ansible.builtin.include_tasks: ../tasks/assisted_token.yml

    - name: Verify aliyun-cli profile + ECS read access
      ansible.builtin.command:
        argv:
          - aliyun
          - ecs
          - DescribeRegions
          - --RegionId
          - "{{ region }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: ali_check
      changed_when: false
      failed_when: ali_check.rc != 0

    - name: Verify aliyun-cli has VPC, SLB, RAM, ROS, PVTZ access
      ansible.builtin.command:
        argv: "{{ item }}"
      register: svc_check
      changed_when: false
      failed_when: svc_check.rc != 0
      loop:
        - [aliyun, vpc, DescribeVpcs,    --RegionId, "{{ region }}", --profile, "{{ aliyun_profile }}"]
        - [aliyun, slb, DescribeLoadBalancers, --RegionId, "{{ region }}", --profile, "{{ aliyun_profile }}"]
        - [aliyun, ram, ListRoles,       --profile, "{{ aliyun_profile }}"]
        - [aliyun, ros, DescribeRegions, --profile, "{{ aliyun_profile }}"]
        - [aliyun, pvtz, DescribeZones,  --profile, "{{ aliyun_profile }}"]
      loop_control:
        label: "{{ item[1] }} {{ item[2] }}"

    # ── ECS instance-type stock check (avoid wasting Phase 03 time on stockouts) ──
    # ROS CreateStack returns ResourceNoStock at the end of its provisioning
    # attempt — i.e. after the stack is half-built — so the cleanup is annoying.
    # Querying DescribeAvailableResource up front catches the problem in 5 sec
    # and recommends alternatives.
    - name: Compute the (zone, instance_type) combinations needed
      ansible.builtin.set_fact:
        _stock_checks: >-
          {{ [
            {'zone': zone,  'type': control_plane_type, 'role': 'control plane (master-1, master-2)'},
            {'zone': zone2, 'type': control_plane_type, 'role': 'control plane (master-3)'}
          ] + (
            [{'zone': zone,  'type': compute_type,         'role': 'compute (workers)'}]
              if (compute_count | int) > 0 else []
          ) + (
            [{'zone': zone,  'type': jump_host_type,       'role': 'jump host'}]
              if (enable_jump_host | default(false) | bool) else []
          ) + (
            [{'zone': zone,  'type': mirror_instance_type, 'role': 'mirror registry'}]
              if (mirror_enabled | default(false) | bool) else []
          ) }}

    - name: Probe each (zone, instance_type) for stock
      ansible.builtin.command:
        argv:
          - aliyun
          - ecs
          - DescribeAvailableResource
          - --RegionId
          - "{{ region }}"
          - --DestinationResource
          - InstanceType
          - --InstanceType
          - "{{ item.type }}"
          - --ZoneId
          - "{{ item.zone }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: _stock_results
      changed_when: false
      loop: "{{ _stock_checks }}"
      loop_control:
        label: "{{ item.zone }} / {{ item.type }} ({{ item.role }})"

    - name: Identify out-of-stock combinations
      ansible.builtin.set_fact:
        _stock_failures: >-
          {{ _stock_results.results
             | selectattr('stdout','defined')
             | rejectattr('stdout','search','\"Status\":\\s*\"Available\"')
             | map(attribute='item') | list }}

    - name: Fail with actionable stockout report
      ansible.builtin.fail:
        msg: |
          ECS stockout in {{ region }}.  ROS CreateStack would fail at the
          end of Phase 03 (ResourceNoStock) — fix BEFORE running 03.

          Out-of-stock:
          {% for f in _stock_failures %}
            ✗ {{ f.zone }} / {{ f.type }} ({{ f.role }})
          {% endfor %}

          To find an in-stock alternative quickly:

            for T in c7 c7e c6e c6 g7 g7a r7; do
              for Z in a b c; do
                S=$(aliyun ecs DescribeAvailableResource --RegionId {{ region }} \
                  --DestinationResource InstanceType --InstanceType ecs.${T}.2xlarge \
                  --ZoneId {{ region }}-${Z} --profile {{ aliyun_profile }} 2>/dev/null \
                  | jq -r '.AvailableZones.AvailableZone[]?.AvailableResources.AvailableResource[]?.SupportedResources.SupportedResource[]?.Status' | head -1)
                [ "$S" = "Available" ] && echo "✓ ecs.${T}.2xlarge zone-${Z}"
              done
            done

          Then edit group_vars/all.yml — change control_plane_type / zone(s)
          to a row that shows ✓.  Same-tier swaps (c7 → c6e) keep the same
          vCPU / RAM ratio; cross-tier (c7 → g7) doubles RAM.
      when: _stock_failures | length > 0

    - name: Stock check passed
      ansible.builtin.debug:
        msg: |
          ✓ ECS stock available for all {{ _stock_checks | length }} (zone, type) combinations.

    # OSS uses ossutil under the hood, which does NOT support --profile.
    # Read AK/SK directly from ~/.aliyun/config.json for the named profile.
    - name: Read AK/SK from aliyun config for OSS check
      ansible.builtin.shell: |
        jq -r '.profiles[] | select(.name=="{{ aliyun_profile }}") | .access_key_id + " " + .access_key_secret' \
          ~/.aliyun/config.json
      register: _oss_creds
      changed_when: false
      check_mode: false

    - name: Assert aliyun profile credentials found
      ansible.builtin.assert:
        that: _oss_creds.stdout | length > 0
        fail_msg: "Could not read AK/SK for profile '{{ aliyun_profile }}' from ~/.aliyun/config.json"

    # ossutil requires --flag=value form; space-separated (-i VALUE) is not supported.
    - name: Verify OSS access (ossutil does not support --profile; use --access-key-id= form)
      ansible.builtin.command:
        argv:
          - aliyun
          - oss
          - ls
          - "--endpoint=oss-{{ region }}.aliyuncs.com"
          - "--access-key-id={{ _oss_creds.stdout.split(' ')[0] }}"
          - "--access-key-secret={{ _oss_creds.stdout.split(' ')[1] }}"
      register: oss_check
      changed_when: false
      failed_when: oss_check.rc != 0
      no_log: true  # Don't print credentials to Ansible output

    - name: Ensure output directory exists
      ansible.builtin.file:
        path: "{{ output_dir }}"
        state: directory
        mode: "0755"

    - name: Preflight passed
      ansible.builtin.debug:
        msg: |
          ✓ All preflight checks passed.
          Next: ansible-playbook playbooks/01-prepare-iso.yml
