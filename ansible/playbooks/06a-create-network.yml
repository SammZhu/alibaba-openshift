---
# Phase 06a (Agent-based) — cluster network + ENI pre-create + MAC harvest.
#
# ⚠ SPIKE-GATED (plan §4 + §7).  The mechanism here depends on whether Alibaba
# ROS/ECS supports pre-creating an ENI (ALIYUN::ECS::NetworkInterface) with a
# fixed PrivateIpAddress and attaching it as an instance's PRIMARY NIC:
#   - Option C (preferred): pre-create ENIs here, harvest MAC now, 06b attaches
#     them as primary NICs when booting the agent image.
#   - Option B (fallback): create instances (stopped / placeholder image) here,
#     harvest the auto-assigned primary-ENI MAC, then 06b ReplaceSystemDisk to
#     the agent image and boots.
# Resolve via the spike before implementing the ROS stack-create below.
#
# CONTRACT — this play MUST end with these facts set (consumed by 01-agent /
# tasks/iso_agent.yml) and persisted to state:
#   _agent_hosts:        list of { hostname, role, mac, ip } for every node
#                        (e.g. master-1 = RendezvousIp, master-2 = Master2Ip, …)
#   _node_gateway:       default gateway of the master subnet (PrivateSubnetCidr2)
#   _node_prefix_length: prefix length of that subnet (e.g. 20)
#   dynamic_manifest_file: written with the alibaba-ccm-config.yaml ConfigMap
#                          (from the network/cluster-stack DynamicCustomManifest
#                          output — region/vpcid/vswitchid/zoneid are known once
#                          the network exists)
#
# Also reused downstream: the ENI ids (for 06b attach) and the cluster-stack id.
- name: Create cluster network + pre-create ENIs + harvest MACs (Agent-based)
  hosts: local
  gather_facts: false
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml
    - ansible.builtin.include_tasks: ../tasks/path_defaults.yml
    - ansible.builtin.include_tasks: ../tasks/mirror_defaults.yml

    - name: Assert installation_method is agent
      ansible.builtin.assert:
        that: installation_method | default('assisted') | lower in ['agent', 'agent-based']
        fail_msg: "06a-create-network.yml is Agent-based only (use 06-create-cluster-stack.yml for Assisted)."

    # TODO(spike): create the network/ENI ROS stack, DescribeNetworkInterfaces to
    # harvest MACs, build _agent_hosts, resolve _node_gateway/_node_prefix_length,
    # and write dynamic_manifest_file.  Until then, fail fast with the contract.
    - name: 06a not yet implemented — pending Option C/B spike
      ansible.builtin.fail:
        msg: >-
          06a (ABI network + MAC harvest) is not implemented yet — it is gated on
          the Alibaba pre-created-primary-ENI spike (plan §4/§7).  See the contract
          in this file's header for the facts it must produce.  For an env-free
          ISO render test, run tasks/iso_agent.yml directly with _agent_hosts /
          _node_gateway / _node_prefix_length / dynamic_manifest_file as extra-vars.
