---
# Phase 07 — wait for hosts, assign roles, upload manifests, install, kubeconfig.
#            (Runs against the cluster-stack created by Phase 06.)
- name: Install OpenShift via Assisted Installer
  hosts: local
  gather_facts: false
  vars:
    # Topology-effective sizing: for cluster_topology=sno the AI installer +
    # ROS template pin (1 master, 0 compute) — must mirror that here, else
    # the "wait for N hosts to discover" + master-IP sanity assert will hang
    # waiting for hosts that will never exist.  ha → use group_vars as-is.
    _effective_control_plane_count: "{{ 1 if (cluster_topology | default('ha')) == 'sno' else (control_plane_count | int) }}"
    _effective_compute_count: "{{ 0 if (cluster_topology | default('ha')) == 'sno' else (compute_count | int) }}"
    expected_hosts: "{{ (_effective_control_plane_count | int) + (_effective_compute_count | int) }}"
    # Rendered Jinja templates land here.  Path is deterministic from
    # output_dir so the manifests_to_upload list can reference it without
    # needing to be re-evaluated after the template task runs.
    rendered_manifest_dir: "{{ output_dir }}/rendered"
    manifests_to_upload:
      - folder: manifests
        name: 00-ovn-mtu.yaml
        src: "{{ repo_root }}/custom_manifests/00-ovn-mtu.yaml"
      - folder: manifests
        name: 01-alibaba-ccm.yaml
        # Templated source — see "Render Jinja manifests" task below.
        # Jinja vars: cluster_name, base_domain (from group_vars/all.yml).
        src: "{{ rendered_manifest_dir }}/01-alibaba-ccm.yaml"
      - folder: manifests
        name: alibaba-ccm-config.yaml
        src: "{{ dynamic_manifest_file }}"
      - folder: openshift
        name: 03-machineconfig-providerid-master.yaml
        src: "{{ repo_root }}/custom_manifests/03-machineconfig-providerid-master.yaml"
      - folder: openshift
        name: 03-machineconfig-providerid-worker.yaml
        src: "{{ repo_root }}/custom_manifests/03-machineconfig-providerid-worker.yaml"
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml
    - ansible.builtin.include_tasks: ../tasks/path_defaults.yml
    - ansible.builtin.include_tasks: ../tasks/mirror_defaults.yml
    - ansible.builtin.include_tasks: ../tasks/assisted_token.yml

    - ansible.builtin.assert:
        that:
          - cluster_id is defined
          - infra_env_id is defined
          - dynamic_manifest_file is defined
        fail_msg: "Run Phases 01-03 first"

    # ── Render Jinja manifests (per-cluster substitution) ────────────────
    # The CCM Deployment hardcodes KUBERNETES_SERVICE_HOST to bypass the
    # OVN/ClusterIP chicken-and-egg during install (see manifest comment).
    # That URL must point to THIS cluster's api-int FQDN — so the manifest
    # is shipped as a .j2 template and rendered here using cluster_name +
    # base_domain from group_vars/all.yml.  Doing it early (before any AI
    # API calls) so a bad template fails fast.
    - name: Ensure rendered manifest dir exists
      ansible.builtin.file:
        path: "{{ rendered_manifest_dir }}"
        state: directory
        mode: '0755'

    - name: Render Jinja manifests (01-alibaba-ccm.yaml)
      ansible.builtin.template:
        src: "{{ repo_root }}/custom_manifests/01-alibaba-ccm.yaml.j2"
        dest: "{{ rendered_manifest_dir }}/01-alibaba-ccm.yaml"
        mode: '0644'
      # The template uses {{ cluster_name }} and {{ base_domain }} from
      # group_vars/all.yml — those are play-scope, no explicit `vars:`
      # binding needed here (`cluster_name: "{{ cluster_name }}"` would
      # be a self-reference → Ansible raises
      # "recursive loop detected in template string").
      # If group_vars renames either field, the Assert task immediately
      # below catches it (grep for {{ braces / FQDN shape / empty value).

    - name: Assert rendered CCM has no template residue and FQDN matches cluster
      ansible.builtin.shell: |
        set -euo pipefail
        F={{ rendered_manifest_dir }}/01-alibaba-ccm.yaml
        EXPECTED='api-int.{{ cluster_name }}.{{ base_domain }}'

        # Catch literal Jinja that failed to render (undefined vars in some
        # strict modes leave braces behind).
        if grep -qE '\{\{|\}\}' "$F"; then
          echo "FAIL: unrendered Jinja braces remain in $F"
          grep -nE '\{\{|\}\}' "$F"
          exit 1
        fi

        # Positive assertion: KUBERNETES_SERVICE_HOST must equal exactly
        # api-int.<cluster_name>.<base_domain>.  Covers (a) empty vars
        # rendering to "api-int.." (b) stale hardcode regression
        # (c) any other oddity where the template silently produces a
        # value that does not match the live cluster.
        if ! grep -qF "value: $EXPECTED" "$F"; then
          echo "FAIL: rendered KUBERNETES_SERVICE_HOST does not match $EXPECTED"
          echo "--- live lines from $F ---"
          grep -nE 'KUBERNETES_SERVICE_HOST|api-int' "$F" || true
          exit 1
        fi

        echo "OK: rendered CCM manifest passes sanity checks (FQDN = $EXPECTED)"
      changed_when: false

    # ── Auto-reset: cancel → reset → reboot nodes ────────────────────────
    # Re-running Phase 04 against the same ROS stack is fully supported.
    # If the cluster is in any post-install-trigger state the playbook:
    #   1. Cancels the in-progress / failed installation (AI side)
    #   2. Resets the cluster back to pre-install state (AI side)
    #   3. Reboots all cluster ECS nodes (not jump host) so they re-enter
    #      the discovery agent and re-register with the AI infra-env.
    # The existing host-poll loop then waits for them to come back as 'known'.
    - name: Get current cluster status
      ansible.builtin.uri:
        url: "{{ assisted_api }}/clusters/{{ cluster_id }}"
        headers: { Authorization: "Bearer {{ ai_access_token }}" }
        return_content: true
      register: cluster_pre

    # Do NOT reset a cluster that is currently mid-install or already done.
    # Step 1: gather both cluster state AND host states BEFORE making any
    # reset/reboot decisions.  Previously cluster status was read once,
    # decision frozen, then we'd reboot hosts → AI detects unexpected
    # restart → cluster transitions to 'error' AFTER our decision frame.
    # Result: we replaced disks without first cancel+reset'ing the cluster,
    # so AI kept host records in stale error/installing states even after
    # the new agents registered → 07 deadlocked in 'Poll for hosts to
    # discover' until the operator manually ran cancel+reset via curl.
    - name: Check host statuses
      ansible.builtin.uri:
        url: "{{ assisted_api }}/infra-envs/{{ infra_env_id }}/hosts"
        headers: { Authorization: "Bearer {{ ai_access_token }}" }
        return_content: true
      register: hosts_after_reset

    - name: Determine whether nodes need a reboot (based on host states)
      ansible.builtin.set_fact:
        nodes_need_reboot: >-
          {{ (hosts_after_reset.json
              | selectattr('status', 'in', [
                  'installing', 'installing-in-progress', 'resetting',
                  'installing-pending-user-action',
                  'resetting-pending-user-action', 'error'
                ])
              | list | length) > 0 }}

    # Step 2: needs_reset triggers when EITHER the cluster is in a
    # cancel+reset-required state OR we're about to reboot nodes (because
    # rebooting without a reset leaves AI thinking they unexpectedly died
    # and stuck in 'error' state with no recovery path).
    #
    # Cluster states that demand reset:
    #   error                            — bootkube / etcd / etc. failed
    #   cancelled                        — operator cancelled previously
    #   installing-pending-user-action   — install paused, waiting for input
    # ('installing', 'finalizing', 'installed' were here by mistake — a
    # transient ansible crash + re-run would otherwise cancel a healthy
    # install or wipe an already-installed cluster.  If you genuinely want
    # to rebuild, run 99-teardown first.)
    - name: Set needs_reset flag
      ansible.builtin.set_fact:
        needs_reset: >-
          {{ cluster_pre.json.status in [
               'error', 'cancelled', 'installing-pending-user-action'
             ]
             or nodes_need_reboot | bool }}

    - name: Cancel installation (AI)
      ansible.builtin.uri:
        url: "{{ assisted_api }}/clusters/{{ cluster_id }}/actions/cancel"
        method: POST
        headers: { Authorization: "Bearer {{ ai_access_token }}" }
        status_code: [202, 409]
      when: needs_reset | bool

    - name: Reset cluster to pre-install state (AI)
      ansible.builtin.uri:
        url: "{{ assisted_api }}/clusters/{{ cluster_id }}/actions/reset"
        method: POST
        headers: { Authorization: "Bearer {{ ai_access_token }}" }
        status_code: [202, 409]
      when: needs_reset | bool

    - name: List all ECS instances in cluster VPC
      # Split-architecture: VPC is owned by mirror-stack; state stores it as
      # mirror_vpc_id (the LEGACY monolithic name `vpc_id` is gone after the split).
      ansible.builtin.command:
        argv:
          - aliyun
          - ecs
          - DescribeInstances
          - --RegionId
          - "{{ region }}"
          - --VpcId
          - "{{ mirror_vpc_id }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: vpc_instances_raw
      changed_when: false
      when: nodes_need_reboot | bool

    # Build a per-instance recovery plan.  Two methods, depending on whether
    # the node already underwent assisted-installer's graceful reboot stage:
    #
    #   RebootForce  — vda still has the discovery ISO content
    #                  (node hung BEFORE assisted-installer's Rebooting stage,
    #                   so clone-vdb-to-vda.service ExecStop never fired).
    #                  A power-cycle + boot from same vda comes back to the
    #                   discovery ISO, agent re-registers cleanly.
    #
    #   ReplaceSystemDisk — vda was OVERWRITTEN by clone-vdb-to-vda during
    #                  the Rebooting stage.  Now vda contains the half-installed
    #                  RHCOS layout; a plain reboot just lands on that broken
    #                  install (no agent, no discovery, no recovery path).
    #                  Must re-image vda from the Phase 02 discovery ECS image
    #                  to get back to a fresh discovery ISO state.
    #
    # Decision boundary: AI host.progress.current_stage at the time of the
    # last error.  Stages 'Rebooting' or later imply clone-vdb-to-vda has run.
    - name: Build IP→AI-stage map for affected hosts
      ansible.builtin.set_fact:
        _host_stage_by_ip: |
          {%- set out = {} -%}
          {%- for h in hosts_after_reset.json -%}
            {%- if h.inventory|default('')|length > 0 -%}
              {%- set inv = h.inventory | from_json -%}
              {%- set ip_cidr = inv.interfaces | map(attribute='ipv4_addresses') | flatten | first | default('') -%}
              {%- set ip = ip_cidr.split('/')[0] -%}
              {%- set stage = h.progress.current_stage | default('') -%}
              {%- if ip -%}{%- set _ = out.update({ip: stage}) -%}{%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {{ out }}
      when: nodes_need_reboot | bool

    - name: Build per-instance reboot plan (RebootForce vs ReplaceSystemDisk)
      # Exclude infra ECS that are NOT cluster nodes:
      #   - jumphost (mirror-stack)
      #   - mirror-registry (mirror-stack)
      # Only cluster-stack masters and workers should be rebooted.  cluster
      # nodes' InstanceName follows ${ClusterName}-master-N / -worker-N.
      ansible.builtin.set_fact:
        _reboot_plan: |
          {%- set plan = [] -%}
          {%- set advanced = ['Rebooting', 'Waiting for ignition', 'Configuring',
                              'Joined', 'Waiting for control plane',
                              'Waiting for bootkube', 'Waiting for controller',
                              'Done'] -%}
          {%- for ecs in (vpc_instances_raw.stdout | from_json).Instances.Instance -%}
            {%- if ecs.InstanceName is search('-(master|worker|compute)-?\\d*$') -%}
              {%- set ip = ecs.VpcAttributes.PrivateIpAddress.IpAddress[0] -%}
              {%- set stage = _host_stage_by_ip[ip] | default('') -%}
              {%- set method = 'ReplaceSystemDisk' if stage in advanced else 'RebootForce' -%}
              {%- set _ = plan.append({
                    'id': ecs.InstanceId, 'name': ecs.InstanceName,
                    'ip': ip, 'stage': stage, 'method': method
                  }) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ plan }}
      when: nodes_need_reboot | bool

    - name: Show reboot plan
      ansible.builtin.debug:
        msg: |
          Recovery plan ({{ _reboot_plan | length }} hosts):
          {% for h in _reboot_plan %}
            {{ h.name }} ({{ h.ip }}) stage="{{ h.stage }}" → {{ h.method }}
          {% endfor %}
      when: nodes_need_reboot | bool

    - name: Sanity — ecs_image_id required when any host needs ReplaceSystemDisk
      ansible.builtin.assert:
        that:
          - ecs_image_id is defined
          - ecs_image_id | length > 0
        fail_msg: |
          At least one host needs ReplaceSystemDisk (vda was overwritten by
          clone-vdb-to-vda during a prior install attempt) but ecs_image_id
          is not set in state.yml.  Re-run Phase 02 to (re)build the
          discovery ECS image first.
      when:
        - nodes_need_reboot | bool
        - (_reboot_plan | default([]) | selectattr('method', 'equalto', 'ReplaceSystemDisk') | list | length) > 0

    # ReplaceSystemDisk requires the ECS to be Stopped first (Aliyun API
    # rejects with IncorrectInstanceStatus otherwise).  Sequence per host:
    #   1. StopInstance --ForceStop=true   (sync; returns immediately)
    #   2. Poll until Status == Stopped     (typ. 30-60 s)
    #   3. ReplaceSystemDisk                (Aliyun auto-starts after replace)
    - name: Stop hosts that need ReplaceSystemDisk (force)
      ansible.builtin.command:
        argv:
          - aliyun
          - ecs
          - StopInstance
          - --RegionId
          - "{{ region }}"
          - --InstanceId
          - "{{ item.id }}"
          - --ForceStop
          - "true"
          - --profile
          - "{{ aliyun_profile }}"
      loop: "{{ _reboot_plan | default([]) | selectattr('method', 'equalto', 'ReplaceSystemDisk') | list }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - nodes_need_reboot | bool
        - (_reboot_plan | default([]) | selectattr('method', 'equalto', 'ReplaceSystemDisk') | list | length) > 0

    - name: Wait for those hosts to reach Stopped (up to 5 min)
      ansible.builtin.command:
        argv:
          - aliyun
          - ecs
          - DescribeInstances
          - --RegionId
          - "{{ region }}"
          - --InstanceIds
          - '["{{ item.id }}"]'
          - --profile
          - "{{ aliyun_profile }}"
      register: _stop_poll
      retries: 30
      delay: 10
      until: (_stop_poll.stdout | from_json).Instances.Instance[0].Status == 'Stopped'
      changed_when: false
      loop: "{{ _reboot_plan | default([]) | selectattr('method', 'equalto', 'ReplaceSystemDisk') | list }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - nodes_need_reboot | bool
        - (_reboot_plan | default([]) | selectattr('method', 'equalto', 'ReplaceSystemDisk') | list | length) > 0

    - name: ReplaceSystemDisk for hosts past Rebooting stage (vda overwritten by clone)
      # Verified empirically: Aliyun does NOT auto-start after ReplaceSystemDisk
      # (some docs claim it does — they're wrong, or describe a different code
      # path).  Instance stays Stopped → explicit StartInstance below.
      ansible.builtin.command:
        argv:
          - aliyun
          - ecs
          - ReplaceSystemDisk
          - --RegionId
          - "{{ region }}"
          - --InstanceId
          - "{{ item.id }}"
          - --ImageId
          - "{{ ecs_image_id }}"
          - --profile
          - "{{ aliyun_profile }}"
      loop: "{{ _reboot_plan | default([]) | selectattr('method', 'equalto', 'ReplaceSystemDisk') | list }}"
      loop_control:
        label: "{{ item.name }} (stage={{ item.stage }})"
      when:
        - nodes_need_reboot | bool
        - ecs_image_id is defined
        - ecs_image_id | length > 0

    - name: StartInstance for replaced hosts (Aliyun doesn't auto-start)
      ansible.builtin.command:
        argv:
          - aliyun
          - ecs
          - StartInstance
          - --RegionId
          - "{{ region }}"
          - --InstanceId
          - "{{ item.id }}"
          - --profile
          - "{{ aliyun_profile }}"
      loop: "{{ _reboot_plan | default([]) | selectattr('method', 'equalto', 'ReplaceSystemDisk') | list }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - nodes_need_reboot | bool
        - (_reboot_plan | default([]) | selectattr('method', 'equalto', 'ReplaceSystemDisk') | list | length) > 0

    - name: Force-reboot for hosts still on discovery ISO (vda intact)
      # --ForceStop=true = power-off + power-on (hard reset).  Required when
      # nodes are hung in a pre-install state (agent.service waiting for AI
      # commands that won't come because cluster is in error).  Default
      # graceful reboot sends ACPI which a hung user-space ignores → API
      # returns ok without actually rebooting.
      ansible.builtin.command:
        argv:
          - aliyun
          - ecs
          - RebootInstance
          - --RegionId
          - "{{ region }}"
          - --InstanceId
          - "{{ item.id }}"
          - --ForceStop
          - "true"
          - --profile
          - "{{ aliyun_profile }}"
      loop: "{{ _reboot_plan | default([]) | selectattr('method', 'equalto', 'RebootForce') | list }}"
      loop_control:
        label: "{{ item.name }} (stage={{ item.stage }})"
      when: nodes_need_reboot | bool

    - name: Wait 60 s for nodes to start rebooting before polling
      ansible.builtin.pause:
        seconds: 60
      when: nodes_need_reboot | bool

    # ── Wait for hosts to register ─────────────────────────────────────────
    # ── Pre-install flow — install-from-scratch only ────────────────────────
    # Skip the entire block (poll-for-known + host PATCHes + manifest upload
    # + ready poll + mirror-CA inject + trigger-install) when cluster is
    # already `installed`.  Without this gate, re-running 07 against an
    # installed cluster hangs in "Poll for hosts to discover" for 30 min
    # (hosts moved past `known`), then fails — and even if it didn't, the
    # hostname/disk/role PATCHes would 400 against installed hosts and
    # "Poll until ready-to-install" would wait forever for a state that
    # never returns.  The block's `when:` makes the play idempotent:
    # subsequent re-runs jump straight to Phase A (immediate exit) →
    # kubeconfig download → DNS rewrite via jumphost.
    # Observed 2026-05-31 P0-3 stage 3 rerun.
    - name: Pre-install flow — install-from-scratch only
      when: cluster_pre.json.status | default('') != 'installed'
      block:
        - name: Poll for {{ expected_hosts }} hosts to discover
          ansible.builtin.uri:
            url: "{{ assisted_api }}/infra-envs/{{ infra_env_id }}/hosts"
            headers: { Authorization: "Bearer {{ ai_access_token }}" }
            return_content: true
          register: hosts_resp
          retries: 90
          delay: 20
          until: >-
            (hosts_resp.json | selectattr('status', 'in', ['known', 'known-unbound', 'insufficient']) | list | length)
            >= (expected_hosts | int)

        # ── Refresh token (poll may have taken >15min) ────────────────────────
        - ansible.builtin.include_tasks: ../tasks/assisted_token.yml

        # ── Build per-host facts table (IP-driven, filters stale hosts) ──────
        # Past bug: looping over all hosts_resp.json and assigning master to
        # "first N by API response order" was fragile — stale historical hosts
        # in the infra-env got picked up first, leaving the actual master ECS
        # hosts as workers (or unbound), and hostname PATCHes landed on the
        # wrong hosts.  Fix: filter to hosts currently bound to THIS cluster
        # with non-empty inventory, then key everything off the host's actual
        # IP — masters are exactly those matching state.yml's master_ipN.
        - name: Build per-host facts (id, ip, role, hostname, install disk)
          ansible.builtin.set_fact:
            cluster_hosts: |
              {%- set out = [] -%}
              {%- set master_ips = [master_ip1|default(''), master_ip2|default(''), master_ip3|default('')] -%}
              {%- for h in hosts_resp.json -%}
                {%- if h.cluster_id|default('') == cluster_id and h.inventory|default('')|length > 0 -%}
                  {%- set inv = h.inventory | from_json -%}
                  {%- set ip_cidr = inv.interfaces | map(attribute='ipv4_addresses') | flatten | first | default('') -%}
                  {%- set ip = ip_cidr.split('/')[0] -%}
                  {#- /dev/vdb in the host's disk inventory.  AI's
                      disks_selected_config wants the disk *id* (typically a
                      /dev/disk/by-path/... path), not the device name. -#}
                  {%- set vdb = (inv.disks | default([]) | selectattr('name','equalto','vdb') | list | first) | default({}) -%}
                  {%- set master_idx = master_ips.index(ip) + 1 if ip in master_ips else 0 -%}
                  {%- set _ = out.append({
                      'id': h.id,
                      'ip': ip,
                      'is_master': (master_idx > 0),
                      'role': ('master' if master_idx > 0 else 'worker'),
                      'hostname': (cluster_name + '-master-' + (master_idx|string) + '.' + cluster_name + '.' + base_domain) if master_idx > 0 else '',
                      'install_disk_id': vdb.id | default('')
                  }) -%}
                {%- endif -%}
              {%- endfor -%}
              {{ out }}

        - name: Show host plan
          ansible.builtin.debug:
            msg: |
              Host plan for cluster {{ cluster_id }}:
              {% for h in cluster_hosts %}
                {{ h.ip }}  →  role={{ h.role }}  hostname={{ h.hostname or '(default)' }}  install_disk={{ h.install_disk_id or '(default vda)' }}
              {% endfor %}

        - name: Sanity — exactly {{ _effective_control_plane_count }} masters identified by IP
          ansible.builtin.assert:
            that:
              - cluster_hosts | selectattr('is_master', 'equalto', true) | list | length == (_effective_control_plane_count | int)
            fail_msg: |
              Expected {{ _effective_control_plane_count }} master IP matches but found
              {{ cluster_hosts | selectattr('is_master', 'equalto', true) | list | length }}.
              state.yml master_ip{1,2,3} = {{ [master_ip1|default(''), master_ip2|default(''), master_ip3|default('')] }}
              Current host IPs            = {{ cluster_hosts | map(attribute='ip') | list }}
              Likely a ROS / state drift — check state.yml or re-run Phase 03.

        # ── Set hostname for each master via AI API ──────────────────────────
        # Workers stay with AI's default hostname (MAC-derived) — they get
        # renamed by the kubelet bootstrap based on the providerID anyway.
        - name: PATCH hostname for masters
          ansible.builtin.uri:
            url: "{{ assisted_api }}/infra-envs/{{ infra_env_id }}/hosts/{{ item.id }}"
            method: PATCH
            headers:
              Authorization: "Bearer {{ ai_access_token }}"
              Content-Type: application/json
            body: "{{ {'host_name': item.hostname} | to_json }}"
            body_format: raw
            status_code: [200, 201]
          loop: "{{ cluster_hosts | selectattr('is_master', 'equalto', true) | list }}"
          loop_control: { label: "{{ item.ip }} → {{ item.hostname }}" }

        # ── Pin coreos-installer to /dev/vdb (Alibaba ECS install workaround) ──
        # /dev/vda holds the Discovery ISO and can't be written (busy
        # partitions).  ansible/files/clone-vdb-to-vda.{sh,service} (injected
        # via 01-prepare-iso ignition_config_override) clones vdb → vda just
        # before the post-install reboot, so ECS boots from the vda clone.
        - name: PATCH installation disk to /dev/vdb for every host
          ansible.builtin.uri:
            url: "{{ assisted_api }}/infra-envs/{{ infra_env_id }}/hosts/{{ item.id }}"
            method: PATCH
            headers:
              Authorization: "Bearer {{ ai_access_token }}"
              Content-Type: application/json
            body: "{{ {'disks_selected_config': [{'id': item.install_disk_id, 'role': 'install'}]} | to_json }}"
            body_format: raw
            status_code: [200, 201]
          loop: "{{ cluster_hosts | selectattr('install_disk_id', 'ne', '') | list }}"
          loop_control: { label: "{{ item.ip }} → install on {{ item.install_disk_id }}" }

        # ── Assign roles (IP-driven, not order-driven) ────────────────────────
        - name: PATCH host roles
          ansible.builtin.uri:
            url: "{{ assisted_api }}/infra-envs/{{ infra_env_id }}/hosts/{{ item.id }}"
            method: PATCH
            headers:
              Authorization: "Bearer {{ ai_access_token }}"
              Content-Type: application/json
            body: "{{ {'host_role': item.role} | to_json }}"
            body_format: raw
            status_code: [200, 201]
          loop: "{{ cluster_hosts }}"
          loop_control: { label: "{{ item.ip }} → {{ item.role }}" }

        # ── Upload custom manifests ───────────────────────────────────────────
        # Root cause: AI backend DELETE removes the logical record but NOT the
        # physical file on disk.  Each POST creates a new physical file with an
        # incrementing suffix (-00, -01, …).  When ignition-configs is generated
        # it finds multiple physical files for the same MachineConfig → fatal.
        #
        # Fix: use PATCH (update-in-place) when a manifest already exists, and
        # POST only when it is truly new.  PATCH rewrites the existing physical
        # file instead of creating a new one, so no duplicates ever accumulate.
        - name: List existing custom manifests
          ansible.builtin.uri:
            url: "{{ assisted_api }}/clusters/{{ cluster_id }}/manifests"
            headers: { Authorization: "Bearer {{ ai_access_token }}" }
            return_content: true
          register: existing_manifests

        - name: Slurp each manifest
          ansible.builtin.slurp:
            src: "{{ item.src }}"
          register: manifest_slurps
          loop: "{{ manifests_to_upload }}"
          loop_control: { label: "{{ item.folder }}/{{ item.name }}" }

        - name: PATCH existing manifests (update in-place, avoids new physical file)
          ansible.builtin.uri:
            url: "{{ assisted_api }}/clusters/{{ cluster_id }}/manifests"
            method: PATCH
            headers:
              Authorization: "Bearer {{ ai_access_token }}"
              Content-Type: application/json
            # PATCH uses updated_content / updated_folder / updated_file_name (not 'content')
            body: >-
              {{ {
                   'folder':           item.item.folder,
                   'file_name':        item.item.name,
                   'updated_content':  item.content,
                   'updated_folder':   item.item.folder,
                   'updated_file_name': item.item.name
                 } | to_json }}
            body_format: raw
            status_code: [200, 201]
          loop: "{{ manifest_slurps.results }}"
          loop_control: { label: "{{ item.item.folder }}/{{ item.item.name }}" }
          when: >-
            (existing_manifests.json
             | selectattr('folder',    'equalto', item.item.folder)
             | selectattr('file_name', 'equalto', item.item.name)
             | list | length) > 0

        - name: POST new manifests (first-time upload, not yet known to AI)
          ansible.builtin.uri:
            url: "{{ assisted_api }}/clusters/{{ cluster_id }}/manifests"
            method: POST
            headers:
              Authorization: "Bearer {{ ai_access_token }}"
              Content-Type: application/json
            body: "{{ {'folder': item.item.folder, 'file_name': item.item.name, 'content': item.content} | to_json }}"
            body_format: raw
            status_code: [201]
          loop: "{{ manifest_slurps.results }}"
          loop_control: { label: "{{ item.item.folder }}/{{ item.item.name }}" }
          when: >-
            (existing_manifests.json
             | selectattr('folder',    'equalto', item.item.folder)
             | selectattr('file_name', 'equalto', item.item.name)
             | list | length) == 0

        # ── Wait cluster ready ────────────────────────────────────────────────
        - ansible.builtin.include_tasks: ../tasks/assisted_token.yml

        - name: Poll cluster until ready-to-install
          ansible.builtin.uri:
            url: "{{ assisted_api }}/clusters/{{ cluster_id }}"
            headers: { Authorization: "Bearer {{ ai_access_token }}" }
            return_content: true
          register: cluster_poll
          retries: 40
          delay: 15
          until: cluster_poll.json.status == 'ready'
          failed_when:
            - cluster_poll.json.status is defined
            - cluster_poll.json.status in ['pending-for-input', 'installing-pending-user-action', 'error', 'cancelled']

        # ── Inject per-registry mirror CA on each master (live ISO) ──────────────
        #
        # The infra-env's additional_trust_bundle alone is NOT enough: it writes
        # the CA to /etc/pki/ca-trust/source/anchors/ but `update-ca-trust extract`
        # isn't run during RHCOS Live ignition, AND containers/image library
        # (skopeo / ostree-container / cri-o) doesn't read the system trust store.
        # Without /etc/containers/certs.d/<mirror>:<port>/ca.crt, the cluster's
        # rhel-coreos image pull during "Starting installation" stage falls back
        # from mirror → upstream quay.io → cross-border timeout → AI 30-min kill.
        #
        # 04's recent PATCH to ignition_config_override bakes this CA into FUTURE
        # discovery-ISO downloads.  But for THIS install (existing live ISO),
        # we have to scp the file in here, before triggering install.
        # Idempotent — re-running 07 just re-writes the same file.
        - name: Inject mirror CA into /etc/containers/certs.d/ on each host
          ansible.builtin.shell: |
            set -euo pipefail
            SSH_BASE="-i {{ ssh_priv_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"
            PROXY="ssh $SSH_BASE -W %h:%p root@{{ jump_host_ip }}"
            scp $SSH_BASE -o "ProxyCommand=$PROXY" \
                {{ mirror_ca_cert_path }} core@{{ item.ip }}:/tmp/mirror-ca.crt
            ssh $SSH_BASE -o "ProxyCommand=$PROXY" core@{{ item.ip }} \
                "sudo mkdir -p /etc/containers/certs.d/{{ mirror_private_ip }}:8443 \
              && sudo cp /tmp/mirror-ca.crt /etc/containers/certs.d/{{ mirror_private_ip }}:8443/ca.crt \
              && sudo rm -f /tmp/mirror-ca.crt \
              && echo ✓ CA installed on {{ item.ip }}"
          loop: "{{ cluster_hosts }}"
          loop_control:
            label: "{{ item.ip }}"
          when:
            - mirror_enabled | default(false) | bool
            - mirror_ca_cert_path is defined
            - mirror_ca_cert_path | length > 0
          changed_when: true

        # ── Install ───────────────────────────────────────────────────────────
        # (No SLB self-loop hack needed — ROS template uses NLB, which supports
        #  hairpin / backend → VIP loopback natively.)
        - name: Trigger install
          ansible.builtin.uri:
            url: "{{ assisted_api }}/clusters/{{ cluster_id }}/actions/install"
            method: POST
            headers: { Authorization: "Bearer {{ ai_access_token }}" }
            status_code: [202, 409]   # 409 if already installing
          when: cluster_poll.json.status == 'ready'

        # ── Two-phase poll: required by the *.apps DNS chicken-and-egg ──────────
        # OBSERVED 2026-05-30 first install + 2026-05-31 re-run: the cluster
        # enters `finalizing` after ~20 min (all hosts Done, control plane up)
        # then sits there indefinitely waiting for console operator to become
        # Available.  console probes https://console-openshift-console.apps.<cluster>.<base>;
        # that hostname is a *.apps wildcard PrivateZone A record seeded to the
        # IngressVip placeholder (10.0.16.6 = bogon).  On platform=external the
        # IngressController defaults to HostNetwork (no LoadBalancer Service),
        # so router-default binds master:80/443 — wildcard must point at a
        # master IP, not the placeholder.
        #
        # Old single-phase poll waited for `installed` and ran the DNS-rewrite
        # post-hook AFTER.  Two problems:
        #   1. `installed` never arrived → the post-hook never ran.
        #   2. The post-hook ran `oc` on the operator box, but kubeconfig's
        #      server URL is api.<cluster>.<base> (PrivateZone, intranet-only)
        #      and the ApiNLB is AddressType=Intranet.  Operator (outside VPC)
        #      can neither resolve nor reach it → oc silently returns nothing
        #      → _apps_target_ip empty → all PATCH tasks silently `when`-skip.
        #      The auto-fix had NEVER actually fired in any prior run.
        #
        # Fix: poll until `finalizing or installed` (kubeconfig is downloadable
        # in either state), then run the DNS rewrite via the jump host (which
        # IS inside the VPC and can resolve api), then poll until `installed`.
    - name: Phase A — poll until cluster reaches finalizing or installed
      block:
        - ansible.builtin.include_tasks: ../tasks/assisted_token.yml
        - name: Get cluster status (Phase A)
          ansible.builtin.uri:
            url: "{{ assisted_api }}/clusters/{{ cluster_id }}"
            headers: { Authorization: "Bearer {{ ai_access_token }}" }
            return_content: true
          register: install_poll
          retries: 35   # ~35 min — typical: 20 min from trigger to finalizing
          delay: 60
          # AI's GET /clusters/{id} occasionally returns a response body
          # missing the top-level 'status' field (transient).  Without
          # `default('')` the `until:` expression throws
          # "'dict object' has no attribute 'status'" and aborts the
          # whole polling loop — which then leaves a healthy ongoing
          # install with no operator following it.
          until: install_poll.json.status | default('') in ['finalizing', 'installed']
          failed_when:
            - install_poll.json.status | default('') != ''
            - install_poll.json.status in ['error', 'cancelled', 'pending-for-input', 'installing-pending-user-action']

    # ── Download credentials (AI allows during both finalizing and installed) ──
    - name: Ensure auth dir
      ansible.builtin.file:
        path: "{{ output_dir }}/auth"
        state: directory
        mode: "0700"

    - ansible.builtin.include_tasks: ../tasks/assisted_token.yml

    - name: Download kubeconfig
      ansible.builtin.uri:
        url: "{{ assisted_api }}/clusters/{{ cluster_id }}/downloads/credentials?file_name=kubeconfig"
        headers: { Authorization: "Bearer {{ ai_access_token }}" }
        dest: "{{ output_dir }}/auth/kubeconfig"
        mode: "0600"

    - name: Download kubeadmin password
      ansible.builtin.uri:
        url: "{{ assisted_api }}/clusters/{{ cluster_id }}/downloads/credentials?file_name=kubeadmin-password"
        headers: { Authorization: "Bearer {{ ai_access_token }}" }
        dest: "{{ output_dir }}/auth/kubeadmin-password"
        mode: "0600"

    # ── Stage kubeconfig on jump host EARLY (needed by *.apps DNS rewrite) ──
    # The DNS-rewrite block below runs `oc` to discover router-default pod
    # hostIPs.  kubeconfig server URL is api.<cluster>.<base> which only
    # resolves via PrivateZone (intranet) and ApiNLB is AddressType=Intranet
    # — neither resolvable nor reachable from the operator box.  We MUST
    # run oc via SSH to the jump host (which is inside the VPC).
    # Historical bug fixed 2026-05-31: the previous architecture ran oc on
    # the operator, got an empty stdout, set _apps_target_ip = '', and the
    # downstream PATCH tasks silently `when`-skipped.  Install hung in
    # finalizing waiting for console operator that could never recover.
    - name: Wait for jump host cloud-init to finish (userdata.done marker)
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_priv_key_file }}"
          - -o
          - StrictHostKeyChecking=no
          - -o
          - ConnectTimeout=5
          - "root@{{ jump_host_ip }}"
          - test -f /var/log/userdata.done
      register: jump_ready
      changed_when: false
      failed_when: false
      retries: 30
      delay: 10
      until: jump_ready.rc == 0
      when: jump_host_ip | default('') | length > 0

    - name: Copy kubeconfig to jump host (needed for oc-via-jumphost below)
      ansible.builtin.command:
        argv:
          - scp
          - -i
          - "{{ ssh_priv_key_file }}"
          - -o
          - StrictHostKeyChecking=no
          - "{{ output_dir }}/auth/kubeconfig"
          - "root@{{ jump_host_ip }}:/root/kubeconfig"
      when: jump_host_ip | default('') | length > 0
      register: scp_kc_result
      changed_when: scp_kc_result.rc == 0

    # ── *.apps wildcard DNS rewrite (BEFORE final installed poll) ──────────
    # cluster-stack ROS template seeds *.apps as A → IngressVip param
    # (default 10.0.16.6 = bogon placeholder).  IngressController on
    # platform=external defaults to endpointPublishingStrategy=HostNetwork
    # — no LoadBalancer Service auto-created — so router-default pods
    # bind master:80/443 via hostNetwork.  Wildcard needs to point at a
    # node actually running router-default, otherwise console operator
    # stays Degraded forever and AI cluster never transitions from
    # finalizing → installed.  This is the chicken-and-egg the
    # two-phase poll above breaks.
    - name: Discover hostIPs of router-default pods (run via jump host, inside VPC)
      # IMPORTANT: pass the entire remote command as ONE quoted shell string
      # (not as separate argv elements).  ssh joins argv after user@host with
      # spaces WITHOUT escaping, so the remote shell would re-split on
      # whitespace — the jsonpath `{range .items[*]}{.status.hostIP}{"\n"}{end}`
      # contains spaces and `[*]`, which the remote shell would mangle:
      # `{range` and `.items[*]}{.status.hostIP}{"\n"}{end}` become two
      # separate arguments, the second is passed to `oc get pods` as a name,
      # and oc errors `name cannot be provided when a selector is specified`.
      # Observed 2026-05-31 P0-3 stage 3 rerun2 — task retried 12 times.
      # Fix: collapse to single shell string with single-quoted jsonpath, and
      # use the simpler `{.items[*].status.hostIP}` form (space-separated
      # IPs, no embedded spaces in the expression itself — safer everywhere).
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_priv_key_file }}"
          - -o
          - StrictHostKeyChecking=no
          - -o
          - ConnectTimeout=10
          - "root@{{ jump_host_ip }}"
          - "oc --kubeconfig=/root/kubeconfig -n openshift-ingress get pods -l ingresscontroller.operator.openshift.io/deployment-ingresscontroller=default -o jsonpath='{.items[*].status.hostIP}'"
      register: _router_ips
      changed_when: false
      # ~7.5 min budget (30 x 15s). The 2-min budget here used to give up while
      # the control plane was still rolling its FIRST static-pod revisions
      # (kube-apiserver/etcd PROGRESSING "0 nodes active, revision 0"): on a
      # single schedulable-master cluster the ingress operator only creates
      # router-default AFTER apiserver/etcd stabilize, so the router pod can
      # appear 4-6 min post-node-Ready — well past 2 min. Observed again
      # 2026-06-11 (site.yml failed=1 here; router-default was Pending/
      # ContainerCreating only as the task exhausted its retries). Widen the
      # window to cover real control-plane convergence on slow/SNO topologies.
      retries: 30   # ~7.5 min — covers first-revision control-plane convergence
      delay: 15     # before the ingress operator schedules router-default
      until: ((_router_ips.stdout | default('')).split() | length) > 0
      when: jump_host_ip | default('') | length > 0

    - name: Resolve current *.apps record ID + new IP target
      ansible.builtin.set_fact:
        # oc jsonpath above returns IPs space-separated on one line.
        # Pick first — pvtz A records support multiple values via
        # multiple records but a single one suffices for HostNetwork
        # (any router pod handles wildcard).  Future: write one A
        # record per hostIP for round-robin.
        _apps_target_ip: "{{ ((_router_ips.stdout | default('')).split() | first | default('')) | trim }}"

    - name: Fail loudly if router pod discovery returned nothing
      ansible.builtin.fail:
        msg: |
          Could not discover any router-default pod hostIP via jump host.
          This means oc-on-jumphost returned empty; without a real router
          node IP the *.apps DNS rewrite below would silently skip and
          install will hang in finalizing.
          Check: ssh root@{{ jump_host_ip }} oc --kubeconfig=/root/kubeconfig -n openshift-ingress get pods
      when: _apps_target_ip | length == 0

    - name: Query *.apps PrivateZone record id
      ansible.builtin.command:
        argv:
          - aliyun
          - pvtz
          - DescribeZoneRecords
          - --ZoneId
          - "{{ forward_zone_id }}"
          - --Keyword
          - apps
          - --SearchMode
          - LIKE
          - --profile
          - "{{ aliyun_profile }}"
      register: _apps_rec_query
      changed_when: false

    - name: Extract *.apps record id
      ansible.builtin.set_fact:
        _apps_record_id: >-
          {{ ((_apps_rec_query.stdout | from_json).Records.Record | default([])
              | selectattr('Rr','equalto','*.apps') | list | first).RecordId }}

    - name: UpdateZoneRecord *.apps → {{ _apps_target_ip }}
      ansible.builtin.command:
        argv:
          - aliyun
          - pvtz
          - UpdateZoneRecord
          - --RecordId
          - "{{ _apps_record_id }}"
          - --Rr
          - "*.apps"
          - --Type
          - A
          - --Value
          - "{{ _apps_target_ip }}"
          - --Ttl
          - "60"
          - --profile
          - "{{ aliyun_profile }}"
      changed_when: true

    # ── Phase B — now poll until fully installed (console etc. converge) ───
    # After the DNS rewrite above, console operator probes the route again
    # within ~30 s and turns Available; AI cluster status moves to
    # `installed`.  Typical Phase B duration: 5-15 min.  Skip the wait if
    # already installed (e.g., re-run after a successful install).
    # P3-FIX.10: ground truth = OCP clusterversion history[0].state == "Completed".
    # The Assisted Installer SaaS cluster.status lags (sometimes indefinitely)
    # for external-platform / SNO even after OCP is fully up — observed
    # 2026-06-06: clusterversion Available=True + ALL ClusterOperators Available,
    # yet AI stayed short of `installed`, hanging the old AI-status-only poll.
    # Poll the cluster itself via the jumphost; only fall back to the AI status
    # when there is no jumphost.
    - name: Phase B — poll until cluster is fully installed
      when: install_poll.json.status | default('') != 'installed'
      block:
        - name: Get cluster status (Phase B) — OCP clusterversion via jumphost (ground truth)
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ssh_priv_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - -o
              - ConnectTimeout=15
              - "root@{{ jump_host_ip }}"
              - "oc --kubeconfig=/root/kubeconfig get clusterversion version -o jsonpath='{.status.history[0].state}'"
          register: _cv_state
          retries: 40   # ~20 min — operators converging after DNS fix
          delay: 30
          until: (_cv_state.stdout | default('') | trim) == 'Completed'
          changed_when: false
          when: jump_host_ip | default('') | length > 0

        - name: Get cluster status (Phase B) — AI status fallback (no jumphost)
          when: jump_host_ip | default('') | length == 0
          block:
            - ansible.builtin.include_tasks: ../tasks/assisted_token.yml
            - name: Get cluster status (Phase B, AI)
              ansible.builtin.uri:
                url: "{{ assisted_api }}/clusters/{{ cluster_id }}"
                headers: { Authorization: "Bearer {{ ai_access_token }}" }
                return_content: true
              register: install_poll_b
              retries: 30   # ~30 min — operators converging after DNS fix
              delay: 60
              until: install_poll_b.json.status | default('') == 'installed'
              failed_when:
                - install_poll_b.json.status | default('') != ''
                - install_poll_b.json.status in ['error', 'cancelled', 'pending-for-input', 'installing-pending-user-action']

    # (Earlier "Copy kubeconfig to jump host" task moved up to support the
    #  DNS-rewrite block above.  Don't add it again here.)

    # ── Persist + summary ─────────────────────────────────────────────────
    - name: Save state
      ansible.builtin.include_tasks: ../tasks/save_state.yml
      vars:
        new_state:
          kubeconfig_path: "{{ output_dir }}/auth/kubeconfig"
          kubeadmin_password_path: "{{ output_dir }}/auth/kubeadmin-password"

    - name: Phase 04 done
      ansible.builtin.debug:
        msg: |
          Cluster installed.
          Kubeconfig: {{ output_dir }}/auth/kubeconfig
          {% if jump_host_ip | default('') | length > 0 %}
          Jump host (manual oc access if needed): root@{{ jump_host_ip }}
          {% endif %}
          Next — from the operator host (same place you ran site.yml), deploy the
          worker plane. Each phase resolves the jump host from state and delegates,
          so you do NOT ssh into the VPC yourself:
                ansible-playbook -i ansible/inventory.yml ansible/playbooks/site-post.yml
          This chains 08 (CAPI provider + CSI) -> 10 (worker boot image) -> 12
          (declarative multi-AZ pools). Run a single phase directly if needed,
          e.g. ansible/playbooks/08-deploy-post-install.yml
