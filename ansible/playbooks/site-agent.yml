---
# Convenience wrapper: bring up the CLUSTER via the Agent-based Installer
# (installation_method=Agent-based).  ABI counterpart of site.yml (Assisted).
#
# Network model (scripts/abi-eni-spike.sh, 2026-06-15): Alibaba's VPC delivers
# each node's fixed PrivateIpAddress over cloud DHCP, so ABI uses fixed-IP-via-
# DHCP with an EMPTY agent-config hosts[] — no per-node MAC harvest, no 06 split.
# The only ordering difference from site.yml is that the mirror (03/04/05) must
# run BEFORE the ISO is built (01), because ABI bakes the mirror CA +
# imageDigestSources into the agent ISO at creation time (the AI path PATCHes
# them in later via the assisted-service API).
#
#   00            preflight
#   03/04/05      mirror (no-op if mirror_enabled=false) — provides mirror CA
#   01-agent      render install-config/agent-config + agent create image
#   02            import agent ISO -> ECS custom image
#   06            cluster-stack: instances boot the agent image -> auto-install
#                 (06 already passes InstallationMethod + RendezvousIp; IsAgentBased
#                  pins the fixed master IPs that DHCP then hands to the nodes)
#   07-agent      wait-for install-complete + harvest kubeconfig
#
# Post-install worker plane (08+) is the shared site-post.yml, unchanged — it
# reads kubeconfig from {{ output_dir }}/auth, the same place 07-agent writes it.
- ansible.builtin.import_playbook: 00-preflight.yml
- ansible.builtin.import_playbook: 03-create-mirror-stack.yml   # no-op if mirror_enabled=false
- ansible.builtin.import_playbook: 04-prepare-mirror.yml        # no-op if mirror_enabled=false
- ansible.builtin.import_playbook: 05-verify-mirror.yml         # no-op if mirror_enabled=false
- ansible.builtin.import_playbook: 01-prepare-iso-agent.yml     # ABI: build agent ISO (empty hosts[])
- ansible.builtin.import_playbook: 02-import-image.yml
- ansible.builtin.import_playbook: 06-create-cluster-stack.yml  # instances boot the agent image
- ansible.builtin.import_playbook: 07-install-cluster-agent.yml
