---
# Convenience wrapper: bring up the CLUSTER via the Agent-based Installer
# (installation_method=Agent-based).  ABI counterpart of site.yml (Assisted).
#
# Network model (ENI-first via reimage): for deterministic node hostnames the
# agent-config hosts[] binds each master's primary-ENI MAC -> hostname, so the
# MACs must be known BEFORE the agent ISO is built (an earlier DHCP-only +
# empty-hosts[] attempt left the rendezvous/node-zero named after its MAC).
# ROS can't attach a pre-created ENI as an instance's primary NIC, so we do it
# in two phases: phase-1 boots the masters from a throwaway PLACEHOLDER image
# (fixed IPs -> auto primary ENIs) and harvests their MACs; phase-2 UpdateStacks
# ImageId to the agent image, which ROS applies as an in-place ReplaceSystemDisk
# (keeps the instance/ENI/MAC/IP) so the masters reboot into the agent image and
# self-install with the correct hostnames.  Mirror (03/04/05) is first because
# ABI bakes the mirror CA + imageDigestSources into the agent ISO at build time.
#
#   00       preflight
#   03/04/05 mirror (REQUIRED) — the agent ISO is built ON the mirror ECS
#   06       create-cluster-stack PHASE-1: SG/NLB/DNS + masters on a placeholder
#            image (fixed IPs, auto primary ENIs); harvest the ENI MACs to state
#   06a      build-agent-iso: ON the mirror ECS, build the agent ISO (hosts[] =
#            harvested MAC↔hostname bindings) + OSS upload + ImportImage ->
#            ecs_image_id  (no separate Phase 02 — import is folded in here)
#   06b      reimage-masters PHASE-2: UpdateStack ImageId -> agent image
#            (in-place ReplaceSystemDisk) -> masters reboot + self-install
#   07       install-cluster-agent: monitor via `agent wait-for`, rewrite *.apps,
#            harvest kubeconfig
#
# Post-install worker plane (08+) is the shared site-post.yml, unchanged — it
# reads kubeconfig from {{ output_dir }}/auth, the same place 07 writes it.
- ansible.builtin.import_playbook: 00-preflight.yml
- ansible.builtin.import_playbook: 03-create-mirror-stack.yml
- ansible.builtin.import_playbook: 04-prepare-mirror.yml
- ansible.builtin.import_playbook: 05-verify-mirror.yml
- ansible.builtin.import_playbook: 06-create-cluster-stack.yml  # phase-1: placeholder masters + MAC harvest
- ansible.builtin.import_playbook: 06a-build-agent-iso.yml      # build agent ISO (MAC↔hostname) + import
- ansible.builtin.import_playbook: 06b-reimage-masters.yml      # phase-2: UpdateStack -> ReplaceSystemDisk to agent image
- ansible.builtin.import_playbook: 07-install-cluster-agent.yml
