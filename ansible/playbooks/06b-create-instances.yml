---
# Phase 06b (Agent-based) — create the cluster instances and boot them from the
# imported agent ECS image so the Agent-based install auto-starts.
#
# ⚠ SPIKE-GATED (plan §4 + §7).  Depends on the same Option C/B decision as 06a:
#   - Option C: create instances that ATTACH the ENIs pre-created in 06a as their
#     primary NIC (so the MAC matches the agent ISO hosts[]), booting ImageId =
#     the agent custom image from 02.
#   - Option B: ReplaceSystemDisk on the instances created in 06a with the agent
#     image, then start them.
#
# Requires (from 06a / 02): ENI ids, cluster-stack id, ecs_image_id (agent image).
# After this, instances boot the agent ISO and the install proceeds unattended;
# 07-install-cluster-agent.yml waits for completion.
- name: Create cluster instances on the agent image (Agent-based)
  hosts: local
  gather_facts: false
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml
    - ansible.builtin.include_tasks: ../tasks/path_defaults.yml

    - name: Assert installation_method is agent
      ansible.builtin.assert:
        that: installation_method | default('assisted') | lower in ['agent', 'agent-based']
        fail_msg: "06b-create-instances.yml is Agent-based only."

    - name: Assert agent image was imported (Phase 02)
      ansible.builtin.assert:
        that:
          - ecs_image_id is defined
          - ecs_image_id | length > 0
        fail_msg: "ecs_image_id not set — run 02-import-image.yml first."

    # TODO(spike): create/attach instances per the resolved Option C/B mechanism.
    - name: 06b not yet implemented — pending Option C/B spike
      ansible.builtin.fail:
        msg: >-
          06b (ABI instance create/boot) is not implemented yet — gated on the
          same pre-created-primary-ENI spike as 06a (plan §4/§7).
