---
# Phase 03 — submit ROS stack, wait, capture outputs.
- name: Create ROS stack
  hosts: local
  gather_facts: false
  vars:
    stack_name: "openshift-{{ cluster_name }}"
    template_file: "{{ repo_root }}/ros-templates/create-cluster-LEGACY.yaml"
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml
    - ansible.builtin.include_tasks: ../tasks/path_defaults.yml
    - ansible.builtin.include_tasks: ../tasks/mirror_defaults.yml

    - name: Read SSH public key
      ansible.builtin.slurp:
        src: "{{ ssh_pub_key_file }}"
      register: ssh_pub_slurp

    - name: Read SSH private key (for jump host node access)
      ansible.builtin.slurp:
        src: "{{ ssh_priv_key_file }}"
      register: ssh_priv_slurp
      when: enable_jump_host | bool

    # ── If we already have a stack ID in state, verify it's still viable ─────
    - name: Check existing stack status (if ID already saved)
      ansible.builtin.command:
        argv:
          - aliyun
          - ros
          - GetStack
          - --StackId
          - "{{ ros_stack_id }}"
          - --RegionId
          - "{{ region }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: existing_stack_check
      changed_when: false
      failed_when: false
      when: ros_stack_id is defined and ros_stack_id | length > 0

    # Stack is gone (DELETE_COMPLETE or 404) — just reset ID and recreate
    - name: Reset ros_stack_id if stack is gone or already deleted
      ansible.builtin.set_fact:
        ros_stack_id: ""
      when:
        - ros_stack_id is defined and ros_stack_id | length > 0
        - existing_stack_check is not skipped
        - existing_stack_check.rc != 0 or
          (existing_stack_check.stdout | length > 0 and
           (existing_stack_check.stdout | from_json).Status is match(
             '^(DELETE_COMPLETE|CREATE_FAILED|ROLLBACK_FAILED|ROLLBACK_COMPLETE|DELETE_FAILED|UPDATE_FAILED)$'))

    # ── Pre-clean resources known to block stack deletion ─────────────────
    # Only needed for stacks still alive in a failed state (not DELETE_COMPLETE/404)
    - name: Pre-detach RAM policy from role (unblocks stack deletion)
      ansible.builtin.command:
        argv:
          - aliyun
          - ram
          - DetachPolicyFromRole
          - --PolicyName
          - "{{ cluster_name }}-node-policy"
          - --PolicyType
          - Custom
          - --RoleName
          - "{{ ram_role_name | default('openshift-node-role') }}"
          - --profile
          - "{{ aliyun_profile }}"
      failed_when: false
      changed_when: false
      when:
        - existing_stack_check is defined and existing_stack_check is not skipped
        - existing_stack_check.rc == 0
        - existing_stack_check.stdout | length > 0
        - (existing_stack_check.stdout | from_json).Status is match(
            '^(CREATE_FAILED|ROLLBACK_FAILED|ROLLBACK_COMPLETE|DELETE_FAILED|UPDATE_FAILED)$')

    - name: Pre-delete RAM policy (unblocks stack deletion)
      ansible.builtin.command:
        argv:
          - aliyun
          - ram
          - DeletePolicy
          - --PolicyName
          - "{{ cluster_name }}-node-policy"
          - --profile
          - "{{ aliyun_profile }}"
      failed_when: false
      changed_when: false
      when:
        - existing_stack_check is defined and existing_stack_check is not skipped
        - existing_stack_check.rc == 0
        - existing_stack_check.stdout | length > 0
        - (existing_stack_check.stdout | from_json).Status is match(
            '^(CREATE_FAILED|ROLLBACK_FAILED|ROLLBACK_COMPLETE|DELETE_FAILED|UPDATE_FAILED)$')

    - name: Delete failed stack so we can recreate with same name
      ansible.builtin.command:
        argv:
          - aliyun
          - ros
          - DeleteStack
          - --StackId
          - "{{ (existing_stack_check.stdout | from_json).StackId }}"
          - --RegionId
          - "{{ region }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: delete_existing_failed
      when:
        - existing_stack_check is defined and existing_stack_check is not skipped
        - existing_stack_check.rc == 0
        - existing_stack_check.stdout | length > 0
        - (existing_stack_check.stdout | from_json).Status is match(
            '^(CREATE_FAILED|ROLLBACK_FAILED|ROLLBACK_COMPLETE|DELETE_FAILED|UPDATE_FAILED)$')

    - name: Wait for stack deletion to complete
      ansible.builtin.command:
        argv:
          - aliyun
          - ros
          - GetStack
          - --StackId
          - "{{ (existing_stack_check.stdout | from_json).StackId }}"
          - --RegionId
          - "{{ region }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: stack_delete_wait
      changed_when: false
      failed_when: false
      retries: 40
      delay: 15
      until: >-
        stack_delete_wait.rc != 0 or
        (stack_delete_wait.stdout | length > 0 and
         (stack_delete_wait.stdout | from_json).Status == 'DELETE_COMPLETE')
      when: delete_existing_failed is not skipped

    - name: Fail if stack is still stuck in DELETE_FAILED after cleanup
      ansible.builtin.fail:
        msg: |
          Stack {{ (existing_stack_check.stdout | from_json).StackId }} is stuck in DELETE_FAILED.
          Check the ROS console for blocking resources and delete them manually.
      when:
        - stack_delete_wait is not skipped
        - stack_delete_wait.rc == 0
        - stack_delete_wait.stdout | length > 0
        - (stack_delete_wait.stdout | from_json).Status == 'DELETE_FAILED'

    # ── Adopt existing stack by name if state.yml was lost ────────────────
    - name: List stacks by name
      ansible.builtin.command:
        argv:
          - aliyun
          - ros
          - ListStacks
          - --RegionId
          - "{{ region }}"
          - --StackName.1
          - "{{ stack_name }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: stack_list
      changed_when: false
      failed_when: false
      when: ros_stack_id is not defined or ros_stack_id | length == 0

    - name: Adopt existing stack (only if in a viable state)
      ansible.builtin.set_fact:
        ros_stack_id: "{{ ((stack_list.stdout | from_json).Stacks
                           | selectattr('Status', 'match',
                               '^(CREATE_COMPLETE|CREATE_IN_PROGRESS|UPDATE_COMPLETE)$')
                           | list | first).StackId }}"
      when:
        - ros_stack_id is not defined or ros_stack_id | length == 0
        - stack_list is defined and stack_list.rc == 0
        - (stack_list.stdout | from_json).Stacks
            | selectattr('Status', 'match',
                '^(CREATE_COMPLETE|CREATE_IN_PROGRESS|UPDATE_COMPLETE)$')
            | list | length > 0

    # ── If still no stack ID, check if a failed stack exists by name ──────
    # Handles the case where state.yml was lost/reset but the cloud stack is
    # still stuck in a failed state (StackExists would block CreateStack).
    - name: Find failed stack by name (to clean up before recreating)
      ansible.builtin.set_fact:
        failed_stack_by_name: "{{ (stack_list.stdout | from_json).Stacks
                                   | selectattr('Status', 'match',
                                       '^(CREATE_FAILED|ROLLBACK_FAILED|ROLLBACK_COMPLETE|DELETE_FAILED|UPDATE_FAILED)$')
                                   | list | first }}"
      when:
        - ros_stack_id is not defined or ros_stack_id | length == 0
        - stack_list is defined and stack_list.rc == 0
        - (stack_list.stdout | from_json).Stacks
            | selectattr('Status', 'match',
                '^(CREATE_FAILED|ROLLBACK_FAILED|ROLLBACK_COMPLETE|DELETE_FAILED|UPDATE_FAILED)$')
            | list | length > 0

    - name: Pre-detach RAM policy from role (clean up failed stack found by name)
      ansible.builtin.command:
        argv:
          - aliyun
          - ram
          - DetachPolicyFromRole
          - --PolicyName
          - "{{ cluster_name }}-node-policy"
          - --PolicyType
          - Custom
          - --RoleName
          - "{{ ram_role_name | default('openshift-node-role') }}"
          - --profile
          - "{{ aliyun_profile }}"
      failed_when: false
      changed_when: false
      when:
        - failed_stack_by_name is defined
        - failed_stack_by_name.StackId is defined

    - name: Pre-delete RAM policy (clean up failed stack found by name)
      ansible.builtin.command:
        argv:
          - aliyun
          - ram
          - DeletePolicy
          - --PolicyName
          - "{{ cluster_name }}-node-policy"
          - --profile
          - "{{ aliyun_profile }}"
      failed_when: false
      changed_when: false
      when:
        - failed_stack_by_name is defined
        - failed_stack_by_name.StackId is defined

    - name: Delete failed stack found by name
      ansible.builtin.command:
        argv:
          - aliyun
          - ros
          - DeleteStack
          - --StackId
          - "{{ failed_stack_by_name.StackId }}"
          - --RegionId
          - "{{ region }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: delete_named_failed
      when:
        - failed_stack_by_name is defined
        - failed_stack_by_name.StackId is defined

    - name: Wait for named failed stack deletion to complete
      ansible.builtin.command:
        argv:
          - aliyun
          - ros
          - GetStack
          - --StackId
          - "{{ failed_stack_by_name.StackId }}"
          - --RegionId
          - "{{ region }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: named_stack_delete_wait
      changed_when: false
      failed_when: false
      retries: 40
      delay: 15
      until: >-
        named_stack_delete_wait.rc != 0 or
        (named_stack_delete_wait.stdout | length > 0 and
         (named_stack_delete_wait.stdout | from_json).Status == 'DELETE_COMPLETE')
      when: delete_named_failed is not skipped

    - name: Fail if named stack is still stuck in DELETE_FAILED after cleanup
      ansible.builtin.fail:
        msg: |
          Stack {{ failed_stack_by_name.StackId }} is stuck in DELETE_FAILED.
          Check the ROS console for blocking resources and delete them manually.
      when:
        - named_stack_delete_wait is not skipped
        - named_stack_delete_wait.rc == 0
        - named_stack_delete_wait.stdout | length > 0
        - (named_stack_delete_wait.stdout | from_json).Status == 'DELETE_FAILED'

    # ── Create stack if still missing ──────────────────────────────────────
    # All stack-creation tasks below are gated on "ros_stack_id is empty" so
    # they are skipped entirely when adopting an existing stack.  This avoids
    # referencing variables like ecs_image_id that may be absent in the
    # adoption case (e.g. state.yml was wiped but the cloud stack survives).
    - name: Pre-flight — ensure ecs_image_id is set before creating a new stack
      ansible.builtin.assert:
        that:
          - ecs_image_id is defined
          - ecs_image_id | length > 0
        fail_msg: |
          ecs_image_id is empty — Phase 02 must run first to import the
          RHCOS-based ECS image.  ROS will reject CreateStack with
          "Specified ImageId cannot be empty" otherwise.

          If you previously kept an image (keep_image=true) but lost state.yml,
          look it up and restore manually:
            aliyun ecs DescribeImages --RegionId {{ region }} \
              --ImageOwnerAlias self --profile {{ aliyun_profile }} \
              | jq '.Images.Image[] | {ImageId, ImageName, Status}'
            echo "ecs_image_id: '<ImageId>'" >> ansible/state.yml
      when: ros_stack_id is not defined or ros_stack_id | length == 0

    - name: Resolve mirror init password (auto-generate if blank)
      ansible.builtin.set_fact:
        _mirror_init_password_resolved: "{{ mirror_init_password if (mirror_init_password | default('') | length > 0) else lookup('password', '/dev/null length=20 chars=ascii_letters,digits') }}"
      when: mirror_enabled | default(false) | bool
      no_log: true

    - name: Build ROS Parameters JSON
      ansible.builtin.set_fact:
        ros_params:
          - {ParameterKey: ClusterName,              ParameterValue: "{{ cluster_name }}"}
          - {ParameterKey: BaseDomain,               ParameterValue: "{{ base_domain }}"}
          - {ParameterKey: Region,                   ParameterValue: "{{ region }}"}
          - {ParameterKey: ZoneId,                   ParameterValue: "{{ zone }}"}
          - {ParameterKey: ZoneId2,                  ParameterValue: "{{ zone2 }}"}
          - {ParameterKey: VpcCidr,                  ParameterValue: "{{ vpc_cidr }}"}
          - {ParameterKey: PrivateSubnetCidr,        ParameterValue: "{{ private_subnet_cidr }}"}
          - {ParameterKey: PrivateSubnetCidr2,       ParameterValue: "{{ private_subnet_cidr2 }}"}
          - {ParameterKey: PublicSubnetCidr,         ParameterValue: "{{ public_subnet_cidr }}"}
          - {ParameterKey: ControlPlaneCount,        ParameterValue: "{{ control_plane_count | string }}"}
          - {ParameterKey: ControlPlaneInstanceType, ParameterValue: "{{ control_plane_type }}"}
          - {ParameterKey: ComputeCount,             ParameterValue: "{{ compute_count | string }}"}
          - {ParameterKey: ComputeInstanceType,      ParameterValue: "{{ compute_type }}"}
          - {ParameterKey: SystemDiskCategory,       ParameterValue: "{{ system_disk_category }}"}
          - {ParameterKey: SystemDiskSize,           ParameterValue: "{{ system_disk_size | string }}"}
          - {ParameterKey: InstallDiskSize,          ParameterValue: "{{ install_disk_size | default(100) | string }}"}
          - {ParameterKey: InstallationMethod,       ParameterValue: "{{ installation_method }}"}
          - {ParameterKey: ImageId,                  ParameterValue: "{{ ecs_image_id | default('') }}"}
          - {ParameterKey: RendezvousIp,             ParameterValue: "{{ rendezvous_ip }}"}
          - {ParameterKey: IngressVip,               ParameterValue: "{{ ingress_vip | default('10.0.16.6') }}"}
          - {ParameterKey: EnableJumpHost,           ParameterValue: "{{ enable_jump_host | string | lower }}"}
          - {ParameterKey: JumpHostInstanceType,     ParameterValue: "{{ jump_host_type }}"}
          - {ParameterKey: SshPublicKey,             ParameterValue: "{{ ssh_pub_slurp.content | b64decode | trim }}"}
          - {ParameterKey: SshPrivateKey,            ParameterValue: "{{ ssh_priv_slurp.content | trim if enable_jump_host | bool else '' }}"}
          - {ParameterKey: MirrorEnabled,            ParameterValue: "{{ mirror_enabled | default(false) | string | lower }}"}
          - {ParameterKey: MirrorOssBucket,          ParameterValue: "{{ oss_bucket | default('') }}"}
          - {ParameterKey: MirrorOssObject,          ParameterValue: "{{ mirror_oss_object | default('') }}"}
          - {ParameterKey: MirrorPrivateIp,          ParameterValue: "{{ mirror_private_ip | default('10.0.16.4') }}"}
          - {ParameterKey: MirrorInstanceType,       ParameterValue: "{{ mirror_instance_type | default('ecs.g7.large') }}"}
          - {ParameterKey: MirrorDataDiskSize,       ParameterValue: "{{ mirror_data_disk_size | default(100) | string }}"}
          - {ParameterKey: MirrorInitUser,           ParameterValue: "{{ mirror_init_user | default('mirror-admin') }}"}
          - {ParameterKey: MirrorInitPassword,       ParameterValue: "{{ _mirror_init_password_resolved | default('') }}"}
      no_log: "{{ enable_jump_host | bool or (mirror_enabled | default(false) | bool) }}"   # suppress log when private key or mirror password is present
      when: ros_stack_id is not defined or ros_stack_id | length == 0

    - name: Write ROS parameters to temp file
      ansible.builtin.copy:
        dest: "/tmp/ros-params-{{ cluster_name }}.json"
        content: "{{ ros_params | to_json }}"
        mode: "0600"
      no_log: "{{ enable_jump_host | bool }}"   # file contains private key when jump host enabled
      when: ros_stack_id is not defined or ros_stack_id | length == 0

    - name: Submit ROS CreateStack (indexed params via Python subprocess — avoids CLI JSON parsing bugs)
      ansible.builtin.shell:
        cmd: |
          python3 - << 'PYEOF'
          import json, subprocess, sys

          template_file = "{{ template_file }}"
          params_file   = "/tmp/ros-params-{{ cluster_name }}.json"
          log_file      = "/tmp/ros-create-{{ cluster_name }}.log"

          with open(template_file) as f:
              template_body = f.read()

          with open(params_file) as f:
              params = json.load(f)

          cmd = [
              "aliyun", "ros", "CreateStack",
              "--RegionId",        "{{ region }}",
              "--StackName",       "{{ stack_name }}",
              "--DisableRollback", "true",
              "--TimeoutInMinutes","60",
              "--TemplateBody",    template_body,
              "--profile",         "{{ aliyun_profile }}",
          ]

          for i, p in enumerate(params, 1):
              cmd += [
                  f"--Parameters.{i}.ParameterKey",   p["ParameterKey"],
                  f"--Parameters.{i}.ParameterValue",  p["ParameterValue"],
              ]

          result = subprocess.run(cmd, capture_output=True, text=True)
          # Persist outcome to a log file so a follow-up task can show the
          # error even when no_log censors this task's stdout.
          with open(log_file, "w") as f:
              f.write(f"=== RC: {result.returncode} ===\n")
              f.write(f"=== STDOUT ===\n{result.stdout}\n")
              f.write(f"=== STDERR ===\n{result.stderr}\n")
          # On success, extract StackId and write to a plain-text file.
          # Plain text is dead-simple to read back (slurp + decode + strip)
          # and avoids the slurp -> b64decode -> from_json -> .StackId chain
          # which has multiple failure modes (JSON parsing, dict access, etc).
          if result.returncode == 0:
              try:
                  stack_id = json.loads(result.stdout).get("StackId", "")
                  with open("/tmp/ros-create-{{ cluster_name }}-stackid.txt", "w") as f:
                      f.write(stack_id)
              except (json.JSONDecodeError, AttributeError) as e:
                  # Surface parse errors via the log file
                  with open(log_file, "a") as f:
                      f.write(f"=== PARSE ERROR: {e} ===\n")
          sys.stdout.write(result.stdout)
          sys.stderr.write(result.stderr)
          sys.exit(result.returncode)
          PYEOF
      register: create_result
      no_log: "{{ enable_jump_host | bool }}"   # suppress: cmd args include private key when jump host enabled
      failed_when: false                         # check rc in dedicated task below so errors stay visible
      when: ros_stack_id is not defined or ros_stack_id | length == 0

    - name: Show CreateStack log on failure (bypasses no_log via separate task)
      ansible.builtin.command: cat /tmp/ros-create-{{ cluster_name }}.log
      register: create_log
      changed_when: false
      failed_when: false
      when:
        - create_result is defined
        - create_result is not skipped
        - create_result.rc | default(0) != 0

    - name: Fail with visible CreateStack error
      ansible.builtin.fail:
        msg: |
          CreateStack failed (rc={{ create_result.rc }}). Log contents:
          {{ create_log.stdout | default('(no log captured)') }}
      when:
        - create_result is defined
        - create_result is not skipped
        - create_result.rc | default(0) != 0

    # Read StackId from a plain-text file written by the Python heredoc above.
    # Plain text bypasses both Ansible's no_log censoring AND the unreliable
    # slurp -> b64decode -> from_json -> .StackId chain.
    - name: Read CreateStack StackId file
      ansible.builtin.slurp:
        src: "/tmp/ros-create-{{ cluster_name }}-stackid.txt"
      register: stackid_slurp
      when:
        - create_result is not skipped
        - create_result.rc | default(0) == 0

    - name: Capture new stack ID (from plain-text file)
      ansible.builtin.set_fact:
        ros_stack_id: "{{ stackid_slurp.content | b64decode | trim }}"
      when:
        - create_result is not skipped
        - create_result.rc | default(0) == 0
        - stackid_slurp is defined
        - stackid_slurp is not skipped
        - (stackid_slurp.content | b64decode | trim) | length > 0

    - name: Assert ros_stack_id was captured
      ansible.builtin.assert:
        that:
          - ros_stack_id is defined
          - ros_stack_id | length > 0
        fail_msg: |
          CreateStack appeared to succeed but ros_stack_id is empty.
          Diagnostic dump:
            create_result.rc       = {{ create_result.rc | default('(unset)') }}
            stackid_slurp defined  = {{ stackid_slurp is defined }}
            stackid_slurp skipped  = {{ (stackid_slurp | default({})).get('skipped', 'no') }}
            stackid file content   = {{ (stackid_slurp.content | default('') | b64decode | trim)
                                         if stackid_slurp is defined
                                            and stackid_slurp is not skipped
                                         else '(no slurp result)' }}
          See /tmp/ros-create-{{ cluster_name }}.log for the full API response.
      when:
        - create_result is not skipped
        - create_result.rc | default(0) == 0

    - name: Delete CreateStack StackId file (no longer needed)
      ansible.builtin.file:
        path: "/tmp/ros-create-{{ cluster_name }}-stackid.txt"
        state: absent
      when:
        - create_result is not skipped
        - create_result.rc | default(0) == 0

    - name: Delete temp params file (contains private key)
      ansible.builtin.file:
        path: "/tmp/ros-params-{{ cluster_name }}.json"
        state: absent

    - name: Persist stack ID before waiting (so a kill mid-wait doesn't lose it)
      ansible.builtin.include_tasks: ../tasks/save_state.yml
      vars:
        new_state: { ros_stack_id: "{{ ros_stack_id }}" }

    # Mark stack as already ready so we can skip the poll when possible.
    # Case 1: state.yml had a stack ID and it was already CREATE_COMPLETE.
    - name: Mark stack already ready (existing stack in CREATE_COMPLETE state)
      ansible.builtin.set_fact:
        stack_ready: true
      when:
        - create_result is skipped
        - existing_stack_check is defined
        - existing_stack_check is not skipped
        - existing_stack_check.rc == 0
        - existing_stack_check.stdout | length > 0
        - (existing_stack_check.stdout | from_json).Status == 'CREATE_COMPLETE'

    # Case 2: stack was adopted by name from ListStacks (state.yml had no ID) and
    # it was already in CREATE_COMPLETE.  In this case existing_stack_check was
    # skipped, but we know status from the ListStacks adoption condition.
    # IMPORTANT: also gate on ros_stack_id | length > 0 to ensure adoption actually
    # ran and set the ID.  The 'in' test used by adoption and 'equalto' used here
    # can behave differently across Jinja2 versions; gating on ros_stack_id prevents
    # stack_ready=true with an empty StackId, which would crash the Fetch task below.
    - name: Mark stack already ready (adopted-by-name CREATE_COMPLETE)
      ansible.builtin.set_fact:
        stack_ready: true
      when:
        - create_result is skipped
        - stack_ready is not defined
        - ros_stack_id | length > 0
        - stack_list is defined
        - stack_list is not skipped
        - stack_list.rc == 0
        - (stack_list.stdout | from_json).Stacks
            | selectattr('Status', 'equalto', 'CREATE_COMPLETE')
            | list | length > 0

    # ── Wait for CREATE_COMPLETE ───────────────────────────────────────────
    # Skip entirely when we already know the stack is ready (avoids confusing
    # FAILED-RETRYING output and API throttling on re-runs).
    - name: Poll stack until CREATE_COMPLETE (10-15 min)
      ansible.builtin.command:
        argv:
          - aliyun
          - ros
          - GetStack
          - --StackId
          - "{{ ros_stack_id }}"
          - --RegionId
          - "{{ region }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: stack_poll
      changed_when: false
      failed_when: false   # never abort mid-poll; status checked in until/post-assert
      retries: 60
      delay: 20
      # Guard all from_json calls with a length check: empty stdout (transient
      # API error / rate-limit) must result in a retry, not a JSONDecodeError.
      # rc != 0 alone is NOT a terminal condition — it fires on transient errors too.
      until: >-
        (stack_poll.rc == 0 and
         stack_poll.stdout | length > 0 and
         (stack_poll.stdout | from_json).Status in
           ['CREATE_COMPLETE', 'CREATE_FAILED', 'ROLLBACK_FAILED',
            'ROLLBACK_COMPLETE', 'DELETE_IN_PROGRESS', 'DELETE_FAILED']) or
        (stack_poll.rc != 0 and
         'StackNotFound' in (stack_poll.stderr | default('')))
      when: not (stack_ready | default(false) | bool)

    # When the stack was already ready at start, reuse existing_stack_check as
    # the poll result so downstream tasks (assert, parse outputs) work uniformly.
    # IMPORTANT: build the entire dict inside ONE Jinja2 expression.  Writing
    # it field-by-field causes Ansible to re-parse each rendered value as
    # YAML/JSON, which silently turns the JSON-text stdout into a dict and
    # breaks downstream string operations (slicing, from_json).
    - name: Use existing stack check as poll result (already CREATE_COMPLETE)
      ansible.builtin.set_fact:
        stack_poll: >-
          {{ {
            'stdout': existing_stack_check.stdout,
            'stderr': existing_stack_check.stderr | default(''),
            'rc':     existing_stack_check.rc,
            'changed': false
          } }}
      when:
        - stack_ready | default(false) | bool
        - existing_stack_check is defined
        - existing_stack_check is not skipped

    # For the adopted-by-name case, fetch the full stack detail (ListStacks only
    # returns summary — Outputs are absent until we call GetStack directly).
    - name: Assert ros_stack_id is set before fetching stack detail
      ansible.builtin.assert:
        that: ros_stack_id | length > 0
        fail_msg: >-
          stack_ready=true but ros_stack_id is empty — adoption did not set the
          stack ID.  This usually means 'Adopt existing stack' was skipped due to
          a selectattr mismatch.  Check the ListStacks output and re-run.
      when: stack_ready | default(false) | bool

    # CRITICAL: register to a different name (NOT stack_poll).  A skipped task
    # with `register: stack_poll` overwrites the variable with a skip-marker
    # dict, wiping the value we set above and breaking the downstream assert.
    - name: Fetch full stack detail for adopted-by-name CREATE_COMPLETE stack
      ansible.builtin.command:
        argv:
          - aliyun
          - ros
          - GetStack
          - --StackId
          - "{{ ros_stack_id }}"
          - --RegionId
          - "{{ region }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: stack_refetch
      changed_when: false
      when:
        - stack_ready | default(false) | bool
        - ros_stack_id | length > 0
        - stack_poll is not defined or stack_poll.stdout | default('') | length == 0

    - name: Update stack_poll with refetched detail (if refetch ran)
      ansible.builtin.set_fact:
        stack_poll: >-
          {{ {
            'stdout': stack_refetch.stdout,
            'stderr': stack_refetch.stderr | default(''),
            'rc':     stack_refetch.rc,
            'changed': false
          } }}
      when:
        - stack_refetch is defined
        - stack_refetch is not skipped

    - name: Assert stack created successfully
      ansible.builtin.assert:
        that:
          - stack_poll is defined
          - stack_poll.stdout | default('') | length > 0
          - (stack_poll.stdout | from_json).Status == 'CREATE_COMPLETE'
        fail_msg: >-
          Stack {{ ros_stack_id }} did not reach CREATE_COMPLETE.
          Check the ROS console for details — and inspect stack_poll
          (rc / stdout / stderr) in -vv output.

    # ── Capture outputs ────────────────────────────────────────────────────
    - name: Parse stack outputs
      ansible.builtin.set_fact:
        outputs: "{{ (stack_poll.stdout | from_json).Outputs }}"

    - name: Pick outputs available directly (always present since template v2+)
      ansible.builtin.set_fact:
        vpc_id:           "{{ (outputs | selectattr('OutputKey', 'equalto', 'VpcId')              | list | first).OutputValue }}"
        private_vswitch:  "{{ (outputs | selectattr('OutputKey', 'equalto', 'VSwitchId')          | list | first).OutputValue }}"
        api_lb_endpoint:  "{{ (outputs | selectattr('OutputKey', 'equalto', 'ApiLBEndpoint')     | list | first).OutputValue }}"
        install_config:   "{{ (outputs | selectattr('OutputKey', 'equalto', 'InstallConfig')      | list | first).OutputValue }}"
        dynamic_manifest: "{{ (outputs | selectattr('OutputKey', 'equalto', 'DynamicCustomManifest')| list | first).OutputValue }}"
        _worker_sg_from_output:   "{{ (outputs | selectattr('OutputKey', 'equalto', 'WorkerSecurityGroup') | list | map(attribute='OutputValue') | list | first | default('')) }}"
        _node_role_from_output:   "{{ (outputs | selectattr('OutputKey', 'equalto', 'NodeRamRoleName')     | list | map(attribute='OutputValue') | list | first | default('')) }}"

    # Fallback: query the physical resource ID directly when the output is absent
    # (stacks created before WorkerSecurityGroup/NodeRamRoleName outputs were added)
    - name: Query WorkerSecurityGroup physical ID from stack resources (fallback)
      ansible.builtin.command:
        argv:
          - aliyun
          - ros
          - GetStackResource
          - --StackId
          - "{{ ros_stack_id }}"
          - --RegionId
          - "{{ region }}"
          - --LogicalResourceId
          - WorkerSecurityGroup
          - --profile
          - "{{ aliyun_profile }}"
      register: worker_sg_resource
      changed_when: false
      when: _worker_sg_from_output == ''

    - name: Query NodeRamRole physical ID from stack resources (fallback)
      ansible.builtin.command:
        argv:
          - aliyun
          - ros
          - GetStackResource
          - --StackId
          - "{{ ros_stack_id }}"
          - --RegionId
          - "{{ region }}"
          - --LogicalResourceId
          - NodeRamRole
          - --profile
          - "{{ aliyun_profile }}"
      register: node_role_resource
      changed_when: false
      when: _node_role_from_output == ''

    - name: Resolve worker_sg and node_ram_role
      ansible.builtin.set_fact:
        worker_sg:     "{{ _worker_sg_from_output if _worker_sg_from_output != '' else (worker_sg_resource.stdout | from_json).PhysicalResourceId }}"
        node_ram_role: "{{ _node_role_from_output if _node_role_from_output != '' else (node_role_resource.stdout | from_json).PhysicalResourceId }}"

    - name: Pick jump host IP (optional)
      ansible.builtin.set_fact:
        jump_host_ip: "{{ (outputs | selectattr('OutputKey', 'equalto', 'JumpHostPublicIp') | list | first).OutputValue }}"
      when: (outputs | selectattr('OutputKey', 'equalto', 'JumpHostPublicIp') | list | length) > 0

    # ── Node hostname A records + PTR records ─────────────────────────────
    # Written after instances exist (IPs only known post-stack-creation).
    # Node FQDN: <cluster>-master-N.<cluster>.<domain>
    # RHCOS resolves its own hostname via PTR on boot; forward A record is
    # needed for kubelet registration and general cluster DNS.
    - name: Pick master IPs and reverse zone IDs from outputs
      ansible.builtin.set_fact:
        master_ip1:       "{{ (outputs | selectattr('OutputKey', 'equalto', 'MasterIp1')      | list | first | default({})).OutputValue | default('') }}"
        master_ip2:       "{{ (outputs | selectattr('OutputKey', 'equalto', 'MasterIp2')      | list | first | default({})).OutputValue | default('') }}"
        master_ip3:       "{{ (outputs | selectattr('OutputKey', 'equalto', 'MasterIp3')      | list | first | default({})).OutputValue | default('') }}"
        reverse_zone_id1: "{{ (outputs | selectattr('OutputKey', 'equalto', 'ReverseZoneId1') | list | first | default({})).OutputValue | default('') }}"
        reverse_zone_id2: "{{ (outputs | selectattr('OutputKey', 'equalto', 'ReverseZoneId2') | list | first | default({})).OutputValue | default('') }}"
        private_zone_id:  "{{ (outputs | selectattr('OutputKey', 'equalto', 'PrivateZoneName') | list | first | default({})).OutputValue | default('') }}"

    # Fetch the PrivateZone ID (needed for AddZoneRecord; PrivateZoneName output
    # gives the zone name, not the zone ID — look it up by name)
    - name: Fetch PrivateZone ID by name
      ansible.builtin.command:
        argv:
          - aliyun
          - pvtz
          - DescribeZones
          - --profile
          - "{{ aliyun_profile }}"
      register: pvtz_list
      changed_when: false
      when: master_ip1 | length > 0

    - name: Set forward_zone_id fact
      ansible.builtin.set_fact:
        forward_zone_id: "{{ (pvtz_list.stdout | from_json).Zones.Zone
                              | selectattr('ZoneName', 'equalto', cluster_name + '.' + base_domain)
                              | map(attribute='ZoneId') | list | first }}"
      when: master_ip1 | length > 0 and pvtz_list is not skipped

    # Fallback: ReverseZoneId1/2 Outputs are absent on stacks created before the
    # reverse-zone resources were added to the template.  Re-query pvtz (already
    # fetched above) to look up zone IDs by name so PTR records never silently
    # skip due to an empty zone_id.
    - name: Resolve missing reverse_zone_id1 from pvtz list (fallback)
      ansible.builtin.set_fact:
        reverse_zone_id1: "{{ (pvtz_list.stdout | from_json).Zones.Zone
                               | selectattr('ZoneName', 'equalto', '16.0.10.in-addr.arpa')
                               | map(attribute='ZoneId') | list | first | default('') }}"
      when:
        - pvtz_list is not skipped
        - reverse_zone_id1 | length == 0

    - name: Resolve missing reverse_zone_id2 from pvtz list (fallback)
      ansible.builtin.set_fact:
        reverse_zone_id2: "{{ (pvtz_list.stdout | from_json).Zones.Zone
                               | selectattr('ZoneName', 'equalto', '32.0.10.in-addr.arpa')
                               | map(attribute='ZoneId') | list | first | default('') }}"
      when:
        - pvtz_list is not skipped
        - reverse_zone_id2 | length == 0

    - name: Add node hostname A records to PrivateZone
      ansible.builtin.command:
        argv:
          - aliyun
          - pvtz
          - AddZoneRecord
          - --ZoneId
          - "{{ forward_zone_id }}"
          - --Rr
          - "{{ item.name }}"
          - --Type
          - A
          - --Value
          - "{{ item.ip }}"
          - --Ttl
          - "60"
          - --profile
          - "{{ aliyun_profile }}"
      loop:
        - { ip: "{{ master_ip1 }}", name: "{{ cluster_name }}-master-1" }
        - { ip: "{{ master_ip2 }}", name: "{{ cluster_name }}-master-2" }
        - { ip: "{{ master_ip3 }}", name: "{{ cluster_name }}-master-3" }
      failed_when: false
      changed_when: true
      when:
        - item.ip | length > 0
        - forward_zone_id is defined

    - name: Add PTR records for control plane nodes
      ansible.builtin.command:
        argv:
          - aliyun
          - pvtz
          - AddZoneRecord
          - --ZoneId
          - "{{ item.zone_id }}"
          - --Rr
          - "{{ item.ip.split('.')[-1] }}"
          - --Type
          - PTR
          - --Value
          - "{{ cluster_name }}-master-{{ item.idx }}.{{ cluster_name }}.{{ base_domain }}."
          - --Ttl
          - "60"
          - --profile
          - "{{ aliyun_profile }}"
      loop:
        - { ip: "{{ master_ip1 }}", zone_id: "{{ reverse_zone_id1 }}", idx: "1" }
        - { ip: "{{ master_ip2 }}", zone_id: "{{ reverse_zone_id1 }}", idx: "2" }
        - { ip: "{{ master_ip3 }}", zone_id: "{{ reverse_zone_id2 }}", idx: "3" }
      register: ptr_results
      failed_when: false
      changed_when: true
      when:
        - item.ip | length > 0
        - item.zone_id | length > 0

    - name: Warn on PTR record failures (non-fatal — record may already exist)
      ansible.builtin.debug:
        msg: "WARNING: PTR for master-{{ item.item.idx }} ({{ item.item.ip }}) rc={{ item.rc }} stderr={{ item.stderr | default('') }}"
      loop: "{{ ptr_results.results }}"
      loop_control: { label: "master-{{ item.item.idx }}" }
      when:
        - item is not skipped
        - item.rc != 0
        - '"Record already exists" not in (item.stderr | default(""))'

    # ── Save ROS-generated CCM ConfigMap to disk for Phase 04 ──────────────
    - name: Save alibaba-ccm-config.yaml
      ansible.builtin.copy:
        dest: "{{ output_dir }}/alibaba-ccm-config.yaml"
        content: "{{ dynamic_manifest }}"
        mode: "0644"

    - name: Save install-config.yaml (reference copy)
      ansible.builtin.copy:
        dest: "{{ output_dir }}/install-config.yaml"
        content: "{{ install_config }}"
        mode: "0644"

    # ── Persist state ──────────────────────────────────────────────────────
    - name: Save state
      ansible.builtin.include_tasks: ../tasks/save_state.yml
      vars:
        new_state:
          ros_stack_id: "{{ ros_stack_id }}"
          vpc_id: "{{ vpc_id }}"
          private_vswitch: "{{ private_vswitch }}"
          api_lb_endpoint: "{{ api_lb_endpoint }}"
          worker_sg: "{{ worker_sg }}"
          node_ram_role: "{{ node_ram_role }}"
          dynamic_manifest_file: "{{ output_dir }}/alibaba-ccm-config.yaml"
          jump_host_ip: "{{ jump_host_ip | default('') }}"
          master_ip1: "{{ master_ip1 | default('') }}"
          master_ip2: "{{ master_ip2 | default('') }}"
          master_ip3: "{{ master_ip3 | default('') }}"

    # ── Mirror setup is NOT done here ─────────────────────────────────────────
    # When mirror_enabled, the ROS stack created a "bare" mirror ECS that has
    # only the OS + base packages + SSH access — no mirror-registry installed,
    # no image tarball imported, no AI cluster PATCH'd.
    #
    # All of that lives in a SEPARATE playbook so it can be iterated on
    # without re-creating the entire stack on every fix:
    #
    #   ansible-playbook ansible/playbooks/mirror-prepare.yml
    #
    # Only after mirror-prepare succeeds is the cluster ready for Phase 04.
    - name: Save mirror coordinates to state (mirror-prepare reads them)
      ansible.builtin.include_tasks: ../tasks/save_state.yml
      vars:
        new_state:
          mirror_private_ip: "{{ mirror_private_ip }}"
          mirror_init_user: "{{ mirror_init_user | default('mirror-admin') }}"
          mirror_init_password: "{{ _mirror_init_password_resolved }}"
      when: mirror_enabled | default(false) | bool
      no_log: true

    - name: Phase 03 done
      ansible.builtin.debug:
        msg: |
          ✓ Stack ready.

          API NLB    : {{ api_lb_endpoint }}
          {% if jump_host_ip | default('') | length > 0 %}
          Jump host  : {{ jump_host_ip }}

          SSH into jump host:
            ssh -i {{ ssh_priv_key_file }} root@{{ jump_host_ip }}

          From jump host → cluster nodes:
            ssh core@{{ master_ip1 | default('10.0.16.x') }}
            ssh core@{{ master_ip2 | default('10.0.16.y') }}
            ssh core@{{ master_ip3 | default('10.0.32.z') }}
          {% else %}
          Jump host  : (disabled — set enable_jump_host: true to provision one)
          {% endif %}

          Next step:
          {% if mirror_enabled | default(false) | bool %}
            ansible-playbook ansible/playbooks/04-prepare-mirror.yml   # ~25-40 min
            ansible-playbook ansible/playbooks/05-verify-mirror.yml    # sanity
            ansible-playbook ansible/playbooks/07-install-cluster.yml
          {% else %}
            ansible-playbook ansible/playbooks/07-install-cluster.yml
          {% endif %}

          Or one-shot 00→04:  ansible-playbook ansible/playbooks/site.yml
