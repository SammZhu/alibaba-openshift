---
# Phase 06 — Create the SHORT-LIVED cluster-stack
# via ROS, consuming mirror-stack outputs from state.yml.
#
# This is the split architecture Phase 06 (paired with
# 03-create-mirror-stack.yml).  Together they replace the legacy
# 03-create-stack-LEGACY.yml + create-cluster.yaml.
#
# What this stack contains:
#   - Control plane + worker SecurityGroups (+ cross-SG ingress)
#   - API NLB + ServerGroups + Listeners
#   - PrivateZone + records (api, api-int, *.apps, etcd-N)
#   - Reverse PrivateZones
#   - 3 master ECS instances + optional worker InstanceGroup
#
# Tear down freely with `teardown_target=cluster`; mirror-stack
# survives so the next install does not redo the ~30 min mirror prep.

- name: Create cluster-stack
  hosts: local
  gather_facts: false
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml
    - ansible.builtin.include_tasks: ../tasks/path_defaults.yml
    - ansible.builtin.include_tasks: ../tasks/mirror_defaults.yml

    - name: Sanity — mirror-stack outputs are in state.yml
      ansible.builtin.assert:
        that:
          - mirror_vpc_id is defined
          - mirror_private_vsw_1 is defined
          - mirror_private_vsw_2 is defined
          - mirror_node_ram_role is defined
        fail_msg: |
          Required mirror-stack outputs missing from state.yml.
          Run 03-create-mirror-stack.yml first.

    - name: Resolve ABI flag + the ImageId to pass this pass
      ansible.builtin.set_fact:
        _is_abi: "{{ installation_method | default('Assisted') | lower in ['agent', 'agent-based'] }}"

    # AI needs the agent/discovery image up-front (single create).  ABI's
    # ENI-first phase-1 create runs BEFORE the agent image exists (01 builds it
    # from the MACs this pass harvests), so it boots the masters from a throwaway
    # PLACEHOLDER system image; 06b later UpdateStacks ImageId to the real agent
    # image (in-place ReplaceSystemDisk keeps the ENI/MAC/IP).
    - name: Sanity — ECS image was imported by Phase 02 (Assisted only)
      ansible.builtin.assert:
        that:
          - ecs_image_id is defined
          - ecs_image_id | length > 0
        fail_msg: "Run 02-import-image.yml first."
      when: not (_is_abi | bool)

    # ABI phase-1 placeholder: a throwaway system image only needed so the
    # masters + their auto primary ENIs come up (06b reimages them to the agent
    # image).  Prefer Alibaba Cloud Linux 3 — the cloud-native image: free,
    # always present, fast-booting, no marketplace subscription.  Overridable
    # via abi_placeholder_image_id.
    #
    # NOTE on field values (verified 2026-06-19, cn-wulanchabu): the public OS is
    # Platform="Aliyun" (NOT "Alibaba Cloud Linux"), OSNameEn has a DOUBLE space
    # ("Alibaba Cloud Linux  3.2104 ..."), and the plain base image id is
    # aliyun_3_x64_20G_alibase_<date>.vhd.  We match on the ImageId prefix (most
    # robust).  Also DO NOT pass --InstanceType: it reorders results so third-
    # party distros (Ubuntu/Rocky/...) fill page 1 and push Aliyun off it.  Fetch
    # two pages and select across both.
    - name: ABI — list system Linux images for the placeholder (2 pages)
      ansible.builtin.command:
        argv:
          - aliyun
          - ecs
          - DescribeImages
          - --RegionId
          - "{{ region }}"
          - --ImageOwnerAlias
          - system
          - --OSType
          - linux
          - --Architecture
          - x86_64
          - --Status
          - Available
          - --PageSize
          - "100"
          - --PageNumber
          - "{{ item }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: _abi_images_pages
      changed_when: false
      loop: [1, 2]
      when:
        - _is_abi | bool
        - abi_placeholder_image_id | default('') | length == 0

    - name: ABI — flatten the image list across pages
      ansible.builtin.set_fact:
        _abi_all_images: >-
          {{ _abi_images_pages.results | default([]) | map(attribute='stdout')
             | map('from_json') | map(attribute='Images') | map(attribute='Image')
             | flatten }}
      when:
        - _is_abi | bool
        - abi_placeholder_image_id | default('') | length == 0

    - name: ABI — select placeholder image (prefer Alibaba Cloud Linux 3 base)
      vars:
        _acl3:   "{{ _abi_all_images | default([]) | selectattr('ImageId','defined') | selectattr('ImageId','match','^aliyun_3_x64_20G_alibase_') | map(attribute='ImageId') | list | sort }}"
        _aliyun: "{{ _abi_all_images | default([]) | selectattr('Platform','defined') | selectattr('Platform','equalto','Aliyun') | map(attribute='ImageId') | list | sort }}"
        _any:    "{{ _abi_all_images | default([]) | selectattr('ImageId','defined') | map(attribute='ImageId') | list }}"
      ansible.builtin.set_fact:
        _abi_placeholder_image: >-
          {{ abi_placeholder_image_id
             if (abi_placeholder_image_id | default('') | length > 0)
             else (_acl3[-1] if (_acl3 | length > 0)
                   else (_aliyun[-1] if (_aliyun | length > 0)
                         else (_any[0] if (_any | length > 0) else ''))) }}
      when: _is_abi | bool

    - name: ABI — show chosen placeholder image
      ansible.builtin.debug:
        msg: "ABI phase-1 placeholder image = {{ _abi_placeholder_image }}"
      when: _is_abi | bool

    - name: ABI — fail if no placeholder image found
      ansible.builtin.fail:
        msg: |
          No bootable system image found for {{ control_plane_type }} in {{ region }}.
          Set abi_placeholder_image_id in group_vars to a known-good system image id.
      when:
        - _is_abi | bool
        - _abi_placeholder_image | default('') | length == 0

    - name: Read SSH public key (informational; RHCOS gets keys via ignition)
      ansible.builtin.slurp:
        src: "{{ ssh_pub_key_file }}"
      register: _ssh_pub_slurp

    # Topology-effective sizing (same pattern 07-install-cluster.yml uses).
    # For cluster_topology=sno the ROS template pins ControlPlaneCount=1 +
    # ComputeCount=0 via AllowedValues; sending the HA group_vars defaults
    # straight through would violate AllowedValues and ROS would reject
    # the CreateStack with UserParameterMissing / value-out-of-range
    # (observed 2026-06-04 P3-COST.2 verification run, fix d45f16a missed
    # this site).  Derive effective counts up-front and use them below.
    - name: Resolve effective control-plane / compute counts per cluster_topology
      ansible.builtin.set_fact:
        _effective_control_plane_count: "{{ 1 if (cluster_topology | default('ha')) == 'sno' else (control_plane_count | int) }}"
        _effective_compute_count: "{{ 0 if (cluster_topology | default('ha')) == 'sno' else (compute_count | int) }}"

    - name: Build cluster-stack Parameters (ABI phase-1 uses placeholder ImageId)
      ansible.builtin.include_tasks: ../tasks/cluster_stack_params.yml
      vars:
        cluster_stack_image_id: "{{ _abi_placeholder_image if (_is_abi | bool) else ecs_image_id }}"

    # cluster_topology selects between HA (3-master + NLB) and SNO (1 ECS,
    # no NLB).  Defaults to 'ha' for back-compat.  See docs/SNO-MODE.md.
    - name: Resolve ROS template path per cluster_topology
      ansible.builtin.set_fact:
        _cs_template_file: >-
          {{ 'cluster-stack-sno.yaml'
             if (cluster_topology | default('ha')) == 'sno'
             else 'cluster-stack.yaml' }}

    - name: Announce template selection
      ansible.builtin.debug:
        msg: >-
          cluster_topology={{ cluster_topology | default('ha') }}
          → using ros-templates/{{ _cs_template_file }}

    - name: Create / adopt cluster-stack
      ansible.builtin.include_tasks: ../tasks/create_stack.yml
      vars:
        _cs_stack_name: "{{ cluster_name }}-cluster"
        _cs_template_path: "{{ repo_root }}/ros-templates/{{ _cs_template_file }}"
        _cs_parameters: "{{ _cluster_stack_params }}"
        _cs_state_key_id: "cluster_stack_id"
        _cs_timeout_minutes: 30

    - name: Map cluster-stack outputs to facts
      ansible.builtin.set_fact:
        api_lb_endpoint:  "{{ (_cs_outputs | selectattr('OutputKey','equalto','ApiLBEndpoint')        | first).OutputValue }}"
        worker_sg:        "{{ (_cs_outputs | selectattr('OutputKey','equalto','WorkerSecurityGroup') | first).OutputValue }}"
        # Instances always exist (placeholder at ABI phase-1), so MasterIp{1,2,3}
        # GetAtt the actual primary-NIC IP — which for ABI equals the fixed param.
        master_ip1:       "{{ (_cs_outputs | selectattr('OutputKey','equalto','MasterIp1')           | first).OutputValue }}"
        master_ip2:       "{{ (_cs_outputs | selectattr('OutputKey','equalto','MasterIp2')           | first).OutputValue }}"
        master_ip3:       "{{ (_cs_outputs | selectattr('OutputKey','equalto','MasterIp3')           | first).OutputValue }}"
        reverse_zone_id1: "{{ (_cs_outputs | selectattr('OutputKey','equalto','ReverseZoneId1')      | first).OutputValue }}"
        reverse_zone_id2: "{{ (_cs_outputs | selectattr('OutputKey','equalto','ReverseZoneId2')      | first).OutputValue }}"
        dynamic_manifest: "{{ (_cs_outputs | selectattr('OutputKey','equalto','DynamicCustomManifest')| first).OutputValue }}"

    # ENI-first via reimage: phase-1 booted the masters from the placeholder
    # image so their auto primary ENIs now exist.  Resolve each primary-NIC id
    # (stack output) to its MAC, then feed the MACs into agent-config hosts[] at
    # 01 (MAC -> hostname binding).  This is why 06 runs before 01 for ABI.
    - name: ABI — collect master primary-NIC ids from stack outputs
      ansible.builtin.set_fact:
        _abi_nic_ids:
          - "{{ (_cs_outputs | selectattr('OutputKey','equalto','Master1PrimaryNic') | first).OutputValue }}"
          - "{{ (_cs_outputs | selectattr('OutputKey','equalto','Master2PrimaryNic') | first).OutputValue }}"
          - "{{ (_cs_outputs | selectattr('OutputKey','equalto','Master3PrimaryNic') | first).OutputValue }}"
      when: _is_abi | bool

    - name: ABI — resolve each primary NIC to its MAC
      ansible.builtin.command:
        argv:
          - aliyun
          - ecs
          - DescribeNetworkInterfaces
          - --RegionId
          - "{{ region }}"
          - --NetworkInterfaceId.1
          - "{{ item }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: _abi_nic_desc
      changed_when: false
      loop: "{{ _abi_nic_ids | default([]) }}"
      when: _is_abi | bool

    - name: ABI — set master MAC facts
      ansible.builtin.set_fact:
        master_mac1: "{{ (_abi_nic_desc.results[0].stdout | from_json).NetworkInterfaceSets.NetworkInterfaceSet[0].MacAddress }}"
        master_mac2: "{{ (_abi_nic_desc.results[1].stdout | from_json).NetworkInterfaceSets.NetworkInterfaceSet[0].MacAddress }}"
        master_mac3: "{{ (_abi_nic_desc.results[2].stdout | from_json).NetworkInterfaceSets.NetworkInterfaceSet[0].MacAddress }}"
      when: _is_abi | bool

    - name: ABI — persist MACs + placeholder image to state (consumed by 01 / 06b)
      ansible.builtin.include_tasks: ../tasks/save_state.yml
      vars:
        new_state:
          master_mac1: "{{ master_mac1 }}"
          master_mac2: "{{ master_mac2 }}"
          master_mac3: "{{ master_mac3 }}"
          abi_placeholder_image_used: "{{ _abi_placeholder_image }}"
      when: _is_abi | bool

    - name: Save dynamic CCM config to {{ output_dir }}/alibaba-ccm-config.yaml
      ansible.builtin.copy:
        content: "{{ dynamic_manifest }}"
        dest: "{{ output_dir }}/alibaba-ccm-config.yaml"
        mode: "0644"

    - name: Resolve forward-zone ID by name (for Phase 07 PTR/DNS PATCHes)
      ansible.builtin.command:
        argv:
          - aliyun
          - pvtz
          - DescribeZones
          - --Keyword
          - "{{ cluster_name }}.{{ base_domain }}"
          - --profile
          - "{{ aliyun_profile }}"
      register: _pvtz_list
      changed_when: false

    - name: Set forward_zone_id fact
      # Don't use json_query — it needs the community.general collection
      # which the RHEL 8 default ansible install does not ship.  Plain dict
      # attribute access works (and is equally idempotent: on a miss,
      # default({}) → .ZoneId falls through to default('')).
      ansible.builtin.set_fact:
        forward_zone_id: >-
          {{ ((_pvtz_list.stdout | from_json).Zones.Zone
              | selectattr('ZoneName','equalto', cluster_name + '.' + base_domain)
              | list | first | default({})).ZoneId | default('') }}

    # PTR records: reverse DNS for each master fixed IP → <cluster>-master-N.
    # AI sets node hostnames itself via assisted-service requested_hostname, so
    # it doesn't need these and the new 06 didn't create them — keep that path
    # untouched (ABI-only).  ABI's RHCOS (no cloud-init / guest agent) takes its
    # hostname from DHCP option 12 or reverse-DNS, so without these PTRs the node
    # names fall back to MAC-derived junk.  Zone is chosen by the IP's 3rd octet
    # (16.* → zone1, else zone2) so it works regardless of master subnet.
    - name: Add PTR records for control plane nodes (reverse DNS → node hostname)
      ansible.builtin.command:
        argv:
          - aliyun
          - pvtz
          - AddZoneRecord
          - --ZoneId
          - "{{ reverse_zone_id1 if item.ip.split('.')[2] == '16' else reverse_zone_id2 }}"
          - --Rr
          - "{{ item.ip.split('.')[-1] }}"
          - --Type
          - PTR
          - --Value
          - "{{ cluster_name }}-master-{{ item.idx }}.{{ cluster_name }}.{{ base_domain }}."
          - --Ttl
          - "60"
          - --profile
          - "{{ aliyun_profile }}"
      loop:
        - { ip: "{{ master_ip1 }}", idx: "1" }
        - { ip: "{{ master_ip2 }}", idx: "2" }
        - { ip: "{{ master_ip3 }}", idx: "3" }
      register: _ptr_results
      failed_when: false
      changed_when: true
      when:
        - installation_method | default('Assisted') | lower in ['agent', 'agent-based']
        - item.ip | length > 0
        - (reverse_zone_id1 if item.ip.split('.')[2] == '16' else reverse_zone_id2) | length > 0

    - name: Warn on PTR record failures (non-fatal — record may already exist)
      ansible.builtin.debug:
        msg: "WARNING: PTR for master-{{ item.item.idx }} ({{ item.item.ip }}) rc={{ item.rc }} stderr={{ item.stderr | default('') }}"
      loop: "{{ _ptr_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.idx | default('?') }}"
      when:
        - item.rc is defined
        - item.rc != 0

    - name: Save cluster-stack facts to state
      ansible.builtin.include_tasks: ../tasks/save_state.yml
      vars:
        new_state:
          cluster_stack_id: "{{ _cs_stack_id }}"
          api_lb_endpoint: "{{ api_lb_endpoint }}"
          worker_sg: "{{ worker_sg }}"
          master_ip1: "{{ master_ip1 }}"
          master_ip2: "{{ master_ip2 }}"
          master_ip3: "{{ master_ip3 }}"
          forward_zone_id: "{{ forward_zone_id }}"
          reverse_zone_id1: "{{ reverse_zone_id1 }}"
          reverse_zone_id2: "{{ reverse_zone_id2 }}"
          dynamic_manifest_file: "{{ output_dir }}/alibaba-ccm-config.yaml"

    - name: Phase 06 (cluster-stack) done
      ansible.builtin.debug:
        msg: |
          ✓ cluster-stack ready (topology={{ cluster_topology | default('ha') }}).

          api-int endpoint : {{ api_lb_endpoint }}{{
            ' (SNO: master IP — no NLB)' if (cluster_topology | default('ha')) == 'sno' else ' (HA: NLB DNS)' }}
          master-1 IP      : {{ master_ip1 }}
          master-2 IP      : {{ master_ip2 if master_ip2 else '(n/a — SNO)' }}
          master-3 IP      : {{ master_ip3 if master_ip3 else '(n/a — SNO)' }}

          Next:
            ansible-playbook ansible/playbooks/07-install-cluster.yml
