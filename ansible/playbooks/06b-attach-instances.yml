---
# Phase 06b — Agent-based ENI-first phase-2: attach instances to the stack.
#
# Runs AFTER 01-prepare-iso-agent.yml has built + imported the agent image.
# 06 (phase-1) created the cluster-stack with only the network plumbing and the
# 3 fixed-IP control-plane ENIs (ImageId was empty → instances deferred via the
# template's HasImage condition).  This playbook re-submits the SAME stack with
# ImageId=ecs_image_id via UpdateStack, which materialises the 3 master
# instances, each attaching its pre-created ENI as the primary NIC (so the MACs
# baked into agent-config hosts[] match the booting nodes → deterministic
# hostnames, including the rendezvous/node-zero).
#
# Agent-based ONLY.  The Assisted path never runs this (06 creates everything in
# one shot because it always has the image).

- name: Attach control-plane instances (ABI ENI-first phase-2)
  hosts: local
  gather_facts: false
  tasks:
    - ansible.builtin.include_tasks: ../tasks/load_state.yml
    - ansible.builtin.include_tasks: ../tasks/path_defaults.yml
    - ansible.builtin.include_tasks: ../tasks/mirror_defaults.yml

    - name: Guard — Agent-based only
      ansible.builtin.assert:
        that:
          - installation_method | default('Assisted') | lower in ['agent', 'agent-based']
        fail_msg: "06b is Agent-based ENI-first only; the Assisted path creates instances in 06."

    - name: Sanity — phase-1 stack + agent image present
      ansible.builtin.assert:
        that:
          - cluster_stack_id is defined and cluster_stack_id | length > 0
          - ecs_image_id is defined and ecs_image_id | length > 0
        fail_msg: |
          Need both the phase-1 cluster_stack_id (run 06-create-cluster-stack.yml)
          and ecs_image_id (run 01-prepare-iso-agent.yml) in state.yml first.

    - name: Read SSH public key (informational; RHCOS gets keys via ignition)
      ansible.builtin.slurp:
        src: "{{ ssh_pub_key_file }}"
      register: _ssh_pub_slurp

    - name: Resolve effective control-plane / compute counts per cluster_topology
      ansible.builtin.set_fact:
        _effective_control_plane_count: "{{ 1 if (cluster_topology | default('ha')) == 'sno' else (control_plane_count | int) }}"
        _effective_compute_count: "{{ 0 if (cluster_topology | default('ha')) == 'sno' else (compute_count | int) }}"

    - name: Resolve ROS template path per cluster_topology
      ansible.builtin.set_fact:
        _cs_template_file: >-
          {{ 'cluster-stack-sno.yaml'
             if (cluster_topology | default('ha')) == 'sno'
             else 'cluster-stack.yaml' }}

    # Same parameters as the phase-1 create, but now with the real ImageId so
    # the instances (Condition HasImage) come into existence.
    - name: Build cluster-stack Parameters with the agent ImageId
      ansible.builtin.include_tasks: ../tasks/cluster_stack_params.yml
      vars:
        cluster_stack_image_id: "{{ ecs_image_id }}"

    - name: UpdateStack — materialise control-plane instances
      ansible.builtin.include_tasks: ../tasks/update_stack.yml
      vars:
        _cs_stack_name: "{{ cluster_name }}-cluster"
        _cs_stack_id: "{{ cluster_stack_id }}"
        _cs_template_path: "{{ repo_root }}/ros-templates/{{ _cs_template_file }}"
        _cs_parameters: "{{ _cluster_stack_params }}"

    - name: Map refreshed outputs to facts
      ansible.builtin.set_fact:
        api_lb_endpoint:  "{{ (_cs_outputs | selectattr('OutputKey','equalto','ApiLBEndpoint') | first).OutputValue }}"
        master_ip1:       "{{ (_cs_outputs | selectattr('OutputKey','equalto','MasterIp1')     | first).OutputValue }}"
        master_ip2:       "{{ (_cs_outputs | selectattr('OutputKey','equalto','MasterIp2')     | first).OutputValue }}"
        master_ip3:       "{{ (_cs_outputs | selectattr('OutputKey','equalto','MasterIp3')     | first).OutputValue }}"

    - name: Persist refreshed endpoint to state
      ansible.builtin.include_tasks: ../tasks/save_state.yml
      vars:
        new_state:
          api_lb_endpoint: "{{ api_lb_endpoint }}"

    - name: Phase 06b done
      ansible.builtin.debug:
        msg: |
          ✓ Control-plane instances created, ENIs attached as primary NIC.
          Masters: {{ master_ip1 }} / {{ master_ip2 }} / {{ master_ip3 }}
          Nodes will boot the agent image and self-install.
          Next: ansible-playbook ansible/playbooks/07-install-cluster-agent.yml
