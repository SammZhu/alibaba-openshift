---
# Single source of truth for component image references.
#
# Bump the tag HERE; every playbook pulls it via `vars_files` (04 mirror /
# 08 deploy / 09 smoke / 11 routeb). Do NOT hardcode an image tag in a playbook
# or manifest again — that is exactly how 04/08/02 drifted to v0.1.2 while 11
# was on v0.1.11 and 09 on v0.1.4.
#
# Keep in sync (both are outside ansible's var loading, so they can't read this):
#   - scripts/build-mirror-tarball.sh   OPENSHIFT_CAPI_IMAGE default
#   - openshift-capi-alicloud config/manager/deployment.yaml  static `image:` fallback
#     (08 sed-overrides it with capa_image at deploy time, but keep it current)
capa_image_repo: "quay.io/samzhu/openshift-capi-alicloud"
capa_image_tag: "v0.1.22"
capa_image: "{{ capa_image_repo }}:{{ capa_image_tag }}"

# CSI operator release version (the operator's OWN semver, independent of the
# bundled upstream csi-driver imageTag which stays v1.35.3 in the CR/operator).
# Auto-bumped by the alibaba-cloud-csi-operator CI sync-deploy-tag job on a v* tag
# (same mechanism as capa_image_tag). Drives the air-gap mirror pre-pull list in
# 04-prepare-mirror.yml — the operator, bundle and catalog images all share this tag.
# The deploy itself (08 `kustomize build .../config/default`) reads the tag from the
# operator repo's config/manager/kustomization.yaml, bumped in the same release.
# Keep in sync (outside ansible var loading, can't read this):
#   - scripts/build-mirror-tarball.sh   CSI image tags
csi_operator_image_repo: "quay.io/samzhu/alibaba-cloud-csi-operator"
csi_operator_image_tag: "v0.1.0"
