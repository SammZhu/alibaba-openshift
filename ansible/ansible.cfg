[defaults]
inventory               = ./inventory.yml
jinja2_native           = true   # preserve Python types in templates (int stays int, not "3")
host_key_checking       = False
retry_files_enabled     = False
# stdout_callback = community.general.yaml   # nicer output; needs:
#   ansible-galaxy collection install community.general
# We default to the built-in callback so a fresh ansible-core works
# out of the box. Uncomment + install the collection if you prefer
# YAML-formatted output.
stdout_callback         = default
# surface_errors: aggregate callback (runs alongside the stdout callback) that
# prints a compact error block (stderr/msg/rc) on any failure, so the real cause
# is visible without scrolling the result JSON.  See callback_plugins/surface_errors.py.
# (no_log tasks are censored before callbacks; those surface their own error via
#  tasks/run_checked.yml — see create_stack.yml/update_stack.yml.)
callback_plugins        = ./callback_plugins
callbacks_enabled       = surface_errors
forks                   = 10
gathering               = explicit
interpreter_python      = auto_silent
display_skipped_hosts   = False
display_ok_hosts        = True
nocows                  = True

# Persist every playbook run to a rolling log file.
# All runs append to the same file — grep by timestamp / playbook name to
# locate a specific session.  Override via ANSIBLE_LOG_PATH env var.
# The file is gitignored (see .gitignore).
log_path                = ./logs/ansible.log

# Tighten error output
[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml

[ssh_connection]
ssh_args                = -o ControlMaster=auto -o ControlPersist=300s -o ServerAliveInterval=30
pipelining              = True
