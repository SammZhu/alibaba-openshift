[defaults]
inventory               = ./inventory.yml
host_key_checking       = False
retry_files_enabled     = False
# stdout_callback = community.general.yaml   # nicer output; needs:
#   ansible-galaxy collection install community.general
# We default to the built-in callback so a fresh ansible-core works
# out of the box. Uncomment + install the collection if you prefer
# YAML-formatted output.
stdout_callback         = default
forks                   = 10
gathering               = explicit
interpreter_python      = auto_silent
display_skipped_hosts   = False
display_ok_hosts        = True
nocows                  = True

# Tighten error output
[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml

[ssh_connection]
ssh_args                = -o ControlMaster=auto -o ControlPersist=300s -o ServerAliveInterval=30
pipelining              = True
