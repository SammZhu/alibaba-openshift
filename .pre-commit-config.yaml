# Pre-commit hooks for this repo.  Install once:
#
#   pip install pre-commit
#   pre-commit install
#
# Then every `git commit` runs these checks automatically.  Add the
# scripts/lint-ansible-quotes.py hook because we kept burning an entire
# 03b cycle on the "single apostrophe in a comment breaks ansible"
# class of bug.
repos:
  - repo: local
    hooks:
      - id: ansible-shell-quote-balance
        name: ansible.builtin.shell heredoc — single-quote balance
        entry: scripts/lint-ansible-quotes.py
        language: system
        files: ^ansible/.*\.ya?ml$
        pass_filenames: true

  # Shell/correctness regression gate — mirrors the CI ansible-lint job.
  # Config: .ansible-lint (cosmetic -> warnings); baseline: .ansible-lint-ignore
  # (existing findings grandfathered). Blocks NEW no-changed-when /
  # risky-shell-pipe / command-instead-of-* so shell can't silently get worse.
  # Version pinned to match CI for an identical gate. Note: ansible-lint 6.x
  # crashes on ansible-core >= 2.19 (removed ansible.parsing.yaml.constructor);
  # 26.x matches modern core, which is what CI's Python 3.11 resolves.
  - repo: https://github.com/ansible/ansible-lint
    rev: v26.6.0
    hooks:
      - id: ansible-lint
        args: ["-q", "ansible/"]
        pass_filenames: false
