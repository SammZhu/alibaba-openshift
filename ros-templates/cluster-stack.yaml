ROSTemplateFormatVersion: '2015-09-01'
Description: |
  OpenShift on Alibaba Cloud — SHORT-LIVED (cluster) stack.

  Provisions everything that gets torn down on each cluster rebuild:
    * Security Groups (control plane + worker + cross-SG ingress rules)
    * API NLB + 2 ServerGroups (6443, 22623) + 2 Listeners
    * PrivateZone + records (api / api-int / *.apps / etcd-N)
    * Reverse PrivateZones for PTR records
    * 3 control plane ECS instances (split, not InstanceGroup, so each
      can be individually attached to the NLB ServerGroup)
    * Worker InstanceGroup (conditional on ComputeCount > 0)

  Companion template: mirror-stack.yaml — the PERSISTENT stack that
  owns the VPC, NAT, RAM roles, optional jump host, and the
  mirror-registry ECS.  This stack takes mirror-stack's outputs as
  parameters (VpcId, VSwitchIds, NodeRamRoleName,
  JumpHostSecurityGroupId, MirrorPrivateIp).

  Workflow:
    1. Create mirror-stack    (one-time)
    2. Run 04-prepare-mirror (one-time)
    3. Create cluster-stack   (this template; per-cluster)
    4. Run 04-install-cluster (per-cluster)
    5. Delete cluster-stack   (per-cluster; mirror-stack survives)
    6. Repeat 3-5 freely

Parameters:
  # ── References to mirror-stack outputs (operator passes these in) ────────
  # When invoked by ansible (06-create-cluster-stack.yml) these come
  # straight from state.yml; for manual ROS-console creation, copy the
  # values from the mirror-stack outputs page.
  VpcId:
    Type: String
    Description: VPC ID — from mirror-stack output VpcId
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: VPC CIDR — must match mirror-stack VpcCidr
  PrivateVSwitchId:
    Type: String
    Description: Primary private VSwitch (zone1) — from mirror-stack PrivateVSwitchId
  PrivateVSwitch2Id:
    Type: String
    Description: Secondary private VSwitch (zone2) — from mirror-stack PrivateVSwitch2Id
  PrivateVSwitch3Id:
    Type: String
    Default: ""
    Description: |
      Third private VSwitch (zone3) — from mirror-stack PrivateVSwitch3Id.
      Agent-based multi-AZ only (master-3 in zone3); empty for Assisted / single-AZ.
  ZoneId:
    Type: String
    Description: Primary zone — from mirror-stack ZoneId
  ZoneId2:
    Type: String
    Description: Secondary zone — from mirror-stack ZoneId2
  ZoneId3:
    Type: String
    Default: ""
    Description: Third zone — from mirror-stack ZoneId3 (Agent-based multi-AZ; empty otherwise)
  NodeRamRoleName:
    Type: String
    Default: openshift-node-role
    Description: Node RAM role name — from mirror-stack NodeRamRoleName
  JumpHostSecurityGroupId:
    Type: String
    Default: "none"
    Description: |
      Optional jump-host SG ID — from mirror-stack JumpHostSecurityGroupId
      output (only present when mirror-stack had EnableJumpHost=true).
      Used as SourceGroupId for the SSH ingress rules.  Pair with
      EnableJumpHostSsh="true" to actually create the rules.

  EnableJumpHostSsh:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: |
      When "true", create SSH-from-jump-host ingress rules on master +
      worker SGs.  06 sets this to "true" when jump_host_sg_id is a
      real SG id.

      Why a separate boolean parameter instead of !Not [!Equals
      [JumpHostSecurityGroupId, "none"]] on the SG ID itself:
      observed 2026-05-30 that Aliyun ROS evaluates Fn::Not against
      Fn::Equals as FALSE even when the inner Equals is plainly FALSE
      (verified: param = real sg-..., compared to literal "none",
      expected HasJumpHost=true → got false → SSH rules never created
      → 07's scp-CA-cert step timed out connecting to master:22).
      Plain Fn::Equals with positive logic ("true" → HasJumpHost) is
      known to work — IsAssisted / HasWorkers in this template use it.

  # ── Cluster identity ────────────────────────────────────────────────────
  ClusterName:
    Type: String
    Description: OpenShift cluster name (must match Red Hat console entry)
    AllowedPattern: '[a-z0-9][a-z0-9-]{1,20}[a-z0-9]'

  BaseDomain:
    Type: String
    Description: Base domain (e.g. example.com). PrivateZone will be <ClusterName>.<BaseDomain>.

  Region:
    Type: String
    Default: cn-wulanchabu

  # ── Compute sizing ──────────────────────────────────────────────────────
  ControlPlaneCount:
    Type: Number
    Default: 3
    AllowedValues: [3]
  ControlPlaneInstanceType:
    Type: String
    Default: ecs.c7.2xlarge
  ComputeCount:
    Type: Number
    Default: 0
    MinValue: 0
  ComputeInstanceType:
    Type: String
    Default: ecs.c7.xlarge

  SystemDiskCategory:
    Type: String
    Default: cloud_essd
    AllowedValues: [cloud_essd, cloud_ssd, cloud_efficiency]
  SystemDiskSize:
    Type: Number
    Default: 40
  InstallDiskSize:
    Type: Number
    Default: 100
    Description: |
      Size in GB of /dev/vdb on each control plane node.  OpenShift
      requires ≥ 100 GB ("Disk is too small … 100 GB required").
      Cloned to /dev/vda before reboot via clone-vdb-to-vda hook.

  InstallationMethod:
    Type: String
    Default: Assisted
    AllowedValues: [Assisted, Agent-based]

  ImageId:
    Type: String
    Description: |
      ECS image the control-plane instances boot from.

      Assisted: the custom image imported from the discovery ISO (Phase 02).

      Agent-based (ENI-first via reimage): on the FIRST create this is a
      throwaway *placeholder* system image — the instances come up with their
      fixed IPs + auto primary ENIs so we can harvest the ENI MACs (which feed
      agent-config hosts[] -> deterministic hostnames).  After the agent image
      is built, a stack UPDATE swaps ImageId to it; ROS performs an in-place
      ReplaceSystemDisk (an "interruption", not a replacement), so each
      instance keeps its primary ENI + MAC + fixed IP and reboots into the
      agent image to self-install.

  RendezvousIp:
    Type: String
    Default: 10.0.16.5
    Description: |
      Agent-based only.  Fixed private IP for the rendezvous node (master-1).
      Multi-AZ layout: master-1 lives in zone1 (PrivateVSwitchId / PrivateSubnetCidr,
      10.0.16.0/20), so the rendezvous IP must fall there (e.g. 10.0.16.5,
      alongside the mirror ECS at 10.0.16.4).

  Master2Ip:
    Type: String
    Default: 10.0.32.6
    Description: |
      Agent-based only.  Fixed private IP for master-2 in zone2
      (PrivateVSwitch2Id / PrivateSubnetCidr2, 10.0.32.0/20).

  Master3Ip:
    Type: String
    Default: 10.0.48.7
    Description: |
      Agent-based only.  Fixed private IP for master-3 in zone3
      (PrivateVSwitch3Id / PrivateSubnetCidr3, 10.0.48.0/20).

  IngressVip:
    Type: String
    Default: 10.0.16.6
    Description: |
      Placeholder IP for the *.apps wildcard PrivateZone record
      required by Assisted Installer's host DNS validation.  After
      install, the ingress operator creates a real SLB via CCM; update
      the *.apps record to that SLB IP.

  SshPublicKey:
    Type: String
    Default: ""
    Description: |
      SSH public key (informational; RHCOS gets its key via ignition,
      not from this parameter).

Conditions:
  IsAgentBased: !Equals [!Ref InstallationMethod, Agent-based]
  IsAssisted:   !Equals [!Ref InstallationMethod, Assisted]
  HasWorkers:   !Not [!Equals [!Ref ComputeCount, 0]]
  HasJumpHost:  !Equals [!Ref EnableJumpHostSsh, "true"]
  # Multi-AZ control plane (Agent-based): master-1/2/3 spread across zone1/2/3.
  # True only when a third zone/VSwitch is supplied — i.e. the ABI multi-AZ path.
  # Assisted keeps all masters in zone2 (zero regression).
  HasZone3:     !Not [!Equals [!Ref ZoneId3, ""]]

Resources:
  # ── Security Groups ──────────────────────────────────────────────────────
  ControlPlaneSecurityGroup:
    Type: ALIYUN::ECS::SecurityGroup
    Properties:
      VpcId: !Ref VpcId
      SecurityGroupName: !Sub '${ClusterName}-master-sg'
      SecurityGroupIngress:
        - IpProtocol: tcp
          PortRange: 6443/6443
          SourceCidrIp: !Ref VpcCidr
          Description: Kubernetes API (VPC-internal only; exposed via NLB)
        - IpProtocol: tcp
          PortRange: 22623/22623
          SourceCidrIp: !Ref VpcCidr
          Description: Machine Config Server
        - IpProtocol: tcp
          PortRange: 2379/2380
          SourceCidrIp: !Ref VpcCidr
          Description: etcd
        # OCP's default ingress operator on platform=external uses
        # endpointPublishingStrategy=HostNetwork (no LoadBalancer Service
        # is auto-created — that would need an additional cloud LB
        # controller).  router-default pods bind master:80/443 via
        # hostNetwork.  Without these rules, internal HTTP probes
        # (oauth/console/canary) from other masters timeout and the
        # authentication / console / ingress operators get stuck Degraded.
        # Observed 2026-05-30.
        - IpProtocol: tcp
          PortRange: 80/80
          SourceCidrIp: !Ref VpcCidr
          Description: Ingress HTTP (router-default hostNetwork on masters)
        - IpProtocol: tcp
          PortRange: 443/443
          SourceCidrIp: !Ref VpcCidr
          Description: Ingress HTTPS (router-default hostNetwork on masters)
        # Agent-based only: the rendezvous node runs assisted-service on 8090.
        # Masters reach each other intra-SG by default, but the monitoring host
        # — the mirror ECS (different SG) running `openshift-install agent
        # wait-for`, and the jump host — is NOT, so without this the wait-for
        # gets "Agent Rest API never initialized" even though the install
        # succeeds.  Install-time only; assisted-service stops post-install.
        - !If
          - IsAgentBased
          - IpProtocol: tcp
            PortRange: 8090/8090
            SourceCidrIp: !Ref VpcCidr
            Description: Agent-based assisted-service API (install-time; wait-for from mirror/jump)
          - !Ref 'ALIYUN::NoValue'
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  WorkerSecurityGroup:
    Type: ALIYUN::ECS::SecurityGroup
    Properties:
      VpcId: !Ref VpcId
      SecurityGroupName: !Sub '${ClusterName}-worker-sg'
      SecurityGroupIngress:
        - IpProtocol: tcp
          PortRange: 80/80
          SourceCidrIp: 0.0.0.0/0
          Description: Ingress HTTP
        - IpProtocol: tcp
          PortRange: 443/443
          SourceCidrIp: 0.0.0.0/0
          Description: Ingress HTTPS
        - IpProtocol: tcp
          PortRange: 30000/32767
          SourceCidrIp: !Ref VpcCidr
          Description: NodePort services (SLB health-check + VPC-internal)
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  CPSGFromWorkers:
    Type: ALIYUN::ECS::SecurityGroupIngress
    DependsOn: [ControlPlaneSecurityGroup, WorkerSecurityGroup]
    Properties:
      SecurityGroupId: !Ref ControlPlaneSecurityGroup
      IpProtocol: all
      PortRange: -1/-1
      NicType: intranet
      SourceGroupId: !Ref WorkerSecurityGroup
      Description: From workers (kubelet → API, OVN Geneve overlay)

  WorkerSGFromMasters:
    Type: ALIYUN::ECS::SecurityGroupIngress
    DependsOn: [ControlPlaneSecurityGroup, WorkerSecurityGroup]
    Properties:
      SecurityGroupId: !Ref WorkerSecurityGroup
      IpProtocol: all
      PortRange: -1/-1
      NicType: intranet
      SourceGroupId: !Ref ControlPlaneSecurityGroup
      Description: From masters (Geneve UDP 6081 + kubelet)

  # Cross-stack SG ingress (uses JumpHostSecurityGroupId from mirror-stack)
  CPSGSSHFromJumpHost:
    Type: ALIYUN::ECS::SecurityGroupIngress
    Condition: HasJumpHost
    DependsOn: ControlPlaneSecurityGroup
    Properties:
      SecurityGroupId: !Ref ControlPlaneSecurityGroup
      IpProtocol: tcp
      PortRange: 22/22
      NicType: intranet
      SourceGroupId: !Ref JumpHostSecurityGroupId
      Description: SSH from jump host (mirror-stack) to master nodes

  WorkerSGSSHFromJumpHost:
    Type: ALIYUN::ECS::SecurityGroupIngress
    Condition: HasJumpHost
    DependsOn: WorkerSecurityGroup
    Properties:
      SecurityGroupId: !Ref WorkerSecurityGroup
      IpProtocol: tcp
      PortRange: 22/22
      NicType: intranet
      SourceGroupId: !Ref JumpHostSecurityGroupId
      Description: SSH from jump host (mirror-stack) to worker nodes

  # ── API Server NLB ──────────────────────────────────────────────────────
  ApiNLB:
    Type: ALIYUN::NLB::LoadBalancer
    Properties:
      LoadBalancerName: !Sub '${ClusterName}-api'
      LoadBalancerType: Network
      AddressType: Intranet
      AddressIpVersion: Ipv4
      VpcId: !Ref VpcId
      ZoneMappings:
        - ZoneId: !Ref ZoneId
          VSwitchId: !Ref PrivateVSwitchId
        - ZoneId: !Ref ZoneId2
          VSwitchId: !Ref PrivateVSwitch2Id
        # zone3 added for the Agent-based multi-AZ control plane (master-3).
        - !If
          - HasZone3
          - ZoneId: !Ref ZoneId3
            VSwitchId: !Ref PrivateVSwitch3Id
          - !Ref 'ALIYUN::NoValue'
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  # 6443 — Kubernetes API server (Servers inline; NLB has no SG attachment resource)
  ApiServerGroup:
    Type: ALIYUN::NLB::ServerGroup
    Properties:
      ServerGroupName: !Sub '${ClusterName}-api-6443'
      ServerGroupType: Instance
      VpcId: !Ref VpcId
      Protocol: TCP
      Scheduler: Wrr
      HealthCheckConfig:
        HealthCheckEnabled: true
        HealthCheckType: Tcp
        HealthCheckConnectPort: 6443
        HealthCheckInterval: 10
        HealthyThreshold: 2
        UnhealthyThreshold: 2
      Servers:
        - ServerId: !Ref RendezvousInstance
          ServerType: Ecs
          Port: 6443
          Weight: 100
        - ServerId: !Ref ControlPlaneInstance2
          ServerType: Ecs
          Port: 6443
          Weight: 100
        - ServerId: !Ref ControlPlaneInstance3
          ServerType: Ecs
          Port: 6443
          Weight: 100

  ApiNLBListener:
    Type: ALIYUN::NLB::Listener
    Properties:
      LoadBalancerId: !Ref ApiNLB
      ListenerProtocol: TCP
      ListenerPort: 6443
      ServerGroupId: !Ref ApiServerGroup

  # 22623 — Machine Config Server (ignition fetch during install)
  McsServerGroup:
    Type: ALIYUN::NLB::ServerGroup
    Properties:
      ServerGroupName: !Sub '${ClusterName}-mcs-22623'
      ServerGroupType: Instance
      VpcId: !Ref VpcId
      Protocol: TCP
      Scheduler: Wrr
      HealthCheckConfig:
        HealthCheckEnabled: true
        HealthCheckType: Tcp
        HealthCheckConnectPort: 22623
        HealthCheckInterval: 10
        HealthyThreshold: 2
        UnhealthyThreshold: 2
      Servers:
        - ServerId: !Ref RendezvousInstance
          ServerType: Ecs
          Port: 22623
          Weight: 100
        - ServerId: !Ref ControlPlaneInstance2
          ServerType: Ecs
          Port: 22623
          Weight: 100
        - ServerId: !Ref ControlPlaneInstance3
          ServerType: Ecs
          Port: 22623
          Weight: 100

  McsNLBListener:
    Type: ALIYUN::NLB::Listener
    Properties:
      LoadBalancerId: !Ref ApiNLB
      ListenerProtocol: TCP
      ListenerPort: 22623
      ServerGroupId: !Ref McsServerGroup

  # ── Private DNS ─────────────────────────────────────────────────────────
  PrivateZone:
    Type: ALIYUN::PVTZ::Zone
    Properties:
      ZoneName: !Sub '${ClusterName}.${BaseDomain}'
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  PrivateZoneVpcBinding:
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    Properties:
      ZoneId: !Ref PrivateZone
      Vpcs:
        - VpcId: !Ref VpcId
          RegionId: !Ref Region

  # api / api-int CNAME → NLB DNSName (per-zone HA)
  ApiRecord:
    Type: ALIYUN::PVTZ::ZoneRecord
    Properties:
      ZoneId: !Ref PrivateZone
      Rr: api
      Type: CNAME
      Value: !GetAtt ApiNLB.DNSName
      Ttl: 60

  ApiIntRecord:
    Type: ALIYUN::PVTZ::ZoneRecord
    Properties:
      ZoneId: !Ref PrivateZone
      Rr: api-int
      Type: CNAME
      Value: !GetAtt ApiNLB.DNSName
      Ttl: 60

  AppsRecord:
    Type: ALIYUN::PVTZ::ZoneRecord
    Properties:
      ZoneId: !Ref PrivateZone
      Rr: '*.apps'
      Type: A
      Value: !Ref IngressVip
      Ttl: 60

  # etcd-N A records → master private IPs
  EtcdRecord0:
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn: [RendezvousInstance, PrivateZone]
    Properties:
      ZoneId: !Ref PrivateZone
      Rr: etcd-0
      Type: A
      Value: !If [IsAgentBased, !Ref RendezvousIp, !GetAtt RendezvousInstance.PrivateIp]
      Ttl: 60

  EtcdRecord1:
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn: [ControlPlaneInstance2, PrivateZone]
    Properties:
      ZoneId: !Ref PrivateZone
      Rr: etcd-1
      Type: A
      Value: !If [IsAgentBased, !Ref Master2Ip, !GetAtt ControlPlaneInstance2.PrivateIp]
      Ttl: 60

  EtcdRecord2:
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn: [ControlPlaneInstance3, PrivateZone]
    Properties:
      ZoneId: !Ref PrivateZone
      Rr: etcd-2
      Type: A
      Value: !If [IsAgentBased, !Ref Master3Ip, !GetAtt ControlPlaneInstance3.PrivateIp]
      Ttl: 60

  # ── Reverse DNS zones (PTR records added by Phase 03 post-creation) ──────
  ReverseZone1:
    Type: ALIYUN::PVTZ::Zone
    Properties:
      ZoneName: 16.0.10.in-addr.arpa

  ReverseZone1VpcBinding:
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    DependsOn: ReverseZone1
    Properties:
      ZoneId: !Ref ReverseZone1
      Vpcs:
        - VpcId: !Ref VpcId
          RegionId: !Ref Region

  ReverseZone2:
    Type: ALIYUN::PVTZ::Zone
    Properties:
      ZoneName: 32.0.10.in-addr.arpa

  ReverseZone2VpcBinding:
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    DependsOn: ReverseZone2
    Properties:
      ZoneId: !Ref ReverseZone2
      Vpcs:
        - VpcId: !Ref VpcId
          RegionId: !Ref Region

  # Reverse zone for the multi-AZ master-3 subnet (10.0.48.0/20 -> 48.0.10.in-addr.arpa)
  ReverseZone3:
    Type: ALIYUN::PVTZ::Zone
    Condition: HasZone3
    Properties:
      ZoneName: 48.0.10.in-addr.arpa

  ReverseZone3VpcBinding:
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    Condition: HasZone3
    DependsOn: ReverseZone3
    Properties:
      ZoneId: !Ref ReverseZone3
      Vpcs:
        - VpcId: !Ref VpcId
          RegionId: !Ref Region

  # ── ECS Instances (Agent-based: multi-AZ master-1/2/3 in zone1/2/3; Assisted: all zone2) ─────
  # Serialised via DependsOn chain so ROS does not batch a single
  # RunInstances(Amount=2+) call that Aliyun cn-wulanchabu often rejects
  # atomically even when per-instance stock is available.
  #
  # ENI-first via reimage (Agent-based): phase-1 boots these from a placeholder
  # ImageId with their fixed IPs (auto primary ENI); ansible harvests each auto
  # ENI's MAC (GetAtt PrimaryNetworkInterfaceId -> DescribeNetworkInterfaces) to
  # feed agent-config hosts[]; phase-2 UpdateStack swaps ImageId to the agent
  # image -> in-place ReplaceSystemDisk keeps the ENI/MAC/IP and reboots into
  # the agent image.  So the masters always carry their fixed PrivateIpAddress
  # on the auto primary NIC -- no separate ENI resource, single NIC.
  RendezvousInstance:
    Type: ALIYUN::ECS::Instance
    Properties:
      InstanceName: !Sub '${ClusterName}-master-1'
      # ABI only: gives RHCOS a real hostname via DHCP/IMDS instead of the
      # MAC-derived fallback.  AI sets node names itself (requested_hostname),
      # so leave it unset there to keep AI behaviour byte-for-byte unchanged.
      HostName: !If [IsAgentBased, !Sub '${ClusterName}-master-1', !Ref 'ALIYUN::NoValue']
      InstanceType: !Ref ControlPlaneInstanceType
      ImageId: !Ref ImageId
      SecurityGroupId: !Ref ControlPlaneSecurityGroup
      # ABI multi-AZ: master-1 (rendezvous) in zone1.  Assisted: zone2 (unchanged).
      VSwitchId: !If [IsAgentBased, !Ref PrivateVSwitchId, !Ref PrivateVSwitch2Id]
      SystemDiskCategory: !Ref SystemDiskCategory
      SystemDiskSize: !Ref SystemDiskSize
      # Agent-based: NO extra install disk.  The Alibaba ISO boot makes the agent
      # ISO the system disk (/dev/vda); the minimal ISO runs its rootfs from RAM
      # so /dev/vda is free, and with no second disk the assisted-installer
      # installs RHCOS directly to /dev/vda -> reboot boots RHCOS (no vdb->vda
      # clone hook needed).  Assisted keeps the /dev/vdb install disk + clone hook.
      DiskMappings: !If
        - IsAgentBased
        - !Ref 'ALIYUN::NoValue'
        - - Category: !Ref SystemDiskCategory
            Size: !Ref InstallDiskSize
            DiskName: !Sub '${ClusterName}-master-1-install'
      AllocatePublicIP: false
      PrivateIpAddress: !If [IsAgentBased, !Ref RendezvousIp, !Ref 'ALIYUN::NoValue']
      RamRoleName: !Ref NodeRamRoleName
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned
        - Key: openshift-node-role
          Value: master

  ControlPlaneInstance2:
    Type: ALIYUN::ECS::Instance
    DependsOn: RendezvousInstance
    Properties:
      InstanceName: !Sub '${ClusterName}-master-2'
      HostName: !If [IsAgentBased, !Sub '${ClusterName}-master-2', !Ref 'ALIYUN::NoValue']
      InstanceType: !Ref ControlPlaneInstanceType
      ImageId: !Ref ImageId
      SecurityGroupId: !Ref ControlPlaneSecurityGroup
      VSwitchId: !Ref PrivateVSwitch2Id
      SystemDiskCategory: !Ref SystemDiskCategory
      SystemDiskSize: !Ref SystemDiskSize
      DiskMappings: !If
        - IsAgentBased
        - !Ref 'ALIYUN::NoValue'
        - - Category: !Ref SystemDiskCategory
            Size: !Ref InstallDiskSize
            DiskName: !Sub '${ClusterName}-master-2-install'
      AllocatePublicIP: false
      PrivateIpAddress: !If [IsAgentBased, !Ref Master2Ip, !Ref 'ALIYUN::NoValue']
      RamRoleName: !Ref NodeRamRoleName
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned
        - Key: openshift-node-role
          Value: master

  ControlPlaneInstance3:
    Type: ALIYUN::ECS::Instance
    DependsOn: ControlPlaneInstance2
    Properties:
      InstanceName: !Sub '${ClusterName}-master-3'
      HostName: !If [IsAgentBased, !Sub '${ClusterName}-master-3', !Ref 'ALIYUN::NoValue']
      InstanceType: !Ref ControlPlaneInstanceType
      ImageId: !Ref ImageId
      SecurityGroupId: !Ref ControlPlaneSecurityGroup
      # ABI multi-AZ: master-3 in zone3.  Assisted: zone2 (unchanged).
      VSwitchId: !If [IsAgentBased, !Ref PrivateVSwitch3Id, !Ref PrivateVSwitch2Id]
      SystemDiskCategory: !Ref SystemDiskCategory
      SystemDiskSize: !Ref SystemDiskSize
      DiskMappings: !If
        - IsAgentBased
        - !Ref 'ALIYUN::NoValue'
        - - Category: !Ref SystemDiskCategory
            Size: !Ref InstallDiskSize
            DiskName: !Sub '${ClusterName}-master-3-install'
      AllocatePublicIP: false
      PrivateIpAddress: !If [IsAgentBased, !Ref Master3Ip, !Ref 'ALIYUN::NoValue']
      RamRoleName: !Ref NodeRamRoleName
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned
        - Key: openshift-node-role
          Value: master

  WorkerInstanceGroup:
    Type: ALIYUN::ECS::InstanceGroup
    Condition: HasWorkers
    Properties:
      InstanceName: !Sub '${ClusterName}-worker'
      InstanceType: !Ref ComputeInstanceType
      ImageId: !Ref ImageId
      SecurityGroupId: !Ref WorkerSecurityGroup
      VSwitchId: !Ref PrivateVSwitchId
      SystemDiskCategory: !Ref SystemDiskCategory
      SystemDiskSize: !Ref SystemDiskSize
      DiskMappings:
        - Category: !Ref SystemDiskCategory
          Size: !Ref InstallDiskSize
          DiskName: !Sub '${ClusterName}-worker-install'
      AllocatePublicIP: false
      MaxAmount: !Ref ComputeCount
      MinAmount: !Ref ComputeCount
      RamRoleName: !Ref NodeRamRoleName
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned
        - Key: openshift-node-role
          Value: worker

Outputs:
  ApiLBEndpoint:
    Value: !GetAtt ApiNLB.DNSName
    Description: API Server NLB intranet DNS name
  PrivateZoneName:
    Value: !Sub '${ClusterName}.${BaseDomain}'
  RendezvousInstanceId:
    Value: !Ref RendezvousInstance
  # Instances always exist (placeholder image at ABI phase-1, real image at AI
  # create / ABI phase-2), so GetAtt PrivateIp is always valid.  For ABI these
  # equal the fixed RendezvousIp/Master2Ip/Master3Ip params.
  MasterIp1:
    Value: !GetAtt RendezvousInstance.PrivateIp
  MasterIp2:
    Value: !GetAtt ControlPlaneInstance2.PrivateIp
  MasterIp3:
    Value: !GetAtt ControlPlaneInstance3.PrivateIp
  WorkerSecurityGroup:
    Value: !Ref WorkerSecurityGroup
  ReverseZoneId1:
    Value: !Ref ReverseZone1
  ReverseZoneId2:
    Value: !Ref ReverseZone2
  ReverseZoneId3:
    Condition: HasZone3
    Value: !Ref ReverseZone3
    Description: Reverse zone for 10.0.48.0/20 (multi-AZ master-3 PTR)
  # Agent-based ENI-first via reimage: the auto primary-ENI id of each master,
  # harvested at phase-1 (ImageId=placeholder) and resolved to a MAC by ansible
  # (DescribeNetworkInterfaces) to feed agent-config hosts[] (MAC -> hostname).
  Master1PrimaryNic:
    Condition: IsAgentBased
    Value: !GetAtt RendezvousInstance.PrimaryNetworkInterfaceId
  Master2PrimaryNic:
    Condition: IsAgentBased
    Value: !GetAtt ControlPlaneInstance2.PrimaryNetworkInterfaceId
  Master3PrimaryNic:
    Condition: IsAgentBased
    Value: !GetAtt ControlPlaneInstance3.PrimaryNetworkInterfaceId
  InstallConfig:
    Description: install-config.yaml (paste into Red Hat console or save for agent-create)
    Value: !Sub |
      apiVersion: v1
      metadata:
        name: ${ClusterName}
      baseDomain: ${BaseDomain}
      networking:
        clusterNetwork:
          - cidr: 10.128.0.0/14
            hostPrefix: 23
        networkType: OVNKubernetes
        machineNetwork:
          - cidr: ${VpcCidr}
        serviceNetwork:
          - 172.30.0.0/16
      compute:
        - architecture: amd64
          hyperthreading: Enabled
          name: worker
          replicas: ${ComputeCount}
      controlPlane:
        architecture: amd64
        hyperthreading: Enabled
        name: master
        replicas: ${ControlPlaneCount}
      platform:
        external:
          platformName: AlibabaCloud
          cloudControllerManager: External
      pullSecret: '<replace-with-pull-secret>'
      sshKey: '<replace-with-ssh-public-key>'
  AgentConfig:
    Description: agent-config.yaml (Agent-based only)
    Value: !Sub |
      apiVersion: v1alpha1
      kind: AgentConfig
      metadata:
        name: ${ClusterName}
      rendezvousIP: ${RendezvousIp}
      hosts: []
  DynamicCustomManifest:
    Description: |
      alibaba-cloud-config ConfigMap — consumed by Alibaba CCM v2.x.
      Schema (YAML/JSON, see pkg/config/cloud_config.go in upstream):
        Global:
          region, vpcid, vswitchid, zoneid, clusterID, ...
      No AccessKeyID/AccessKeySecret — auth via ECS RAM role + IMDSv2
      (--enable-imdsv2=true is CCM's default).
      LoadBalancer address-type now controlled per-Service via annotation
      `service.beta.kubernetes.io/alibaba-cloud-loadbalancer-address-type`
      (was a global config knob in v1.x INI format).
    Value: !Sub |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: alibaba-cloud-config
        namespace: alibaba-cloud-controller-manager
      data:
        cloud.conf: |
          {
            "Global": {
              "clusterID": "${ClusterName}",
              "region": "${Region}",
              "vpcid": "${VpcId}",
              "zoneid": "${ZoneId}",
              "vswitchid": "${PrivateVSwitchId}"
            }
          }
