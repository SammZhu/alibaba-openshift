ROSTemplateFormatVersion: '2015-09-01'
Description: |
  OpenShift on Alibaba Cloud — Infrastructure provisioning template.
  Equivalent to oracle-quickstart/oci-openshift create-cluster Terraform stack.
  Runs in Alibaba Cloud ROS (Resource Orchestration Service) — no local tooling required.

Parameters:
  ClusterName:
    Type: String
    Description: OpenShift cluster name (must match Red Hat console entry)
    AllowedPattern: '[a-z0-9][a-z0-9-]{1,20}[a-z0-9]'

  BaseDomain:
    Type: String
    Description: Base domain (e.g. example.com). A PrivateZone will be created as <ClusterName>.<BaseDomain>.

  Region:
    Type: String
    Default: cn-hangzhou
    Description: Alibaba Cloud region

  ZoneId:
    Type: String
    Description: Availability zone for primary VSwitch (e.g. cn-hangzhou-h)

  ZoneId2:
    Type: String
    Description: Availability zone for secondary VSwitch (e.g. cn-hangzhou-i)

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16

  PrivateSubnetCidr:
    Type: String
    Default: 10.0.16.0/20

  PrivateSubnetCidr2:
    Type: String
    Default: 10.0.32.0/20

  PublicSubnetCidr:
    Type: String
    Default: 10.0.0.0/20

  ControlPlaneCount:
    Type: Number
    Default: 3
    AllowedValues: [3]

  ControlPlaneInstanceType:
    Type: String
    Default: ecs.c6.2xlarge

  ComputeCount:
    Type: Number
    Default: 3
    MinValue: 2

  ComputeInstanceType:
    Type: String
    Default: ecs.c6.xlarge

  BootstrapInstanceType:
    Type: String
    Default: ecs.c6.xlarge

  SystemDiskCategory:
    Type: String
    Default: cloud_essd
    AllowedValues: [cloud_essd, cloud_ssd, cloud_efficiency]

  SystemDiskSize:
    Type: Number
    Default: 120

  # Discovery ISO uploaded to OSS — get the URL from Red Hat Hybrid Cloud Console
  DiscoveryIsoUrl:
    Type: String
    Description: Pre-authenticated URL to the OpenShift discovery ISO in OSS

  RamRoleName:
    Type: String
    Default: openshift-node-role
    Description: RAM Role name to bind to all ECS nodes (Instance Principal for CCM/CAPA)

Resources:
  # ── Networking ───────────────────────────────────────────────────────────────

  Vpc:
    Type: ALIYUN::ECS::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      VpcName: !Sub '${ClusterName}-vpc'
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  PrivateVSwitch:
    Type: ALIYUN::ECS::VSwitch
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnetCidr
      ZoneId: !Ref ZoneId
      VSwitchName: !Sub '${ClusterName}-private-vsw-1'
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  PrivateVSwitch2:
    Type: ALIYUN::ECS::VSwitch
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnetCidr2
      ZoneId: !Ref ZoneId2
      VSwitchName: !Sub '${ClusterName}-private-vsw-2'
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  PublicVSwitch:
    Type: ALIYUN::ECS::VSwitch
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnetCidr
      ZoneId: !Ref ZoneId
      VSwitchName: !Sub '${ClusterName}-public-vsw'

  NatGateway:
    Type: ALIYUN::VPC::NatGateway
    Properties:
      VpcId: !Ref Vpc
      VSwitchId: !Ref PublicVSwitch
      NatGatewayName: !Sub '${ClusterName}-nat'
      NatType: Enhanced

  EIP:
    Type: ALIYUN::VPC::EIP
    Properties:
      Bandwidth: 100
      InternetChargeType: PayByTraffic

  EIPAssociation:
    Type: ALIYUN::VPC::EIPAssociation
    Properties:
      AllocationId: !Ref EIP
      InstanceId: !Ref NatGateway

  NatSNATEntry:
    Type: ALIYUN::VPC::SnatEntry
    DependsOn: EIPAssociation
    Properties:
      SnatTableId: !GetAtt NatGateway.SNatTableId
      SourceVSwitchId: !Ref PrivateVSwitch
      SnatIp: !GetAtt EIP.EipAddress

  NatSNATEntry2:
    Type: ALIYUN::VPC::SnatEntry
    DependsOn: EIPAssociation
    Properties:
      SnatTableId: !GetAtt NatGateway.SNatTableId
      SourceVSwitchId: !Ref PrivateVSwitch2
      SnatIp: !GetAtt EIP.EipAddress

  # ── Security Groups ──────────────────────────────────────────────────────────

  ControlPlaneSecurityGroup:
    Type: ALIYUN::ECS::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      SecurityGroupName: !Sub '${ClusterName}-master-sg'
      SecurityGroupIngress:
        - IpProtocol: tcp
          PortRange: 6443/6443
          SourceCidrIp: 0.0.0.0/0
          Description: Kubernetes API
        - IpProtocol: tcp
          PortRange: 22623/22623
          SourceCidrIp: !Ref VpcCidr
          Description: Machine Config Server
        - IpProtocol: tcp
          PortRange: 2379/2380
          SourceCidrIp: !Ref VpcCidr
          Description: etcd
        - IpProtocol: all
          PortRange: -1/-1
          SourceGroupId: !Ref ControlPlaneSecurityGroup
          Description: Intra-cluster
        - IpProtocol: all
          PortRange: -1/-1
          SourceGroupId: !Ref WorkerSecurityGroup
          Description: From workers

  WorkerSecurityGroup:
    Type: ALIYUN::ECS::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      SecurityGroupName: !Sub '${ClusterName}-worker-sg'
      SecurityGroupIngress:
        - IpProtocol: all
          PortRange: -1/-1
          SourceGroupId: !Ref ControlPlaneSecurityGroup
          Description: From masters

  # ── RAM Role (Instance Principal) ───────────────────────────────────────────

  NodeRamRole:
    Type: ALIYUN::RAM::Role
    Properties:
      RoleName: !Ref RamRoleName
      Description: RAM Role for OpenShift nodes — used by CCM and CAPA
      AssumeRolePolicyDocument:
        Version: '1'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs.aliyuncs.com
            Action: sts:AssumeRole

  NodeRamPolicy:
    Type: ALIYUN::RAM::ManagedPolicy
    Properties:
      PolicyName: !Sub '${ClusterName}-node-policy'
      Description: Permissions for OpenShift CCM and CAPA
      PolicyDocument:
        Version: '1'
        Statement:
          - Effect: Allow
            Action:
              - ecs:DescribeInstances
              - ecs:DescribeInstanceTypes
              - ecs:DescribeRegions
              - ecs:DescribeZones
              - ecs:RunInstances
              - ecs:StopInstance
              - ecs:DeleteInstance
              - ecs:StartInstance
            Resource: '*'
          - Effect: Allow
            Action:
              - slb:CreateLoadBalancer
              - slb:DeleteLoadBalancer
              - slb:DescribeLoadBalancers
              - slb:AddBackendServers
              - slb:RemoveBackendServers
              - slb:CreateLoadBalancerTCPListener
              - slb:StartLoadBalancerListener
              - slb:StopLoadBalancerListener
            Resource: '*'
          - Effect: Allow
            Action:
              - vpc:DescribeVpcs
              - vpc:DescribeVSwitches
              - vpc:DescribeRouteTableList
            Resource: '*'

  RolePolicyAttachment:
    Type: ALIYUN::RAM::AttachPolicyToRole
    Properties:
      RoleName: !Ref NodeRamRole
      PolicyName: !GetAtt NodeRamPolicy.PolicyName
      PolicyType: Custom

  # ── API Server SLB ───────────────────────────────────────────────────────────

  ApiSLB:
    Type: ALIYUN::SLB::LoadBalancer
    Properties:
      LoadBalancerName: !Sub '${ClusterName}-api'
      AddressType: intranet
      VpcId: !Ref Vpc
      VSwitchId: !Ref PrivateVSwitch
      LoadBalancerSpec: slb.s2.small

  ApiSLBListener:
    Type: ALIYUN::SLB::Listener
    Properties:
      LoadBalancerId: !Ref ApiSLB
      ListenerPort: 6443
      BackendServerPort: 6443
      Protocol: tcp
      Bandwidth: -1
      HealthCheck:
        HealthCheckType: tcp
        HealthCheckConnectPort: 6443
        HealthyThreshold: 3
        UnhealthyThreshold: 3
        HealthCheckInterval: 5

  McsListener:
    Type: ALIYUN::SLB::Listener
    Properties:
      LoadBalancerId: !Ref ApiSLB
      ListenerPort: 22623
      BackendServerPort: 22623
      Protocol: tcp
      Bandwidth: -1

  # ── Private DNS ──────────────────────────────────────────────────────────────

  PrivateZone:
    Type: ALIYUN::PVTZone::Zone
    Properties:
      ZoneName: !Sub '${ClusterName}.${BaseDomain}'

  PrivateZoneVpcBinding:
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    Properties:
      ZoneId: !Ref PrivateZone
      Vpcs:
        - VpcId: !Ref Vpc
          RegionId: !Ref Region

  ApiRecord:
    Type: ALIYUN::PVTZ::ZoneRecord
    Properties:
      ZoneId: !Ref PrivateZone
      Rr: api
      Type: A
      Value: !GetAtt ApiSLB.IpAddress
      Ttl: 60

  ApiIntRecord:
    Type: ALIYUN::PVTZ::ZoneRecord
    Properties:
      ZoneId: !Ref PrivateZone
      Rr: api-int
      Type: A
      Value: !GetAtt ApiSLB.IpAddress
      Ttl: 60

  # ── ECS Instances ────────────────────────────────────────────────────────────

  BootstrapInstance:
    Type: ALIYUN::ECS::Instance
    DependsOn: NatSNATEntry
    Properties:
      InstanceName: !Sub '${ClusterName}-bootstrap'
      InstanceType: !Ref BootstrapInstanceType
      ImageId: !Ref DiscoveryIsoUrl   # placeholder — replaced by agent-based installer flow
      SecurityGroupId: !Ref ControlPlaneSecurityGroup
      VSwitchId: !Ref PrivateVSwitch
      SystemDiskCategory: !Ref SystemDiskCategory
      SystemDiskSize: !Ref SystemDiskSize
      RamRoleName: !Ref NodeRamRole
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned
        - Key: openshift-node-role
          Value: bootstrap

  ControlPlaneInstanceGroup:
    Type: ALIYUN::ECS::InstanceGroup
    DependsOn: NatSNATEntry
    Properties:
      InstanceName: !Sub '${ClusterName}-master-[1,3]'
      InstanceType: !Ref ControlPlaneInstanceType
      ImageId: !Ref DiscoveryIsoUrl
      SecurityGroupId: !Ref ControlPlaneSecurityGroup
      VSwitchId: !Ref PrivateVSwitch
      SystemDiskCategory: !Ref SystemDiskCategory
      SystemDiskSize: !Ref SystemDiskSize
      MaxAmount: !Ref ControlPlaneCount
      MinAmount: !Ref ControlPlaneCount
      RamRoleName: !Ref NodeRamRole
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned
        - Key: openshift-node-role
          Value: master

  WorkerInstanceGroup:
    Type: ALIYUN::ECS::InstanceGroup
    DependsOn: NatSNATEntry
    Properties:
      InstanceName: !Sub '${ClusterName}-worker-[1,3]'
      InstanceType: !Ref ComputeInstanceType
      ImageId: !Ref DiscoveryIsoUrl
      SecurityGroupId: !Ref WorkerSecurityGroup
      VSwitchId: !Ref PrivateVSwitch
      SystemDiskCategory: !Ref SystemDiskCategory
      SystemDiskSize: 100
      MaxAmount: !Ref ComputeCount
      MinAmount: !Ref ComputeCount
      RamRoleName: !Ref NodeRamRole
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned
        - Key: openshift-node-role
          Value: worker

Outputs:
  VpcId:
    Value: !Ref Vpc
    Description: VPC ID — needed for CCM cloud.conf

  VSwitchId:
    Value: !Ref PrivateVSwitch
    Description: Primary VSwitch ID — needed for CCM cloud.conf

  ApiSLBIp:
    Value: !GetAtt ApiSLB.IpAddress
    Description: API Server SLB internal IP — use for install-config.yaml platform.external

  PrivateZoneName:
    Value: !Sub '${ClusterName}.${BaseDomain}'
    Description: Private DNS zone name

  InstallConfig:
    Description: Generated install-config.yaml — paste into Red Hat Assisted Installer
    Value: !Sub |
      apiVersion: v1
      metadata:
        name: ${ClusterName}
      baseDomain: ${BaseDomain}
      networking:
        clusterNetwork:
          - cidr: 10.128.0.0/14
            hostPrefix: 23
        networkType: OVNKubernetes
        machineNetwork:
          - cidr: ${VpcCidr}
        serviceNetwork:
          - 172.30.0.0/16
      compute:
        - architecture: amd64
          hyperthreading: Enabled
          name: worker
          replicas: ${ComputeCount}
      controlPlane:
        architecture: amd64
        hyperthreading: Enabled
        name: master
        replicas: ${ControlPlaneCount}
      platform:
        external:
          platformName: AlibabaCloud
          cloudControllerManager: External
      pullSecret: '<replace-with-pull-secret>'
      sshKey: '<replace-with-ssh-public-key>'

  DynamicCustomManifest:
    Description: |
      After cluster installation, apply these manifests:
        oc apply -f custom_manifests/01-alibaba-ccm.yaml
        oc apply -f custom_manifests/02-capa-crds.yaml
        oc apply -f custom_manifests/02-capa-controller.yaml
        oc apply -f custom_manifests/03-machineconfig-providerid.yaml
      Then update 01-alibaba-ccm.yaml cloud.conf with the following values before applying.
    Value: !Sub |
      ALIBABA_REGION: ${Region}
      ALIBABA_VPC_ID: ${Vpc}
      ALIBABA_ZONE_ID: ${ZoneId}
      ALIBABA_VSWITCH_ID: ${PrivateVSwitch}
