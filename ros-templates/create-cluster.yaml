ROSTemplateFormatVersion: '2015-09-01'
Description: |
  OpenShift on Alibaba Cloud — Infrastructure provisioning template.
  Equivalent to oracle-quickstart/oci-openshift create-cluster Terraform stack.
  Runs in Alibaba Cloud ROS (Resource Orchestration Service) — no local tooling required.

  ## Prerequisites — prepare the boot image before creating this stack
  The ECS instances boot from a custom ECS image imported from the OpenShift ISO.
  Steps:
    1. Assisted:   Download Discovery ISO from cloud.redhat.com → upload to OSS.
       Agent-based: Run `openshift-install agent create image` → upload agent.x86_64.iso to OSS.
    2. In the ECS console (or via API): Images → Import Image → provide the OSS URL.
       Select architecture: x86_64, OS type: Linux, Image format: ISO.
    3. Wait for import to complete, copy the resulting Image ID (e.g. m-bp1xxxxxxxxxx).
    4. Provide that Image ID as the `ImageId` parameter when creating this stack.

Parameters:
  ClusterName:
    Type: String
    Description: OpenShift cluster name (must match Red Hat console entry)
    AllowedPattern: '[a-z0-9][a-z0-9-]{1,20}[a-z0-9]'

  BaseDomain:
    Type: String
    Description: Base domain (e.g. example.com). A PrivateZone will be created as <ClusterName>.<BaseDomain>.

  Region:
    Type: String
    Default: cn-wulanchabu
    Description: Alibaba Cloud region

  ZoneId:
    Type: String
    Description: Availability zone for primary VSwitch (e.g. cn-wulanchabu-a)

  ZoneId2:
    Type: String
    Description: Availability zone for secondary VSwitch (e.g. cn-wulanchabu-b)

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16

  PrivateSubnetCidr:
    Type: String
    Default: 10.0.16.0/20

  PrivateSubnetCidr2:
    Type: String
    Default: 10.0.32.0/20

  PublicSubnetCidr:
    Type: String
    Default: 10.0.0.0/20

  ControlPlaneCount:
    Type: Number
    Default: 3
    AllowedValues: [3]

  ControlPlaneInstanceType:
    Type: String
    Default: ecs.c6.2xlarge

  ComputeCount:
    Type: Number
    Default: 3
    # MinValue 0 supports the "compact 3-node" topology where the control plane
    # also schedules workloads (set ComputeCount=0 + install-config compute.replicas=0).
    # For HA production set 2 or higher; CAPI MachineDeployment can still scale
    # workers separately at runtime regardless of this value.
    MinValue: 0

  ComputeInstanceType:
    Type: String
    Default: ecs.c6.xlarge

  # Removed: BootstrapInstanceType — Assisted/Agent-based dynamically elect
  # bootstrap from the 3 control plane nodes; no separate bootstrap ECS needed.

  SystemDiskCategory:
    Type: String
    Default: cloud_essd
    AllowedValues: [cloud_essd, cloud_ssd, cloud_efficiency]

  SystemDiskSize:
    Type: Number
    Default: 120

  InstallationMethod:
    Type: String
    Default: Assisted
    AllowedValues: [Assisted, Agent-based]
    Description: |
      Assisted: Use Red Hat Hybrid Cloud Console — no local tooling required.
      Agent-based: Generate ISO locally with openshift-install CLI, suitable for
      air-gapped or disconnected environments.

  ImageId:
    Type: String
    Description: |
      Custom ECS image ID created by importing the OpenShift ISO into Alibaba Cloud.
      See the template Description above for import steps.
      Example: m-bp1xxxxxxxxxxxxxxxxx

  RendezvousIp:
    Type: String
    Default: 10.0.16.5
    Description: |
      Agent-based only. Fixed private IP for the rendezvous (first control plane) node.

  IngressVip:
    Type: String
    Default: 10.0.16.6
    Description: |
      Placeholder IP for the *.apps wildcard PrivateZone record required by the
      Assisted Installer host DNS validation. Must be an unused IP in the private
      subnet. After install, the ingress operator creates a real SLB via CCM —
      update the *.apps PrivateZone record to that SLB IP.
      Must be within PrivateSubnetCidr (default 10.0.16.0/20). Ignored for Assisted installs.
      This IP must be set in agent-config.yaml BEFORE generating the agent ISO.

  RamRoleName:
    Type: String
    Default: openshift-node-role
    Description: RAM Role name to bind to all ECS nodes (Instance Principal for CCM/CAPA)

  # ── Testing-only: SSH jump host into the VPC ─────────────────────────────────
  # The cluster's API SLB is intranet-only and PrivateZone records resolve only
  # inside the VPC. Set EnableJumpHost=true to provision a tiny ECS with a
  # public EIP + pre-installed oc/kubectl/openshift-install/aliyun CLI so an
  # operator working from a local workstation can SSH in and run oc commands.
  # Cost: ~¥2/day (1C/1G burst instance + 1 Mbps EIP, pay-by-traffic).
  # Production deployments should leave this off and use a proper VPN gateway.
  EnableJumpHost:
    Type: Boolean
    Default: false
    Description: Provision a public SSH jump host with pre-installed cluster tools (testing only)

  JumpHostInstanceType:
    Type: String
    Default: ecs.t6-c1m1.large
    Description: ECS type for the jump host. Burst-class (t6) is cheapest for occasional SSH use.

  SshPublicKey:
    Type: String
    Default: ""
    Description: |
      SSH public key authorised on the jump host (paste full content of ~/.ssh/id_*.pub).
      Required only when EnableJumpHost=true. RHCOS nodes get SSH keys via ignition,
      not from this parameter.

  SshPrivateKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: |
      SSH private key (base64-encoded) written to /root/.ssh/openshift_ed25519 on the jump host.
      Pass the raw base64 output of `base64 < ~/.ssh/openshift_ed25519` (no line wraps).
      The UserData script decodes it with `base64 -d`. Required only when EnableJumpHost=true.

  # ── Disconnected / private mirror registry (China regions) ─────────────────
  # When MirrorEnabled=true an additional ECS is created inside the cluster VPC
  # at a static private IP.  Its cloud-init downloads a pre-built tarball from
  # OSS (via RAM-role / internal endpoint) and runs `mirror-registry install`
  # plus `oc mirror` to import all release/agent images.  Cluster nodes then
  # pull from this mirror over the VPC instead of quay.io.
  MirrorEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Set to "true" to provision the dedicated mirror-registry ECS.

  MirrorOssBucket:
    Type: String
    Default: ""
    Description: OSS bucket holding the mirror tarball (no scheme, just the bucket name).

  MirrorOssObject:
    Type: String
    Default: ""
    Description: OSS object key for the mirror tarball, e.g. mirror-tarballs/cluster1-4.20.tar

  MirrorPrivateIp:
    Type: String
    Default: 10.0.16.4
    Description: Static private IP for the mirror ECS (must live in PrivateSubnetCidr).

  MirrorInstanceType:
    Type: String
    Default: ecs.g7.large
    Description: ECS type for the mirror registry (2vCPU/8GB is sufficient for one cluster).

  MirrorDataDiskSize:
    Type: Number
    Default: 100
    Description: Size in GB of the cloud_essd data disk mounted at /var/lib/quay-storage.

  MirrorInitUser:
    Type: String
    Default: mirror-admin
    Description: Initial admin username created by mirror-registry installer.

  MirrorInitPassword:
    Type: String
    Default: ""
    NoEcho: true
    Description: Initial admin password for mirror-registry (auto-generated by Phase 03 if blank).

Conditions:
  IsAgentBased: !Equals [!Ref InstallationMethod, Agent-based]
  IsAssisted:   !Equals [!Ref InstallationMethod, Assisted]
  # Skip the worker InstanceGroup entirely when ComputeCount=0 — required by
  # ROS because ALIYUN::ECS::InstanceGroup rejects MinAmount/MaxAmount=0.
  HasWorkers:   !Not [!Equals [!Ref ComputeCount, 0]]
  HasJumpHost:  !Equals [!Ref EnableJumpHost, true]
  MirrorEnabled: !Equals [!Ref MirrorEnabled, "true"]

Resources:
  # ── Networking ───────────────────────────────────────────────────────────────

  Vpc:
    Type: ALIYUN::ECS::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      VpcName: !Sub '${ClusterName}-vpc'
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  PrivateVSwitch:
    Type: ALIYUN::ECS::VSwitch
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnetCidr
      ZoneId: !Ref ZoneId
      VSwitchName: !Sub '${ClusterName}-private-vsw-1'
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  PrivateVSwitch2:
    Type: ALIYUN::ECS::VSwitch
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnetCidr2
      ZoneId: !Ref ZoneId2
      VSwitchName: !Sub '${ClusterName}-private-vsw-2'
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  PublicVSwitch:
    Type: ALIYUN::ECS::VSwitch
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnetCidr
      ZoneId: !Ref ZoneId
      VSwitchName: !Sub '${ClusterName}-public-vsw'
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  NatGateway:
    Type: ALIYUN::VPC::NatGateway
    Properties:
      VpcId: !Ref Vpc
      VSwitchId: !Ref PublicVSwitch
      NatGatewayName: !Sub '${ClusterName}-nat'
      NatType: Enhanced
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  EIP:
    Type: ALIYUN::VPC::EIP
    Properties:
      Bandwidth: 100
      InternetChargeType: PayByTraffic
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  EIPAssociation:
    Type: ALIYUN::VPC::EIPAssociation
    Properties:
      AllocationId: !Ref EIP
      InstanceId: !Ref NatGateway

  NatSNATEntry:
    Type: ALIYUN::VPC::SnatEntry
    DependsOn: EIPAssociation
    Properties:
      SnatTableId: !GetAtt NatGateway.SNatTableId
      SourceCIDR: !Ref PrivateSubnetCidr
      SnatIp: !GetAtt EIP.EipAddress

  NatSNATEntry2:
    Type: ALIYUN::VPC::SnatEntry
    DependsOn: EIPAssociation
    Properties:
      SnatTableId: !GetAtt NatGateway.SNatTableId
      SourceCIDR: !Ref PrivateSubnetCidr2
      SnatIp: !GetAtt EIP.EipAddress

  # ── Security Groups ──────────────────────────────────────────────────────────

  ControlPlaneSecurityGroup:
    Type: ALIYUN::ECS::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      SecurityGroupName: !Sub '${ClusterName}-master-sg'
      # Only CIDR-based rules here; cross-SG rules added below to avoid CircularDependency
      SecurityGroupIngress:
        - IpProtocol: tcp
          PortRange: 6443/6443
          SourceCidrIp: !Ref VpcCidr
          Description: Kubernetes API (VPC-internal only; exposed via SLB)
        - IpProtocol: tcp
          PortRange: 22623/22623
          SourceCidrIp: !Ref VpcCidr
          Description: Machine Config Server
        - IpProtocol: tcp
          PortRange: 2379/2380
          SourceCidrIp: !Ref VpcCidr
          Description: etcd
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  WorkerSecurityGroup:
    Type: ALIYUN::ECS::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      SecurityGroupName: !Sub '${ClusterName}-worker-sg'
      # Only CIDR-based rules here; cross-SG rules added below to avoid CircularDependency
      SecurityGroupIngress:
        - IpProtocol: tcp
          PortRange: 80/80
          SourceCidrIp: 0.0.0.0/0
          Description: Ingress HTTP
        - IpProtocol: tcp
          PortRange: 443/443
          SourceCidrIp: 0.0.0.0/0
          Description: Ingress HTTPS
        # NodePort range — required for SLB backend health checks and LoadBalancer
        # services. SLB nodes have VPC IPs outside the node SGs, so the source
        # must be the VPC CIDR rather than a specific SG.
        - IpProtocol: tcp
          PortRange: 30000/32767
          SourceCidrIp: !Ref VpcCidr
          Description: NodePort services (SLB health-check and VPC-internal access)
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  # ── Cross-SG ingress rules (added AFTER both SGs exist to avoid CircularDependency) ──
  # Note: intra-group rules (SG → same SG) are NOT needed and NOT allowed by Alibaba Cloud
  # VPC API (InvalidParamter.Conflict). Instances in the same security group can communicate
  # freely by default — no explicit self-referential rule required.

  CPSGFromWorkers:
    Type: ALIYUN::ECS::SecurityGroupIngress
    DependsOn:
      - ControlPlaneSecurityGroup
      - WorkerSecurityGroup
    Properties:
      SecurityGroupId: !Ref ControlPlaneSecurityGroup
      IpProtocol: all
      PortRange: -1/-1
      NicType: intranet
      SourceGroupId: !Ref WorkerSecurityGroup
      Description: From workers (kubelet → API, OVN Geneve overlay)

  CPSGSSHFromJumpHost:
    Type: ALIYUN::ECS::SecurityGroupIngress
    Condition: HasJumpHost
    DependsOn:
      - ControlPlaneSecurityGroup
      - JumpHostSecurityGroup
    Properties:
      SecurityGroupId: !Ref ControlPlaneSecurityGroup
      IpProtocol: tcp
      PortRange: 22/22
      NicType: intranet
      SourceGroupId: !Ref JumpHostSecurityGroup
      Description: SSH from jump host to master nodes (core user)

  WorkerSGSSHFromJumpHost:
    Type: ALIYUN::ECS::SecurityGroupIngress
    Condition: HasJumpHost
    DependsOn:
      - WorkerSecurityGroup
      - JumpHostSecurityGroup
    Properties:
      SecurityGroupId: !Ref WorkerSecurityGroup
      IpProtocol: tcp
      PortRange: 22/22
      NicType: intranet
      SourceGroupId: !Ref JumpHostSecurityGroup
      Description: SSH from jump host to worker nodes (core user)

  WorkerSGFromMasters:
    Type: ALIYUN::ECS::SecurityGroupIngress
    DependsOn:
      - ControlPlaneSecurityGroup
      - WorkerSecurityGroup
    Properties:
      SecurityGroupId: !Ref WorkerSecurityGroup
      IpProtocol: all
      PortRange: -1/-1
      NicType: intranet
      SourceGroupId: !Ref ControlPlaneSecurityGroup
      Description: From masters (covers Geneve UDP 6081 OVN overlay + kubelet)

  # ── RAM Role (Instance Principal) ───────────────────────────────────────────

  NodeRamRole:
    Type: ALIYUN::RAM::Role
    Properties:
      RoleName: !Ref RamRoleName
      Description: RAM Role for OpenShift nodes — used by CCM and CAPA
      AssumeRolePolicyDocument:
        Version: '1'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs.aliyuncs.com
            Action: sts:AssumeRole

  NodeRamPolicy:
    Type: ALIYUN::RAM::ManagedPolicy
    Properties:
      PolicyName: !Sub '${ClusterName}-node-policy'
      Description: Permissions for OpenShift CCM, CAPA, and Alibaba Cloud CSI Driver
      PolicyDocument:
        Version: '1'
        Statement:
          # ── ECS instance lifecycle (CCM + CAPA) ─────────────────────────────
          - Effect: Allow
            Action:
              - ecs:DescribeInstances
              - ecs:DescribeInstanceTypes
              - ecs:DescribeRegions
              - ecs:DescribeZones
              - ecs:RunInstances
              - ecs:StopInstance
              - ecs:DeleteInstance
              - ecs:StartInstance
              - ecs:TagResources
              - ecs:ListTagResources
            Resource: ['*']
          # ── SLB (CCM LoadBalancer service) ──────────────────────────────────
          - Effect: Allow
            Action:
              - slb:CreateLoadBalancer
              - slb:DeleteLoadBalancer
              - slb:DescribeLoadBalancers
              - slb:AddBackendServers
              - slb:RemoveBackendServers
              - slb:CreateLoadBalancerTCPListener
              - slb:StartLoadBalancerListener
              - slb:StopLoadBalancerListener
              - slb:DescribeLoadBalancerAttribute
              - slb:SetLoadBalancerDeleteProtection
            Resource: ['*']
          # ── VPC / VSwitch (CCM + CAPA network) ──────────────────────────────
          - Effect: Allow
            Action:
              - vpc:DescribeVpcs
              - vpc:DescribeVSwitches
              - vpc:DescribeRouteTableList
            Resource: ['*']
          # ── Private Zone DNS (CCM) ───────────────────────────────────────────
          - Effect: Allow
            Action:
              - pvtz:DescribeZones
              - pvtz:DescribeZoneRecords
            Resource: ['*']
          # ── ECS Disk (Alibaba Cloud CSI Driver — Phase 1) ────────────────────
          # Required for dynamic PersistentVolume provisioning, attachment,
          # expansion, and snapshot operations via the disk CSI driver.
          - Effect: Allow
            Action:
              - ecs:AttachDisk
              - ecs:DetachDisk
              - ecs:DescribeDisks
              - ecs:CreateDisk
              - ecs:DeleteDisk
              - ecs:ResizeDisk
              - ecs:ModifyDiskAttribute
              - ecs:CreateSnapshot
              - ecs:DeleteSnapshot
              - ecs:DescribeSnapshots
              - ecs:CreateAutoSnapshotPolicy
              - ecs:ApplyAutoSnapshotPolicy
              - ecs:DeleteAutoSnapshotPolicy
              - ecs:DescribeAutoSnapshotPolicyEx
            Resource: ['*']
          # ── NAS (Alibaba Cloud CSI Driver — Phase 2) ─────────────────────────
          # Required for dynamic NAS PV provisioning (file-system and mount-target
          # lifecycle) used by ReadWriteMany volumes and VM live migration support.
          - Effect: Allow
            Action:
              - nas:DescribeFileSystems
              - nas:CreateFileSystem
              - nas:DeleteFileSystem
              - nas:ModifyFileSystem
              - nas:DescribeMountTargets
              - nas:CreateMountTarget
              - nas:DeleteMountTarget
              - nas:ModifyMountTarget
              - nas:DescribeAccessGroups
              - nas:CreateAccessGroup
              - nas:DeleteAccessGroup
              - nas:DescribeAccessRules
              - nas:CreateAccessRule
              - nas:DeleteAccessRule
              - nas:DescribeZones
            Resource: ['*']

  RolePolicyAttachment:
    Type: ALIYUN::RAM::AttachPolicyToRole
    Properties:
      RoleName: !Ref NodeRamRole
      PolicyName: !GetAtt NodeRamPolicy.PolicyName
      PolicyType: Custom

  # ── API Server SLB ───────────────────────────────────────────────────────────

  ApiSLB:
    Type: ALIYUN::SLB::LoadBalancer
    Properties:
      LoadBalancerName: !Sub '${ClusterName}-api'
      AddressType: intranet
      VpcId: !Ref Vpc
      VSwitchId: !Ref PrivateVSwitch
      LoadBalancerSpec: slb.s2.small
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  ApiSLBListener:
    Type: ALIYUN::SLB::Listener
    Properties:
      LoadBalancerId: !Ref ApiSLB
      ListenerPort: 6443
      BackendServerPort: 6443
      Protocol: tcp
      Bandwidth: -1
      # HealthCheck sub-properties are not supported by ROS ALIYUN::SLB::Listener;
      # SLB uses default TCP health check on the backend port automatically.

  McsListener:
    Type: ALIYUN::SLB::Listener
    Properties:
      LoadBalancerId: !Ref ApiSLB
      ListenerPort: 22623
      BackendServerPort: 22623
      Protocol: tcp
      Bandwidth: -1
      # HealthCheck sub-properties are not supported by ROS ALIYUN::SLB::Listener.

  # ── Private DNS ──────────────────────────────────────────────────────────────

  PrivateZone:
    Type: ALIYUN::PVTZ::Zone
    Properties:
      ZoneName: !Sub '${ClusterName}.${BaseDomain}'
      # ALIYUN::PVTZ::Zone supports Tags since 2023.
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  PrivateZoneVpcBinding:
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    Properties:
      ZoneId: !Ref PrivateZone
      Vpcs:
        - VpcId: !Ref Vpc
          RegionId: !Ref Region

  ApiRecord:
    Type: ALIYUN::PVTZ::ZoneRecord
    Properties:
      ZoneId: !Ref PrivateZone
      Rr: api
      Type: A
      Value: !GetAtt ApiSLB.IpAddress
      Ttl: 60

  ApiIntRecord:
    Type: ALIYUN::PVTZ::ZoneRecord
    Properties:
      ZoneId: !Ref PrivateZone
      Rr: api-int
      Type: A
      Value: !GetAtt ApiSLB.IpAddress
      Ttl: 60

  AppsRecord:
    Type: ALIYUN::PVTZ::ZoneRecord
    Properties:
      ZoneId: !Ref PrivateZone
      Rr: '*.apps'
      Type: A
      Value: !Ref IngressVip
      Ttl: 60

  # etcd-N A records — added after instances exist so GetAtt can resolve their IPs.
  # etcd uses these for peer-to-peer communication between control plane nodes.
  EtcdRecord0:
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn: [RendezvousInstance, PrivateZone]
    Properties:
      ZoneId: !Ref PrivateZone
      Rr: etcd-0
      Type: A
      Value: !GetAtt RendezvousInstance.PrivateIp
      Ttl: 60

  EtcdRecord1:
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn: [ControlPlaneInstance2, PrivateZone]
    Properties:
      ZoneId: !Ref PrivateZone
      Rr: etcd-1
      Type: A
      Value: !GetAtt ControlPlaneInstance2.PrivateIp
      Ttl: 60

  EtcdRecord2:
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn: [ControlPlaneInstance3, PrivateZone]
    Properties:
      ZoneId: !Ref PrivateZone
      Rr: etcd-2
      Type: A
      Value: !GetAtt ControlPlaneInstance3.PrivateIp
      Ttl: 60

  # ── Reverse DNS zones (PTR records added by Phase 03 after IPs are known) ────
  # PrivateVSwitch  → 10.0.16.0/20 → reverse zone: 16.0.10.in-addr.arpa
  # PrivateVSwitch2 → 10.0.32.0/20 → reverse zone: 32.0.10.in-addr.arpa
  ReverseZone1:
    Type: ALIYUN::PVTZ::Zone
    Properties:
      ZoneName: 16.0.10.in-addr.arpa

  ReverseZone1VpcBinding:
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    DependsOn: ReverseZone1
    Properties:
      ZoneId: !Ref ReverseZone1
      Vpcs:
        - VpcId: !Ref Vpc
          RegionId: !Ref Region

  ReverseZone2:
    Type: ALIYUN::PVTZ::Zone
    Properties:
      ZoneName: 32.0.10.in-addr.arpa

  ReverseZone2VpcBinding:
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    DependsOn: ReverseZone2
    Properties:
      ZoneId: !Ref ReverseZone2
      Vpcs:
        - VpcId: !Ref Vpc
          RegionId: !Ref Region

  # ── ECS Instances ────────────────────────────────────────────────────────────
  # All instances DependsOn RolePolicyAttachment to ensure RAM role policy is
  # attached before the nodes try to call Alibaba Cloud APIs via instance principal.

  # Assisted only: separate bootstrap node. Agent-based uses rendezvous master instead.
  # NOTE: No separate bootstrap ECS. Modern Assisted Installer (and Agent-based
  # since 4.12) elects one of the 3 control-plane nodes as a temporary bootstrap
  # at install time; after install completes, that node becomes a regular master.
  # Provisioning a 4th dedicated bootstrap ECS wastes ~¥0.8/h and is vestigial
  # from the UPI workflow.

  # First control plane node. In Agent-based mode gets a fixed private IP so
  # rendezvousIP in agent-config.yaml is known before ISO generation.
  RendezvousInstance:
    Type: ALIYUN::ECS::Instance
    DependsOn:
      - NatSNATEntry
      - RolePolicyAttachment
    Properties:
      InstanceName: !Sub '${ClusterName}-master-1'
      InstanceType: !Ref ControlPlaneInstanceType
      ImageId: !Ref ImageId
      SecurityGroupId: !Ref ControlPlaneSecurityGroup
      VSwitchId: !Ref PrivateVSwitch
      SystemDiskCategory: !Ref SystemDiskCategory
      SystemDiskSize: !Ref SystemDiskSize
      AllocatePublicIP: false
      PrivateIpAddress: !If [IsAgentBased, !Ref RendezvousIp, !Ref 'ALIYUN::NoValue']
      RamRoleName: !Ref NodeRamRole
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned
        - Key: openshift-node-role
          Value: master

  # Second control plane node (split from InstanceGroup so all 3 can be
  # individually registered as SLB backend servers).
  ControlPlaneInstance2:
    Type: ALIYUN::ECS::Instance
    DependsOn:
      - NatSNATEntry
      - RolePolicyAttachment
    Properties:
      InstanceName: !Sub '${ClusterName}-master-2'
      InstanceType: !Ref ControlPlaneInstanceType
      ImageId: !Ref ImageId
      SecurityGroupId: !Ref ControlPlaneSecurityGroup
      VSwitchId: !Ref PrivateVSwitch
      SystemDiskCategory: !Ref SystemDiskCategory
      SystemDiskSize: !Ref SystemDiskSize
      AllocatePublicIP: false
      RamRoleName: !Ref NodeRamRole
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned
        - Key: openshift-node-role
          Value: master

  # Third control plane node.
  ControlPlaneInstance3:
    Type: ALIYUN::ECS::Instance
    DependsOn:
      - NatSNATEntry
      - RolePolicyAttachment
    Properties:
      InstanceName: !Sub '${ClusterName}-master-3'
      InstanceType: !Ref ControlPlaneInstanceType
      ImageId: !Ref ImageId
      SecurityGroupId: !Ref ControlPlaneSecurityGroup
      VSwitchId: !Ref PrivateVSwitch2
      SystemDiskCategory: !Ref SystemDiskCategory
      SystemDiskSize: !Ref SystemDiskSize
      AllocatePublicIP: false
      RamRoleName: !Ref NodeRamRole
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned
        - Key: openshift-node-role
          Value: master

  # Register all 3 control plane nodes as SLB backend servers.
  # This must exist before installation completes so that api-int.<cluster>.<domain>
  # (which resolves to the SLB) can reach the API server and MCS.
  ControlPlaneSLBAttachment:
    Type: ALIYUN::SLB::BackendServerAttachment
    DependsOn:
      - ApiSLBListener
      - McsListener
    Properties:
      LoadBalancerId: !Ref ApiSLB
      BackendServers:
        - ServerId: !Ref RendezvousInstance
          Weight: 100
          Type: ecs
        - ServerId: !Ref ControlPlaneInstance2
          Weight: 100
          Type: ecs
        - ServerId: !Ref ControlPlaneInstance3
          Weight: 100
          Type: ecs

  WorkerInstanceGroup:
    Type: ALIYUN::ECS::InstanceGroup
    Condition: HasWorkers
    DependsOn:
      - NatSNATEntry
      - NatSNATEntry2
      - RolePolicyAttachment
    Properties:
      InstanceName: !Sub '${ClusterName}-worker'
      InstanceType: !Ref ComputeInstanceType
      ImageId: !Ref ImageId
      SecurityGroupId: !Ref WorkerSecurityGroup
      VSwitchId: !Ref PrivateVSwitch
      SystemDiskCategory: !Ref SystemDiskCategory
      SystemDiskSize: 100
      AllocatePublicIP: false
      MaxAmount: !Ref ComputeCount
      MinAmount: !Ref ComputeCount
      RamRoleName: !Ref NodeRamRole
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned
        - Key: openshift-node-role
          Value: worker

  # ── Optional SSH jump host (testing only) ────────────────────────────────────
  # Looks up the latest Alibaba Linux 3 image dynamically so the template stays
  # portable across regions and image refreshes.
  JumpHostImageLookup:
    Type: DATASOURCE::ECS::Images
    Condition: HasJumpHost
    Properties:
      OSType: linux
      Architecture: x86_64
      ImageName: aliyun_3_x64_20G_alibase_*
      Status: Available

  JumpHostSecurityGroup:
    Type: ALIYUN::ECS::SecurityGroup
    Condition: HasJumpHost
    Properties:
      VpcId: !Ref Vpc
      SecurityGroupName: !Sub '${ClusterName}-jumphost-sg'
      SecurityGroupIngress:
        - IpProtocol: tcp
          PortRange: 22/22
          SourceCidrIp: 0.0.0.0/0
          Description: SSH from anywhere (testing)
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned

  JumpHostInstance:
    Type: ALIYUN::ECS::Instance
    Condition: HasJumpHost
    DependsOn:
      - NatSNATEntry
      - RendezvousInstance
      - ControlPlaneInstance2
      - ControlPlaneInstance3
    Properties:
      InstanceName: !Sub '${ClusterName}-jumphost'
      InstanceType: !Ref JumpHostInstanceType
      ImageId: !Select [0, !GetAtt JumpHostImageLookup.ImageIds]
      SecurityGroupId: !Ref JumpHostSecurityGroup
      VSwitchId: !Ref PublicVSwitch
      SystemDiskCategory: cloud_essd
      SystemDiskSize: 20
      # Direct public IP via RunInstances (avoids AllocateEipAddress RAM sub-user restriction)
      AllocatePublicIP: true
      InternetMaxBandwidthOut: 1       # 1 Mbps — sufficient for SSH
      InternetChargeType: PayByTraffic
      # SSH key injected via UserData; password login disabled in sshd_config
      PasswordInherit: true
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            set -euxo pipefail
            exec > /var/log/userdata.log 2>&1

            # 1. Authorise operator SSH key for root + write private key for node access
            mkdir -p /root/.ssh && chmod 700 /root/.ssh
            echo "${SshPublicKey}" >> /root/.ssh/authorized_keys
            chmod 600 /root/.ssh/authorized_keys
            # Private key — lets jump host SSH into cluster nodes (core@<node-ip>)
            # Value is base64-encoded (no newlines) so it survives CLI argument passing
            echo "${SshPrivateKey}" | base64 -d > /root/.ssh/openshift_ed25519
            chmod 600 /root/.ssh/openshift_ed25519
            # SSH config: use this key automatically for all private subnet hosts
            cat > /root/.ssh/config <<'SSHCONF'
            Host 10.0.*.*
              User core
              IdentityFile /root/.ssh/openshift_ed25519
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
            SSHCONF
            chmod 600 /root/.ssh/config

            # 2. Cluster info MOTD — written BEFORE tool downloads so it always appears
            # even if a later curl/git step fails.
            # Alibaba Linux 3 uses update-motd.d (dynamic MOTD): scripts in that
            # directory are executed at login and their output is appended to the
            # banner, so writing directly to /etc/motd is silently overwritten.
            # Creating an executable script in update-motd.d is the correct fix.
            # We also run it once immediately to seed a static /etc/motd as fallback
            # for SSH clients that read the file directly.
            mkdir -p /etc/update-motd.d
            cat > /etc/update-motd.d/99-openshift-cluster <<'ENDSCRIPT'
            #!/bin/bash
            echo ""
            echo "──────────────────────────────────────────────────────────"
            echo " OpenShift on Alibaba Cloud — Jump Host"
            echo " Cluster : ${ClusterName}.${BaseDomain}"
            echo " API SLB : api.${ClusterName}.${BaseDomain}:6443 (PrivateZone)"
            echo ""
            echo " Tools   : oc / kubectl / openshift-install / kustomize / aliyun"
            echo " Repos   : /root/openshift-alibaba/"
            echo ""
            echo " SSH to cluster nodes (key pre-installed):"
            echo "   ssh core@${RendezvousInstance.PrivateIp}      # master-1"
            echo "   ssh core@${ControlPlaneInstance2.PrivateIp}   # master-2"
            echo "   ssh core@${ControlPlaneInstance3.PrivateIp}   # master-3"
            echo ""
            echo " Typical workflow:"
            echo "   1. export KUBECONFIG=/root/kubeconfig"
            echo "   2. oc get nodes"
            echo "   3. cd /root/openshift-alibaba/alibaba-openshift"
            echo "   4. ansible-playbook ansible/playbooks/05-deploy-post-install.yml"
            echo "──────────────────────────────────────────────────────────"
            ENDSCRIPT
            chmod 0755 /etc/update-motd.d/99-openshift-cluster
            /etc/update-motd.d/99-openshift-cluster > /etc/motd

            # 3. OS packages
            yum install -y --setopt=tsflags=nodocs git tar gzip jq curl bash-completion

            # 4. OpenShift CLI (RHEL 8 compat — works on Alibaba Linux 3)
            cd /tmp
            curl -sL -O https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest-4.20/openshift-client-linux-amd64-rhel8.tar.gz
            tar -xzf openshift-client-linux-amd64-rhel8.tar.gz
            install -m 0755 oc kubectl /usr/local/bin/
            rm -f openshift-client-linux-amd64-rhel8.tar.gz oc kubectl README.md

            # 5. openshift-install (generic linux)
            curl -sL -O https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest-4.20/openshift-install-linux.tar.gz
            tar -xzf openshift-install-linux.tar.gz
            install -m 0755 openshift-install /usr/local/bin/
            rm -f openshift-install-linux.tar.gz openshift-install README.md

            # 6. kustomize
            curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz" \
              | tar -xz -C /usr/local/bin/
            chmod 0755 /usr/local/bin/kustomize

            # 7. aliyun CLI
            curl -sL -o /tmp/aliyun-cli.tgz https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
            tar -xzf /tmp/aliyun-cli.tgz -C /usr/local/bin/
            rm /tmp/aliyun-cli.tgz

            # 8. Clone project repos
            mkdir -p /root/openshift-alibaba && cd /root/openshift-alibaba
            git clone https://github.com/SammZhu/alibaba-openshift.git || true
            git clone https://github.com/SammZhu/alibaba-cloud-csi-operator.git || true
            git clone https://github.com/SammZhu/openshift-capi-alicloud.git || true

            # 9. Marker file so 'cloud-init status' shows readiness
            touch /var/log/userdata.done
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned
        - Key: role
          Value: jumphost

  # ── Optional private mirror registry ECS (China / disconnected) ──────────────
  # Dynamically resolves the latest Alibaba Linux 3 image so the template stays
  # portable across regions (same pattern as JumpHostImageLookup).
  MirrorImageLookup:
    Type: DATASOURCE::ECS::Images
    Condition: MirrorEnabled
    Properties:
      OSType: linux
      Architecture: x86_64
      ImageName: aliyun_3_x64_20G_alibase_*
      Status: Available

  MirrorRamRole:
    Type: ALIYUN::RAM::Role
    Condition: MirrorEnabled
    Properties:
      RoleName: !Sub '${ClusterName}-mirror-role'
      Description: RAM Role for mirror-registry ECS — pulls tarball from OSS via instance principal
      AssumeRolePolicyDocument:
        Version: '1'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs.aliyuncs.com
            Action: sts:AssumeRole

  MirrorRamPolicy:
    Type: ALIYUN::RAM::ManagedPolicy
    Condition: MirrorEnabled
    Properties:
      PolicyName: !Sub '${ClusterName}-mirror-policy'
      Description: Read-only OSS access for mirror-registry tarball download
      PolicyDocument:
        Version: '1'
        Statement:
          - Effect: Allow
            Action:
              - oss:GetObject
              - oss:HeadObject
              - oss:ListObjects
              - oss:ListBuckets
            Resource: ['*']

  MirrorRamAttach:
    Type: ALIYUN::RAM::AttachPolicyToRole
    Condition: MirrorEnabled
    Properties:
      RoleName: !Ref MirrorRamRole
      PolicyName: !GetAtt MirrorRamPolicy.PolicyName
      PolicyType: Custom

  # Cluster nodes (control plane + workers) live in WorkerSecurityGroup /
  # ControlPlaneSecurityGroup, and the mirror ECS is also placed in
  # WorkerSecurityGroup so cluster nodes can reach it on 8443.
  # The intra-SG default-allow rule lets nodes reach the mirror; these
  # explicit ingress rules additionally allow access from anywhere in the
  # VPC CIDR (covers control plane SG, jump host, etc.).
  MirrorSecurityGroupIngress8443:
    Type: ALIYUN::ECS::SecurityGroupIngress
    Condition: MirrorEnabled
    DependsOn: WorkerSecurityGroup
    Properties:
      SecurityGroupId: !Ref WorkerSecurityGroup
      IpProtocol: tcp
      PortRange: 8443/8443
      SourceCidrIp: !Ref VpcCidr
      NicType: intranet
      Description: mirror-registry quay listener (VPC-internal pulls from cluster nodes)

  MirrorSecurityGroupIngressSsh:
    Type: ALIYUN::ECS::SecurityGroupIngress
    Condition: MirrorEnabled
    DependsOn: WorkerSecurityGroup
    Properties:
      SecurityGroupId: !Ref WorkerSecurityGroup
      IpProtocol: tcp
      PortRange: 22/22
      SourceCidrIp: !Ref VpcCidr
      NicType: intranet
      Description: SSH to mirror ECS from jump host / Ansible (VPC-internal only)

  MirrorRegistryInstance:
    Type: ALIYUN::ECS::Instance
    Condition: MirrorEnabled
    DependsOn:
      - NatSNATEntry
      - MirrorRamAttach
    Properties:
      InstanceName: !Sub '${ClusterName}-mirror-registry'
      HostName: !Sub '${ClusterName}-mirror'
      InstanceType: !Ref MirrorInstanceType
      ImageId: !Select [0, !GetAtt MirrorImageLookup.ImageIds]
      SecurityGroupId: !Ref WorkerSecurityGroup
      VSwitchId: !Ref PrivateVSwitch
      PrivateIpAddress: !Ref MirrorPrivateIp
      SystemDiskCategory: cloud_essd
      SystemDiskSize: 40
      DiskMappings:
        - Category: cloud_essd
          Size: !Ref MirrorDataDiskSize
          Device: /dev/xvdb
          DiskName: !Sub '${ClusterName}-mirror-data'
      AllocatePublicIP: false
      RamRoleName: !GetAtt MirrorRamRole.RoleName
      # SSH key is injected via UserData (same pattern as jump host).
      # SshPublicKey is reused — operator passes the same key, Ansible reaches
      # the mirror over the jump host's ProxyCommand.
      PasswordInherit: true
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            set -euxo pipefail
            exec > /var/log/mirror-setup.log 2>&1
            echo "=== $(date -Iseconds) cloud-init started ==="

            # cloud-init systemd unit may not export HOME; mirror-registry
            # then resolves --sshKey default to '/.ssh/quay_installer' which
            # fails ('open /.ssh/quay_installer.pub: no such file or directory').
            # Set HOME so mirror-registry (and any other ~ users) find /root.
            export HOME=/root

            # 0. Authorise operator SSH key for root so Ansible can SSH in
            mkdir -p /root/.ssh && chmod 700 /root/.ssh
            echo "${SshPublicKey}" >> /root/.ssh/authorized_keys
            chmod 600 /root/.ssh/authorized_keys

            # 1. Wait for + mount data disk
            DATA_DISK=/dev/vdb
            for i in $(seq 1 60); do [ -b "$DATA_DISK" ] && break; sleep 2; done
            mkfs.xfs -f "$DATA_DISK"
            mkdir -p /var/lib/quay-storage
            mount "$DATA_DISK" /var/lib/quay-storage
            echo "$DATA_DISK /var/lib/quay-storage xfs defaults 0 0" >> /etc/fstab

            # 2. Install dependencies
            dnf install -y podman tar curl jq
            curl -fLO https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
            tar xzf aliyun-cli-linux-latest-amd64.tgz
            install -m 0755 aliyun /usr/local/bin/
            rm -f aliyun-cli-linux-latest-amd64.tgz aliyun

            # 3. Download mirror-registry installer FROM OSS (build host put it there)
            # mirror.openshift.com 307-redirects to access.cdn.redhat.com with a
            # signed URL that times out from cn-* regions.  We get it from OSS
            # via the internal endpoint instead — same RAM role, free traffic.
            cd /opt
            # Download the "version marker" file first
            aliyun oss cp \
              "oss://${MirrorOssBucket}/mirror-tarballs/mirror-registry-version.txt" \
              ./mr-version.txt \
              --endpoint="oss-${Region}-internal.aliyuncs.com" \
              --mode=EcsRamRole --ecs-role-name "${ClusterName}-mirror-role" \
              --region "${Region}" --force
            MR_VERSION=$(cat ./mr-version.txt | tr -d '[:space:]')
            rm -f ./mr-version.txt
            echo "    mirror-registry version: $MR_VERSION"
            aliyun oss cp \
              "oss://${MirrorOssBucket}/mirror-tarballs/mirror-registry-$MR_VERSION.tar.gz" \
              ./mirror-registry.tar.gz \
              --endpoint="oss-${Region}-internal.aliyuncs.com" \
              --mode=EcsRamRole --ecs-role-name "${ClusterName}-mirror-role" \
              --region "${Region}" --part-size=104857600 --parallel=10
            tar xzf mirror-registry.tar.gz
            rm -f mirror-registry.tar.gz

            # 4. Download oc + oc-mirror using VERSIONED URLs
            # /latest/ symlinks on mirror.openshift.com are now 404; URL must
            # pin to a specific patch.  Phase 02 stages the patch version in
            # OSS as openshift-patch-version.txt — read it first.
            aliyun oss cp \
              "oss://${MirrorOssBucket}/mirror-tarballs/openshift-patch-version.txt" \
              ./ocp-version.txt \
              --endpoint="oss-${Region}-internal.aliyuncs.com" \
              --mode=EcsRamRole --ecs-role-name "${ClusterName}-mirror-role" \
              --region "${Region}" --force
            OCP_VERSION=$(cat ./ocp-version.txt | tr -d '[:space:]')
            rm -f ./ocp-version.txt
            echo "    OpenShift patch version: $OCP_VERSION"

            curl -fL "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/$OCP_VERSION/openshift-client-linux.tar.gz" | tar xz oc
            curl -fLO "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/$OCP_VERSION/oc-mirror.tar.gz"
            tar xzf oc-mirror.tar.gz
            chmod +x oc oc-mirror
            install -m 0755 oc oc-mirror /usr/local/bin/
            rm -f oc oc-mirror oc-mirror.tar.gz

            # 5. Download tarball from OSS via RAM role + internal endpoint
            echo "=== $(date -Iseconds) downloading tarball from OSS ==="
            aliyun oss cp "oss://${MirrorOssBucket}/${MirrorOssObject}" \
              /var/lib/quay-storage/mirror-tarball.tar \
              --endpoint="oss-${Region}-internal.aliyuncs.com" \
              --mode=EcsRamRole --ecs-role-name "${ClusterName}-mirror-role" \
              --region "${Region}" --part-size=104857600 --parallel=10

            # 6. Install mirror-registry
            echo "=== $(date -Iseconds) installing mirror-registry ==="
            /opt/mirror-registry install \
              --quayHostname "${MirrorPrivateIp}" \
              --quayRoot /var/lib/quay-storage \
              --initUser "${MirrorInitUser}" \
              --initPassword "${MirrorInitPassword}"

            # 7. Trust cert + import tarball
            cp /var/lib/quay-storage/quay-rootCA/rootCA.pem /etc/pki/ca-trust/source/anchors/quay-mirror.crt
            update-ca-trust extract

            mkdir -p /root/.docker
            cat > /root/.docker/config.json <<DOCKEREOF
            {"auths":{"${MirrorPrivateIp}:8443":{"auth":"$(echo -n "${MirrorInitUser}:${MirrorInitPassword}" | base64 -w0)"}}}
            DOCKEREOF

            until curl -ksf "https://${MirrorPrivateIp}:8443/health/instance"; do sleep 5; done

            echo "=== $(date -Iseconds) importing tarball into mirror-registry ==="
            oc mirror --from=/var/lib/quay-storage/mirror-tarball.tar \
              "docker://${MirrorPrivateIp}:8443"

            # 8. Expose CA + signal ready
            cp /var/lib/quay-storage/quay-rootCA/rootCA.pem /var/lib/mirror-ca.crt
            echo "$(date -Iseconds) READY" > /var/lib/mirror-ready
            echo "=== $(date -Iseconds) mirror ready ==="
      Tags:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned
        - Key: role
          Value: mirror-registry

Outputs:
  JumpHostPublicIp:
    Condition: HasJumpHost
    Value: !GetAtt JumpHostInstance.PublicIp
    Description: Jump host public IP — SSH target for operator access

  JumpHostSshCommand:
    Condition: HasJumpHost
    Value: !Sub
      - 'ssh root@${Ip}'
      - Ip: !GetAtt JumpHostInstance.PublicIp
    Description: Ready-to-run SSH command (uses the key passed in SshPublicKey)

  VpcId:
    Value: !Ref Vpc
    Description: VPC ID — needed for CCM cloud.conf and CAPA AlibabaCloudCluster

  VSwitchId:
    Value: !Ref PrivateVSwitch
    Description: Primary VSwitch ID — needed for CCM cloud.conf

  ApiSLBIp:
    Value: !GetAtt ApiSLB.IpAddress
    Description: API Server SLB internal IP — use as controlPlaneEndpoint in install-config.yaml

  PrivateZoneName:
    Value: !Sub '${ClusterName}.${BaseDomain}'
    Description: Private DNS zone name

  RendezvousInstanceId:
    Value: !Ref RendezvousInstance
    Description: ECS instance ID of master-1 (rendezvous node)

  InstallConfig:
    Description: |
      Assisted: paste into Red Hat Hybrid Cloud Console.
      Agent-based: save as install-config.yaml in your installation directory,
      fill in pullSecret and sshKey, then run:
        openshift-install agent create image --dir <install-dir>
    Value: !Sub |
      apiVersion: v1
      metadata:
        name: ${ClusterName}
      baseDomain: ${BaseDomain}
      networking:
        clusterNetwork:
          - cidr: 10.128.0.0/14
            hostPrefix: 23
        networkType: OVNKubernetes
        machineNetwork:
          - cidr: ${VpcCidr}
        serviceNetwork:
          - 172.30.0.0/16
      compute:
        - architecture: amd64
          hyperthreading: Enabled
          name: worker
          replicas: ${ComputeCount}
      controlPlane:
        architecture: amd64
        hyperthreading: Enabled
        name: master
        replicas: ${ControlPlaneCount}
      platform:
        external:
          platformName: AlibabaCloud
          cloudControllerManager: External
      pullSecret: '<replace-with-pull-secret>'
      sshKey: '<replace-with-ssh-public-key>'

  AgentConfig:
    Description: |
      Agent-based only. Save as agent-config.yaml alongside install-config.yaml.
      The rendezvousIP MUST match the RendezvousIp parameter used when creating this stack.
      Run: openshift-install agent create image --dir <install-dir>
      Then import the generated agent.x86_64.iso as a custom ECS image and create
      a new stack (or update this one) with the resulting ImageId.
    Value: !Sub |
      apiVersion: v1alpha1
      kind: AgentConfig
      metadata:
        name: ${ClusterName}
      rendezvousIP: ${RendezvousIp}
      hosts: []

  WorkerSecurityGroup:
    Value: !Ref WorkerSecurityGroup
    Description: Worker security group ID — needed by Phase 04 to register nodes

  NodeRamRoleName:
    Value: !Ref NodeRamRole
    Description: RAM role name attached to all nodes — needed by Phase 04

  MasterIp1:
    Value: !GetAtt RendezvousInstance.PrivateIp
    Description: master-1 private IP (etcd-0, PTR record target)

  MasterIp2:
    Value: !GetAtt ControlPlaneInstance2.PrivateIp
    Description: master-2 private IP (etcd-1, PTR record target)

  MasterIp3:
    Value: !GetAtt ControlPlaneInstance3.PrivateIp
    Description: master-3 private IP (etcd-2, PTR record target)

  ReverseZoneId1:
    Value: !Ref ReverseZone1
    Description: PrivateZone ID for 16.0.10.in-addr.arpa (PTR records for PrivateVSwitch nodes)

  ReverseZoneId2:
    Value: !Ref ReverseZone2
    Description: PrivateZone ID for 32.0.10.in-addr.arpa (PTR records for PrivateVSwitch2 nodes)

  DynamicCustomManifest:
    Description: |
      Assisted: save as alibaba-ccm-config.yaml and upload to Assisted Installer
      Custom Manifests alongside 01-alibaba-ccm.yaml and 03-machineconfig-providerid.yaml.
      Agent-based: save as openshift/alibaba-ccm-config.yaml inside your installation
      directory before running openshift-install agent create image.
    Value: !Sub |
      # alibaba-ccm-config.yaml — generated by ROS stack (${ClusterName})
      # Upload to Assisted Installer Custom Manifests at install time.
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: alibaba-cloud-config
        # Per the Platform External onboarding guide, the CCM runs in its own
        # dedicated namespace (not kube-system). See 01-alibaba-ccm.yaml.
        namespace: alibaba-cloud-controller-manager
      data:
        cloud.conf: |
          [Global]
          cluster-id=${ClusterName}
          region=${Region}
          vpcid=${Vpc}
          zoneid=${ZoneId}
          vswitchid=${PrivateVSwitch}

          [LoadBalancer]
          address-type=intranet

  MirrorRegistryIp:
    Condition: MirrorEnabled
    Value: !Ref MirrorPrivateIp
    Description: Static private IP of the mirror-registry ECS (https://<ip>:8443)

  MirrorRegistryInstanceId:
    Condition: MirrorEnabled
    Value: !Ref MirrorRegistryInstance
    Description: ECS instance ID of the mirror-registry node
