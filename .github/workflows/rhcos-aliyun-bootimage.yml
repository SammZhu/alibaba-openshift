# RHCOS aliyun boot-image supply chain — version matrix (P3-IMG.1)
name: rhcos-aliyun-bootimage

on:
  schedule:
    - cron: "17 6 * * *"        # daily: poll for new RHCOS across the support window
  workflow_dispatch: {}

permissions:
  contents: write               # provenance write-back

jobs:
  bake-matrix:
    runs-on: [self-hosted, Linux, X64, rhel8, alibaba-vpc]
    steps:
      # This runner is in the Alibaba VPC; its cross-border path to github.com is
      # flaky (OpenSSL SSL_ERROR_SYSCALL).  fetch-depth:1 minimises the clone, and
      # the provenance write-back below retries.  A rare checkout SSL drop just
      # needs a workflow re-run.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Bake every RHCOS from the floor up (skip already baked)
        run: |
          set -uo pipefail
          # AND 上 AI 版本矩阵:从 operator 的 all.yml 读 token 路径
          OP_GV="$HOME/work/alibabacloud/openshift-alibaba/alibaba-openshift/ansible/group_vars/all.yml"
          AI_ARG=""
          if python3 scripts/ai_versions.py --group-vars "$OP_GV" > /tmp/ai-versions.txt 2>/tmp/ai.err; then
            AI_ARG="--ai-versions /tmp/ai-versions.txt"
            echo "AI-supported: $(tr '\n' ' ' < /tmp/ai-versions.txt)"
          else
            echo "::warning::AI 拉取失败 — 不做 AI 交集,仅按 floor 烤"; cat /tmp/ai.err 2>/dev/null || true
          fi
          LIST="$(python3 scripts/bootimage_detect.py --all-from $AI_ARG --provenance-dir bootimage/provenance)"
          
          if [ -z "$LIST" ]; then
            echo "✓ all versions up to date — nothing to bake"
            exit 0
          fi
          echo "to bake:"; printf '%s\n' "$LIST" | cut -f1,2
          rc=0
          while IFS=$'\t' read -r RHCOS OCP URL SHA; do
            [ -z "$RHCOS" ] && continue
            echo "::group::bake $RHCOS (OCP $OCP)"
            if bash scripts/bake-one.sh "$RHCOS" "$OCP" "$URL" "$SHA"; then
              echo "✓ $RHCOS baked + provenance recorded"
            else
              echo "::error::bake failed for $RHCOS (OCP $OCP)"; rc=1
            fi
            echo "::endgroup::"
          done <<< "$LIST"
          exit $rc

      - name: Refresh provenance ocpVersion to latest z-stream
        if: ${{ !cancelled() }}            # 即使某个版本烤失败也刷新其它条目
        run: |
          set -uo pipefail
          # 复用 bake 步骤已拉好的 AI 列表;没有就跳过(没 AI 源刷不了 z)
          [ -s /tmp/ai-versions.txt ] || { echo "no AI list — skip refresh"; exit 0; }
          python3 scripts/normalize_provenance.py \
            --ai-versions /tmp/ai-versions.txt \
            --provenance-dir bootimage/provenance
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bootimage/provenance
          git commit -m "chore(bootimage): refresh ocpVersion to latest z" || { echo "no change"; exit 0; }
          # Self-hosted runner -> github.com is cross-border and flaky
          # (OpenSSL SSL_ERROR_SYSCALL); retry the pull/push write-back.
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" \
               && git push origin "HEAD:${GITHUB_REF_NAME:-main}"; then
              echo "provenance write-back OK (attempt $i)"; exit 0
            fi
            echo "::warning::git write-back attempt $i failed (github.com SSL/network); retry in 15s"
            sleep 15
          done
          echo "::error::git write-back failed after 5 attempts"; exit 1
