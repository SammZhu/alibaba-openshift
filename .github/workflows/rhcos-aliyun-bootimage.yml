# RHCOS aliyun boot-image supply chain (P3-IMG.1)
#
# Zero standing storage: provenance (this repo) is the only durable artifact; the
# qcow2 is re-baked on demand, OSS is transit-only, the ECS image is materialized
# when needed. The bake runs on an INTERNAL self-hosted runner that reaches GitHub
# OUTBOUND only (pull, not push) — no inbound firewall hole.
#
# detect (hosted)  ->  bake (self-hosted, VPC)  ->  provenance (hosted, writes back)
name: rhcos-aliyun-bootimage

on:
  schedule:
    - cron: "17 6 * * *"        # daily poll for a new RHCOS release
  workflow_dispatch:
    inputs:
      stream_json:
        description: "Optional: paste coreos-bootimages stream JSON (else the self-hosted runner reads it from the cluster)"
        required: false

permissions:
  contents: write               # provenance job commits back

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      needs_bake: ${{ steps.d.outputs.needs_bake }}
      rhcos_version: ${{ steps.d.outputs.rhcos_version }}
      source_url: ${{ steps.d.outputs.source_url }}
      source_sha256: ${{ steps.d.outputs.source_sha256 }}
    steps:
      - uses: actions/checkout@v4
      # Stream JSON either comes from workflow_dispatch input, or the self-hosted
      # runner fetches it from the cluster in the bake job. For the scheduled path
      # we expect the input; otherwise detect defers (needs_bake derived in bake).
      - id: d
        if: ${{ github.event.inputs.stream_json != '' }}
        run: |
          echo '${{ github.event.inputs.stream_json }}' > /tmp/stream.json
          python3 scripts/bootimage_detect.py --stream /tmp/stream.json \
            --provenance-dir bootimage/provenance >> "$GITHUB_OUTPUT"
      - if: ${{ github.event.inputs.stream_json == '' }}
        run: echo "no stream input; bake job will read the cluster stream + decide"

  bake:
    needs: detect
    # The internal RHEL runner picks this up over its OUTBOUND connection.
    runs-on: [self-hosted, Linux, X64, rhel8, alibaba-vpc]
    # RAM role on the runner ECS provides cloud creds — no AK/SK secrets here.
    steps:
      - uses: actions/checkout@v4

      - name: Resolve stream + decide (from cluster if not provided)
        id: r
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.stream_json }}" ]; then
            echo '${{ github.event.inputs.stream_json }}' > /tmp/stream.json
          else
            oc -n openshift-machine-config-operator get cm coreos-bootimages \
              -o jsonpath='{.data.stream}' > /tmp/stream.json
          fi
          python3 scripts/bootimage_detect.py --stream /tmp/stream.json \
            --provenance-dir bootimage/provenance >> "$GITHUB_OUTPUT"

      - name: Bake + offline gate (skip if already baked)
        if: ${{ steps.r.outputs.needs_bake == 'true' }}
        env:
          RHCOS_VERSION: ${{ steps.r.outputs.rhcos_version }}
          SOURCE_URL: ${{ steps.r.outputs.source_url }}
          SOURCE_SHA256: ${{ steps.r.outputs.source_sha256 }}
        run: |
          set -euo pipefail
          WORK="$(mktemp -d)"; trap 'rm -rf "$WORK"' EXIT     # RHEL keeps nothing
          curl -fSL "$SOURCE_URL" -o "$WORK/rhcos.qcow2.gz"
          echo "${SOURCE_SHA256}  $WORK/rhcos.qcow2.gz" | sha256sum -c -   # trust anchor
          gunzip -f "$WORK/rhcos.qcow2.gz"
          # Phase 10 does the guestfish re-stamp + OSS + ImportImage; here we run
          # the bake then the GATE before any upload (Phase 10 to be refactored to
          # call bootimage-gate.sh between re-stamp and upload).
          PREV="$(ls -1 bootimage/provenance/*.yaml 2>/dev/null | grep -v example | sort | tail -1 || true)"
          BASELINE=""
          if [ -n "$PREV" ]; then
            python3 scripts/print_baseline.py "$PREV" > "$WORK/baseline.keys"
            BASELINE="$WORK/baseline.keys"
          fi
          ansible-playbook -i ansible/inventory.yml ansible/playbooks/10-prepare-worker-bootimage.yml \
            -e "rhcos_qcow=$WORK/rhcos.qcow2" -e "skip_upload_until_gate=true"
          # Hard gate BEFORE upload/import:
          scripts/bootimage-gate.sh "$WORK/rhcos.qcow2" $BASELINE

      - name: Boot smoke (low-frequency, before blessing)
        if: ${{ steps.r.outputs.needs_bake == 'true' }}
        run: |
          echo "TODO boot smoke: launch one ECS from the new image; assert ignition runs as aliyun + kubelet joins; then mark provenance bootSmoke=passed"

  provenance:
    needs: [detect, bake]
    if: ${{ always() && needs.bake.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Commit provenance for the new version (bot)
        run: |
          echo "TODO: assemble bootimage/provenance/<rhcos>.yaml from the bake outputs,"
          echo "cosign-sign it, and open a bot PR. (write-back closes the loop)"
