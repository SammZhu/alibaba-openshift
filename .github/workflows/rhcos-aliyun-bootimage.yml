# RHCOS aliyun boot-image supply chain — version matrix (P3-IMG.1)
name: rhcos-aliyun-bootimage

on:
  schedule:
    - cron: "17 6 * * *"        # daily: poll for new RHCOS across the support window
  workflow_dispatch: {}

permissions:
  contents: write               # provenance write-back

jobs:
  bake-matrix:
    runs-on: [self-hosted, Linux, X64, rhel8, alibaba-vpc]
    steps:
      - uses: actions/checkout@v4

      - name: Bake every RHCOS from the floor up (skip already baked)
        run: |
          set -uo pipefail
          LIST="$(python3 scripts/bootimage_detect.py --all-from --provenance-dir bootimage/provenance)"
          if [ -z "$LIST" ]; then
            echo "✓ all versions up to date — nothing to bake"
            exit 0
          fi
          echo "to bake:"; printf '%s\n' "$LIST" | cut -f1,2
          rc=0
          while IFS=$'\t' read -r RHCOS OCP URL SHA; do
            [ -z "$RHCOS" ] && continue
            echo "::group::bake $RHCOS (OCP $OCP)"
            if bash scripts/bake-one.sh "$RHCOS" "$OCP" "$URL" "$SHA"; then
              echo "✓ $RHCOS baked + provenance recorded"
            else
              echo "::error::bake failed for $RHCOS (OCP $OCP)"; rc=1
            fi
            echo "::endgroup::"
          done <<< "$LIST"
          exit $rc
