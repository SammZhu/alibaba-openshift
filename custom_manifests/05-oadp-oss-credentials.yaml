---
# OSS credentials for OADP/Velero backup storage.
#
# IMPORTANT: This is a TEMPLATE — replace the placeholder values before applying.
#
# The AK/SK used here should be a dedicated RAM user with MINIMUM PRIVILEGE:
#   oss:PutObject, oss:GetObject, oss:DeleteObject, oss:ListObjects,
#   oss:ListBuckets, oss:GetBucketLocation, oss:PutBucketLifecycle
#
# DO NOT reuse the node instance RAM Role credentials here.
# These credentials are stored as a Kubernetes Secret in openshift-adp namespace.
#
# RAM policy template (attach to the backup RAM user):
#   {
#     "Version": "1",
#     "Statement": [{
#       "Effect": "Allow",
#       "Action": [
#         "oss:PutObject", "oss:GetObject", "oss:DeleteObject",
#         "oss:ListObjects", "oss:ListBuckets", "oss:GetBucketLocation",
#         "oss:PutBucketLifecycle", "oss:GetBucketLifecycle"
#       ],
#       "Resource": [
#         "acs:oss:*:*:YOUR-BUCKET-NAME",
#         "acs:oss:*:*:YOUR-BUCKET-NAME/*"
#       ]
#     }]
#   }
apiVersion: v1
kind: Secret
metadata:
  name: cloud-credentials
  namespace: openshift-adp
type: Opaque
stringData:
  # Velero expects AWS-compatible credential format for S3-compatible storage.
  cloud: |
    [default]
    aws_access_key_id=<YOUR-OSS-ACCESS-KEY-ID>
    aws_secret_access_key=<YOUR-OSS-ACCESS-KEY-SECRET>
