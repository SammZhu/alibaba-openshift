---
# AlibabaCloudCSIDriver CR — the singleton instance that tells the operator
# which CSI drivers to deploy and how to configure them.
# This CR is injected after the Subscription so the operator is already running.
# NOTE: The operator itself watches for this CR in kube-system.
#
# RAM: the node instance RAM role (mirror-stack NodeRamPolicy) already grants the
# Disk CSI (ecs:*Disk / *Snapshot) and NAS CSI (nas:*FileSystem / *MountTarget)
# permissions, so both drivers can provision dynamically with ramToken v2 (IMDSv2).
apiVersion: csi.alibabacloud.com/v1alpha1
kind: AlibabaCloudCSIDriver
metadata:
  name: cluster
  namespace: kube-system
spec:
  # Phase 1: Disk (EBS / cloud disk) driver
  disk:
    enabled: true
    defaultStorageClass: true
    storageClasses:
      # Cluster-wide default StorageClass (first entry + defaultStorageClass: true).
      # Filesystem mode for general container workloads (RWO + Filesystem).
      - name: alicloud-disk-essd
        type: cloud_essd
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        volumeMode: Filesystem
      # OpenShift Virtualization VM OS-disk class — Block mode for raw block device
      # access (best VM I/O, no double filesystem layer). Marked virtDefault so OKV
      # DataVolumes land here by default.
      - name: alicloud-disk-essd-block
        type: cloud_essd
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        volumeMode: Block
        virtDefault: true
      # Cheaper general-purpose class (cloud_efficiency), Filesystem.
      - name: alicloud-disk-efficiency
        type: cloud_efficiency
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        volumeMode: Filesystem
    # snapshot.storage.k8s.io CRDs ship with OpenShift by default. The operator
    # creates a VolumeSnapshotClass (is-default-class) for VM snapshots and the
    # OADP/Velero backup chain. It skips gracefully if the CRDs are absent.
    snapshot:
      enabled: true
      className: alibaba-cloud-disk-snapclass
    # Patch the CDI StorageProfile so KubeVirt DataVolumes pick the right
    # accessMode/volumeMode automatically (disk = RWO + per-class volumeMode).
    # cloneStrategy values (must match CDI cdi.kubevirt.io/v1beta1 CDICloneStrategy):
    #   csi-clone  — zero-copy CSI clone (fastest)
    #   snapshot   — VolumeSnapshot-based copy
    #   copy       — host-assisted pod copy (slowest; NOTE: NOT "host-assisted")
    # Silently skipped if CDI / OpenShift Virtualization is not installed.
    storageProfile:
      patch: true
      cloneStrategy: csi-clone

  # Phase 2: NAS (file storage) driver — ReadWriteMany, required for VM live migration.
  # Node RAM role has the nas:* permissions (mirror-stack) for dynamic filesystem-mode
  # provisioning.
  #
  # storageClasses is intentionally EMPTY: the operator deploys the NAS driver
  # (CSIDriver + controller + node DaemonSet) but does NOT create a StorageClass.
  # A dynamically-provisionable NAS SC needs filesystem-mode params that are
  # cluster-network-specific (volumeAs=filesystem + vpcId/vSwitchId/zoneId), which
  # the operator cannot know at reconcile time. 08-deploy-post-install applies the
  # alicloud-nas-performance StorageClass directly, filled from the cluster's
  # vpc/vSwitch/zone (state.yml). See docs/csi-driver-design.md §5.5.3 gap 2 — the
  # operator-native version (CR carries the network) is tracked separately.
  nas:
    enabled: true
    storageClasses: []
    storageProfile:
      patch: true
      cloneStrategy: csi-clone  # NAS supports csi-clone; no snapshot support yet

  # Phase 3: OSS — not implemented as a mount driver (backup is via OADP + OSS S3).
  oss:
    enabled: false

  # Upstream csi-driver image tag (kubernetes-sigs/alibaba-cloud-csi-driver)
  imageTag: v1.35.3

  # Auth via ECS RAM Role instance principal (IMDSv2) — no AK/SK required
  auth:
    ramToken: v2

  # Controller Deployment pinned to control-plane nodes
  controller:
    replicas: 2
    nodeSelector:
      node-role.kubernetes.io/master: ""
    tolerations:
      - key: node-role.kubernetes.io/master
        effect: NoSchedule
