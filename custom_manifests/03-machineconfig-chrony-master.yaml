---
# MachineConfig: point chrony at Alibaba Cloud INTERNAL NTP (master nodes).
# The internal NTP endpoints (ntp*.cloud.aliyuncs.com) are reachable from any
# ECS inside the VPC WITHOUT internet egress — like IMDS 100.100.100.200. This
# keeps every AZ's clock correct without a NAT egress path, which is air-gap-safe
# and avoids the clock skew that broke CSI on an egress-less worker subnet
# (cn-wulanchabu-c, observed 2026-06-14: +8h skew -> STS creds "expired" ->
# unsigned DescribeDisks -> disk-node CrashLoop).
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 50-chrony-aliyun-internal-master
  labels:
    machineconfiguration.openshift.io/role: master
spec:
  config:
    ignition:
      version: 3.4.0
    storage:
      files:
        - path: /etc/chrony.conf
          mode: 0644
          overwrite: true
          contents:
            source: "data:text/plain;charset=utf-8;base64,"
