---
# MachineConfig: point chrony at Alibaba Cloud INTERNAL NTP (worker nodes).
# See the master twin (03-machineconfig-chrony-master.yaml) for the rationale.
# Worker subnets that lack a NAT egress path (a dynamically-added AZ such as
# cn-wulanchabu-c) cannot reach EXTERNAL NTP, so their clock drifts and CSI's
# signed ECS calls fail. The internal NTP needs no egress, so this fixes the
# clock on every AZ regardless of egress. Applies to CAPA-joined workers too —
# the machine-config-server serves this rendered config at first boot.
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 50-chrony-aliyun-internal-worker
  labels:
    machineconfiguration.openshift.io/role: worker
spec:
  config:
    ignition:
      version: 3.4.0
    storage:
      files:
        - path: /etc/chrony.conf
          mode: 0644
          overwrite: true
          contents:
            source: "data:text/plain;charset=utf-8;base64,"
