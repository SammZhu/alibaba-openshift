---
# MachineConfig: inject kubelet ProviderID from Alibaba Cloud ECS metadata
# Applied to master (control-plane) nodes at first boot.
# Format: alicloud://<region>.<instance-id>  (matches cloud-provider-alibaba-cloud CCM NodeFromProviderID)
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 10-alibaba-providerid-master
  labels:
    machineconfiguration.openshift.io/role: master
spec:
  config:
    ignition:
      version: 3.4.0
    systemd:
      units:
        - name: alibaba-providerid.service
          enabled: true
          contents: |
            [Unit]
            Description=Set Alibaba Cloud ECS ProviderID for kubelet
            Before=kubelet.service
            After=network-online.target
            ConditionPathExists=!/etc/kubernetes/node-providerid

            [Service]
            Type=oneshot
            RemainAfterExit=yes
            ExecStart=/usr/local/bin/alibaba-providerid.sh

            [Install]
            WantedBy=multi-user.target
    storage:
      files:
        - path: /usr/local/bin/alibaba-providerid.sh
          mode: 0755
          # ⚠️ Use `source:` (data URI), NOT `contents.inline:`.  MCO has a
          # bug rendering `inline` form for MachineConfig storage.files —
          # the inline content gets DROPPED in the rendered MC but
          # `overwrite: true` (auto-added) stays, producing an invalid
          # Ignition file:
          #   "$.storage.files[N].overwrite — overwrite must be false if
          #    source is unspecified"
          # MCS then returns HTTP 500 to all master/worker ignition fetches
          # → bootstrap deadlock, install stuck in Configuring.
          # data:text/plain;base64,<base64-of-script>:
          contents:
            source: "data:text/plain;charset=utf-8;base64,"
