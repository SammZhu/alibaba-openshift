# CAPA admission webhooks (P3-CAPA.7 / task #29)
# ---------------------------------------------------------------------------
# Defaulting (mutating) + validation (validating) for AlibabaCloudMachine and
# AlibabaCloudCluster, served by the controller-manager on :9443.
#
# TLS is handled the OpenShift-native way, NO cert-manager:
#   * the Service below carries the annotation
#       service.beta.openshift.io/serving-cert-secret-name: capa-webhook-server-cert
#     so the cluster service-ca operator mints a serving cert into that Secret,
#     which the Deployment mounts at /tmp/k8s-webhook-server/serving-certs
#     (see 02-capa-controller.yaml).
#   * each *WebhookConfiguration carries
#       service.beta.openshift.io/inject-cabundle: "true"
#     so service-ca injects the matching CA into every clientConfig.caBundle.
#
# Apply order: this file is applied together with 02-capa-controller.yaml. The
# controller image MUST be >= v0.1.7 (the build that serves the webhooks);
# older images don't listen on :9443 and — with failurePolicy: Fail — would make
# every AlibabaCloud* create/update fail. The 08-deploy / 09-smoke playbooks pin
# the digest accordingly.
---
apiVersion: v1
kind: Service
metadata:
  name: capa-webhook-service
  namespace: capa-system
  labels:
    app: capa-controller-manager
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: capa-webhook-server-cert
spec:
  selector:
    app: capa-controller-manager
  ports:
    - port: 443
      targetPort: webhook-server
      protocol: TCP
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: capa-mutating-webhook-configuration
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
webhooks:
  - name: default.alibabacloudmachine.infrastructure.cluster.x-k8s.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: capa-webhook-service
        namespace: capa-system
        path: /mutate-infrastructure-cluster-x-k8s-io-v1beta1-alibabacloudmachine
    rules:
      - apiGroups: ["infrastructure.cluster.x-k8s.io"]
        apiVersions: ["v1beta1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["alibabacloudmachines"]
        scope: Namespaced
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: capa-validating-webhook-configuration
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
webhooks:
  - name: validation.alibabacloudmachine.infrastructure.cluster.x-k8s.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: capa-webhook-service
        namespace: capa-system
        path: /validate-infrastructure-cluster-x-k8s-io-v1beta1-alibabacloudmachine
    rules:
      - apiGroups: ["infrastructure.cluster.x-k8s.io"]
        apiVersions: ["v1beta1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["alibabacloudmachines"]
        scope: Namespaced
  - name: validation.alibabacloudcluster.infrastructure.cluster.x-k8s.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: capa-webhook-service
        namespace: capa-system
        path: /validate-infrastructure-cluster-x-k8s-io-v1beta1-alibabacloudcluster
    rules:
      - apiGroups: ["infrastructure.cluster.x-k8s.io"]
        apiVersions: ["v1beta1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["alibabacloudclusters"]
        scope: Namespaced
