---
# Cluster API Provider Alibaba Cloud (CAPA) — Controller
# Provides MachineSet/MachineDeployment auto-scaling support
# Prerequisite: 02-capa-crds.yaml must be applied first
apiVersion: v1
kind: Namespace
metadata:
  name: capa-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: capa-controller-manager
  namespace: capa-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capa-manager-role
rules:
  - apiGroups: [infrastructure.cluster.x-k8s.io]
    resources: [alibabacloudclusters, alibabacloudmachines, alibabacloudclustertemplates, alibabacloudmachinetemplates]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [infrastructure.cluster.x-k8s.io]
    resources: [alibabacloudclusters/status, alibabacloudmachines/status]
    verbs: [get, update, patch]
  - apiGroups: [infrastructure.cluster.x-k8s.io]
    resources: [alibabacloudclusters/finalizers, alibabacloudmachines/finalizers]
    verbs: [update]
  # Externally-managed control plane (AlibabaCloudControlPlane) — Cluster's
  # controlPlaneRef; reports the existing OCP control plane as initialized so
  # CAPI core marks ControlPlaneInitialized and worker MachineDeployments converge.
  - apiGroups: [controlplane.cluster.x-k8s.io]
    resources: [alibabacloudcontrolplanes]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [controlplane.cluster.x-k8s.io]
    resources: [alibabacloudcontrolplanes/status]
    verbs: [get, update, patch]
  - apiGroups: [cluster.x-k8s.io]
    resources: [clusters, machines, machines/status]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [secrets, events]
    verbs: [get, list, watch, create, update, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  # B1 (P3-CAPA.18): auto-approve kubelet CSRs for CAPA-provisioned nodes.
  - apiGroups: [certificates.k8s.io]
    resources: [certificatesigningrequests]
    verbs: [get, list, watch]
  - apiGroups: [certificates.k8s.io]
    resources: [certificatesigningrequests/approval]
    verbs: [update]
  - apiGroups: [certificates.k8s.io]
    resources: [signers]
    resourceNames:
      - kubernetes.io/kube-apiserver-client-kubelet
      - kubernetes.io/kubelet-serving
    verbs: [approve]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
  # P3-CAPA.29 (#79): detect the CAPI core controller-manager (cluster.x-k8s.io/
  # provider=cluster-api) to gate on self-bundled vs OCP-hosted core coexistence.
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capa-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: capa-manager-role
subjects:
  - kind: ServiceAccount
    name: capa-controller-manager
    namespace: capa-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: capa-controller-manager
  namespace: capa-system
  labels:
    app: capa-controller-manager
spec:
  # HA (P4-OPS.1): 2 replicas with leader election (--leader-elect=true below) —
  # only the leader reconciles, the standby takes over on leader loss. The webhook
  # server runs in EVERY replica (not leader-gated), so 2 replicas also keep
  # admission available during a node drain / rollout, which lets failurePolicy=Fail
  # stay safe (see 02-capa-webhooks.yaml).
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: capa-controller-manager
  template:
    metadata:
      labels:
        app: capa-controller-manager
    spec:
      serviceAccountName: capa-controller-manager
      terminationGracePeriodSeconds: 10
      # Spread the replicas across nodes so a single node failure can't take both
      # the active leader and the standby (and both webhook servers) down at once.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: capa-controller-manager
      containers:
        - name: manager
          # Pinned to immutable version tag (NOT :latest) — IfNotPresent below
          # would otherwise never re-pull a mutated :latest, masking rollouts.
          # Image is mirrored by build-mirror-tarball.sh (additionalImages +
          # TAG_MAPPING entry). This static `image:` is pinned by TAG, but on a
          # restricted cluster 08-deploy-post-install resolves the mirror digest and
          # sed-overrides it to a DIGEST reference (quay.io/...@sha256:...), which
          # the install-config ImageDigestMirrorSet redirects to the mirror. A
          # companion ImageTagMirrorSet (samzhu-tag-mirror) is also applied as a
          # backstop for any tag pull (e.g. CSI, or if digest resolution is skipped).
          # Both matter: the IDMS only redirects DIGEST pulls, so without one of
          # these a tag pull escapes to public quay.io and fails on any node that
          # hasn't cached the image (P3-CAPA: HA degraded after node churn
          # rescheduled the standby pod, 2026-06-11).
          # Version history:
          #   v0.1.0 → init() panic on non-semver build version (semver.MustParse)
          #   v0.1.1 → parseVersionOrFallback fix (a4dc369)
          #   v0.1.2 → explicit credential resolution from env / RAM role (bb1f73e),
          #           required because the aliyun SDK's NewClientWithOptions
          #           returns UnsupportedCredential on a nil credential and
          #           does NOT auto-discover env vars.
          # Tag SSOT = ansible/vars/images.yml (capa_image); 08-deploy-post-install
          # sed-overrides this `image:` with it. This static value is only the
          # fallback for applying the manifest directly — keep it in sync.
          #   skopeo inspect docker://quay.io/samzhu/openshift-capi-alicloud:v0.1.12
          image: quay.io/samzhu/openshift-capi-alicloud:v0.1.12
          imagePullPolicy: IfNotPresent
          command: [/manager]
          args:
            - --leader-elect=true
            - --concurrency=1
          # Inject Alibaba Cloud credentials from a Secret in the same
          # namespace.  Required for CAPA's resolveCredential() to pick
          # them up (the aliyun Go SDK does NOT auto-discover env vars
          # — see https://github.com/SammZhu/openshift-capi-alicloud
          # commit bb1f73e for the rationale).
          #
          # The Secret is NOT shipped here; create it once per cluster
          # with the operator's AK/SK before applying this manifest:
          #
          #   oc -n capa-system create secret generic alibaba-creds \
          #     --from-literal=ALIBABA_CLOUD_ACCESS_KEY_ID=$AK \
          #     --from-literal=ALIBABA_CLOUD_ACCESS_KEY_SECRET=$SK
          #
          # optional=false → Pod won't start until the Secret exists,
          # making the missing-credential mode a hard failure instead
          # of a silent UnsupportedCredential reconcile loop.
          envFrom:
            - secretRef:
                name: alibaba-creds
                optional: false
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9440
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9440
            initialDelaySeconds: 5
            periodSeconds: 10
          # Admission webhook server (defaulting + validation, P3-CAPA.7).
          # controller-runtime serves it on :9443 and reads its TLS cert from
          # /tmp/k8s-webhook-server/serving-certs (tls.crt/tls.key). The cert is
          # minted by the OpenShift service-ca operator into the secret below
          # (see 02-capa-webhooks.yaml Service annotation) — no cert-manager.
          ports:
            - name: webhook-server
              containerPort: 9443
              protocol: TCP
            # Prometheus metrics (--metrics-bind-address :8080): controller-runtime
            # built-ins + the provider's capa_* metrics. Scraped via the metrics
            # Service + ServiceMonitor in 02-capa-metrics.yaml.
            - name: metrics
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
      volumes:
        - name: cert
          secret:
            secretName: capa-webhook-server-cert
            # Populated asynchronously by service-ca after the Service in
            # 02-capa-webhooks.yaml is created; optional=false would deadlock the
            # very first apply, so allow the pod to start and let the kubelet
            # project the cert once it lands.
            optional: true
