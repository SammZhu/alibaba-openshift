---
# Cluster API Provider Alibaba Cloud (CAPA) — Controller
# Provides MachineSet/MachineDeployment auto-scaling support
# Prerequisite: 02-capa-crds.yaml must be applied first
apiVersion: v1
kind: Namespace
metadata:
  name: capa-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: capa-controller-manager
  namespace: capa-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capa-manager-role
rules:
  - apiGroups: [infrastructure.cluster.x-k8s.io]
    resources: [alibabacloudclusters, alibabacloudmachines, alibabacloudclustertemplates, alibabacloudmachinetemplates]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [infrastructure.cluster.x-k8s.io]
    resources: [alibabacloudclusters/status, alibabacloudmachines/status]
    verbs: [get, update, patch]
  - apiGroups: [infrastructure.cluster.x-k8s.io]
    resources: [alibabacloudclusters/finalizers, alibabacloudmachines/finalizers]
    verbs: [update]
  - apiGroups: [cluster.x-k8s.io]
    resources: [clusters, machines, machines/status]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [secrets, events]
    verbs: [get, list, watch, create, update, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capa-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: capa-manager-role
subjects:
  - kind: ServiceAccount
    name: capa-controller-manager
    namespace: capa-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: capa-controller-manager
  namespace: capa-system
  labels:
    app: capa-controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: capa-controller-manager
  template:
    metadata:
      labels:
        app: capa-controller-manager
    spec:
      serviceAccountName: capa-controller-manager
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: quay.io/samzhu/cluster-api-provider-alibaba:latest
          imagePullPolicy: IfNotPresent
          command: [/manager]
          args:
            - --leader-elect=true
            - --concurrency=1
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9440
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9440
            initialDelaySeconds: 5
            periodSeconds: 10
