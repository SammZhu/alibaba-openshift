---
# CatalogSource — tells OLM where to find the alibaba-cloud-csi-operator bundle.
# This manifest is injected at install-time via the install-config extraManifests mechanism.
# OLM will pull the catalog image and discover the operator bundle automatically.
apiVersion: operators.coreos.com/v1alpha1
kind: CatalogSource
metadata:
  name: alibaba-cloud-csi-catalog
  namespace: openshift-marketplace
spec:
  sourceType: grpc
  # Pin to the operator release version (the catalog image shares the operator's
  # semver; SSOT is ansible/vars/images.yml csi_operator_image_tag). NOTE: the
  # primary deploy path is 08 `kustomize build .../config/default` (direct
  # manifests); this CatalogSource/Subscription pair is the alternate OLM path.
  image: quay.io/samzhu/alibaba-cloud-csi-operator-catalog:v0.1.0
  displayName: Alibaba Cloud CSI Operator
  publisher: SammZhu
  updateStrategy:
    registryPoll:
      interval: 24h
