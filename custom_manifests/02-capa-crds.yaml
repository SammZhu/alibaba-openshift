                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              controlPlaneEndpoint:
                description: |-
                  ControlPlaneEndpoint is the endpoint downstream consumers (Machine
                  controller, control-plane provider) use to reach the API server.
                  In BYO mode it mirrors Spec.ControlPlaneEndpoint; the CAPI infra-cluster
                  contract requires this to be populated before status.ready=true.
                minProperties: 1
                properties:
                  host:
                    description: host is the hostname on which the API server is serving.
                    maxLength: 512
                    minLength: 1
                    type: string
                  port:
                    description: port is the port on which the API server is serving.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                type: object
              failureDomains:
                description: |-
                  FailureDomains is the list of failure domains published to CAPI so it can
                  automatically spread Machines across availability zones.
                  Populated by the controller from Spec.FailureDomains.
                items:
                  description: |-
                    FailureDomain is the Schema for Cluster API failure domains.
                    It allows controllers to understand how many failure domains a cluster can optionally span across.
                  properties:
                    attributes:
                      additionalProperties:
                        type: string
                      description: attributes is a free form map of attributes an
                        infrastructure provider might use or require.
                      type: object
                    controlPlane:
                      description: controlPlane determines if this failure domain
                        is suitable for use by control plane machines.
                      type: boolean
                    name:
                      description: name is the name of the failure domain.
                      maxLength: 256
                      minLength: 1
                      type: string
                  required:
                  - name
                  type: object
                type: array
              ready:
                default: false
                description: Ready indicates that the cluster infrastructure is ready.
                type: boolean
              slbInstanceID:
                description: |-
                  SLBInstanceID is the ID of the Server Load Balancer created for the
