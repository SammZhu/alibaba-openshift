---
# Cluster API Provider Alibaba Cloud (CAPA) — CRD definitions
# Source: https://github.com/SammZhu/cluster-api-provider-alibaba
# Provides MachineSet-based auto-scaling (differentiator vs OCI approach)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alibabacloudclusters.infrastructure.cluster.x-k8s.io
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    kind: AlibabaCloudCluster
    listKind: AlibabaCloudClusterList
    plural: alibabacloudclusters
    singular: alibabacloudcluster
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [region]
              properties:
                region:
                  type: string
                vpcID:
                  type: string
                resourceGroupID:
                  type: string
                controlPlaneEndpoint:
                  type: object
                  properties:
                    host:
                      type: string
                    port:
                      type: integer
                      format: int32
                additionalTags:
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                      value:
                        type: string
            status:
              type: object
              properties:
                ready:
                  type: boolean
                vpcID:
                  type: string
                slbInstanceID:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alibabacloudclustertemplates.infrastructure.cluster.x-k8s.io
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    kind: AlibabaCloudClusterTemplate
    listKind: AlibabaCloudClusterTemplateList
    plural: alibabacloudclustertemplates
    singular: alibabacloudclustertemplate
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                template:
                  type: object
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alibabacloudmachines.infrastructure.cluster.x-k8s.io
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    kind: AlibabaCloudMachine
    listKind: AlibabaCloudMachineList
    plural: alibabacloudmachines
    singular: alibabacloudmachine
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [instanceType, imageID]
              properties:
                providerID:
                  type: string
                instanceType:
                  type: string
                imageID:
                  type: string
                regionID:
                  type: string
                zoneID:
                  type: string
                securityGroupIDs:
                  type: array
                  items:
                    type: string
                vSwitchID:
                  type: string
                systemDisk:
                  type: object
                  properties:
                    category:
                      type: string
                    size:
                      type: integer
                ramRoleName:
                  type: string
                tags:
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                      value:
                        type: string
            status:
              type: object
              properties:
                ready:
                  type: boolean
                instanceID:
                  type: string
                instanceState:
                  type: string
                addresses:
                  type: array
                  items:
                    type: object
                conditions:
                  type: array
                  items:
                    type: object
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alibabacloudmachinetemplates.infrastructure.cluster.x-k8s.io
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    kind: AlibabaCloudMachineTemplate
    listKind: AlibabaCloudMachineTemplateList
    plural: alibabacloudmachinetemplates
    singular: alibabacloudmachinetemplate
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                template:
                  type: object
