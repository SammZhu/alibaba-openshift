                  httpEndpoint:
                    description: |-
                      HttpEndpoint enables or disables the metadata endpoint. Defaults to
                      "enabled" when the whole MetadataOptions block is omitted.
                    enum:
                    - enabled
                    - disabled
                    type: string
                  httpPutResponseHopLimit:
