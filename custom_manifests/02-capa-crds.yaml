            properties:
              credentialsSecret:
                description: |-
                  CredentialsSecret refers to a Secret containing Alibaba Cloud credentials.
                  If not specified, the controller uses the ambient credentials from the
                  cluster credential infrastructure.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              dataDisks:
                description: DataDisks describes additional data disks.
                items:
                  description: DataDisk describes an additional data disk for an ECS
                    instance.
                  properties:
                    category:
                      description: Category is the disk category.
                      enum:
                      - cloud_efficiency
                      - cloud_ssd
                      - cloud_essd
                      - cloud_auto
                      type: string
                    encrypted:
                      description: Encrypted enables server-side encryption of the
                        disk.
                      type: boolean
                    kmsKeyID:
                      description: |-
                        KMSKeyID is the ID of the KMS key used to encrypt the disk. When Encrypted
                        is true and KMSKeyID is empty, Alibaba Cloud's default EBS service key is
                        used. Setting KMSKeyID without Encrypted=true is rejected by the webhook.
                      type: string
                    name:
                      description: Name is an optional identifier for the data disk.
                      type: string
                    performanceLevel:
                      description: |-
                        PerformanceLevel is the ESSD performance level. Only meaningful for the
                        cloud_essd category; ignored otherwise.
                      enum:
                      - PL0
                      - PL1
                      - PL2
                      - PL3
                      type: string
                    size:
                      description: Size is the disk size in GiB.
                      minimum: 20
                      type: integer
                  required:
                  - category
                  - size
                  type: object
                type: array
              imageID:
                description: |-
                  ImageID is the ID of the ECS image to use for the instance. When empty, the
                  owning AlibabaCloudCluster's spec.bootImageID is used instead (the cluster
                  RHCOS/discovery boot image). At least one of the two must be set, otherwise
                  provisioning fails with a terminal NoBootImage error.
